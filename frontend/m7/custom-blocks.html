<!DOCTYPE html>

/* ============================================
   M7 积木编排平台 - Brand Design Tokens
   Low-code visual workflow orchestration platform
   Style: Clean modern, light theme, drag interaction, node-based editing
   ============================================ */

:root {
  /* --- Brand Primary --- */
  --brand-primary: #3b82f6;
  --brand-primary-hover: #2563eb;
  --brand-primary-active: #1d4ed8;
  --brand-primary-light: #eff6ff;
  --brand-primary-50: #eff6ff;
  --brand-primary-100: #dbeafe;
  --brand-primary-200: #bfdbfe;
  --brand-primary-500: #3b82f6;
  --brand-primary-600: #2563eb;
  --brand-primary-700: #1d4ed8;

  /* --- State Colors --- */
  --state-success: #10b981;
  --state-success-light: #d1fae5;
  --state-warning: #f59e0b;
  --state-warning-light: #fef3c7;
  --state-error: #ef4444;
  --state-error-light: #fee2e2;
  --state-info: #8b5cf6;
  --state-info-light: #ede9fe;

  /* --- Node Type Colors --- */
  --node-trigger: #10b981;
  --node-ai: #8b5cf6;
  --node-logic: #f59e0b;
  --node-data: #06b6d4;
  --node-tool: #6366f1;
  --node-custom: #64748b;

  /* --- Backgrounds & Surfaces --- */
  --bg-body: #f8fafc;
  --bg-surface: #ffffff;
  --bg-surface-hover: #f1f5f9;
  --bg-surface-active: #e2e8f0;
  --bg-canvas: #f1f5f9;
  --bg-canvas-dots: #cbd5e1;
  --bg-overlay: rgba(0, 0, 0, 0.4);
  --bg-sidebar: #ffffff;
  --bg-toolbar: #ffffff;
  --bg-statusbar: #f8fafc;
  --bg-input: #ffffff;
  --bg-input-focus: #ffffff;

  /* --- Text Colors --- */
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-tertiary: #94a3b8;
  --text-inverse: #ffffff;
  --text-brand: #3b82f6;
  --text-link: #3b82f6;
  --text-placeholder: #94a3b8;

  /* --- Borders --- */
  --border-default: #e2e8f0;
  --border-light: #f1f5f9;
  --border-strong: #cbd5e1;
  --border-brand: #3b82f6;
  --border-focus: #3b82f6;

  /* --- Border Radius --- */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 9999px;

  /* --- Shadows (static: alpha <= 0.05) --- */
  --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.03), 0 2px 4px rgba(0, 0, 0, 0.02);
  --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.04), 0 4px 6px rgba(0, 0, 0, 0.02);
  --shadow-float: 0 20px 25px rgba(0, 0, 0, 0.06), 0 8px 10px rgba(0, 0, 0, 0.04);
  --shadow-node: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-node-selected: 0 0 0 2px #3b82f6, 0 4px 12px rgba(59, 130, 246, 0.15);

  /* --- Spacing Scale --- */
  --space-0: 0px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;

  /* --- Typography --- */
  --font-sans: 'Inter', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;

  --text-xs: 12px;
  --text-sm: 13px;
  --text-base: 14px;
  --text-lg: 16px;
  --text-xl: 18px;
  --text-2xl: 20px;
  --text-3xl: 24px;
  --text-4xl: 30px;

  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.625;

  --weight-normal: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;

  /* --- Canvas Grid Dots --- */
  --canvas-dot-color: #cbd5e1;
  --canvas-dot-size: 1px;
  --canvas-dot-gap: 20px;

  /* --- Connection Lines --- */
  --connection-color: #94a3b8;
  --connection-selected: #3b82f6;
  --connection-width: 2px;
  --connection-selected-width: 3px;

  /* --- Node Port --- */
  --port-size: 10px;
  --port-color: #94a3b8;
  --port-hover: #3b82f6;
  --port-connected: #3b82f6;

  /* --- Transition --- */
  --transition-fast: 150ms ease;
  --transition-normal: 200ms ease;
  --transition-slow: 300ms ease;
}

/* Typography Classes */
.brand-h1 {
  font-family: var(--font-sans);
  font-size: var(--text-4xl);
  font-weight: var(--weight-bold);
  line-height: var(--leading-tight);
  color: var(--text-primary);
  letter-spacing: -0.02em;
}

.brand-h2 {
  font-family: var(--font-sans);
  font-size: var(--text-3xl);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-tight);
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

.brand-h3 {
  font-family: var(--font-sans);
  font-size: var(--text-2xl);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-tight);
  color: var(--text-primary);
}

.brand-h4 {
  font-family: var(--font-sans);
  font-size: var(--text-xl);
  font-weight: var(--weight-medium);
  line-height: var(--leading-normal);
  color: var(--text-primary);
}

.brand-body {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  font-weight: var(--weight-normal);
  line-height: var(--leading-normal);
  color: var(--text-secondary);
}

.brand-body-sm {
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  font-weight: var(--weight-normal);
  line-height: var(--leading-normal);
  color: var(--text-secondary);
}

.brand-caption {
  font-family: var(--font-sans);
  font-size: var(--text-xs);
  font-weight: var(--weight-normal);
  line-height: var(--leading-normal);
  color: var(--text-tertiary);
}

.brand-mono {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  font-weight: var(--weight-normal);
  line-height: var(--leading-normal);
  color: var(--text-secondary);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>

    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--brand-primary);
  }
  @layer base {
    body { background: var(--brand-background); color: var(--brand-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>

</head>

    // 自定义积木数据（从 API 加载）
    var customBlocks = [];
    var selectedIcon = 'puzzle';
    var editingBlockId = null;

    // 图标颜色映射
    var iconColorMap = {
        'zap': 'var(--node-trigger)',
        'sparkles': 'var(--node-ai)',
        'git-branch': 'var(--node-logic)',
        'database': 'var(--node-data)',
        'wrench': 'var(--node-tool)',
        'puzzle': 'var(--node-custom)',
        'mail': 'var(--node-logic)',
        'image': 'var(--node-tool)',
    };

    // 类型颜色映射
    var typeColorMap = {
        '工具块': 'var(--node-tool)',
        '数据块': 'var(--node-data)',
        '逻辑块': 'var(--node-logic)',
    };

    // ========== API 调用 ==========

    // 获取自定义积木列表
    function fetchCustomBlocks() {
        return YunxiAPI.request('GET', '/v1/custom-blocks')
            .then(function(data) {
                customBlocks = (data && data.items) ? data.items : [];
                renderBlocks();
                return customBlocks;
            })
            .catch(function(error) {
                console.warn('获取自定义积木失败:', error.message);
                customBlocks = [];
                renderBlocks();
                throw error;
            });
    }

    // 创建自定义积木
    function apiCreateBlock(blockData) {
        return YunxiAPI.request('POST', '/v1/custom-blocks', { body: blockData });
    }

    // 更新自定义积木
    function apiUpdateBlock(blockId, blockData) {
        return YunxiAPI.request('PUT', '/v1/custom-blocks/' + blockId, { body: blockData });
    }

    // 删除自定义积木
    function apiDeleteBlock(blockId) {
        return YunxiAPI.request('DELETE', '/v1/custom-blocks/' + blockId);
    }

    // ========== 渲染积木列表 ==========

    function renderBlocks() {
        if (!blockListContainer) return;

        if (customBlocks.length === 0) {
            blockListContainer.innerHTML = renderEmptyState();
            if (window.lucide) lucide.createIcons();
            return;
        }

        var html = '';
        for (var i = 0; i < customBlocks.length; i++) {
            html += renderBlockCard(customBlocks[i]);
        }
        blockListContainer.innerHTML = html;

        // 重新绑定事件
        bindBlockCardEvents();

        // 重新初始化图标
        if (window.lucide) lucide.createIcons();
    }

    function renderEmptyState() {
        return '<div class="rounded-lg border p-12 text-center" style="background: var(--bg-surface); border-color: var(--border-default);">' +
            '<div class="w-16 h-16 mx-auto mb-4 rounded-full flex items-center justify-center" style="background: var(--bg-surface-hover);">' +
            '<i data-lucide="package" class="w-8 h-8" style="color: var(--text-tertiary);"></i>' +
            '</div>' +
            '<h3 class="text-sm font-medium mb-1" style="color: var(--text-primary);">暂无自定义积木</h3>' +
            '<p class="text-xs mb-4" style="color: var(--text-tertiary);">点击右上角「新建积木」创建你的第一个自定义积木块</p>' +
            '</div>';
    }

    function renderBlockCard(block) {
        var inputs = (block.ports && block.ports.inputs) ? block.ports.inputs.length : 0;
        var outputs = (block.ports && block.ports.outputs) ? block.ports.outputs.length : 0;
        var iconName = block.icon || 'puzzle';
        var iconColor = iconColorMap[iconName] || 'var(--node-custom)';
        var typeColor = typeColorMap[block.category] || 'var(--node-custom)';

        return '<div class="block-card rounded-lg border p-5 transition-colors duration-150 cursor-pointer" ' +
            'data-block-id="' + block.id + '" ' +
            'style="background: var(--bg-surface); border-color: var(--border-default);" ' +
            'onmouseover="this.style.background=\'var(--bg-surface-hover)\'" ' +
            'onmouseout="this.style.background=\'var(--bg-surface)\'">' +
            '<div class="flex items-center gap-4">' +
            '  <div class="shrink-0 w-10 h-10 rounded-lg flex items-center justify-center" style="background: color-mix(in srgb, ' + iconColor + ' 12%, transparent);">' +
            '    <i data-lucide="' + iconName + '" class="w-5 h-5" style="color: ' + iconColor + ';"></i>' +
            '  </div>' +
            '  <div class="flex-1 min-w-0">' +
            '    <div class="flex items-center gap-2 mb-1">' +
            '      <span class="font-medium text-sm truncate" style="color: var(--text-primary);">' + escapeHtml(block.name) + '</span>' +
            '      <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium whitespace-nowrap" style="background: color-mix(in srgb, ' + typeColor + ' 10%, transparent); color: ' + typeColor + ';">' + escapeHtml(block.category || '工具块') + '</span>' +
            '    </div>' +
            '    <p class="text-xs truncate" style="color: var(--text-secondary);">' + escapeHtml(block.description || '') + '</p>' +
            '    <div class="flex items-center gap-3 mt-2">' +
            '      <span class="flex items-center gap-1 text-xs" style="color: var(--text-tertiary);">' +
            '        <span class="w-2 h-2 rounded-full inline-block" style="background: var(--node-trigger);"></span>' +
            '        ' + inputs + '入' +
            '      </span>' +
            '      <span class="flex items-center gap-1 text-xs" style="color: var(--text-tertiary);">' +
            '        <span class="w-2 h-2 rounded-full inline-block" style="background: var(--brand-primary);"></span>' +
            '        ' + outputs + '出' +
            '      </span>' +
            '    </div>' +
            '  </div>' +
            '  <div class="shrink-0 flex items-center gap-3">' +
            '    <button class="btn-edit text-xs font-medium transition-colors duration-150" style="color: var(--brand-primary);" onmouseover="this.style.color=\'var(--brand-primary-hover)\'" onmouseout="this.style.color=\'var(--brand-primary)\'">编辑</button>' +
            '    <button class="btn-test text-xs font-medium transition-colors duration-150" style="color: var(--state-success);" onmouseover="this.style.opacity=\'0.8\'" onmouseout="this.style.opacity=\'1\'">测试</button>' +
            '    <button class="btn-delete text-xs font-medium transition-colors duration-150" style="color: var(--state-error);" onmouseover="this.style.opacity=\'0.8\'" onmouseout="this.style.opacity=\'1\'">删除</button>' +
            '  </div>' +
            '</div>' +
            '</div>';
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ========== 绑定积木卡片事件 ==========

    function bindBlockCardEvents() {
        var cards = blockListContainer.querySelectorAll('.block-card');
        cards.forEach(function(card) {
            var blockId = card.getAttribute('data-block-id');
            var block = customBlocks.find(function(b) { return b.id === blockId; });
            if (!block) return;

            // 编辑按钮
            var editBtn = card.querySelector('.btn-edit');
            if (editBtn) {
                editBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    editBlock(block.id);
                });
            }

            // 测试按钮
            var testBtn = card.querySelector('.btn-test');
            if (testBtn) {
                testBtn.setAttribute('data-require-ollama', 'true');
                testBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    testBlock(block.id, block.name);
                });
            }

            // 删除按钮
            var deleteBtn = card.querySelector('.btn-delete');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    deleteBlock(block.id, block.name, card);
                });
            }

            // 卡片点击 -> 查看详情
            card.addEventListener('click', function() {
                YunxiAPI.showToast('查看积木：' + block.name, 'info');
            });
        });
    }

    // ========== 读取表单数据 ==========

    function getFormData() {
        var nameInput = document.querySelector('input[placeholder="输入积木块名称"]');
        var descInput = document.querySelector('textarea[placeholder="描述积木块的功能"]');
        var typeSelect = document.querySelectorAll('select')[0];

        var inputs = getInputPorts();
        var outputs = getOutputPorts();

        return {
            name: nameInput ? nameInput.value.trim() : '',
            description: descInput ? descInput.value.trim() : '',
            category: typeSelect ? typeSelect.value : '工具块',
            icon: selectedIcon,
            ports: {
                inputs: inputs,
                outputs: outputs
            },
            code: ''
        };
    }

    function getInputPorts() {
        var tbody = document.querySelectorAll('table tbody')[0];
        if (!tbody) return [];
        var rows = tbody.querySelectorAll('tr');
        var ports = [];
        for (var i = 0; i < rows.length; i++) {
            var input = rows[i].querySelector('input');
            var select = rows[i].querySelector('select');
            if (input && input.value.trim()) {
                ports.push({
                    name: input.value.trim(),
                    type: select ? select.value : 'text'
                });
            }
        }
        return ports;
    }

    function getOutputPorts() {
        var tbody = document.querySelectorAll('table tbody')[1];
        if (!tbody) return [];
        var rows = tbody.querySelectorAll('tr');
        var ports = [];
        for (var i = 0; i < rows.length; i++) {
            var input = rows[i].querySelector('input');
            var select = rows[i].querySelector('select');
            if (input && input.value.trim()) {
                ports.push({
                    name: input.value.trim(),
                    type: select ? select.value : 'json'
                });
            }
        }
        return ports;
    }

    // ========== 新建积木 ==========

    function createBlock() {
        var data = getFormData();
        if (!data.name) {
            YunxiAPI.showToast('请输入积木块名称', 'warning');
            var nameInput = document.querySelector('input[placeholder="输入积木块名称"]');
            if (nameInput) nameInput.focus();
            return;
        }

        YunxiAPI.showLoading('正在创建积木...');
        apiCreateBlock(data)
            .then(function(result) {
                YunxiAPI.hideLoading();
                YunxiAPI.showToast('积木「' + data.name + '」创建成功', 'success');
                resetForm();
                // 刷新列表
                return fetchCustomBlocks();
            })
            .catch(function(error) {
                YunxiAPI.hideLoading();
                YunxiAPI.showToast('创建失败：' + error.message, 'error');
            });
    }

    // ========== 编辑积木 ==========

    function editBlock(id) {
        var block = customBlocks.find(function(b) { return b.id === id; });
        if (!block) return;

        editingBlockId = id;

        // 填充表单
        var nameInput = document.querySelector('input[placeholder="输入积木块名称"]');
        var descInput = document.querySelector('textarea[placeholder="描述积木块的功能"]');
        var typeSelect = document.querySelectorAll('select')[0];

        if (nameInput) nameInput.value = block.name || '';
        if (descInput) descInput.value = block.description || '';
        if (typeSelect) typeSelect.value = block.category || '工具块';

        // 更新选中图标
        selectedIcon = block.icon || 'puzzle';
        updateIconSelectionUI();

        // 填充端口
        fillInputPorts(block.ports && block.ports.inputs ? block.ports.inputs : []);
        fillOutputPorts(block.ports && block.ports.outputs ? block.ports.outputs : []);

        // 更新按钮文字
        var submitBtn = document.querySelector('[data-dom-id="btn-create-submit"]');
        if (submitBtn) {
            submitBtn.innerHTML = '<i data-lucide="save" class="w-4 h-4"></i> 保存修改';
            if (window.lucide) lucide.createIcons();
        }

        // 更新表单标题
        var formTitle = document.querySelector('[data-dom-id="form-title"]');
        if (formTitle) {
            formTitle.textContent = '编辑自定义块';
        }

        // 滚动到表单
        var formPanel = document.querySelector('.lg\\:w-\\[380px\\]');
        if (!formPanel) {
            var panels = document.querySelectorAll('[class*="w-"][class*="shrink-0"]');
            if (panels.length > 0) formPanel = panels[panels.length - 1];
        }
        if (formPanel) {
            formPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        YunxiAPI.showToast('正在编辑：' + block.name, 'info');
    }

    function fillInputPorts(ports) {
        var tbody = document.querySelectorAll('table tbody')[0];
        if (!tbody) return;
        tbody.innerHTML = '';
        if (ports.length === 0) {
            addInputPortRow(tbody, '', 'text');
        } else {
            for (var i = 0; i < ports.length; i++) {
                addInputPortRow(tbody, ports[i].name, ports[i].type || 'text');
            }
        }
        if (window.lucide) lucide.createIcons();
    }

    function fillOutputPorts(ports) {
        var tbody = document.querySelectorAll('table tbody')[1];
        if (!tbody) return;
        tbody.innerHTML = '';
        if (ports.length === 0) {
            addOutputPortRow(tbody, '', 'json');
        } else {
            for (var i = 0; i < ports.length; i++) {
                addOutputPortRow(tbody, ports[i].name, ports[i].type || 'json');
            }
        }
        if (window.lucide) lucide.createIcons();
    }

    function addInputPortRow(tbody, name, type) {
        var tr = document.createElement('tr');
        tr.innerHTML = '<td class="pr-2 pb-2">' +
            '<input type="text" value="' + escapeHtml(name) + '" placeholder="端口名称" class="w-full h-8 px-2 rounded text-xs border outline-none transition-colors" style="background: var(--bg-input); border-color: var(--border-default); color: var(--text-primary);" onfocus="this.style.borderColor=\'var(--border-brand)\'" onblur="this.style.borderColor=\'var(--border-default)\'">' +
            '</td>' +
            '<td class="pr-2 pb-2">' +
            '<select class="w-full h-8 px-2 rounded text-xs border outline-none appearance-none transition-colors" style="background: var(--bg-input); border-color: var(--border-default); color: var(--text-primary);">' +
            '<option' + (type === 'text' ? ' selected' : '') + '>text</option>' +
            '<option' + (type === 'number' ? ' selected' : '') + '>number</option>' +
            '<option' + (type === 'json' ? ' selected' : '') + '>json</option>' +
            '<option' + (type === 'boolean' ? ' selected' : '') + '>boolean</option>' +
            '</select>' +
            '</td>' +
            '<td class="pb-2">' +
            '<button class="text-xs transition-colors" style="color: var(--state-error);" onclick="this.closest(\'tr\').remove(); YunxiAPI.showToast(\'已删除端口\', \'info\');">' +
            '<i data-lucide="x" class="w-3 h-3"></i>' +
            '</button>' +
            '</td>';
        tbody.appendChild(tr);
    }

    function addOutputPortRow(tbody, name, type) {
        var tr = document.createElement('tr');
        tr.innerHTML = '<td class="pr-2 pb-2">' +
            '<input type="text" value="' + escapeHtml(name) + '" placeholder="端口名称" class="w-full h-8 px-2 rounded text-xs border outline-none transition-colors" style="background: var(--bg-input); border-color: var(--border-default); color: var(--text-primary);" onfocus="this.style.borderColor=\'var(--border-brand)\'" onblur="this.style.borderColor=\'var(--border-default)\'">' +
            '</td>' +
            '<td class="pr-2 pb-2">' +
            '<select class="w-full h-8 px-2 rounded text-xs border outline-none appearance-none transition-colors" style="background: var(--bg-input); border-color: var(--border-default); color: var(--text-primary);">' +
            '<option' + (type === 'json' ? ' selected' : '') + '>json</option>' +
            '<option' + (type === 'text' ? ' selected' : '') + '>text</option>' +
            '<option' + (type === 'number' ? ' selected' : '') + '>number</option>' +
            '<option' + (type === 'boolean' ? ' selected' : '') + '>boolean</option>' +
            '</select>' +
            '</td>' +
            '<td class="pb-2">' +
            '<button class="text-xs transition-colors" style="color: var(--state-error);" onclick="this.closest(\'tr\').remove(); YunxiAPI.showToast(\'已删除端口\', \'info\');">' +
            '<i data-lucide="x" class="w-3 h-3"></i>' +
            '</button>' +
            '</td>';
        tbody.appendChild(tr);
    }

    function updateIconSelectionUI() {
        var iconBtns = document.querySelectorAll('.grid.grid-cols-6.gap-2 button');
        var icons = ['zap', 'sparkles', 'git-branch', 'database', 'wrench', 'puzzle'];
        iconBtns.forEach(function(btn, index) {
            if (icons[index] === selectedIcon) {
                btn.style.borderColor = 'var(--brand-primary)';
                btn.style.background = 'var(--brand-primary-light)';
            } else {
                btn.style.borderColor = 'var(--border-default)';
                btn.style.background = 'var(--bg-input)';
            }
        });
    }

    // ========== 删除积木 ==========

    function deleteBlock(id, name, cardEl) {
        YunxiAPI.showConfirm('确定要删除积木「' + name + '」吗？\n删除后所有引用该积木的工作流将受到影响。', '删除积木').then(function(confirmed) {
            if (confirmed) {
                YunxiAPI.showLoading('正在删除...');
                apiDeleteBlock(id)
                    .then(function() {
                        YunxiAPI.hideLoading();
                        if (cardEl) {
                            cardEl.style.opacity = '0';
                            cardEl.style.transform = 'translateX(-20px)';
                            setTimeout(function() {
                                cardEl.remove();
                                YunxiAPI.showToast('积木已删除', 'success');
                                // 刷新列表确保同步
                                fetchCustomBlocks();
                            }, 200);
                        } else {
                            YunxiAPI.showToast('积木已删除', 'success');
                            fetchCustomBlocks();
                        }
                    })
                    .catch(function(error) {
                        YunxiAPI.hideLoading();
                        YunxiAPI.showToast('删除失败：' + error.message, 'error');
                    });
            }
        });
    }

    // ========== 测试积木 ==========

    function testBlock(id, name) {
        YunxiAPI.withValidation(
            { ollama: true },
            async function() {
                YunxiAPI.showLoading('正在测试积木：' + name + '...');
                await new Promise(function(r) { setTimeout(r, 1500); });
                YunxiAPI.hideLoading();
                YunxiAPI.showToast('积木「' + name + '」测试通过', 'success');
            },
            { loadingText: '检查运行环境...' }
        );
    }

    // ========== 重置表单 ==========

    function resetForm() {
        var nameInput = document.querySelector('input[placeholder="输入积木块名称"]');
        var descInput = document.querySelector('textarea[placeholder="描述积木块的功能"]');
        var typeSelect = document.querySelectorAll('select')[0];
        var submitBtn = document.querySelector('[data-dom-id="btn-create-submit"]');

        if (nameInput) nameInput.value = '';
        if (descInput) descInput.value = '';
        if (typeSelect) typeSelect.value = '工具块';
        editingBlockId = null;
        selectedIcon = 'puzzle';
        updateIconSelectionUI();

        // 重置端口为默认一行
        fillInputPorts([{ name: '消息内容', type: 'text' }]);
        fillOutputPorts([{ name: '发送结果', type: 'json' }]);

        if (submitBtn) {
            submitBtn.innerHTML = '创建积木';
        }

        var formTitle = document.querySelector('[data-dom-id="form-title"]');
        if (formTitle) {
            formTitle.textContent = '新建自定义块';
        }
    }

    // ========== 图标选择 ==========

    function selectIcon(iconName, btn) {
        selectedIcon = iconName;
        updateIconSelectionUI();
        YunxiAPI.showToast('已选择图标', 'info');
    }

    // ========== 添加输入端口 ==========

    function addInputPort() {
        var tbody = document.querySelectorAll('table tbody')[0];
        if (!tbody) return;
        addInputPortRow(tbody, '', 'text');
        if (window.lucide) lucide.createIcons();
        YunxiAPI.showToast('已添加输入端口', 'success');
    }

    // ========== 添加输出端口 ==========

    function addOutputPort() {
        var tbody = document.querySelectorAll('table tbody')[1];
        if (!tbody) return;
        addOutputPortRow(tbody, '', 'json');
        if (window.lucide) lucide.createIcons();
        YunxiAPI.showToast('已添加输出端口', 'success');
    }

    // ========== 绑定新建按钮 ==========

    function bindCreateButton() {
        var createBtn = document.querySelector('[data-dom-id="btn-create-block"]');
        if (createBtn) {
            createBtn.addEventListener('click', function() {
                resetForm();
                // 滚动到表单
                var formPanel = document.querySelector('.lg\\:w-\\[380px\\]');
                if (!formPanel) {
                    var panels = document.querySelectorAll('[class*="w-"][class*="shrink-0"]');
                    if (panels.length > 0) formPanel = panels[panels.length - 1];
                }
                if (formPanel) {
                    formPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
                var nameInput = document.querySelector('input[placeholder="输入积木块名称"]');
                if (nameInput) nameInput.focus();
                YunxiAPI.showToast('请填写积木信息', 'info');
            });
        }
    }

    // ========== 绑定提交按钮 ==========

    function bindSubmitButton() {
        var submitBtn = document.querySelector('[data-dom-id="btn-create-submit"]');
        if (submitBtn) {
            submitBtn.addEventListener('click', function() {
                if (editingBlockId) {
                    // 编辑模式
                    var data = getFormData();
                    if (!data.name) {
                        YunxiAPI.showToast('请输入积木块名称', 'warning');
                        var nameInput = document.querySelector('input[placeholder="输入积木块名称"]');
                        if (nameInput) nameInput.focus();
                        return;
                    }
                    YunxiAPI.showLoading('正在保存修改...');
                    apiUpdateBlock(editingBlockId, data)
                        .then(function() {
                            YunxiAPI.hideLoading();
                            YunxiAPI.showToast('积木已更新', 'success');
                            resetForm();
                            return fetchCustomBlocks();
                        })
                        .catch(function(error) {
                            YunxiAPI.hideLoading();
                            YunxiAPI.showToast('更新失败：' + error.message, 'error');
                        });
                } else {
                    // 新建模式
                    createBlock();
                }
            });
        }
    }

    // ========== 绑定图标选择 ==========

    function bindIconSelection() {
        var iconBtns = document.querySelectorAll('.grid.grid-cols-6.gap-2 button');
        var icons = ['zap', 'sparkles', 'git-branch', 'database', 'wrench', 'puzzle'];

        iconBtns.forEach(function(btn, index) {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                selectIcon(icons[index] || 'puzzle', this);
            });
        });
    }

    // ========== 绑定端口添加按钮 ==========

    function bindPortButtons() {
        var addBtns = document.querySelectorAll('[style*="color: var(--brand-primary)"].inline-flex.items-center');
        if (addBtns.length >= 2) {
            addBtns[0].addEventListener('click', function(e) {
                e.preventDefault();
                addInputPort();
            });
            addBtns[1].addEventListener('click', function(e) {
                e.preventDefault();
                addOutputPort();
            });
        }
    }

    // ========== 绑定导航链接 ==========

    function bindNavLinks() {
        var workflowNav = document.querySelector('[data-nav-key="workflows"]');
        if (workflowNav) {
            workflowNav.addEventListener('click', function(e) {
                e.preventDefault();
                YunxiAPI.showLoading('正在加载...');
                setTimeout(function() {
                    YunxiAPI.hideLoading();
                    window.location.href = 'workflow-list.html';
                }, 200);
            });
        }

        var tplNav = document.querySelector('[data-nav-key="templates"]');
        if (tplNav) {
            tplNav.addEventListener('click', function(e) {
                e.preventDefault();
                YunxiAPI.showLoading('正在加载...');
                setTimeout(function() {
                    YunxiAPI.hideLoading();
                    window.location.href = 'templates.html';
                }, 200);
            });
        }
    }

    // ========== 绑定块逻辑单选 ==========

    function bindLogicRadio() {
        var radios = document.querySelectorAll('input[name="block-logic"]');
        radios.forEach(function(radio) {
            radio.addEventListener('change', function() {
                var labels = { 'sub-workflow': '子工作流', 'code': '代码', 'api': 'API' };
                YunxiAPI.showToast('已选择：' + (labels[this.value] || this.value), 'info');
            });
        });
    }

    // ========== 初始化 ==========

    document.addEventListener('DOMContentLoaded', function() {
        blockListContainer = document.getElementById('block-list-container');

        bindCreateButton();
        bindSubmitButton();
        bindIconSelection();
        bindPortButtons();
        bindNavLinks();
        bindLogicRadio();

        // 初始化图标选择 UI
        updateIconSelectionUI();

        // 更新用户头像
        var user = YunxiAPI.getCurrentUser();
        if (user) {
            var userBtn = document.querySelector('button.rounded-full');
            if (userBtn && user.username) {
                userBtn.textContent = user.username.charAt(0).toUpperCase();
            }
        }

        // 加载积木列表
        YunxiAPI.showLoading('正在加载积木...');
        fetchCustomBlocks()
            .finally(function() {
                YunxiAPI.hideLoading();
                // 触发按钮状态同步
                YunxiAPI.updateButtonsBySystemStatus();
            });
    });
    </script>
</body>
</html>
