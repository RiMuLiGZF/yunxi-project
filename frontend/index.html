<!-- 云汐系统 - 统一入口 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云汐工作台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0f0f23 100%);
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            color: #fff;
        }
        .loader { text-align: center; }
        .loader .dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            display: inline-block; margin: 0 6px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loader .dot:nth-child(1) { animation-delay: -0.32s; }
        .loader .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .loader p { margin-top: 20px; color: #94a3b8; font-size: 14px; }
        .loader a { color: #60a5fa; text-decoration: none; font-size: 13px; }
        .nav-links { margin-top: 30px; display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .nav-links a {
            display: inline-block;
            padding: 10px 20px;
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 8px;
            color: #60a5fa;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }
        .nav-links a:hover {
            background: rgba(96, 165, 250, 0.15);
            border-color: rgba(96, 165, 250, 0.6);
        }
        .nav-links a.primary {
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.2), rgba(167, 139, 250, 0.2));
            border-color: rgba(96, 165, 250, 0.5);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="loader">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <p>正在进入云汐工作台...</p>
        <div class="nav-links">
            <a href="portal/index.html" class="primary">统一门户</a>
            <a href="portal/api-docs.html">API 文档</a>
            <a href="startup/index.html">启动引导</a>
            <a href="owner.html">主理人控制台</a>
        </div>
        <p style="margin-top:12px; font-size:12px; color:#64748b;">
            默认进入统一门户 | 也可选择其他入口
        </p>
    </div>
    <script>
        // 3秒后自动跳转到统一门户
        setTimeout(function() {
            if (!window.location.hash) {
                window.location.href = 'portal/index.html';
            }
        }, 3000);
    </script>
</body>
</html>
