<!DOCTYPE html>
<html lang="zh-CN" data-mode="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>云汐 · Yunxi</title>
  <link rel="stylesheet" href="./startup.css">
  <script src="../common/api.js"></script>

</head>
<body class="dark-mode">

  <!-- ==================== Background Layer ==================== -->
  <div class="bg-layer" aria-hidden="true">
    <div class="bg-blob bg-blob--1"></div>
    <div class="bg-blob bg-blob--2"></div>
    <div class="bg-blob bg-blob--3"></div>
    <div class="bg-noise"></div>
  </div>

  <!-- ==================== Layer 1: Splash Screen ==================== -->
  <section id="splash-layer" class="layer layer--active" role="status" aria-label="系统加载">
    <div class="splash-bg"></div>
    <div class="splash-content">
      <div class="splash-logo-wrap">
        <img id="splash-logo" class="splash-logo" src="./yunxi-splash.png" alt="云汐 Logo" style="display:none;">
      </div>
      <div class="splash-status-container">
        <p class="splash-status-main" id="splash-status-main">正在启动云汐系统</p>
        <p class="splash-status-sub" id="splash-status-sub">正在初始化系统组件…</p>
        <div class="splash-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="splash-footer">
        <span class="splash-footer-text">本系统由汐舟主理开发</span>
      </div>
    </div>
  </section>

  <!-- ==================== Layer 2: Greeting ==================== -->
  <section id="greeting-layer" class="layer layer--hidden" role="main" aria-label="问候与概览">
    <div class="greeting-container">

      <!-- Privacy mode badge (hidden by default) -->
      <div class="privacy-badge" id="privacy-badge">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
        <span>隐私模式已开启</span>
      </div>

      <!-- Top bar: Theme toggle + Settings (top-right) -->
      <div class="greeting-topbar">
        <div class="topbar-right">
          <button class="icon-btn" id="theme-toggle" aria-label="切换主题" title="切换深色/浅色模式">
            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <button class="icon-btn" id="settings-btn" aria-label="设置" title="设置">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Greeting text -->
      <div class="greeting-header">
        <h1 class="greeting-text" id="greeting-text">你好，汐舟主理</h1>
        <p class="greeting-date" id="greeting-date"></p>
      </div>

      <!-- Status cards (3 columns) -->
      <div class="status-cards" id="status-cards">
        <div class="status-card glass-card" data-card="overview">
          <div class="status-card__header">
            <span class="status-card__icon">📋</span>
            <h3 class="status-card__title">今日概览</h3>
          </div>
          <div class="status-card__body" id="card-overview-body">
            <!-- JS populates -->
          </div>
        </div>
        <div class="status-card glass-card" data-card="emotion">
          <div class="status-card__header">
            <span class="status-card__icon">💭</span>
            <h3 class="status-card__title">情绪概览</h3>
            <span class="status-card__subtitle">最近 7 天</span>
          </div>
          <div class="status-card__body" id="card-emotion-body">
            <!-- JS populates emotion bars -->
          </div>
        </div>
        <div class="status-card glass-card" data-card="devices">
          <div class="status-card__header">
            <span class="status-card__icon">📡</span>
            <h3 class="status-card__title">设备状态</h3>
          </div>
          <div class="status-card__body" id="card-devices-body">
            <!-- JS populates -->
          </div>
        </div>
      </div>

      <!-- Memory recall section -->
      <div class="memory-section" id="memory-section">
        <h2 class="memory-section__title">最近的记忆</h2>
        <div class="memory-list" id="memory-list">
          <!-- JS populates memory items -->
        </div>
      </div>

      <!-- Action area -->
      <div class="greeting-actions">
        <button class="btn-start-chat" id="btn-start-chat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          开始对话
        </button>
        <div class="quick-scenes" id="quick-scenes">
          <!-- JS populates quick scene chips -->
        </div>
      </div>

      <!-- Scroll hint -->
      <div class="scroll-hint">
        <span>滑动查看更多</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
    </div>
  </section>

  <!-- ==================== Layer 3: Mode Selector ==================== -->
  <section id="mode-selector-layer" class="layer layer--hidden" role="main" aria-label="场景选择">
    <div class="mode-selector-container">

      <!-- Top bar -->
      <div class="mode-topbar">
        <div class="topbar-right">
          <button class="icon-btn theme-toggle-mode" aria-label="切换主题" title="切换深色/浅色模式">
            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <button class="icon-btn settings-btn-mode" aria-label="设置" title="设置">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Radial Mode Selector -->
      <div class="radial-hub">
        <!-- Decorative orbit rings -->
        <div class="orbit-ring orbit-ring--1"></div>
        <div class="orbit-ring orbit-ring--2"></div>
        <div class="orbit-ring orbit-ring--3"></div>

        <!-- Center avatar - Canvas particle sphere -->
        <div class="hub-center">
          <div class="hub-avatar">
            <canvas id="hubAvatarCanvas" width="240" height="240" style="width:120px;height:120px;"></canvas>
          </div>
          <div class="hub-label">云汐 M4</div>
          <div class="hub-sublabel">呼吸</div>
        </div>

        <!-- Mode buttons positioned in a circle -->
        <button class="mode-btn mode-btn--1" data-scene="work-dev" style="--btn-color: #7C5CFC; --btn-glow: rgba(124,92,252,0.4);">
          <div class="mode-btn__icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/><line x1="14" y1="4" x2="10" y2="20"/></svg>
          </div>
          <span class="mode-btn__name">工作开发</span>
        </button>

        <button class="mode-btn mode-btn--2" data-scene="study-plan" style="--btn-color: #00D26A; --btn-glow: rgba(0,210,106,0.4);">
          <div class="mode-btn__icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
          <span class="mode-btn__name">学业规划</span>
        </button>

        <button class="mode-btn mode-btn--3" data-scene="review-summary" style="--btn-color: #A855F7; --btn-glow: rgba(168,85,247,0.4);">
          <div class="mode-btn__icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          </div>
          <span class="mode-btn__name">复盘总结</span>
        </button>

        <button class="mode-btn mode-btn--4" data-scene="social-relation" style="--btn-color: #FF7D97; --btn-glow: rgba(255,125,151,0.4);">
          <div class="mode-btn__icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <span class="mode-btn__name">人际关系</span>
        </button>

        <button class="mode-btn mode-btn--5" data-scene="emotion-comfort" style="--btn-color: #FF6B9D; --btn-glow: rgba(255,107,157,0.4);">
          <div class="mode-btn__icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </div>
          <span class="mode-btn__name">情绪陪伴</span>
        </button>

        <button class="mode-btn mode-btn--6" data-scene="life-management" style="--btn-color: #FFB347; --btn-glow: rgba(255,179,71,0.4);">
          <div class="mode-btn__icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </div>
          <span class="mode-btn__name">生活管理</span>
        </button>

        <button class="mode-btn mode-btn--7" data-scene="appearance-workshop" style="--btn-color: #4ECDC4; --btn-glow: rgba(78,205,196,0.4);">
          <div class="mode-btn__icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="2.5"/><path d="M17.5 10.5c0-2.5-2-4.5-4.5-4.5s-4.5 2-4.5 4.5"/><circle cx="8.5" cy="13.5" r="2.5"/><path d="M12.5 17.5c0-2.5-2-4.5-4.5-4.5s-4.5 2-4.5 4.5"/><circle cx="14" cy="18" r="3"/></svg>
          </div>
          <span class="mode-btn__name">形象工坊</span>
        </button>
      </div>

      <!-- Bottom action: Start Conversation -->
      <div class="hub-action">
        <button class="btn-start-conversation" id="btn-start-conversation" data-href="../modes/main-chat.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          开启对话
        </button>
      </div>

      <!-- Floating particles decoration -->
      <div class="floating-particles" aria-hidden="true">
        <div class="particle particle--1"></div>
        <div class="particle particle--2"></div>
        <div class="particle particle--3"></div>
        <div class="particle particle--4"></div>
        <div class="particle particle--5"></div>
        <div class="particle particle--6"></div>
        <div class="particle particle--7"></div>
        <div class="particle particle--8"></div>
      </div>

    </div>
  </section>

  <!-- ==================== Settings Dropdown ==================== -->
  <div class="settings-dropdown" id="settings-dropdown" role="menu" aria-label="设置菜单">
    <button class="settings-dropdown__item" role="menuitem">显示设置</button>
    <button class="settings-dropdown__item" role="menuitem">隐私与安全</button>
    <button class="settings-dropdown__item" role="menuitem">关于云汐</button>
  </div>

  <!-- ==================== Toast Container ==================== -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="./startup.js"></script>
</body>
</html>
