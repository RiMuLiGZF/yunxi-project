<html lang="zh-CN" class="light">
<head>

    <style id="theme-vars">
/* ============================================================
   M8 云汐管理台 (M8 Control Tower) — Brand Design Tokens
   Dual-mode: Light (default) / Dark (.dark)
   ============================================================ */

:root {
  /* ── Color System (Light Mode — Default) ── */
  --color-primary: #2563eb;
  --color-primary-hover: #1d4ed8;
  --color-primary-active: #1e40af;
  --color-secondary: #0891b2;
  --color-gradient-start: #2563eb;
  --color-gradient-end: #0891b2;

  --color-bg-base: #e8f4f8;
  --color-bg-elevated: #ffffff;
  --color-bg-surface: #ffffff;
  --color-bg-overlay: rgba(255, 255, 255, 0.95);
  --color-bg-card: #ffffff;
  --color-bg-gradient: linear-gradient(160deg, #dbeafe 0%, #cffafe 25%, #e0f2fe 50%, #bae6fd 75%, #e0f7fa 100%);
  --color-bg-gradient-alt: linear-gradient(200deg, #e0f2fe 0%, #ccfbf1 30%, #dbeafe 60%, #e0f7fa 80%, #f0f9ff 100%);

  --color-border-default: rgba(15, 23, 42, 0.1);
  --color-border-subtle: rgba(15, 23, 42, 0.06);
  --color-border-strong: rgba(15, 23, 42, 0.2);

  --color-text-primary: #0f172a;
  --color-text-secondary: #475569;
  --color-text-tertiary: #94a3b8;
  --color-text-inverse: #f8fafc;

  --state-success: #059669;
  --state-warning: #d97706;
  --state-error: #dc2626;
  --state-info: #2563eb;

  --color-glow-primary: rgba(37, 99, 235, 0.12);
  --color-glow-secondary: rgba(8, 145, 178, 0.1);
  --color-glow-ocean: rgba(14, 116, 144, 0.08);
  --color-ocean-deep: #dbeafe;
  --color-ocean-mid: #cffafe;
  --color-ocean-light: #e0f2fe;
  --color-ocean-surface: #bae6fd;
  --color-ocean-foam: rgba(56, 189, 248, 0.06);

  /* ── Typography ── */
  --font-family-base: 'Inter', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
  --font-family-display: 'Inter', 'PingFang SC', 'Noto Sans SC', sans-serif;
  --font-family-mono: 'JetBrains Mono', 'Fira Code', monospace;

  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.875rem;
  --text-lg: 1rem;
  --text-xl: 1.125rem;
  --text-2xl: 1.375rem;
  --text-3xl: 1.625rem;
  --text-4xl: 2rem;

  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.625;

  --tracking-tight: -0.02em;
  --tracking-normal: 0;
  --tracking-wide: 0.025em;

  /* ── Spacing ── */
  --spacing-0: 0;
  --spacing-1: 0.25rem;
  --spacing-2: 0.5rem;
  --spacing-3: 0.75rem;
  --spacing-4: 1rem;
  --spacing-5: 1.25rem;
  --spacing-6: 1.5rem;
  --spacing-8: 2rem;
  --spacing-10: 2.5rem;
  --spacing-12: 3rem;
  --spacing-16: 4rem;

  /* ── Radius ── */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows (Light) ── */
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 4px 20px rgba(0, 0, 0, 0.1), 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-glow: 0 0 20px rgba(37, 99, 235, 0.1);
  --shadow-glow-strong: 0 0 30px rgba(37, 99, 235, 0.18);

  /* ── Transitions ── */
  --transition-fast: 150ms ease;
  --transition-base: 200ms ease;
  --transition-slow: 300ms ease;

  /* ── Layout ── */
  --sidebar-width: 240px;
  --header-height: 56px;
  --content-max-width: 1400px;

  /* ── Z-index ── */
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-modal-backdrop: 300;
  --z-modal: 400;
  --z-toast: 500;
}

/* ============================================================
   Dark Mode Override
   ============================================================ */
html.dark {
  --color-primary: #3b82f6;
  --color-primary-hover: #2563eb;
  --color-primary-active: #1d4ed8;
  --color-secondary: #06b6d4;
  --color-gradient-start: #3b82f6;
  --color-gradient-end: #06b6d4;

  --color-bg-base: #0a1929;
  --color-bg-elevated: rgba(16, 40, 65, 0.75);
  --color-bg-surface: rgba(16, 40, 65, 0.75);
  --color-bg-overlay: rgba(8, 20, 36, 0.92);
  --color-bg-card: rgba(16, 40, 65, 0.65);
  --color-bg-gradient: linear-gradient(160deg, #061220 0%, #0a2342 25%, #0d3050 50%, #0a2844 75%, #071a30 100%);
  --color-bg-gradient-alt: linear-gradient(200deg, #071828 0%, #0b2a4a 30%, #0e3858 60%, #0a2e4e 80%, #081e35 100%);

  --color-border-default: rgba(148, 163, 184, 0.12);
  --color-border-subtle: rgba(148, 163, 184, 0.06);
  --color-border-strong: rgba(148, 163, 184, 0.24);

  --color-text-primary: #f1f5f9;
  --color-text-secondary: #94a3b8;
  --color-text-tertiary: #64748b;
  --color-text-inverse: #0f172a;

  --state-success: #10b981;
  --state-warning: #f59e0b;
  --state-error: #ef4444;
  --state-info: #3b82f6;

  --color-glow-primary: rgba(59, 130, 246, 0.3);
  --color-glow-secondary: rgba(6, 182, 212, 0.25);
  --color-glow-ocean: rgba(14, 116, 144, 0.2);
  --color-ocean-deep: #061220;
  --color-ocean-mid: #0a2342;
  --color-ocean-light: #0d3050;
  --color-ocean-surface: #0e3858;
  --color-ocean-foam: rgba(56, 189, 248, 0.08);

  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 4px 20px rgba(0, 0, 0, 0.3);
  --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.15);
  --shadow-glow-strong: 0 0 30px rgba(59, 130, 246, 0.25);
}

/* ============================================================
   Global Background
   ============================================================ */
html {
  background: var(--color-bg-gradient);
  background-attachment: fixed;
  min-height: 100%;
}

body {
  background: transparent;
}

/* ============================================================
   Utility Classes
   ============================================================ */
.ocean-gradient-bg {
  background: var(--color-bg-gradient);
}

.ocean-gradient-alt-bg {
  background: var(--color-bg-gradient-alt);
}

.ocean-glow {
  box-shadow: 0 0 40px rgba(6, 182, 212, 0.1), 0 0 80px rgba(59, 130, 246, 0.05);
}

.ocean-shimmer {
  background: linear-gradient(135deg, rgba(14, 56, 88, 0.3) 0%, rgba(6, 35, 66, 0.1) 50%, rgba(14, 116, 144, 0.15) 100%);
}

.brand-gradient-text {
  background: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.brand-gradient-bg {
  background: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end));
}

.brand-gradient-border {
  border-image: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end)) 1;
}

.glass-surface {
  background: rgba(30, 41, 59, 0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--color-border-subtle);
}

/* Light mode glass override */
html:not(.dark) .glass-surface {
  background: rgba(255, 255, 255, 0.75);
  border: 1px solid rgba(15, 23, 42, 0.08);
}

.glow-effect {
  box-shadow: var(--shadow-glow);
}

.glow-effect-strong {
  box-shadow: var(--shadow-glow-strong);
}

/* ── Typography Scale Classes ── */
.text-display {
  font-family: var(--font-family-display);
  font-size: var(--text-4xl);
  font-weight: 700;
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
}

.text-heading {
  font-family: var(--font-family-display);
  font-size: var(--text-2xl);
  font-weight: 600;
  line-height: var(--leading-tight);
}

.text-subheading {
  font-family: var(--font-family-display);
  font-size: var(--text-lg);
  font-weight: 500;
  line-height: var(--leading-normal);
}

.text-body {
  font-family: var(--font-family-base);
  font-size: var(--text-base);
  font-weight: 400;
  line-height: var(--leading-normal);
}

.text-caption {
  font-family: var(--font-family-base);
  font-size: var(--text-sm);
  font-weight: 400;
  line-height: var(--leading-normal);
  color: var(--color-text-secondary);
}

.text-label {
  font-family: var(--font-family-base);
  font-size: var(--text-xs);
  font-weight: 500;
  line-height: var(--leading-normal);
  letter-spacing: var(--tracking-wide);
  text-transform: uppercase;
  color: var(--color-text-tertiary);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>

    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-secondary: var(--color-secondary);
  }
  @layer base {
    body { background: var(--color-bg-base); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }

        align-items: center;
        justify-content: center;

        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="background: var(--color-bg-gradient); background-attachment: fixed;">

    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 bottom-0 w-[240px] flex flex-col border-r" style="background: rgba(255, 255, 255, 0.85); border-color: var(--color-border-default); z-index: var(--z-sticky);">
        <!-- Logo -->
        <div class="flex items-center gap-3 px-5 h-14 border-b" style="border-color: var(--color-border-subtle);">
            <div class="w-8 h-8 rounded-lg brand-gradient-bg flex items-center justify-center">
                <i data-lucide="hexagon" class="w-4 h-4" style="color: var(--color-text-inverse);"></i>
            </div>
            <span class="text-heading truncate" style="color: var(--color-text-primary); font-size: var(--text-lg);">云汐管理台</span>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 py-4 px-3 space-y-1 overflow-y-auto no-scrollbar">
            <a data-dom-id="nav-dashboard" href="dashboard.html" class="flex items-center gap-3 px-3 py-2 rounded-lg truncate" style="color: var(--color-text-secondary); transition: var(--transition-fast);">
                <i data-lucide="layout-dashboard" class="w-[18px] h-[18px] shrink-0"></i>
                <span class="truncate" style="font-size: var(--text-sm);">总览</span>
            </a>
            <a data-dom-id="nav-tasks-hidden" href="tasks.html" class="flex items-center gap-3 px-3 py-2 rounded-lg truncate" style="color: var(--color-text-secondary); transition: var(--transition-fast);">
                <i data-lucide="list-checks" class="w-[18px] h-[18px] shrink-0"></i>
                <span class="truncate" style="font-size: var(--text-sm);">任务中心</span>
            </a>
            <a data-dom-id="nav-modules-hidden" href="modules.html" class="flex items-center gap-3 px-3 py-2 rounded-lg truncate" style="color: var(--color-text-secondary); transition: var(--transition-fast);">
                <i data-lucide="boxes" class="w-[18px] h-[18px] shrink-0"></i>
                <span class="truncate" style="font-size: var(--text-sm);">模块管理</span>
            </a>
            <a data-dom-id="nav-deploy-hidden" href="deploy.html" class="flex items-center gap-3 px-3 py-2 rounded-lg truncate" style="color: var(--color-text-secondary); transition: var(--transition-fast);">
                <i data-lucide="rocket" class="w-[18px] h-[18px] shrink-0"></i>
                <span class="truncate" style="font-size: var(--text-sm);">部署管理</span>
            </a>
            <a data-dom-id="nav-monitor-hidden" href="monitor.html" class="flex items-center gap-3 px-3 py-2 rounded-lg truncate" style="color: var(--color-text-secondary); transition: var(--transition-fast);">
                <i data-lucide="activity" class="w-[18px] h-[18px] shrink-0"></i>
                <span class="truncate" style="font-size: var(--text-sm);">系统监控</span>
            </a>

            <div class="my-3" style="border-top: 1px solid var(--color-border-subtle);"></div>

            <a data-dom-id="nav-settings-active" href="settings.html" class="flex items-center gap-3 px-3 py-2 rounded-lg truncate" style="background: rgba(59, 130, 246, 0.1); color: var(--color-primary); border-left: 3px solid var(--color-primary);">
                <i data-lucide="settings" class="w-[18px] h-[18px] shrink-0"></i>
                <span class="truncate" style="font-size: var(--text-sm); font-weight: 500;">系统设置</span>
            </a>
        </nav>

        <!-- User -->
        <div class="px-4 py-3 border-t flex items-center gap-3" style="border-color: var(--color-border-subtle);">
            <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0" style="background: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end));">
                <span class="text-xs font-semibold" style="color: var(--color-text-inverse);">管</span>
            </div>
            <div class="flex-1 min-w-0">
                <div class="truncate" style="font-size: var(--text-sm); font-weight: 500; color: var(--color-text-primary);">管理员</div>
                <div class="truncate" style="font-size: var(--text-xs); color: var(--color-text-tertiary);">admin</div>
            </div>
            <i data-lucide="log-out" class="w-4 h-4 shrink-0" style="color: var(--color-text-tertiary);"></i>
        </div>
    </aside>

    <!-- Header -->
    <header class="fixed top-0 left-[240px] right-0 h-14 flex items-center justify-between px-6 border-b" style="background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border-color: var(--color-border-default); z-index: var(--z-sticky);">
        <div class="flex items-center gap-2">
            <i data-lucide="settings" class="w-5 h-5" style="color: var(--color-primary);"></i>
            <h1 class="text-heading" style="font-size: var(--text-lg);">系统设置</h1>
        </div>
        <div class="flex items-center gap-4">
            <button class="relative p-2 rounded-lg" style="color: var(--color-text-secondary);">
                <i data-lucide="bell" class="w-[18px] h-[18px]"></i>

            </button>
            <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg" style="background: var(--color-bg-elevated);">

                <span style="font-size: var(--text-xs); color: var(--color-text-secondary);">深色模式</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="ml-[240px] pt-14" style="min-height: 100vh; background: var(--color-bg-base);">
        <div class="flex" style="min-height: calc(100vh - 56px);">

            <!-- Left Tab Navigation -->
            <nav class="w-[180px] shrink-0 py-6 px-4 border-r" style="background: var(--color-bg-base); border-color: var(--color-border-subtle);">
                <div class="space-y-1">
                    <button class="w-full text-left flex items-center gap-2.5 px-3 py-2.5 rounded-lg" style="background: rgba(59, 130, 246, 0.1); color: var(--color-primary); border-left: 3px solid; border-image: linear-gradient(180deg, var(--color-gradient-start), var(--color-gradient-end)) 1; font-size: var(--text-sm); font-weight: 500;">
                        <i data-lucide="sliders-horizontal" class="w-4 h-4 shrink-0"></i>
                        <span>基本设置</span>
                    </button>
                    <button class="w-full text-left flex items-center gap-2.5 px-3 py-2.5 rounded-lg border-l-[3px] border-transparent" style="color: var(--color-text-secondary); font-size: var(--text-sm);">
                        <i data-lucide="users" class="w-4 h-4 shrink-0"></i>
                        <span>用户管理</span>
                    </button>
                    <button class="w-full text-left flex items-center gap-2.5 px-3 py-2.5 rounded-lg border-l-[3px] border-transparent" style="color: var(--color-text-secondary); font-size: var(--text-sm);">

                    <button class="w-full text-left flex items-center gap-2.5 px-3 py-2.5 rounded-lg border-l-[3px] border-transparent" style="color: var(--color-text-secondary); font-size: var(--text-sm);">

                        <span>API 密钥</span>

                    <button class="w-full text-left flex items-center gap-2.5 px-3 py-2.5 rounded-lg border-l-[3px] border-transparent" style="color: var(--color-text-secondary); font-size: var(--text-sm);">
                        <i data-lucide="lock" class="w-4 h-4 shrink-0"></i>
                        <span>安全设置</span>
                    </button>
                </div>
            </nav>

                        <div class="flex items-center gap-2 mb-6">
                            <i data-lucide="info" class="w-5 h-5" style="color: var(--color-primary);"></i>
                            <h2 style="font-size: var(--text-lg); font-weight: 600; color: var(--color-text-primary);">系统信息</h2>

                                </div>

                    </section>

                    <!-- Section 2: 大模型配置 -->

                        <div class="flex items-center gap-2 mb-6">

                        </div>

                        <div class="space-y-5">
                            <!-- AI Provider -->
                            <div>
                                <label class="block mb-2" style="font-size: var(--text-sm); font-weight: 500; color: var(--color-text-secondary);">AI Provider</label>
                                <div class="relative">
                                    <select class="w-full px-4 py-2.5 rounded-lg appearance-none outline-none cursor-pointer" style="background: var(--color-bg-base); border: 1px solid var(--color-border-default); color: var(--color-text-primary); font-size: var(--text-sm); transition: var(--transition-fast);" onfocus="this.style.borderColor='var(--color-primary)'; this.style.boxShadow='0 0 0 3px var(--color-glow-primary)';" onblur="this.style.borderColor='var(--color-border-default)'; this.style.boxShadow='none';">
                                        <option>OpenAI</option>
                                        <option>Azure</option>
                                        <option>本地模型</option>
                                    </select>
                                    <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 pointer-events-none" style="color: var(--color-text-tertiary);"></i>
                                </div>
                            </div>

                            <!-- API Key -->
                            <div>
                                <label class="block mb-2" style="font-size: var(--text-sm); font-weight: 500; color: var(--color-text-secondary);">API Key</label>
                                <div class="relative">
                                    <input id="apiKeyInput" type="password" value="sk-xxxxxxxxxxxxxxxxxxxx" class="w-full px-4 py-2.5 pr-10 rounded-lg outline-none" style="background: var(--color-bg-base); border: 1px solid var(--color-border-default); color: var(--color-text-primary); font-size: var(--text-sm); font-family: var(--font-family-mono); transition: var(--transition-fast);" onfocus="this.style.borderColor='var(--color-primary)'; this.style.boxShadow='0 0 0 3px var(--color-glow-primary)';" onblur="this.style.borderColor='var(--color-border-default)'; this.style.boxShadow='none';">
                                    <button class="absolute right-3 top-1/2 -translate-y-1/2" style="color: var(--color-text-tertiary);" onclick="const inp=document.getElementById('apiKeyInput'); inp.type=inp.type==='password'?'text':'password';">
                                        <i data-lucide="eye" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- 模型选择 -->
                            <div>
                                <label class="block mb-2" style="font-size: var(--text-sm); font-weight: 500; color: var(--color-text-secondary);">模型选择</label>
                                <div class="relative">
                                    <select class="w-full px-4 py-2.5 rounded-lg appearance-none outline-none cursor-pointer" style="background: var(--color-bg-base); border: 1px solid var(--color-border-default); color: var(--color-text-primary); font-size: var(--text-sm); transition: var(--transition-fast);" onfocus="this.style.borderColor='var(--color-primary)'; this.style.boxShadow='0 0 0 3px var(--color-glow-primary)';" onblur="this.style.borderColor='var(--color-border-default)'; this.style.boxShadow='none';">
                                        <option>GPT-4</option>
                                        <option>GPT-3.5</option>
                                        <option>Claude</option>
                                        <option>自定义</option>
                                    </select>
                                    <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 pointer-events-none" style="color: var(--color-text-tertiary);"></i>
                                </div>
                            </div>

                            <!-- 温度参数 -->
                            <div>
                                <div class="flex items-center justify-between mb-2">
                                    <label style="font-size: var(--text-sm); font-weight: 500; color: var(--color-text-secondary);">温度参数</label>
                                    <span style="font-size: var(--text-sm); font-family: var(--font-family-mono); color: var(--color-primary); font-weight: 600;">0.7</span>
                                </div>
                                <div class="flex items-center gap-4">
                                    <span style="font-size: var(--text-xs); color: var(--color-text-tertiary);">0</span>
                                    <input type="range" min="0" max="2" step="0.1" value="0.7" class="flex-1 h-1.5 rounded-full appearance-none cursor-pointer" style="background: var(--color-border-default); accent-color: var(--color-primary);">
                                    <span style="font-size: var(--text-xs); color: var(--color-text-tertiary);">2</span>
                                </div>
                                <div class="flex justify-between mt-1">
                                    <span style="font-size: var(--text-xs); color: var(--color-text-tertiary);">精确</span>
                                    <span style="font-size: var(--text-xs); color: var(--color-text-tertiary);">创意</span>
                                </div>
                            </div>

                            <!-- 最大Token -->
                            <div>
                                <label class="block mb-2" style="font-size: var(--text-sm); font-weight: 500; color: var(--color-text-secondary);">最大 Token</label>
                                <input type="number" value="4096" min="256" max="128000" class="w-full px-4 py-2.5 rounded-lg outline-none" style="background: var(--color-bg-base); border: 1px solid var(--color-border-default); color: var(--color-text-primary); font-size: var(--text-sm); font-family: var(--font-family-mono); transition: var(--transition-fast);" onfocus="this.style.borderColor='var(--color-primary)'; this.style.boxShadow='0 0 0 3px var(--color-glow-primary)';" onblur="this.style.borderColor='var(--color-border-default)'; this.style.boxShadow='none';">
                            </div>
                        </div>
                    </section>

                    <!-- Section 3: 全局参数 -->
                    <section class="rounded-xl p-6" style="background: var(--color-bg-elevated); border: 1px solid var(--color-border-default);">
                        <div class="flex items-center gap-2 mb-6">
                            <i data-lucide="gauge" class="w-5 h-5" style="color: var(--color-secondary);"></i>
                            <h2 style="font-size: var(--text-lg); font-weight: 600; color: var(--color-text-primary);">全局参数</h2>
                        </div>

                        <div class="grid grid-cols-2 gap-5">
                            <!-- 最大并发任务数 -->
                            <div>
                                <label class="block mb-2" style="font-size: var(--text-sm); font-weight: 500; color: var(--color-text-secondary);">最大并发任务数</label>
                                <input type="number" value="10" min="1" max="100" class="w-full px-4 py-2.5 rounded-lg outline-none" style="background: var(--color-bg-base); border: 1px solid var(--color-border-default); color: var(--color-text-primary); font-size: var(--text-sm); font-family: var(--font-family-mono); transition: var(--transition-fast);" onfocus="this.style.borderColor='var(--color-primary)'; this.style.boxShadow='0 0 0 3px var(--color-glow-primary)';" onblur="this.style.borderColor='var(--color-border-default)'; this.style.boxShadow='none';">
                            </div>

                            <!-- 任务超时时间 -->
                            <div>
                                <label class="block mb-2" style="font-size: var(--text-sm); font-weight: 500; color: var(--color-text-secondary);">任务超时时间</label>
                                <div class="flex items-center">
                                    <input type="number" value="30" min="1" max="1440" class="flex-1 px-4 py-2.5 rounded-lg outline-none" style="background: var(--color-bg-base); border: 1px solid var(--color-border-default); border-right: none; color: var(--color-text-primary); font-size: var(--text-sm); font-family: var(--font-family-mono); border-radius: var(--radius-md) 0 0 var(--radius-md); transition: var(--transition-fast);" onfocus="this.style.borderColor='var(--color-primary)'; this.style.boxShadow='0 0 0 3px var(--color-glow-primary)';" onblur="this.style.borderColor='var(--color-border-default)'; this.style.boxShadow='none';">
                                    <span class="px-4 py-2.5 rounded-r-lg whitespace-nowrap" style="background: var(--color-bg-base); border: 1px solid var(--color-border-default); color: var(--color-text-tertiary); font-size: var(--text-sm); border-left: none; border-radius: 0 var(--radius-md) var(--radius-md) 0;">分钟</span>
                                </div>
                            </div>

                            <!-- 日志保留天数 -->
                            <div>
                                <label class="block mb-2" style="font-size: var(--text-sm); font-weight: 500; color: var(--color-text-secondary);">日志保留天数</label>
                                <div class="flex items-center">
                                    <input type="number" value="30" min="1" max="365" class="flex-1 px-4 py-2.5 rounded-lg outline-none" style="background: var(--color-bg-base); border: 1px solid var(--color-border-default); border-right: none; color: var(--color-text-primary); font-size: var(--text-sm); font-family: var(--font-family-mono); border-radius: var(--radius-md) 0 0 var(--radius-md); transition: var(--transition-fast);" onfocus="this.style.borderColor='var(--color-primary)'; this.style.boxShadow='0 0 0 3px var(--color-glow-primary)';" onblur="this.style.borderColor='var(--color-border-default)'; this.style.boxShadow='none';">
                                    <span class="px-4 py-2.5 rounded-r-lg whitespace-nowrap" style="background: var(--color-bg-base); border: 1px solid var(--color-border-default); color: var(--color-text-tertiary); font-size: var(--text-sm); border-left: none; border-radius: 0 var(--radius-md) var(--radius-md) 0;">天</span>
                                </div>
                            </div>

                            <!-- 自动重启 -->
                            <div class="flex items-center justify-between col-span-2 py-1">
                                <div>
                                    <label class="block" style="font-size: var(--text-sm); font-weight: 500; color: var(--color-text-secondary);">自动重启</label>
                                    <p style="font-size: var(--text-xs); color: var(--color-text-tertiary); margin-top: 2px;">任务失败后自动重启</p>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span style="font-size: var(--text-xs); color: var(--color-text-tertiary);">关闭</span>
                                    <!-- Toggle Switch (on / active) -->
                                    <button class="relative w-11 h-6 rounded-full" style="background: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end)); transition: var(--transition-fast);">
                                        <span class="absolute top-0.5 right-0.5 w-5 h-5 rounded-full bg-white shadow-md" style="transition: var(--transition-fast);"></span>
                                    </button>
                                    <span style="font-size: var(--text-xs); color: var(--color-text-primary); font-weight: 500;">开启</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- Save Button -->
                    <div class="flex justify-end pb-8">
                        <button class="brand-gradient-bg px-8 py-2.5 rounded-lg flex items-center gap-2 font-medium" style="color: white; font-size: var(--text-sm); box-shadow: var(--shadow-glow); transition: var(--transition-fast);">
                            <i data-lucide="save" class="w-4 h-4"></i>
                            <span>保存设置</span>
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </main>

    
    <!-- Page API Integration -->
    <script src="../common/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态
            if (!YunxiAPI.isLoggedIn()) {
                YunxiAPI.redirectToLogin();
                return;
            }

            // 设置导航链接
            setupNavigation();

            // 更新用户信息
            updateUserInfo();
        });

        function setupNavigation() {
            var navItems = {
            'nav-dashboard': 'dashboard.html',
            'nav-tasks': 'tasks.html',
            'nav-tasks-active': 'tasks.html',
            'nav-tasks-hidden': 'tasks.html',
            'nav-modules': 'modules.html',
            'nav-modules-active': 'modules.html',
            'nav-modules-hidden': 'modules.html',
            'nav-deploy': 'deploy.html',
            'nav-deploy-active': 'deploy.html',
            'nav-deploy-hidden': 'deploy.html',
            'nav-monitor': 'monitor.html',
            'nav-monitor-active': 'monitor.html',
            'nav-monitor-hidden': 'monitor.html',
            'nav-settings': 'settings.html',
            'nav-settings-active': 'settings.html',
            'nav-settings-hidden': 'settings.html'
        };

            Object.keys(navItems).forEach(function(id) {
                var el = document.querySelector('[data-dom-id="' + id + '"]');
                if (el) {
                    el.addEventListener('click', function(e) {
                        e.preventDefault();
                        location.href = navItems[id];
                    });
                }
            });
        }

        function updateUserInfo() {
            var user = YunxiAPI.getCurrentUser();
            if (user) {
                var username = user.username || '管';
                var initial = username.charAt(0).toUpperCase();
                // 更新侧边栏用户头像
                var sidebarUser = document.querySelector('aside .w-8.h-8.rounded-full');
                if (sidebarUser && sidebarUser.textContent.trim() === '管') {
                    sidebarUser.textContent = initial;
                }
                // 更新顶部用户头像
                var headerUser = document.querySelector('header .w-8.h-8.rounded-full');
                if (headerUser && headerUser.textContent.trim() === '管') {
                    headerUser.textContent = initial;
                }
                // 更新用户名显示
                var userNameSpan = document.querySelector('aside span.text-sm');
                if (userNameSpan && userNameSpan.textContent.trim() === '管理员') {
                    userNameSpan.textContent = username;
                }
            }
        }
    </script>


    <script>lucide.createIcons();</script>
</body>
</html>
