/* ============================================================
   M8 云汐管理台 (M8 Control Tower) — Brand Design Tokens
   Dual-mode: Light (default) / Dark (.dark)
   ============================================================ */

:root {
  /* ── Color System (Light Mode — Default) ── */
  --color-primary: #2563eb;
  --color-primary-hover: #1d4ed8;
  --color-primary-active: #1e40af;
  --color-secondary: #0891b2;
  --color-gradient-start: #2563eb;
  --color-gradient-end: #0891b2;

  --color-bg-base: #e8f4f8;
  --color-bg-elevated: #ffffff;
  --color-bg-surface: #ffffff;
  --color-bg-overlay: rgba(255, 255, 255, 0.95);
  --color-bg-card: #ffffff;
  --color-bg-gradient: linear-gradient(160deg, #dbeafe 0%, #cffafe 25%, #e0f2fe 50%, #bae6fd 75%, #e0f7fa 100%);
  --color-bg-gradient-alt: linear-gradient(200deg, #e0f2fe 0%, #ccfbf1 30%, #dbeafe 60%, #e0f7fa 80%, #f0f9ff 100%);

  --color-border-default: rgba(15, 23, 42, 0.1);
  --color-border-subtle: rgba(15, 23, 42, 0.06);
  --color-border-strong: rgba(15, 23, 42, 0.2);

  --color-text-primary: #0f172a;
  --color-text-secondary: #475569;
  --color-text-tertiary: #94a3b8;
  --color-text-inverse: #f8fafc;

  --state-success: #059669;
  --state-warning: #d97706;
  --state-error: #dc2626;
  --state-info: #2563eb;

  --color-glow-primary: rgba(37, 99, 235, 0.12);
  --color-glow-secondary: rgba(8, 145, 178, 0.1);
  --color-glow-ocean: rgba(14, 116, 144, 0.08);
  --color-ocean-deep: #dbeafe;
  --color-ocean-mid: #cffafe;
  --color-ocean-light: #e0f2fe;
  --color-ocean-surface: #bae6fd;
  --color-ocean-foam: rgba(56, 189, 248, 0.06);

  /* ── Typography ── */
  --font-family-base: 'Inter', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
  --font-family-display: 'Inter', 'PingFang SC', 'Noto Sans SC', sans-serif;
  --font-family-mono: 'JetBrains Mono', 'Fira Code', monospace;

  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.875rem;
  --text-lg: 1rem;
  --text-xl: 1.125rem;
  --text-2xl: 1.375rem;
  --text-3xl: 1.625rem;
  --text-4xl: 2rem;

  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.625;

  --tracking-tight: -0.02em;
  --tracking-normal: 0;
  --tracking-wide: 0.025em;

  /* ── Spacing ── */
  --spacing-0: 0;
  --spacing-1: 0.25rem;
  --spacing-2: 0.5rem;
  --spacing-3: 0.75rem;
  --spacing-4: 1rem;
  --spacing-5: 1.25rem;
  --spacing-6: 1.5rem;
  --spacing-8: 2rem;
  --spacing-10: 2.5rem;
  --spacing-12: 3rem;
  --spacing-16: 4rem;

  /* ── Radius ── */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows (Light) ── */
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 4px 20px rgba(0, 0, 0, 0.1), 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-glow: 0 0 20px rgba(37, 99, 235, 0.1);
  --shadow-glow-strong: 0 0 30px rgba(37, 99, 235, 0.18);

  /* ── Transitions ── */
  --transition-fast: 150ms ease;
  --transition-base: 200ms ease;
  --transition-slow: 300ms ease;

  /* ── Layout ── */
  --sidebar-width: 240px;
  --header-height: 56px;
  --content-max-width: 1400px;

  /* ── Z-index ── */
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-modal-backdrop: 300;
  --z-modal: 400;
  --z-toast: 500;
}

/* ============================================================
   Dark Mode Override
   ============================================================ */
html.dark {
  --color-primary: #3b82f6;
  --color-primary-hover: #2563eb;
  --color-primary-active: #1d4ed8;
  --color-secondary: #06b6d4;
  --color-gradient-start: #3b82f6;
  --color-gradient-end: #06b6d4;

  --color-bg-base: #0a1929;
  --color-bg-elevated: rgba(16, 40, 65, 0.75);
  --color-bg-surface: rgba(16, 40, 65, 0.75);
  --color-bg-overlay: rgba(8, 20, 36, 0.92);
  --color-bg-card: rgba(16, 40, 65, 0.65);
  --color-bg-gradient: linear-gradient(160deg, #061220 0%, #0a2342 25%, #0d3050 50%, #0a2844 75%, #071a30 100%);
  --color-bg-gradient-alt: linear-gradient(200deg, #071828 0%, #0b2a4a 30%, #0e3858 60%, #0a2e4e 80%, #081e35 100%);

  --color-border-default: rgba(148, 163, 184, 0.12);
  --color-border-subtle: rgba(148, 163, 184, 0.06);
  --color-border-strong: rgba(148, 163, 184, 0.24);

  --color-text-primary: #f1f5f9;
  --color-text-secondary: #94a3b8;
  --color-text-tertiary: #64748b;
  --color-text-inverse: #0f172a;

  --state-success: #10b981;
  --state-warning: #f59e0b;
  --state-error: #ef4444;
  --state-info: #3b82f6;

  --color-glow-primary: rgba(59, 130, 246, 0.3);
  --color-glow-secondary: rgba(6, 182, 212, 0.25);
  --color-glow-ocean: rgba(14, 116, 144, 0.2);
  --color-ocean-deep: #061220;
  --color-ocean-mid: #0a2342;
  --color-ocean-light: #0d3050;
  --color-ocean-surface: #0e3858;
  --color-ocean-foam: rgba(56, 189, 248, 0.08);

  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 4px 20px rgba(0, 0, 0, 0.3);
  --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.15);
  --shadow-glow-strong: 0 0 30px rgba(59, 130, 246, 0.25);
}

/* ============================================================
   Global Background
   ============================================================ */
html {
  background: var(--color-bg-gradient);
  background-attachment: fixed;
  min-height: 100%;
}

body {
  background: transparent;
}

/* ============================================================
   Utility Classes
   ============================================================ */
.ocean-gradient-bg {
  background: var(--color-bg-gradient);
}

.ocean-gradient-alt-bg {
  background: var(--color-bg-gradient-alt);
}

.ocean-glow {
  box-shadow: 0 0 40px rgba(6, 182, 212, 0.1), 0 0 80px rgba(59, 130, 246, 0.05);
}

.ocean-shimmer {
  background: linear-gradient(135deg, rgba(14, 56, 88, 0.3) 0%, rgba(6, 35, 66, 0.1) 50%, rgba(14, 116, 144, 0.15) 100%);
}

.brand-gradient-text {
  background: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.brand-gradient-bg {
  background: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end));
}

.brand-gradient-border {
  border-image: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end)) 1;
}

.glass-surface {
  background: rgba(30, 41, 59, 0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--color-border-subtle);
}

/* Light mode glass override */
html:not(.dark) .glass-surface {
  background: rgba(255, 255, 255, 0.75);
  border: 1px solid rgba(15, 23, 42, 0.08);
}

.glow-effect {
  box-shadow: var(--shadow-glow);
}

.glow-effect-strong {
  box-shadow: var(--shadow-glow-strong);
}

/* ── Typography Scale Classes ── */
.text-display {
  font-family: var(--font-family-display);
  font-size: var(--text-4xl);
  font-weight: 700;
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
}

.text-heading {
  font-family: var(--font-family-display);
  font-size: var(--text-2xl);
  font-weight: 600;
  line-height: var(--leading-tight);
}

.text-subheading {
  font-family: var(--font-family-display);
  font-size: var(--text-lg);
  font-weight: 500;
  line-height: var(--leading-normal);
}

.text-body {
  font-family: var(--font-family-base);
  font-size: var(--text-base);
  font-weight: 400;
  line-height: var(--leading-normal);
}

.text-caption {
  font-family: var(--font-family-base);
  font-size: var(--text-sm);
  font-weight: 400;
  line-height: var(--leading-normal);
  color: var(--color-text-secondary);
}

.text-label {
  font-family: var(--font-family-base);
  font-size: var(--text-xs);
  font-weight: 500;
  line-height: var(--leading-normal);
  letter-spacing: var(--tracking-wide);
  text-transform: uppercase;
  color: var(--color-text-tertiary);
}

    </style>

  @theme inline {
    --color-primary: var(--color-primary);

  }

    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="background: var(--color-bg-gradient); background-attachment: fixed;">
    <!-- Sidebar -->
    <aside class="fixed top-0 left-0 h-screen flex flex-col" style="width:var(--sidebar-width);background: var(--sidebar-bg);border-right:1px solid var(--color-border-default);">
        <!-- Logo -->
        <div class="flex items-center gap-3 px-5 h-14 shrink-0" style="border-bottom:1px solid var(--color-border-default);">
            <div class="w-8 h-8 rounded-lg brand-gradient-bg flex items-center justify-center">
                <i data-lucide="hexagon" class="w-4 h-4" style="color:var(--color-text-inverse);"></i>
            </div>
            <span class="font-semibold text-sm whitespace-nowrap" style="color:var(--color-text-primary);">云汐管理台</span>
        </div>
        <!-- Nav Items -->
        <nav class="flex-1 py-3 px-3 space-y-1 overflow-y-auto no-scrollbar">
            <a href="dashboard.html" data-dom-id="nav-dashboard" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm whitespace-nowrap transition-colors duration-150" style="color:var(--color-text-secondary);">
                <i data-lucide="layout-dashboard" class="w-4 h-4 shrink-0"></i>
                <span>总览</span>
            </a>
            <a href="tasks.html" data-dom-id="nav-tasks-hidden" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm whitespace-nowrap transition-colors duration-150" style="color:var(--color-text-secondary);">
                <i data-lucide="list-checks" class="w-4 h-4 shrink-0"></i>
                <span>任务中心</span>
            </a>
            <a href="modules.html" data-dom-id="nav-modules-hidden" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm whitespace-nowrap transition-colors duration-150" style="color:var(--color-text-secondary);">
                <i data-lucide="blocks" class="w-4 h-4 shrink-0"></i>

            </a>
            <a href="deploy.html" data-dom-id="nav-deploy-hidden" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm whitespace-nowrap transition-colors duration-150" style="color:var(--color-text-secondary);">
                <i data-lucide="rocket" class="w-4 h-4 shrink-0"></i>
                <span>部署管理</span>
            </a>
            <a href="monitor.html" data-dom-id="nav-monitor-active" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm whitespace-nowrap" style="background:rgba(59,130,246,0.12);color:var(--color-primary);">

            </a>

                <i data-lucide="settings" class="w-4 h-4 shrink-0"></i>
                <span>系统设置</span>
            </a>
        </nav>
        <!-- Sidebar Footer -->
        <div class="px-4 py-3 shrink-0" style="border-top:1px solid var(--color-border-default);">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold" style="background:linear-gradient(135deg,var(--color-gradient-start),var(--color-gradient-end));color:var(--color-text-inverse);">管</div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium truncate" style="color:var(--color-text-primary);">管理员</p>
                    <p class="text-xs truncate" style="color:var(--color-text-tertiary);">admin@yunxi.io</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Wrapper -->
    <div class="flex flex-col min-h-screen" style="margin-left:var(--sidebar-width);">
        <!-- Header -->
        <header class="sticky top-0 z-50 flex items-center justify-between px-6 h-14 shrink-0 glass-surface" style="background: var(--header-bg); backdrop-filter: blur(12px); border-bottom:1px solid var(--color-border-default);">
            <div class="flex items-center gap-2">
                <i data-lucide="activity" class="w-5 h-5" style="color:var(--color-primary);"></i>
                <h1 class="text-lg font-semibold" style="color:var(--color-text-primary);">系统监控</h1>
            </div>
            <div class="flex items-center gap-4">

            <svg class="theme-icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
          </button>
          <button id="notifyBtn" class="inline-flex items-center justify-center gap-2 px-3 py-1.5 rounded-lg text-sm whitespace-nowrap transition-colors duration-150" style="background:var(--color-bg-elevated);border:1px solid var(--color-border-default);color:var(--color-text-secondary);">
                    <i data-lucide="bell" class="w-4 h-4"></i>
                    <span>通知</span>
                </button>
                <button id="exportBtn" class="inline-flex items-center justify-center gap-2 px-3 py-1.5 rounded-lg text-sm whitespace-nowrap brand-gradient-bg transition-colors duration-150" style="color:var(--color-text-inverse);box-shadow:var(--shadow-glow);">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    <span>导出报告</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 p-6" style="max-width:var(--content-max-width);">
            <!-- Page Title -->
            <div class="mb-6">
                <h2 class="text-heading mb-1" style="color:var(--color-text-primary);text-wrap:balance;word-break:keep-all;overflow-wrap:break-word;">系统监控</h2>
                <p class="text-body" style="color:var(--color-text-secondary);">实时监控系统运行状态与性能指标</p>
            </div>

            <!-- Section 1: Real-time Metrics (4 Gauge Cards) -->
            <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                <!-- CPU -->
                <div class="metric-card rounded-xl p-5 flex flex-col items-center" data-metric="cpu" style="background:var(--color-bg-elevated);border:1px solid var(--color-border-default);cursor:pointer;">
                    <div class="relative w-24 h-24 mb-3">
                        <div class="metric-ring w-24 h-24 rounded-full" style="background:conic-gradient(from 0deg, var(--color-gradient-start) 0%, var(--color-gradient-end) 0%, rgba(148,163,184,0.1) 0%);"></div>
                        <div class="absolute inset-1 rounded-full flex flex-col items-center justify-center" style="background:var(--color-bg-elevated);">
                            <span class="metric-value text-2xl font-bold" style="color:var(--color-text-primary);font-family:var(--font-family-mono);">0%</span>
                        </div>
                    </div>
                    <span class="text-sm font-medium mb-1" style="color:var(--color-text-primary);">CPU 使用率</span>
                    <div class="flex items-center gap-1.5">
                        <span class="metric-dot w-1.5 h-1.5 rounded-full" style="background:var(--state-success);animation:pulse-dot 2s ease-in-out infinite;"></span>
                        <span class="text-xs metric-source" style="color:var(--color-text-tertiary);">加载中...</span>
                    </div>
                </div>
                <!-- Memory -->
                <div class="metric-card rounded-xl p-5 flex flex-col items-center" data-metric="memory" style="background:var(--color-bg-elevated);border:1px solid var(--color-border-default);cursor:pointer;">
                    <div class="relative w-24 h-24 mb-3">
                        <div class="metric-ring w-24 h-24 rounded-full" style="background:conic-gradient(from 0deg, var(--color-gradient-start) 0%, var(--color-gradient-end) 0%, rgba(148,163,184,0.1) 0%);"></div>
                        <div class="absolute inset-1 rounded-full flex flex-col items-center justify-center" style="background:var(--color-bg-elevated);">
                            <span class="metric-value text-2xl font-bold" style="color:var(--color-text-primary);font-family:var(--font-family-mono);">0%</span>
                        </div>
                    </div>
                    <span class="text-sm font-medium mb-1" style="color:var(--color-text-primary);">内存使用</span>
                    <div class="flex items-center gap-1.5">
                        <span class="metric-dot w-1.5 h-1.5 rounded-full" style="background:var(--state-success);animation:pulse-dot 2s ease-in-out infinite;"></span>
                        <span class="text-xs metric-source" style="color:var(--color-text-tertiary);">加载中...</span>

                        <div class="metric-ring w-24 h-24 rounded-full" style="background:conic-gradient(from 0deg, var(--color-gradient-start) 0%, var(--color-gradient-end) 0%, rgba(148,163,184,0.1) 0%);"></div>
                        <div class="absolute inset-1 rounded-full flex flex-col items-center justify-center" style="background:var(--color-bg-elevated);">
                            <span class="metric-value text-2xl font-bold" style="color:var(--color-text-primary);font-family:var(--font-family-mono);">0%</span>
                        </div>
                    </div>
                    <span class="text-sm font-medium mb-1" style="color:var(--color-text-primary);">磁盘使用</span>
                    <div class="flex items-center gap-1.5">
                        <span class="metric-dot w-1.5 h-1.5 rounded-full" style="background:var(--state-success);animation:pulse-dot 2s ease-in-out infinite;"></span>

                    </div>
                </div>
                <!-- Network -->

                    <div class="relative w-24 h-24 mb-3">
                        <div class="metric-ring w-24 h-24 rounded-full" style="background:conic-gradient(from 0deg, var(--color-gradient-start) 0%, var(--color-gradient-end) 0%, rgba(148,163,184,0.1) 0%);"></div>
                        <div class="absolute inset-1 rounded-full flex flex-col items-center justify-center" style="background:var(--color-bg-elevated);">
                            <span class="metric-value text-2xl font-bold" style="color:var(--color-text-primary);font-family:var(--font-family-mono);">0%</span>

                    </div>
                    <span class="text-sm font-medium mb-1" style="color:var(--color-text-primary);">网络带宽</span>
                    <div class="flex items-center gap-1.5">
                        <span class="metric-dot w-1.5 h-1.5 rounded-full" style="background:var(--state-success);animation:pulse-dot 2s ease-in-out infinite;"></span>
                        <span class="text-xs metric-source" style="color:var(--color-text-tertiary);">加载中...</span>

            <!-- Section 2: Line Chart with Time Range Switcher -->

    <!-- Custom Styles -->

    <!-- Page API Integration -->
    <script src="../common/api.js"></script>
    <script>
        // ========== 模拟数据（仅作 fallback） ==========
        var monitorMockData = {
            realtime: {
                source: 'mock',
                cpu: { usage_percent: 42 },
                memory: { percent: 68, used_gb: 5.3, total_gb: 8.0 },
                disk: { percent: 35 },
                network: { upload_mbps: 12.5, download_mbps: 45.3 },
                uptime: { seconds: 86400 }
            },
            history: function(period) {
                var counts = { '1h': 60, '6h': 72, '24h': 96, '7d': 168, '30d': 360 };
                var count = counts[period] || 60;
                var timestamps = [];
                var cpu = [];
                var memory = [];
                var disk = [];
                var network_in = [];
                var network_out = [];
                var now = Date.now();
                var step = period === '1h' ? 60000 : period === '6h' ? 300000 : period === '24h' ? 900000 : period === '7d' ? 3600000 : 7200000;
                for (var i = count - 1; i >= 0; i--) {
                    var t = new Date(now - i * step);
                    timestamps.push(formatTime(t, period));
                    var baseCpu = 35 + Math.sin(i * 0.1) * 15;
                    var baseMem = 60 + Math.cos(i * 0.08) * 10;
                    var baseDisk = 32 + Math.sin(i * 0.05) * 5;
                    cpu.push(Math.round(Math.max(5, Math.min(95, baseCpu + (Math.random() - 0.5) * 10))));
                    memory.push(Math.round(Math.max(20, Math.min(95, baseMem + (Math.random() - 0.5) * 8))));
                    disk.push(Math.round(Math.max(10, Math.min(90, baseDisk + (Math.random() - 0.5) * 3))));
                    network_in.push(Math.round((20 + Math.random() * 60) * 10) / 10);
                    network_out.push(Math.round((5 + Math.random() * 20) * 10) / 10);
                }
                return {
                    timestamps: timestamps,
                    cpu: cpu,
                    memory: memory,
                    disk: disk,
                    network_in: network_in,
                    network_out: network_out
                };
            },
            alerts: [
                { id: 1, level: 'error', title: '服务响应超时', content: 'M7积木服务响应超时 > 30s', source: 'M7积木', status: 'resolved', created_at: '2024-01-15 10:23:45' },
                { id: 2, level: 'warning', title: 'CPU使用率过高', content: 'CPU使用率超过80%', source: 'M4场景', status: 'pending', created_at: '2024-01-15 10:15:20' },
                { id: 3, level: 'info', title: '内存接近阈值', content: '内存使用率接近阈值', source: 'M2技能', status: 'acknowledged', created_at: '2024-01-15 09:58:12' },
                { id: 4, level: 'warning', title: '磁盘空间不足', content: '磁盘空间不足20%', source: 'M5记忆', status: 'pending', created_at: '2024-01-15 09:30:00' },
                { id: 5, level: 'info', title: '任务执行延迟', content: '定时任务执行延迟', source: 'M1调度', status: 'resolved', created_at: '2024-01-15 09:12:33' }
            ],
            overview: {
                modules: { total: 8, online: 8, offline: 0, error: 0 },
                tasks_today: 1234,
                active_users: 56,
                cpu_usage: 42,
                memory_usage: 68,
                disk_usage: 35,
                alerts_active: 2,
                alerts_total: 5,
                uptime: '1天 2小时',
                metrics_source: 'mock'
            }
        };

        // ========== 全局变量 ==========
        var currentMetricType = 'cpu';
        var currentTimeRange = '1h';
        var autoRefreshInterval = null;
        var lineChart = null;
        var lastHistoryData = null;
        var lastRealtimeData = null;

        // ========== 工具函数 ==========
        function formatTime(date, period) {
            var h = date.getHours().toString().padStart(2, '0');
            var m = date.getMinutes().toString().padStart(2, '0');
            if (period === '7d' || period === '30d') {
                var mon = (date.getMonth() + 1).toString().padStart(2, '0');
                var d = date.getDate().toString().padStart(2, '0');
                return mon + '-' + d + ' ' + h + ':' + m;
            }
            return h + ':' + m;
        }

        function formatUptime(seconds) {
            if (!seconds) return '--';
            var s = parseInt(seconds);
            var days = Math.floor(s / 86400);
            var hours = Math.floor((s % 86400) / 3600);
            var mins = Math.floor((s % 3600) / 60);
            if (days > 0) return days + '天 ' + hours + '小时';
            if (hours > 0) return hours + '小时 ' + mins + '分';
            return mins + '分钟';
        }

        function getStatusColor(level) {
            if (level === 'error' || level === 'critical') return 'var(--state-error)';
            if (level === 'warning') return 'var(--state-warning)';
            return 'var(--state-info)';
        }

        function getLevelText(level) {
            var map = { error: '严重', critical: '严重', warning: '警告', info: '提示' };
            return map[level] || level;
        }

        function getStatusText(status) {
            var map = { active: '待处理', pending: '待处理', acknowledged: '已标记', resolved: '已处理', closed: '已关闭' };
            return map[status] || status;
        }

        function getStatusBgColor(status) {
            if (status === 'resolved' || status === 'closed') return 'rgba(16,185,129,0.15)';
            if (status === 'pending' || status === 'active') return 'rgba(245,158,11,0.15)';
            return 'rgba(59,130,246,0.15)';
        }

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态
            if (!YunxiAPI.isLoggedIn()) {
                YunxiAPI.redirectToLogin();
                return;
            }

            // 设置导航链接
            setupNavigation();

            // 初始化折线图
            initLineChart();

            // 绑定所有交互事件
            bindMonitorEvents();

            // 加载历史数据（初始 1h）
            loadHistoryData('1h');

            // 加载实时指标（更新卡片）
            loadRealtimeMetrics();

            // 加载系统概况
            loadOverview();

            // 加载告警列表
            loadAlerts();

            // 更新用户信息
            updateUserInfo();

            // 同步按钮状态
            YunxiAPI.updateButtonsBySystemStatus();

            // 启动自动刷新（每30秒）
            startAutoRefresh();
        });

        // ========== 导航设置 ==========
        function setupNavigation() {
            var navItems = {
                'nav-dashboard': 'dashboard.html',
                'nav-tasks': 'tasks.html',
                'nav-tasks-active': 'tasks.html',
                'nav-tasks-hidden': 'tasks.html',
                'nav-modules': 'modules.html',
                'nav-modules-active': 'modules.html',
                'nav-modules-hidden': 'modules.html',
                'nav-deploy': 'deploy.html',
                'nav-deploy-active': 'deploy.html',
                'nav-deploy-hidden': 'deploy.html',
                'nav-monitor': 'monitor.html',
                'nav-monitor-active': 'monitor.html',
                'nav-monitor-hidden': 'monitor.html',
                'nav-agents': 'agents.html',
                'nav-agents-hidden': 'agents.html',
                'nav-compute': 'compute.html',
                'nav-compute-hidden': 'compute.html',

                'nav-settings': 'settings.html',
                'nav-settings-active': 'settings.html',
                'nav-settings-hidden': 'settings.html'
            };

            Object.keys(navItems).forEach(function(id) {
                var el = document.querySelector('[data-dom-id="' + id + '"]');
                if (el) {
                    el.addEventListener('click', function(e) {
                        e.preventDefault();
                        location.href = navItems[id];
                    });
                }
            });
        }

        // ========== 事件绑定 ==========
        function bindMonitorEvents() {
            // 指标卡片点击切换图表显示
            var metricCards = document.querySelectorAll('.metric-card');
            metricCards.forEach(function(card) {
                card.addEventListener('click', function() {
                    var type = card.getAttribute('data-metric');
                    selectMetric(type, card);
                });
            });

            // 时间范围切换按钮
            var timeRangeBtns = document.querySelectorAll('.time-range-btn');
            timeRangeBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var period = btn.getAttribute('data-period');
                    switchTimeRange(period, btn);
                });
            });

            // 通知按钮
            var notifyBtn = document.getElementById('notifyBtn');
            if (notifyBtn) {
                notifyBtn.addEventListener('click', function() {
                    var badge = document.getElementById('alertBadge');
                    var text = badge ? badge.textContent : '暂无告警';
                    YunxiAPI.showToast('当前' + text, 'warning');
                });
            }

            // 导出报告按钮
            var exportBtn = document.getElementById('exportBtn');
            if (exportBtn) {
                exportBtn.addEventListener('click', function() {
                    exportReport();
                });
            }

            // 用户头像点击
            var userAvatar = document.querySelector('.w-8.h-8.rounded-full');
            if (userAvatar) {
                userAvatar.style.cursor = 'pointer';
                userAvatar.addEventListener('click', function() {
                    handleLogout();
                });
            }
        }

        // ========== 折线图初始化 ==========
        function initLineChart() {
            var ctx = document.getElementById('lineChart');
            if (!ctx) return;

            var isDark = document.documentElement.classList.contains('dark');
            var gridColor = isDark ? 'rgba(148, 163, 184, 0.1)' : 'rgba(148, 163, 184, 0.15)';
            var tickColor = isDark ? 'rgba(148, 163, 184, 0.7)' : 'rgba(100, 116, 139, 0.8)';

            lineChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'CPU (%)',
                            data: [],
                            borderColor: 'rgba(59, 130, 246, 1)',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0,
                            pointHoverRadius: 4
                        },
                        {
                            label: '内存 (%)',
                            data: [],
                            borderColor: 'rgba(6, 182, 212, 1)',
                            backgroundColor: 'rgba(6, 182, 212, 0.08)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0,
                            pointHoverRadius: 4
                        },
                        {
                            label: '磁盘 (%)',
                            data: [],
                            borderColor: 'rgba(16, 185, 129, 1)',
                            backgroundColor: 'rgba(16, 185, 129, 0.08)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0,
                            pointHoverRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            align: 'end',
                            labels: {
                                color: tickColor,
                                font: { size: 12 },
                                usePointStyle: true,
                                pointStyle: 'circle',
                                padding: 16
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleColor: '#f1f5f9',
                            bodyColor: '#cbd5e1',
                            borderColor: 'rgba(148, 163, 184, 0.2)',
                            borderWidth: 1,
                            padding: 12,
                            cornerRadius: 8
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: gridColor, drawBorder: false },
                            ticks: { color: tickColor, font: { size: 11 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 10 }
                        },
                        y: {
                            beginAtZero: true,
                            max: 100,
                            grid: { color: gridColor, drawBorder: false },
                            ticks: {
                                color: tickColor,
                                font: { size: 11 },
                                callback: function(value) { return value + '%'; }
                            }
                        }
                    }
                }
            });
        }

        // ========== 加载历史数据 ==========
        async function loadHistoryData(period) {
            currentTimeRange = period;
            try {
                var data = await YunxiAPI.request('GET', '/monitor/metrics/history?period=' + period);
                if (data && data.timestamps && data.timestamps.length > 0) {
                    lastHistoryData = data;
                    updateLineChart(data);
                } else {
                    // API 返回空数据，使用 fallback
                    useMockHistory(period);
                }
            } catch (e) {
                // API 失败，使用 mock fallback
                useMockHistory(period);
            }
        }

        function useMockHistory(period) {
            var mockData = monitorMockData.history(period);
            lastHistoryData = mockData;
            updateLineChart(mockData);
        }

        function updateLineChart(data) {
            if (!lineChart) return;
            lineChart.data.labels = data.timestamps;
            lineChart.data.datasets[0].data = data.cpu || [];
            lineChart.data.datasets[1].data = data.memory || [];
            lineChart.data.datasets[2].data = data.disk || [];
            lineChart.update('none');
        }

        // ========== 时间范围切换 ==========
        function switchTimeRange(period, btn) {
            // 更新按钮样式
            var btns = document.querySelectorAll('.time-range-btn');
            btns.forEach(function(b) {
                b.style.background = 'var(--color-bg-base)';
                b.style.color = 'var(--color-text-secondary)';
                b.style.border = '1px solid var(--color-border-subtle)';
            });
            btn.style.background = 'var(--color-primary)';
            btn.style.color = 'var(--color-text-inverse)';
            btn.style.border = 'none';

            // 加载对应周期的历史数据
            loadHistoryData(period);
        }

        // ========== 指标卡片选择 ==========
        function selectMetric(type, card) {
            currentMetricType = type;

            // 移除所有卡片的高亮
            var allCards = document.querySelectorAll('.metric-card');
            allCards.forEach(function(c) {
                c.style.borderColor = 'var(--color-border-default)';
                c.style.boxShadow = 'none';
            });

            // 高亮选中卡片
            card.style.borderColor = 'var(--color-primary)';
            card.style.boxShadow = 'var(--shadow-glow)';

            var metricNames = {
                'cpu': 'CPU 使用率',
                'memory': '内存使用',
                'disk': '磁盘使用',
                'network': '网络带宽'
            };

            YunxiAPI.showToast('已切换到' + (metricNames[type] || type) + '监控', 'info');
        }

        // ========== 加载实时指标（更新卡片） ==========
        async function loadRealtimeMetrics() {
            try {
                var data = await YunxiAPI.request('GET', '/monitor/metrics/realtime');
                if (data) {
                    lastRealtimeData = data;
                    updateMetricCards(data);
                }
            } catch (e) {
                // API 失败，使用 mock fallback
                var mock = monitorMockData.realtime;
                lastRealtimeData = mock;
                updateMetricCards(mock);
            }
        }

        function updateMetricCards(data) {
            // 适配嵌套结构（API 返回）和扁平结构（mock fallback）
            var cpuVal = data.cpu_percent;
            var memVal = data.memory_percent;
            var diskVal = data.disk_percent;
            var netVal = data.network_down_mbps;
            var sourceVal = data.source;
            if (data.cpu && data.cpu.usage_percent !== undefined) cpuVal = data.cpu.usage_percent;
            if (data.memory && data.memory.percent !== undefined) memVal = data.memory.percent;
            if (data.disk && data.disk.percent !== undefined) diskVal = data.disk.percent;
            if (data.network && data.network.download_mbps !== undefined) netVal = data.network.download_mbps;
            if (data.network && data.network.download_mbps !== undefined) sourceVal = data.source;

            var metrics = [
                { key: 'cpu', value: cpuVal, unit: '%' },
                { key: 'memory', value: memVal, unit: '%' },
                { key: 'disk', value: diskVal, unit: '%' },
                { key: 'network', value: netVal, unit: 'Mbps' }
            ];

            var cards = document.querySelectorAll('.metric-card');
            metrics.forEach(function(m, idx) {
                if (!cards[idx]) return;
                var valueEl = cards[idx].querySelector('.metric-value');
                var ringEl = cards[idx].querySelector('.metric-ring');
                var sourceEl = cards[idx].querySelector('.metric-source');
                var dotEl = cards[idx].querySelector('.metric-dot');

                var val = m.value !== undefined && m.value !== null ? Number(m.value) : 0;
                var displayVal = m.key === 'network' ? val.toFixed(1) : Math.round(val);
                if (valueEl) valueEl.textContent = displayVal + m.unit;

                // 环形进度（网络用相对比例，其余直接用百分比）
                var ringPercent = m.key === 'network' ? Math.min(100, val) : val;
                if (ringEl) {
                    ringEl.style.background = 'conic-gradient(from 0deg, var(--color-gradient-start) 0%, var(--color-gradient-end) ' + ringPercent + '%, rgba(148,163,184,0.1) ' + ringPercent + '%)';
                }

                // 数据来源标识
                if (sourceEl) {
                    sourceEl.textContent = data.source && data.source !== 'mock' ? '实时数据' : '模拟数据';
                }

                // 状态指示灯颜色
                if (dotEl) {
                    var color = 'var(--state-success)';
                    if (m.key === 'cpu' && val > 80) color = 'var(--state-error)';
                    else if (m.key === 'cpu' && val > 60) color = 'var(--state-warning)';
                    else if (m.key === 'memory' && val > 80) color = 'var(--state-error)';
                    else if (m.key === 'memory' && val > 65) color = 'var(--state-warning)';
                    else if (m.key === 'disk' && val > 85) color = 'var(--state-error)';
                    else if (m.key === 'disk' && val > 70) color = 'var(--state-warning)';
                    dotEl.style.background = color;
                }
            });
        }

        // ========== 自动刷新 ==========
        function startAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
            autoRefreshInterval = setInterval(function() {
                refreshMetrics();
            }, 30000);
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        async function refreshMetrics() {
            try {
                var data = await YunxiAPI.request('GET', '/monitor/metrics/realtime');
                if (data) {
                    lastRealtimeData = data;
                    // 更新指标卡片
                    updateMetricCards(data);
                    // 追加到折线图
                    appendRealtimeToChart(data);
                }
            } catch (e) {
                // API 失败时用 mock 小幅波动作为 fallback
                var mock = generateMockRealtime();
                lastRealtimeData = mock;
                updateMetricCards(mock);
                appendRealtimeToChart(mock);
            }
        }

        function generateMockRealtime() {
            var base = monitorMockData.realtime;
            var baseCpu = base.cpu_percent !== undefined ? base.cpu_percent : base.cpu.usage_percent;
            var baseMem = base.memory_percent !== undefined ? base.memory_percent : base.memory.percent;
            var baseDisk = base.disk_percent !== undefined ? base.disk_percent : base.disk.percent;
            var baseUp = base.network_up_mbps !== undefined ? base.network_up_mbps : base.network.upload_mbps;
            var baseDown = base.network_down_mbps !== undefined ? base.network_down_mbps : base.network.download_mbps;
            var baseUptime = base.uptime_seconds !== undefined ? base.uptime_seconds : base.uptime.seconds;
            return {
                cpu: { usage_percent: Math.max(1, Math.min(99, baseCpu + (Math.random() - 0.5) * 10)) },
                memory: { percent: Math.max(10, Math.min(95, baseMem + (Math.random() - 0.5) * 6)) },
                disk: { percent: Math.max(10, Math.min(95, baseDisk + (Math.random() - 0.5) * 3)) },
                network: {
                    upload_mbps: Math.max(0, baseUp + (Math.random() - 0.5) * 8),
                    download_mbps: Math.max(0, baseDown + (Math.random() - 0.5) * 20)
                },
                uptime: { seconds: baseUptime + 30 },
                source: 'mock'
            };
        }

        function appendRealtimeToChart(data) {
            if (!lineChart || !lastHistoryData) return;

            // 适配嵌套结构
            var cpuVal = data.cpu_percent;
            var memVal = data.memory_percent;
            var diskVal = data.disk_percent;
            if (data.cpu && data.cpu.usage_percent !== undefined) cpuVal = data.cpu.usage_percent;
            if (data.memory && data.memory.percent !== undefined) memVal = data.memory.percent;
            if (data.disk && data.disk.percent !== undefined) diskVal = data.disk.percent;

            var now = new Date();
            var timeLabel = formatTime(now, currentTimeRange);

            // 追加新数据点
            lineChart.data.labels.push(timeLabel);
            lineChart.data.datasets[0].data.push(cpuVal !== undefined ? cpuVal : 0);
            lineChart.data.datasets[1].data.push(memVal !== undefined ? memVal : 0);
            lineChart.data.datasets[2].data.push(diskVal !== undefined ? diskVal : 0);

            // 保持数据点数量不超过上限
            var maxPoints = 120;
            if (lineChart.data.labels.length > maxPoints) {
                lineChart.data.labels.shift();
                lineChart.data.datasets.forEach(function(ds) {
                    ds.data.shift();
                });
            }

            lineChart.update('none');
        }

        // ========== 系统概况 ==========
        async function loadOverview() {
            try {
                var data = await YunxiAPI.request('GET', '/monitor/overview');
                if (data) {
                    updateOverview(data);
                }
            } catch (e) {
                // 使用 mock fallback
                updateOverview(monitorMockData.overview);
            }
        }

        function updateOverview(data) {
            var tasksEl = document.getElementById('stat-tasks');
            var usersEl = document.getElementById('stat-users');
            var modulesEl = document.getElementById('stat-modules');
            var uptimeEl = document.getElementById('stat-uptime');

            if (tasksEl) {
                var taskVal = data.tasks_today !== undefined ? data.tasks_today : '--';
                tasksEl.textContent = typeof taskVal === 'number' ? taskVal.toLocaleString() : taskVal;
            }
            if (usersEl) {
                var userVal = data.active_users !== undefined ? data.active_users : '--';
                usersEl.textContent = typeof userVal === 'number' ? userVal.toLocaleString() : userVal;
            }
            if (modulesEl && data.modules) {
                modulesEl.textContent = (data.modules.online || 0) + ' / ' + (data.modules.total || 0);
                var err = data.modules.error || 0;
                modulesEl.style.color = err > 0 ? 'var(--state-error)' : 'var(--state-success)';
            }
            if (uptimeEl) {
                // API 返回的 uptime 可能是字符串（formatted）或数字（seconds）
                var up = data.uptime;
                if (typeof up === 'object' && up.formatted) {
                    uptimeEl.textContent = up.formatted;
                } else if (typeof up === 'number') {
                    uptimeEl.textContent = formatUptime(up);
                } else {
                    uptimeEl.textContent = up || '--';
                }
            }
        }

        // ========== 告警列表 ==========
        async function loadAlerts() {
            try {
                var data = await YunxiAPI.request('GET', '/monitor/alerts?limit=20');
                var items = [];
                if (data && data.items && Array.isArray(data.items)) {
                    items = data.items;
                } else if (data && Array.isArray(data)) {
                    items = data;
                }
                if (items.length > 0) {
                    renderAlerts(items);
                } else {
                    renderAlerts(monitorMockData.alerts);
                }
            } catch (e) {
                // API 失败，使用 mock fallback
                renderAlerts(monitorMockData.alerts);
            }
        }

        function renderAlerts(alerts) {
            var tableBody = document.getElementById('alertTableBody');
            if (!tableBody) return;

            // 更新告警计数
            var alertBadge = document.getElementById('alertBadge');
            if (alertBadge) {
                alertBadge.textContent = alerts.length + ' 条告警';
            }

            if (!alerts || alerts.length === 0) {
                tableBody.innerHTML = '<tr style="border-top:1px solid var(--color-border-subtle);"><td colspan="5" class="px-5 py-8 text-center" style="color:var(--color-text-tertiary);">暂无告警记录</td></tr>';
                return;
            }

            var html = '';
            alerts.forEach(function(alert) {
                var levelColor = getStatusColor(alert.level);
                var levelText = getLevelText(alert.level);
                var statusText = getStatusText(alert.status);
                var statusBg = getStatusBgColor(alert.status);
                var statusColor = (alert.status === 'resolved' || alert.status === 'closed') ? 'var(--state-success)' : (alert.status === 'pending' || alert.status === 'active') ? 'var(--state-warning)' : 'var(--state-info)';

                html += '<tr style="border-top:1px solid var(--color-border-subtle);cursor:pointer;" class="alert-row" data-id="' + (alert.id || '') + '">'
                    + '<td class="px-5 py-3.5 whitespace-nowrap" style="color:var(--color-text-secondary);font-family:var(--font-family-mono);">' + (alert.created_at_formatted || alert.created_at || '--') + '</td>'
                    + '<td class="px-5 py-3.5">'
                    + '<span class="inline-flex items-center justify-center px-2.5 py-1 rounded-full text-xs font-medium whitespace-nowrap" style="background:' + statusBg.replace('0.15', '0.15') + ';color:' + levelColor + ';">' + levelText + '</span>'
                    + '</td>'
                    + '<td class="px-5 py-3.5 whitespace-nowrap" style="color:var(--color-text-primary);">' + (alert.source || alert.module || '--') + '</td>'
                    + '<td class="px-5 py-3.5 truncate" style="color:var(--color-text-secondary);min-width:200px;">' + (alert.content || alert.message || alert.title || '--') + '</td>'
                    + '<td class="px-5 py-3.5">'
                    + '<span class="inline-flex items-center justify-center px-2.5 py-1 rounded-full text-xs font-medium whitespace-nowrap" style="background:' + statusBg + ';color:' + statusColor + ';">' + statusText + '</span>'
                    + '</td>'
                    + '</tr>';
            });

            tableBody.innerHTML = html;

            // 绑定行点击事件
            var rows = tableBody.querySelectorAll('.alert-row');
            rows.forEach(function(row) {
                row.addEventListener('click', function() {
                    var desc = row.querySelectorAll('td')[3]?.textContent || '';
                    YunxiAPI.showToast('告警详情: ' + desc, 'info');
                });
            });
        }

        // ========== 导出报告 ==========
        async function exportReport() {
            var confirmed = await YunxiAPI.showConfirm('确定要导出监控报告吗？报告将包含当前所有监控指标和告警记录。', '导出报告');
            if (!confirmed) return;

            YunxiAPI.showLoading('正在生成报告...');
            try {
                // 收集当前真实数据
                var reportData = {
                    export_time: new Date().toISOString(),
                    time_range: currentTimeRange,
                    realtime: lastRealtimeData || monitorMockData.realtime,
                    history: lastHistoryData || monitorMockData.history(currentTimeRange),
                    alerts: [],
                    overview: null
                };

                // 尝试获取最新告警数据
                try {
                    var alertData = await YunxiAPI.request('GET', '/monitor/alerts?limit=50');
                    if (alertData && alertData.items) {
                        reportData.alerts = alertData.items;
                    } else if (alertData && Array.isArray(alertData)) {
                        reportData.alerts = alertData;
                    }
                } catch (e) {
                    reportData.alerts = monitorMockData.alerts;
                }

                // 尝试获取 overview
                try {
                    var ovData = await YunxiAPI.request('GET', '/monitor/overview');
                    if (ovData) {
                        reportData.overview = ovData;
                    }
                } catch (e) {
                    reportData.overview = monitorMockData.overview;
                }

                // 生成 CSV 报告
                var csvContent = generateReportCSV(reportData);
                downloadFile(csvContent, 'monitor_report_' + formatDateForFilename() + '.csv', 'text/csv;charset=utf-8;');

                // 同时生成 JSON 报告（更完整）
                var jsonContent = JSON.stringify(reportData, null, 2);
                downloadFile(jsonContent, 'monitor_report_' + formatDateForFilename() + '.json', 'application/json;charset=utf-8;');

                YunxiAPI.showToast('报告已生成，正在下载（CSV + JSON）', 'success');
            } catch (e) {
                YunxiAPI.showToast('导出失败，请稍后重试', 'error');
            } finally {
                YunxiAPI.hideLoading();
            }
        }

        function generateReportCSV(data) {
            var lines = [];
            lines.push('云汐系统监控报告');
            lines.push('导出时间,' + data.export_time);
            lines.push('时间范围,' + data.time_range);
            lines.push('');

            // 实时指标
            lines.push('=== 实时指标 ===');
            var rt = data.realtime || {};
            lines.push('指标,数值');
            var cpuPct = rt.cpu_percent;
            var memPct = rt.memory_percent;
            var memUsed = rt.memory_used_mb;
            var memTotal = rt.memory_total_mb;
            var diskPct = rt.disk_percent;
            var netUp = rt.network_up_mbps;
            var netDown = rt.network_down_mbps;
            var uptimeSec = rt.uptime_seconds;
            if (rt.cpu && rt.cpu.usage_percent !== undefined) cpuPct = rt.cpu.usage_percent;
            if (rt.memory && rt.memory.percent !== undefined) memPct = rt.memory.percent;
            if (rt.memory && rt.memory.used_gb !== undefined) memUsed = Math.round(rt.memory.used_gb * 1024);
            if (rt.memory && rt.memory.total_gb !== undefined) memTotal = Math.round(rt.memory.total_gb * 1024);
            if (rt.disk && rt.disk.percent !== undefined) diskPct = rt.disk.percent;
            if (rt.network && rt.network.upload_mbps !== undefined) netUp = rt.network.upload_mbps;
            if (rt.network && rt.network.download_mbps !== undefined) netDown = rt.network.download_mbps;
            if (rt.uptime && rt.uptime.seconds !== undefined) uptimeSec = rt.uptime.seconds;
            lines.push('CPU使用率,' + (cpuPct != null ? cpuPct + '%' : '--'));
            lines.push('内存使用率,' + (memPct != null ? memPct + '%' : '--'));
            lines.push('内存已用(MB),' + (memUsed != null ? memUsed : '--'));
            lines.push('内存总量(MB),' + (memTotal != null ? memTotal : '--'));
            lines.push('磁盘使用率,' + (diskPct != null ? diskPct + '%' : '--'));
            lines.push('上行速率(Mbps),' + (netUp != null ? netUp : '--'));
            lines.push('下行速率(Mbps),' + (netDown != null ? netDown : '--'));
            lines.push('运行时长(秒),' + (uptimeSec != null ? uptimeSec : '--'));
            lines.push('数据来源,' + (rt.source || '--'));
            lines.push('');

            // 历史数据
            lines.push('=== 历史趋势数据 ===');
            var hist = data.history || {};
            var ts = hist.timestamps || [];
            var header = '时间,CPU(%),内存(%),磁盘(%),下行(Mbps),上行(Mbps)';
            lines.push(header);
            for (var i = 0; i < ts.length; i++) {
                var row = [
                    ts[i],
                    hist.cpu ? hist.cpu[i] : '',
                    hist.memory ? hist.memory[i] : '',
                    hist.disk ? hist.disk[i] : '',
                    hist.network_in ? hist.network_in[i] : '',
                    hist.network_out ? hist.network_out[i] : ''
                ];
                lines.push(row.join(','));
            }
            lines.push('');

            // 告警记录
            lines.push('=== 告警记录 ===');
            lines.push('时间,级别,模块,描述,状态');
            (data.alerts || []).forEach(function(a) {
                var row = [
                    a.created_at || '',
                    getLevelText(a.level),
                    a.source || '',
                    (a.content || a.title || '').replace(/,/g, '，'),
                    getStatusText(a.status)
                ];
                lines.push(row.join(','));
            });

            return lines.join('\n');
        }

        function downloadFile(content, filename, type) {
            var blob = new Blob(['\ufeff' + content], { type: type });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
        }

        function formatDateForFilename() {
            var d = new Date();
            var y = d.getFullYear();
            var m = (d.getMonth() + 1).toString().padStart(2, '0');
            var day = d.getDate().toString().padStart(2, '0');
            var h = d.getHours().toString().padStart(2, '0');
            var min = d.getMinutes().toString().padStart(2, '0');
            return y + m + day + '_' + h + min;
        }

        // ========== 登出 ==========
        async function handleLogout() {
            var confirmed = await YunxiAPI.showConfirm('确定要退出登录吗？', '退出登录');
            if (confirmed) {
                stopAutoRefresh();
                YunxiAPI.showLoading('正在退出...');
                try {
                    await YunxiAPI.logout();
                    YunxiAPI.showToast('已退出登录', 'success');
                    setTimeout(function() {
                        location.href = 'login.html';
                    }, 500);
                } catch (e) {
                    location.href = 'login.html';
                } finally {
                    YunxiAPI.hideLoading();
                }
            }
        }

        // ========== 用户信息 ==========
        function updateUserInfo() {
            var user = YunxiAPI.getCurrentUser();
            if (user) {
                var username = user.username || '管';
                var initial = username.charAt(0).toUpperCase();
                var userBadges = document.querySelectorAll('.w-8.h-8.rounded-full');
                userBadges.forEach(function(badge) {
                    if (badge.textContent.trim() === '管') {
                        badge.textContent = initial;
                    }
                });
                var userNameSpan = document.querySelector('p.text-sm.font-medium');
                if (userNameSpan && userNameSpan.textContent.trim() === '管理员') {
                    userNameSpan.textContent = username;
                }
                var userEmail = document.querySelector('p.text-xs.truncate');
                if (userEmail && user.email) {
                    userEmail.textContent = user.email;
                }
            }
        }
    </script>
