<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">

    <title>登录 - 云汐管理台</title>
    <style id="theme-vars">
/* ============================================================
   M8 云汐管理台 (M8 Control Tower) — Brand Design Tokens
   Dual-mode: Light (default) / Dark (.dark)
   ============================================================ */

:root {
  /* ── Color System (Light Mode — Default) ── */
  --color-primary: #2563eb;
  --color-primary-hover: #1d4ed8;
  --color-primary-active: #1e40af;
  --color-secondary: #0891b2;
  --color-gradient-start: #2563eb;
  --color-gradient-end: #0891b2;

  --color-bg-base: #e8f4f8;
  --color-bg-elevated: #ffffff;
  --color-bg-surface: #ffffff;
  --color-bg-overlay: rgba(255, 255, 255, 0.95);
  --color-bg-card: #ffffff;
  --color-bg-gradient: linear-gradient(160deg, #dbeafe 0%, #cffafe 25%, #e0f2fe 50%, #bae6fd 75%, #e0f7fa 100%);
  --color-bg-gradient-alt: linear-gradient(200deg, #e0f2fe 0%, #ccfbf1 30%, #dbeafe 60%, #e0f7fa 80%, #f0f9ff 100%);

  --color-border-default: rgba(15, 23, 42, 0.1);
  --color-border-subtle: rgba(15, 23, 42, 0.06);
  --color-border-strong: rgba(15, 23, 42, 0.2);

  --color-text-primary: #0f172a;
  --color-text-secondary: #475569;
  --color-text-tertiary: #94a3b8;
  --color-text-inverse: #f8fafc;

  --state-success: #059669;
  --state-warning: #d97706;
  --state-error: #dc2626;
  --state-info: #2563eb;

  --color-glow-primary: rgba(37, 99, 235, 0.12);
  --color-glow-secondary: rgba(8, 145, 178, 0.1);
  --color-glow-ocean: rgba(14, 116, 144, 0.08);
  --color-ocean-deep: #dbeafe;
  --color-ocean-mid: #cffafe;
  --color-ocean-light: #e0f2fe;
  --color-ocean-surface: #bae6fd;
  --color-ocean-foam: rgba(56, 189, 248, 0.06);

  /* ── Typography ── */
  --font-family-base: 'Inter', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
  --font-family-display: 'Inter', 'PingFang SC', 'Noto Sans SC', sans-serif;
  --font-family-mono: 'JetBrains Mono', 'Fira Code', monospace;

  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.875rem;
  --text-lg: 1rem;
  --text-xl: 1.125rem;
  --text-2xl: 1.375rem;
  --text-3xl: 1.625rem;
  --text-4xl: 2rem;

  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.625;

  --tracking-tight: -0.02em;
  --tracking-normal: 0;
  --tracking-wide: 0.025em;

  /* ── Spacing ── */
  --spacing-0: 0;
  --spacing-1: 0.25rem;
  --spacing-2: 0.5rem;
  --spacing-3: 0.75rem;
  --spacing-4: 1rem;
  --spacing-5: 1.25rem;
  --spacing-6: 1.5rem;
  --spacing-8: 2rem;
  --spacing-10: 2.5rem;
  --spacing-12: 3rem;
  --spacing-16: 4rem;

  /* ── Radius ── */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows (Light) ── */
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 4px 20px rgba(0, 0, 0, 0.1), 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-glow: 0 0 20px rgba(37, 99, 235, 0.1);
  --shadow-glow-strong: 0 0 30px rgba(37, 99, 235, 0.18);

  /* ── Transitions ── */
  --transition-fast: 150ms ease;
  --transition-base: 200ms ease;
  --transition-slow: 300ms ease;

  /* ── Layout ── */
  --sidebar-width: 240px;
  --header-height: 56px;
  --content-max-width: 1400px;

  /* ── Z-index ── */
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-modal-backdrop: 300;
  --z-modal: 400;
  --z-toast: 500;
}

/* ============================================================
   Dark Mode Override
   ============================================================ */
html.dark {
  --color-primary: #3b82f6;
  --color-primary-hover: #2563eb;
  --color-primary-active: #1d4ed8;
  --color-secondary: #06b6d4;
  --color-gradient-start: #3b82f6;
  --color-gradient-end: #06b6d4;

  --color-bg-base: #0a1929;
  --color-bg-elevated: rgba(16, 40, 65, 0.75);
  --color-bg-surface: rgba(16, 40, 65, 0.75);
  --color-bg-overlay: rgba(8, 20, 36, 0.92);
  --color-bg-card: rgba(16, 40, 65, 0.65);
  --color-bg-gradient: linear-gradient(160deg, #061220 0%, #0a2342 25%, #0d3050 50%, #0a2844 75%, #071a30 100%);
  --color-bg-gradient-alt: linear-gradient(200deg, #071828 0%, #0b2a4a 30%, #0e3858 60%, #0a2e4e 80%, #081e35 100%);

  --color-border-default: rgba(148, 163, 184, 0.12);
  --color-border-subtle: rgba(148, 163, 184, 0.06);
  --color-border-strong: rgba(148, 163, 184, 0.24);

  --color-text-primary: #f1f5f9;
  --color-text-secondary: #94a3b8;
  --color-text-tertiary: #64748b;
  --color-text-inverse: #0f172a;

  --state-success: #10b981;
  --state-warning: #f59e0b;
  --state-error: #ef4444;
  --state-info: #3b82f6;

  --color-glow-primary: rgba(59, 130, 246, 0.3);
  --color-glow-secondary: rgba(6, 182, 212, 0.25);
  --color-glow-ocean: rgba(14, 116, 144, 0.2);
  --color-ocean-deep: #061220;
  --color-ocean-mid: #0a2342;
  --color-ocean-light: #0d3050;
  --color-ocean-surface: #0e3858;
  --color-ocean-foam: rgba(56, 189, 248, 0.08);

  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 4px 20px rgba(0, 0, 0, 0.3);
  --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.15);
  --shadow-glow-strong: 0 0 30px rgba(59, 130, 246, 0.25);
}

/* ============================================================
   Global Background
   ============================================================ */
html {
  background: var(--color-bg-gradient);
  background-attachment: fixed;
  min-height: 100%;
}

body {
  background: transparent;
}

/* ============================================================
   Utility Classes
   ============================================================ */
.ocean-gradient-bg {
  background: var(--color-bg-gradient);
}

.ocean-gradient-alt-bg {
  background: var(--color-bg-gradient-alt);
}

.ocean-glow {
  box-shadow: 0 0 40px rgba(6, 182, 212, 0.1), 0 0 80px rgba(59, 130, 246, 0.05);
}

.ocean-shimmer {
  background: linear-gradient(135deg, rgba(14, 56, 88, 0.3) 0%, rgba(6, 35, 66, 0.1) 50%, rgba(14, 116, 144, 0.15) 100%);
}

.brand-gradient-text {
  background: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.brand-gradient-bg {
  background: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end));
}

.brand-gradient-border {
  border-image: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end)) 1;
}

.glass-surface {
  background: rgba(30, 41, 59, 0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--color-border-subtle);
}

/* Light mode glass override */
html:not(.dark) .glass-surface {
  background: rgba(255, 255, 255, 0.75);
  border: 1px solid rgba(15, 23, 42, 0.08);
}

.glow-effect {
  box-shadow: var(--shadow-glow);
}

.glow-effect-strong {
  box-shadow: var(--shadow-glow-strong);
}

/* ── Typography Scale Classes ── */
.text-display {
  font-family: var(--font-family-display);
  font-size: var(--text-4xl);
  font-weight: 700;
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
}

.text-heading {
  font-family: var(--font-family-display);
  font-size: var(--text-2xl);
  font-weight: 600;
  line-height: var(--leading-tight);
}

.text-subheading {
  font-family: var(--font-family-display);
  font-size: var(--text-lg);
  font-weight: 500;
  line-height: var(--leading-normal);
}

.text-body {
  font-family: var(--font-family-base);
  font-size: var(--text-base);
  font-weight: 400;
  line-height: var(--leading-normal);
}

.text-caption {
  font-family: var(--font-family-base);
  font-size: var(--text-sm);
  font-weight: 400;
  line-height: var(--leading-normal);
  color: var(--color-text-secondary);
}

.text-label {
  font-family: var(--font-family-base);
  font-size: var(--text-xs);
  font-weight: 500;
  line-height: var(--leading-normal);
  letter-spacing: var(--tracking-wide);
  text-transform: uppercase;
  color: var(--color-text-tertiary);
}

    </style>

</head>
<body class="min-h-screen font-sans antialiased" style="background: var(--color-bg-gradient); background-attachment: fixed; overflow: hidden;">

    <!-- Background animated gradient orbs -->
    <div class="fixed inset-0 overflow-hidden" style="z-index: 0;">
        <!-- Multi-tone ocean gradient overlay -->
        <div style="position:absolute;inset:0;background:linear-gradient(160deg, #dbeafe 0%, #cffafe 30%, #e0f2fe 55%, #bae6fd 80%, #e0f7fa 100%);"></div>
        <!-- Orb 1 - deep cyan -->
        <div style="position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%); top: -15%; left: -10%; animation: floatOrb1 20s ease-in-out infinite;"></div>
        <!-- Orb 2 - light teal -->
        <div style="position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(8,145,178,0.06) 0%, transparent 70%); bottom: -10%; right: -8%; animation: floatOrb2 25s ease-in-out infinite;"></div>
        <!-- Orb 3 - small accent -->
        <div style="position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(37,99,235,0.05) 0%, transparent 70%); top: 50%; left: 60%; animation: floatOrb3 18s ease-in-out infinite;"></div>
        <!-- CSS grid pattern overlay -->
        <div style="position: absolute; inset: 0; background-image: linear-gradient(rgba(148,163,184,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(148,163,184,0.03) 1px, transparent 1px); background-size: 60px 60px;"></div>
    </div>

    <!-- Main content -->
    <main class="relative flex items-center justify-center min-h-screen" style="z-index: 1;">
        <div class="w-full max-w-4xl mx-4">

            <!-- Login Card (glass-morphism) -->
            <div class="glass-surface overflow-hidden" style="border-radius: var(--radius-xl); box-shadow: var(--shadow-lg);">

                <div class="flex flex-col md:flex-row">

                    <!-- LEFT: Brand Display -->
                    <div class="flex-shrink-0 flex flex-col items-center justify-center p-10 md:p-12 md:w-[280px]" style="background: linear-gradient(160deg, rgba(59,130,246,0.08) 0%, rgba(6,182,212,0.05) 100%); border-right: 1px solid var(--color-border-default);">
                        <!-- Logo Mark -->
                        <div class="flex items-center justify-center mb-6" style="width: 56px; height: 56px; border-radius: var(--radius-lg); background: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end)); box-shadow: var(--shadow-glow);">
                            <span style="font-family: var(--font-family-display); font-size: 24px; font-weight: 700; color: var(--color-text-inverse);">M8</span>
                        </div>
                        <!-- Brand Name -->
                        <h1 class="brand-gradient-text mb-1" style="font-family: var(--font-family-display); font-size: var(--text-3xl); font-weight: 700; letter-spacing: var(--tracking-tight); line-height: var(--leading-tight);">云汐</h1>
                        <!-- Subtitle -->
                        <p style="font-family: var(--font-family-base); font-size: var(--text-sm); color: var(--color-text-secondary); letter-spacing: var(--tracking-wide); text-transform: uppercase; margin-bottom: 16px;">M8 Control Tower</p>
                        <!-- Divider -->
                        <div style="width: 32px; height: 2px; background: linear-gradient(90deg, var(--color-gradient-start), var(--color-gradient-end)); border-radius: 1px; margin-bottom: 16px;"></div>
                        <!-- Tagline -->
                        <p style="font-family: var(--font-family-base); font-size: var(--text-sm); color: var(--color-text-tertiary); text-align: center; line-height: var(--leading-relaxed);">智慧管控平台</p>
                    </div>

                    <!-- RIGHT: Login Form -->
                    <div class="flex-1 p-8 md:p-12">
                        <!-- Form Header -->
                        <div class="mb-8">
                            <h2 style="font-family: var(--font-family-display); font-size: var(--text-2xl); font-weight: 600; color: var(--color-text-primary); margin-bottom: 6px;">欢迎回来</h2>
                            <p style="font-family: var(--font-family-base); font-size: var(--text-sm); color: var(--color-text-secondary);">请输入您的账号信息以继续</p>
                        </div>

                        <!-- Form -->
                        <form onsubmit="return false;" class="space-y-5">

                            <!-- Username -->
                            <div>
                                <label for="username" style="display: block; font-family: var(--font-family-base); font-size: var(--text-xs); font-weight: 500; color: var(--color-text-secondary); letter-spacing: var(--tracking-wide); text-transform: uppercase; margin-bottom: 6px;">用户名</label>
                                <div class="relative">
                                    <i data-lucide="user" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--color-text-tertiary); pointer-events: none;"></i>
                                    <input
                                        type="text"
                                        id="username"
                                        placeholder="请输入用户名"
                                        autocomplete="username"
                                        class="w-full outline-none"
                                        style="height: 44px; padding: 0 12px 0 40px; font-family: var(--font-family-base); font-size: var(--text-base); color: var(--color-text-primary); background: var(--color-bg-base); border: 1px solid var(--color-border-default); border-radius: var(--radius-md); transition: border-color var(--transition-base), box-shadow var(--transition-base);"
                                        onfocus="this.style.borderColor='var(--color-primary)'; this.style.boxShadow='0 0 0 3px var(--color-glow-primary)';"
                                        onblur="this.style.borderColor='var(--color-border-default)'; this.style.boxShadow='none';"
                                    >
                                </div>
                            </div>

                            <!-- Password -->
                            <div>
                                <label for="password" style="display: block; font-family: var(--font-family-base); font-size: var(--text-xs); font-weight: 500; color: var(--color-text-secondary); letter-spacing: var(--tracking-wide); text-transform: uppercase; margin-bottom: 6px;">密码</label>
                                <div class="relative">
                                    <i data-lucide="lock" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--color-text-tertiary); pointer-events: none;"></i>
                                    <input
                                        type="password"
                                        id="password"
                                        placeholder="请输入密码"
                                        autocomplete="current-password"
                                        class="w-full outline-none"
                                        style="height: 44px; padding: 0 12px 0 40px; font-family: var(--font-family-base); font-size: var(--text-base); color: var(--color-text-primary); background: var(--color-bg-base); border: 1px solid var(--color-border-default); border-radius: var(--radius-md); transition: border-color var(--transition-base), box-shadow var(--transition-base);"
                                        onfocus="this.style.borderColor='var(--color-primary)'; this.style.boxShadow='0 0 0 3px var(--color-glow-primary)';"
                                        onblur="this.style.borderColor='var(--color-border-default)'; this.style.boxShadow='none';"
                                    >
                                </div>
                            </div>

                            <!-- Remember Me -->
                            <div class="flex items-center justify-between">
                                <label class="flex items-center cursor-pointer" style="user-select: none;">
                                    <input type="checkbox" class="sr-only" id="remember-me">
                                    <span id="remember-toggle" style="display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border: 1px solid var(--color-border-strong); border-radius: 4px; background: var(--color-bg-base); transition: background var(--transition-fast), border-color var(--transition-fast); margin-right: 8px; flex-shrink: 0;">
                                        <i data-lucide="check" style="width: 12px; height: 12px; color: var(--color-text-inverse); opacity: 0; transition: opacity var(--transition-fast);"></i>
                                    </span>
                                    <span style="font-family: var(--font-family-base); font-size: var(--text-sm); color: var(--color-text-secondary);">记住我</span>
                                </label>
                                <a href="#" style="font-family: var(--font-family-base); font-size: var(--text-sm); color: var(--color-primary); text-decoration: none; transition: color var(--transition-fast);" onmouseover="this.style.color='var(--color-primary-hover)'" onmouseout="this.style.color='var(--color-primary)'">忘记密码？</a>
                            </div>

                            <!-- Login Button -->
                            <button
                                type="submit"
                                data-dom-id="cta-login"
                                class="w-full flex items-center justify-center gap-2 cursor-pointer"
                                style="height: 44px; font-family: var(--font-family-base); font-size: var(--text-base); font-weight: 600; color: var(--color-text-inverse); background: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end)); border: none; border-radius: var(--radius-md); transition: box-shadow var(--transition-base), transform var(--transition-fast), opacity var(--transition-fast); letter-spacing: var(--tracking-wide);"
                                onmouseover="this.style.boxShadow='var(--shadow-glow-strong)'; this.style.transform='translateY(-1px)';"
                                onmouseout="this.style.boxShadow='none'; this.style.transform='translateY(0)';"
                                onmousedown="this.style.opacity='0.9'; this.style.transform='translateY(0)';"
                                onmouseup="this.style.opacity='1';"
                            >
                                <span>登 录</span>
                                <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
                            </button>

                        </form>
                    </div>
                </div>

            </div>

            <!-- Version -->
            <p class="text-center mt-6" style="font-family: var(--font-family-base); font-size: var(--text-xs); color: var(--color-text-tertiary); letter-spacing: var(--tracking-wide);">v1.0.0</p>

        </div>
    </main>

    <!-- Custom Styles (placed before </body> per rules) -->
    <style>
        @keyframes floatOrb1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, 30px) scale(1.05); }
            66% { transform: translate(-20px, 50px) scale(0.95); }
        }
        @keyframes floatOrb2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-30px, -40px) scale(1.08); }
            66% { transform: translate(25px, -20px) scale(0.97); }
        }
        @keyframes floatOrb3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-35px, 25px) scale(1.1); }
        }
        #remember-me:checked ~ #remember-toggle,
        label:has(#remember-me:checked) #remember-toggle {
            background: var(--color-primary);
            border-color: var(--color-primary);
        }
        label:has(#remember-me:checked) #remember-toggle i[data-lucide="check"] {
            opacity: 1;
        }
        input::placeholder {
            color: var(--color-text-tertiary);
        }
        @media (prefers-reduced-motion: reduce) {
            div[style*="animation"] {
                animation: none !important;
            }
        }
    </style>

        <!-- Login API Integration -->
    <script src="../common/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var loginBtn = document.querySelector('[data-dom-id="cta-login"]');
            var usernameInput = document.querySelector('input[type="text"], input[name="username"]');
            var passwordInput = document.querySelector('input[type="password"]');
            var rememberCheckbox = document.querySelector('input[type="checkbox"]');

            // 如果没有找到具体name的input，尝试找第一个和第二个input
            if (!usernameInput) {
                var inputs = document.querySelectorAll('input');
                if (inputs.length >= 2) {
                    usernameInput = inputs[0];
                    passwordInput = inputs[1];
                }
            }

            // 回车登录
            if (passwordInput) {
                passwordInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        handleLogin();
                    }
                });
            }

            if (loginBtn) {
                loginBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    handleLogin();
                });
            }

            async function handleLogin() {
                var username = usernameInput ? usernameInput.value.trim() : '';
                var password = passwordInput ? passwordInput.value : '';
                var remember = rememberCheckbox ? rememberCheckbox.checked : false;

                if (!username) {
                    YunxiAPI.showToast('请输入用户名', 'warning');
                    if (usernameInput) usernameInput.focus();
                    return;
                }

                if (!password) {
                    YunxiAPI.showToast('请输入密码', 'warning');
                    if (passwordInput) passwordInput.focus();
                    return;
                }

                var originalText = loginBtn ? loginBtn.innerHTML : '';
                if (loginBtn) {
                    loginBtn.innerHTML = '<span>登录中...</span>';
                    loginBtn.style.opacity = '0.7';
                    loginBtn.style.pointerEvents = 'none';
                }

                try {
                    await YunxiAPI.login(username, password, remember);
                    YunxiAPI.showToast('登录成功，正在跳转...', 'success');

                    // 检查是否有 redirect 参数
                    var urlParams = new URLSearchParams(location.search);
                    var redirect = urlParams.get('redirect');
                    var redirectUrl = redirect ? decodeURIComponent(redirect) : 'dashboard.html';

                    setTimeout(function() {
                        location.href = redirectUrl;
                    }, 500);
                } catch (error) {
                    console.error('登录失败:', error);
                    YunxiAPI.showToast(error.message || '登录失败', 'error');
                    if (loginBtn) {
                        loginBtn.innerHTML = originalText;
                        loginBtn.style.opacity = '';
                        loginBtn.style.pointerEvents = '';
                    }
                }
            }
        });
    </script>

<script>
        lucide.createIcons();
    </script>
</body>
</html>
