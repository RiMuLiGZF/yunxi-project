/* ============================================================
   M8 云汐管理台 (M8 Control Tower) — Brand Design Tokens
   ============================================================ */

:root {
  --color-primary: #2563eb;
  --color-primary-hover: #1d4ed8;
  --color-secondary: #0891b2;
  --color-gradient-start: #2563eb;
  --color-gradient-end: #0891b2;

  --color-bg-base: #e8f4f8;
  --color-bg-elevated: #ffffff;
  --color-bg-card: #ffffff;
  --color-bg-gradient: linear-gradient(160deg, #dbeafe 0%, #cffafe 25%, #e0f2fe 50%, #bae6fd 75%, #e0f7fa 100%);

  --color-border-default: rgba(15, 23, 42, 0.1);
  --color-border-subtle: rgba(15, 23, 42, 0.06);

  --color-text-primary: #0f172a;
  --color-text-secondary: #475569;
  --color-text-tertiary: #94a3b8;

  --state-success: #059669;
  --state-warning: #d97706;
  --state-error: #dc2626;
  --state-info: #2563eb;
  --state-critical: #b91c1c;

  --font-family-base: 'Inter', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', system-ui, sans-serif;
  --font-family-display: 'Inter', 'PingFang SC', 'Noto Sans SC', sans-serif;
  --font-family-mono: 'JetBrains Mono', 'Fira Code', monospace;

  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.875rem;
  --text-lg: 1rem;
  --text-xl: 1.125rem;
  --text-2xl: 1.375rem;
  --text-3xl: 1.625rem;

  --spacing-1: 0.25rem;
  --spacing-2: 0.5rem;
  --spacing-3: 0.75rem;
  --spacing-4: 1rem;
  --spacing-5: 1.25rem;
  --spacing-6: 1.5rem;
  --spacing-8: 2rem;

  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-lg: 0 4px 20px rgba(0, 0, 0, 0.1);

  --transition-fast: 150ms ease;
  --transition-base: 200ms ease;

  --sidebar-width: 240px;
  --header-height: 56px;
  --content-max-width: 1400px;
}

html.dark {
  --color-primary: #3b82f6;
  --color-primary-hover: #2563eb;
  --color-secondary: #06b6d4;
  --color-gradient-start: #3b82f6;
  --color-gradient-end: #06b6d4;

  --color-bg-base: #0a1929;
  --color-bg-elevated: rgba(16, 40, 65, 0.75);
  --color-bg-card: rgba(16, 40, 65, 0.65);
  --color-bg-gradient: linear-gradient(160deg, #061220 0%, #0a2342 25%, #0d3050 50%, #0a2844 75%, #071a30 100%);

  --color-border-default: rgba(148, 163, 184, 0.12);
  --color-border-subtle: rgba(148, 163, 184, 0.06);

  --color-text-primary: #f1f5f9;
  --color-text-secondary: #94a3b8;
  --color-text-tertiary: #64748b;

  --state-success: #10b981;
  --state-warning: #f59e0b;
  --state-error: #ef4444;
  --state-info: #3b82f6;
  --state-critical: #f87171;

  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 4px 20px rgba(0, 0, 0, 0.3);
}

html {
  background: var(--color-bg-gradient);
  background-attachment: fixed;
  min-height: 100%;
}

body {
  background: transparent;
  margin: 0;
  font-family: var(--font-family-base);
  font-size: var(--text-base);
  color: var(--color-text-primary);
  line-height: 1.5;
}

.glass-surface {
  background: rgba(30, 41, 59, 0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--color-border-subtle);
}

html:not(.dark) .glass-surface {
  background: rgba(255, 255, 255, 0.75);
  border: 1px solid rgba(15, 23, 42, 0.08);
}

.brand-gradient-text {
  background: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.brand-gradient-bg {
  background: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end));
}

.text-label {
  font-size: var(--text-xs);
  font-weight: 500;
  letter-spacing: 0.025em;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
}

.text-subheading {
  font-family: var(--font-family-display);
  font-size: var(--text-lg);
  font-weight: 500;
  line-height: 1.5;
}

.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

/* 健康度环形进度条 */
.health-ring {
  position: relative;
  width: 64px;
  height: 64px;
}
.health-ring svg {
  transform: rotate(-90deg);
}
.health-ring-bg {
  fill: none;
  stroke: var(--color-border-subtle);
  stroke-width: 6;
}
.health-ring-progress {
  fill: none;
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.6s ease;
}
.health-ring-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: var(--text-sm);
  font-weight: 600;
  font-family: var(--font-family-display);
}

/* 进度条 */
.progress-bar {
  height: 6px;
  border-radius: var(--radius-full);
  background: var(--color-border-subtle);
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  border-radius: var(--radius-full);
  transition: width 0.6s ease;
}

/* 告警项hover效果 */
.alert-item {
  transition: all var(--transition-base);
}
.alert-item:hover {
  background: rgba(148, 163, 184, 0.06);
}

/* 表格样式 */
.data-table {
  width: 100%;
  border-collapse: collapse;
}
.data-table th {
  text-align: left;
  font-size: var(--text-xs);
  font-weight: 500;
  color: var(--color-text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.025em;
  padding: 10px 12px;
  border-bottom: 1px solid var(--color-border-default);
}
.data-table td {
  padding: 12px;
  font-size: var(--text-sm);
  color: var(--color-text-secondary);
  border-bottom: 1px solid var(--color-border-subtle);
}
.data-table tr:last-child td {
  border-bottom: none;
}
.data-table tr:hover td {
  background: rgba(148, 163, 184, 0.04);
}

/* 状态徽章 */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: 500;
  white-space: nowrap;
}
.badge-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}
.badge-success {
  background: rgba(16, 185, 129, 0.1);
  color: var(--state-success);
}
.badge-success .badge-dot { background: var(--state-success); }
.badge-warning {
  background: rgba(245, 158, 11, 0.1);
  color: var(--state-warning);
}
.badge-warning .badge-dot { background: var(--state-warning); }
.badge-error {
  background: rgba(239, 68, 68, 0.1);
  color: var(--state-error);
}
.badge-error .badge-dot { background: var(--state-error); }
.badge-info {
  background: rgba(59, 130, 246, 0.1);
  color: var(--color-primary);
}
.badge-info .badge-dot { background: var(--color-primary); }
.badge-critical {
  background: rgba(239, 68, 68, 0.15);
  color: var(--state-critical);
}
.badge-critical .badge-dot { background: var(--state-critical); }

/* 巡检项目卡片 */
.inspection-item {
  transition: all var(--transition-base);
  cursor: pointer;
}
.inspection-item:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

/* 脉冲动画 */
@keyframes pulse-ring {
  0% { transform: scale(0.8); opacity: 1; }
  100% { transform: scale(1.4); opacity: 0; }
}
.pulse-indicator {
  position: relative;
}
.pulse-indicator::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  animation: pulse-ring 1.5s ease-out infinite;
}
.pulse-critical::before { background: var(--state-error); }
.pulse-warning::before { background: var(--state-warning); }

/* 扫描动画 */
@keyframes scan {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100%); }
}
.scanning .scan-line {
  position: absolute;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
  animation: scan 1.5s linear infinite;
}

                            </div>
                            <div class="grid grid-cols-5 gap-3" id="inspection-items">

                        <!-- 巡检历史记录 -->
                        <div class="glass-surface rounded-xl p-4" style="border-radius: var(--radius-lg);">

                                <h3 class="text-subheading" style="color: var(--color-text-primary);">

                                </h3>
                                <div class="flex items-center gap-2">
                                    <select class="text-xs px-2 py-1 rounded outline-none"

                    </div>

                    <!-- 右侧：问题告警列表 -->
                    <div class="col-span-4">
                        <div class="glass-surface rounded-xl p-4" style="border-radius: var(--radius-lg); height: 100%;">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="text-subheading" style="color: var(--color-text-primary);">
                                    <i data-lucide="bell" class="w-4 h-4 inline mr-2" style="color: var(--state-error);"></i>
                                    问题告警
                                </h3>
                                <div class="flex items-center gap-1">
                                    <button onclick="filterAlerts('all')" class="alert-filter-btn text-xs px-2 py-1 rounded transition-all"

                                            style="background: rgba(59, 130, 246, 0.1); color: var(--color-primary);">全部</button>
                                    <button onclick="filterAlerts('high')" class="alert-filter-btn text-xs px-2 py-1 rounded transition-all"
                                            data-filter="high"
                                            style="color: var(--color-text-tertiary);">高危</button>
                                    <button onclick="filterAlerts('medium')" class="alert-filter-btn text-xs px-2 py-1 rounded transition-all"
                                            data-filter="medium"
                                            style="color: var(--color-text-tertiary);">中危</button>
                                    <button onclick="filterAlerts('low')" class="alert-filter-btn text-xs px-2 py-1 rounded transition-all"

                </section>

            </main>
        </div>
    </div>

    <!-- ===== 巡检进行中弹窗 ===== -->
    <div id="inspect-modal" class="fixed inset-0 z-[500] hidden items-center justify-center"
         style="background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);">
        <div class="glass-surface rounded-xl p-6 w-full max-w-md mx-4" style="border-radius: var(--radius-lg);">
            <div class="text-center mb-4">
                <div class="w-16 h-16 mx-auto mb-4 rounded-full flex items-center justify-center brand-gradient-bg relative overflow-hidden scanning">
                    <i data-lucide="shield-check" class="w-8 h-8" style="color: white; position: relative; z-index: 1;"></i>
                    <div class="scan-line"></div>
                </div>
                <h3 class="text-subheading mb-2" style="color: var(--color-text-primary);">正在执行巡检</h3>
                <p class="text-sm" style="color: var(--color-text-secondary);" id="inspect-status">正在初始化巡检模块...</p>
            </div>

            <div class="space-y-2 mb-4" id="inspect-progress-list">
                <!-- 由 JS 渲染进度 -->
            </div>

            <div class="progress-bar mb-2">
                <div class="progress-bar-fill brand-gradient-bg" id="inspect-progress-bar" style="width: 0%;"></div>
            </div>
            <p class="text-xs text-center" style="color: var(--color-text-tertiary);">
                <span id="inspect-percent">0</span>% 完成
            </p>
        </div>
    </div>

    <!-- ===== 巡检详情弹窗 ===== -->
    <div id="detail-modal" class="fixed inset-0 z-[500] hidden items-center justify-center"
         style="background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);">
        <div class="glass-surface rounded-xl p-6 w-full max-w-2xl mx-4" style="border-radius: var(--radius-lg); max-height: 80vh; overflow-y: auto;">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-subheading" style="color: var(--color-text-primary);">
                    <i data-lucide="file-text" class="w-4 h-4 inline mr-2" style="color: var(--color-primary);"></i>
                    巡检详情
                </h3>
                <button onclick="closeDetailModal()" class="w-7 h-7 rounded-md flex items-center justify-center transition-all hover:opacity-80"
                        style="color: var(--color-text-tertiary);">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div id="detail-content">
                <!-- 由 JS 渲染 -->
            </div>
        </div>
    </div>

    <!-- ===== Toast ===== -->
    <div id="toast" class="fixed top-5 right-5 z-[600] hidden px-4 py-3 rounded-lg text-sm shadow-lg transition-all"
         style="background: rgba(16, 185, 129, 0.9); color: white; backdrop-filter: blur(8px);">
        <span id="toast-message"></span>
    </div>

    <script>
        // ========== 模拟数据 ==========
        const inspectionItems = [
            { id: 'system', name: '系统巡检', icon: 'monitor', color: 'primary', desc: '系统状态与资源', count: 32, status: 'normal' },
            { id: 'security', name: '安全巡检', icon: 'shield', color: 'error', desc: '漏洞与安全策略', count: 28, status: 'warning' },
            { id: 'performance', name: '性能巡检', icon: 'gauge', color: 'warning', desc: '性能指标与瓶颈', count: 24, status: 'normal' },
            { id: 'data', name: '数据巡检', icon: 'database', color: 'success', desc: '数据完整性与备份', count: 18, status: 'normal' },
            { id: 'network', name: '网络巡检', icon: 'wifi', color: 'secondary', desc: '网络连通与延迟', count: 15, status: 'error' },
        ];

        const inspectionHistory = [
            { id: 'INS-20260710-001', type: '全量巡检', time: '2026-07-10 14:30:22', duration: '3分24秒', issues: 8, status: 'completed' },
            { id: 'INS-20260710-002', type: '安全巡检', time: '2026-07-10 10:15:08', duration: '1分12秒', issues: 3, status: 'completed' },
            { id: 'INS-20260710-003', type: '性能巡检', time: '2026-07-10 08:00:00', duration: '58秒', issues: 2, status: 'completed' },
            { id: 'INS-20260709-005', type: '系统巡检', time: '2026-07-09 22:00:14', duration: '2分05秒', issues: 1, status: 'completed' },
            { id: 'INS-20260709-004', type: '数据巡检', time: '2026-07-09 18:30:00', duration: '4分32秒', issues: 0, status: 'completed' },
            { id: 'INS-20260709-003', type: '全量巡检', time: '2026-07-09 14:00:00', duration: '3分45秒', issues: 6, status: 'completed' },
            { id: 'INS-20260709-002', type: '网络巡检', time: '2026-07-09 10:20:33', duration: '45秒', issues: 2, status: 'completed' },
        ];

        const alerts = [
            { id: 1, level: 'high', title: '数据库连接池接近上限', desc: 'MySQL 主库连接数已达 85%，可能影响业务响应', module: '数据巡检', time: '10分钟前' },
            { id: 2, level: 'high', title: 'SSL证书即将过期', desc: 'api.yunxi.com 证书将于 7 天后过期', module: '安全巡检', time: '32分钟前' },
            { id: 3, level: 'medium', title: 'CPU 使用率持续偏高', desc: '核心服务节点 CPU 平均使用率 78%', module: '性能巡检', time: '1小时前' },
            { id: 4, level: 'medium', title: '磁盘空间不足预警', desc: '日志分区剩余空间 15%，建议清理', module: '系统巡检', time: '2小时前' },
            { id: 5, level: 'medium', title: '接口响应超时增加', desc: '支付接口 P99 延迟升至 1.2s', module: '性能巡检', time: '3小时前' },
            { id: 6, level: 'medium', title: '弱密码策略未启用', desc: '部分用户账户未强制开启强密码策略', module: '安全巡检', time: '4小时前' },
            { id: 7, level: 'low', title: 'Redis 内存碎片率偏高', desc: '碎片率 1.5，建议重启整理', module: '系统巡检', time: '5小时前' },
            { id: 8, level: 'low', title: 'Nginx 访问日志未轮转', desc: '日志文件持续增长，建议配置轮转', module: '系统巡检', time: '6小时前' },
        ];

        // ========== 工具函数 ==========
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const msg = document.getElementById('toast-message');
            msg.textContent = message;
            toast.style.background = type === 'success' ? 'rgba(16, 185, 129, 0.9)' :
                                     type === 'error' ? 'rgba(239, 68, 68, 0.9)' :
                                     'rgba(59, 130, 246, 0.9)';
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getStatusBadge(status) {
            const map = {
                completed: { text: '已完成', class: 'badge-success' },
                running: { text: '进行中', class: 'badge-info' },
                failed: { text: '失败', class: 'badge-error' },
            };
            const s = map[status] || map.completed;
            return `<span class="badge ${s.class}"><span class="badge-dot"></span>${s.text}</span>`;
        }

        function getLevelBadge(level) {
            const map = {
                high: { text: '高危', class: 'badge-critical', pulse: 'pulse-critical' },
                medium: { text: '中危', class: 'badge-warning', pulse: 'pulse-warning' },
                low: { text: '低危', class: 'badge-info', pulse: '' },
            };
            const l = map[level] || map.low;
            return `<span class="badge ${l.class}"><span class="badge-dot pulse-indicator ${l.pulse}"></span>${l.text}</span>`;
        }

        // ========== 渲染函数 ==========
        function renderInspectionItems() {
            const container = document.getElementById('inspection-items');
            const colorMap = {
                primary: { bg: 'rgba(59, 130, 246, 0.1)', text: 'var(--color-primary)' },
                error: { bg: 'rgba(239, 68, 68, 0.1)', text: 'var(--state-error)' },
                warning: { bg: 'rgba(245, 158, 11, 0.1)', text: 'var(--state-warning)' },
                success: { bg: 'rgba(16, 185, 129, 0.1)', text: 'var(--state-success)' },
                secondary: { bg: 'rgba(6, 182, 212, 0.1)', text: 'var(--color-secondary)' },
            };
            const statusMap = {
                normal: { text: '正常', class: 'badge-success' },
                warning: { text: '告警', class: 'badge-warning' },
                error: { text: '异常', class: 'badge-error' },
            };

            let html = '';
            inspectionItems.forEach(item => {
                const c = colorMap[item.color];
                const s = statusMap[item.status];
                html += `
                    <div class="inspection-item glass-surface rounded-lg p-3 relative overflow-hidden"
                         onclick="runInspection('${item.id}')"
                         style="border-radius: var(--radius-md);">
                        <div class="absolute top-0 left-0 right-0 h-[1.5px]" style="background: ${c.text}; opacity: 0.6;"></div>
                        <div class="flex items-center gap-2 mb-2">
                            <div class="w-8 h-8 rounded-md flex items-center justify-center shrink-0"
                                 style="background: ${c.bg};">
                                <i data-lucide="${item.icon}" class="w-4 h-4" style="color: ${c.text};"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">${item.name}</p>
                            </div>
                        </div>
                        <p class="text-xs mb-2 truncate" style="color: var(--color-text-tertiary);">${item.desc}</p>
                        <div class="flex items-center justify-between">
                            <span class="text-xs" style="color: var(--color-text-secondary);">
                                ${item.count} 项检测
                            </span>
                            <span class="badge ${s.class}">
                                <span class="badge-dot"></span>${s.text}
                            </span>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            lucide.createIcons();
        }

        function renderHistoryTable() {
            const tbody = document.getElementById('history-table');
            let html = '';
            inspectionHistory.forEach(h => {
                html += `
                    <tr>
                        <td style="font-family: var(--font-family-mono); font-size: var(--text-xs); color: var(--color-text-primary);">${h.id}</td>
                        <td>${h.type}</td>
                        <td style="color: var(--color-text-tertiary);">${h.time}</td>
                        <td>${h.duration}</td>
                        <td>
                            <span style="color: ${h.issues > 0 ? 'var(--state-warning)' : 'var(--state-success)'};">
                                ${h.issues} 个
                            </span>
                        </td>
                        <td>${getStatusBadge(h.status)}</td>
                        <td>
                            <button onclick="viewDetail('${h.id}')" class="text-xs transition-all hover:opacity-80"
                                    style="color: var(--color-primary);">
                                查看详情
                            </button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function renderAlerts(filter = 'all') {
            const container = document.getElementById('alerts-list');
            const filtered = filter === 'all' ? alerts : alerts.filter(a => a.level === filter);

            if (!filtered.length) {
                container.innerHTML = '<div class="text-center py-8 text-xs" style="color: var(--color-text-tertiary);">暂无告警信息</div>';
                return;
            }

            let html = '';
            filtered.forEach(alert => {
                const levelColors = {
                    high: { border: 'var(--state-error)', icon: 'alert-octagon' },
                    medium: { border: 'var(--state-warning)', icon: 'alert-triangle' },
                    low: { border: 'var(--color-primary)', icon: 'info' },
                };
                const lc = levelColors[alert.level];
                html += `
                    <div class="alert-item p-3 rounded-lg mb-2"
                         style="border-left: 3px solid ${lc.border}; background: rgba(148, 163, 184, 0.03);">
                        <div class="flex items-start gap-2">
                            <i data-lucide="${lc.icon}" class="w-4 h-4 shrink-0 mt-0.5" style="color: ${lc.border};"></i>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center justify-between gap-2 mb-1">
                                    <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">${escapeHtml(alert.title)}</p>
                                    ${getLevelBadge(alert.level)}
                                </div>
                                <p class="text-xs mb-2" style="color: var(--color-text-secondary);">${escapeHtml(alert.desc)}</p>
                                <div class="flex items-center justify-between text-xs" style="color: var(--color-text-tertiary);">
                                    <span>${alert.module}</span>
                                    <span>${alert.time}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            lucide.createIcons();
        }

        function filterAlerts(filter) {
            // 更新按钮状态
            document.querySelectorAll('.alert-filter-btn').forEach(btn => {
                if (btn.dataset.filter === filter) {
                    btn.style.background = 'rgba(59, 130, 246, 0.1)';
                    btn.style.color = 'var(--color-primary)';
                } else {
                    btn.style.background = 'transparent';
                    btn.style.color = 'var(--color-text-tertiary)';
                }
            });
            renderAlerts(filter);
        }

        // ========== 一键巡检 ==========
        let isInspecting = false;

        function startQuickInspection() {
            if (isInspecting) return;
            isInspecting = true;

            const btn = document.getElementById('quick-inspect-btn');
            const btnText = document.getElementById('inspect-btn-text');
            const btnIcon = document.getElementById('inspect-icon');

            btn.style.opacity = '0.7';
            btnText.textContent = '巡检中...';
            btnIcon.classList.add('animate-spin');

            // 打开巡检弹窗
            const modal = document.getElementById('inspect-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            const steps = [
                { name: '系统巡检', status: 'pending' },
                { name: '安全巡检', status: 'pending' },
                { name: '性能巡检', status: 'pending' },
                { name: '数据巡检', status: 'pending' },
                { name: '网络巡检', status: 'pending' },
            ];

            function updateProgressList() {
                const list = document.getElementById('inspect-progress-list');
                let html = '';
                steps.forEach(s => {
                    let icon = 'circle';
                    let color = 'var(--color-text-tertiary)';
                    if (s.status === 'running') { icon = 'loader'; color = 'var(--color-primary)'; }
                    else if (s.status === 'done') { icon = 'check-circle-2'; color = 'var(--state-success)'; }
                    html += `
                        <div class="flex items-center gap-2 px-3 py-2 rounded-md"
                             style="background: rgba(148, 163, 184, 0.04);">
                            <i data-lucide="${icon}" class="w-4 h-4 shrink-0 ${s.status === 'running' ? 'animate-spin' : ''}" style="color: ${color};"></i>
                            <span class="text-sm" style="color: ${s.status === 'pending' ? 'var(--color-text-tertiary)' : 'var(--color-text-primary)'};">${s.name}</span>
                        </div>
                    `;
                });
                list.innerHTML = html;
                lucide.createIcons();
            }

            updateProgressList();

            let currentStep = 0;
            const statusTexts = [
                '正在检测系统资源与服务状态...',
                '正在扫描安全漏洞与策略配置...',
                '正在分析性能指标与瓶颈...',
                '正在校验数据完整性与备份...',
                '正在检测网络连通与延迟...',
            ];

            function runNextStep() {
                if (currentStep >= steps.length) {
                    // 完成
                    document.getElementById('inspect-status').textContent = '巡检完成！';
                    document.getElementById('inspect-progress-bar').style.width = '100%';
                    document.getElementById('inspect-percent').textContent = '100';

                    setTimeout(() => {
                        closeInspectModal();
                        showToast('巡检完成，发现 8 个问题');
                        // 更新数据
                        document.getElementById('today-count').textContent =
                            parseInt(document.getElementById('today-count').textContent) + 1;
                    }, 800);
                    return;
                }

                steps[currentStep].status = 'running';
                document.getElementById('inspect-status').textContent = statusTexts[currentStep];
                updateProgressList();

                const progress = ((currentStep + 0.5) / steps.length) * 100;
                document.getElementById('inspect-progress-bar').style.width = progress + '%';
                document.getElementById('inspect-percent').textContent = Math.floor(progress);

                setTimeout(() => {
                    steps[currentStep].status = 'done';
                    currentStep++;
                    runNextStep();
                }, 800 + Math.random() * 600);
            }

            setTimeout(runNextStep, 500);
        }

        function closeInspectModal() {
            const modal = document.getElementById('inspect-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');

            const btn = document.getElementById('quick-inspect-btn');
            const btnText = document.getElementById('inspect-btn-text');
            const btnIcon = document.getElementById('inspect-icon');

            btn.style.opacity = '1';
            btnText.textContent = '一键巡检';
            btnIcon.classList.remove('animate-spin');
            isInspecting = false;

            // 重置进度
            document.getElementById('inspect-progress-bar').style.width = '0%';
            document.getElementById('inspect-percent').textContent = '0';
        }

        function runInspection(type) {
            const item = inspectionItems.find(i => i.id === type);
            if (item) {
                showToast(`开始执行${item.name}...`, 'info');
            }
        }

        // ========== 详情弹窗 ==========
        function viewDetail(id) {
            const modal = document.getElementById('detail-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            const record = inspectionHistory.find(h => h.id === id);
            if (!record) return;

            const issuesList = [
                { name: 'CPU 使用率检查', status: 'pass', value: '45%', desc: '正常范围内' },
                { name: '内存使用率检查', status: 'pass', value: '62%', desc: '正常范围内' },
                { name: '磁盘空间检查', status: 'warning', value: '85%', desc: '日志分区空间不足' },
                { name: '服务进程检查', status: 'pass', value: '全部运行中', desc: '12/12 服务正常' },
                { name: '端口连通性检查', status: 'pass', value: '全部开放', desc: '24/24 端口正常' },
                { name: '数据库连接池', status: 'warning', value: '85%', desc: '接近上限，建议扩容' },
                { name: 'SSL 证书有效期', status: 'error', value: '7天', desc: '即将过期，请及时更新' },
                { name: '弱密码策略', status: 'warning', value: '未开启', desc: '建议启用强密码策略' },
            ];

            let html = `
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div class="p-3 rounded-lg" style="background: rgba(148, 163, 184, 0.06);">
                        <p class="text-xs mb-1" style="color: var(--color-text-tertiary);">巡检ID</p>
                        <p class="text-sm font-medium" style="font-family: var(--font-family-mono); color: var(--color-text-primary);">${record.id}</p>
                    </div>
                    <div class="p-3 rounded-lg" style="background: rgba(148, 163, 184, 0.06);">
                        <p class="text-xs mb-1" style="color: var(--color-text-tertiary);">巡检类型</p>
                        <p class="text-sm font-medium" style="color: var(--color-text-primary);">${record.type}</p>
                    </div>
                    <div class="p-3 rounded-lg" style="background: rgba(148, 163, 184, 0.06);">
                        <p class="text-xs mb-1" style="color: var(--color-text-tertiary);">耗时</p>
                        <p class="text-sm font-medium" style="color: var(--color-text-primary);">${record.duration}</p>
                    </div>
                </div>

                <h4 class="text-sm font-medium mb-3" style="color: var(--color-text-primary);">
                    检测项详情 <span class="text-xs font-normal" style="color: var(--color-text-tertiary);">（共 ${issuesList.length} 项）</span>
                </h4>
                <div class="space-y-2">
            `;

            issuesList.forEach(item => {
                const statusMap = {
                    pass: { icon: 'check-circle-2', color: 'var(--state-success)', text: '通过' },
                    warning: { icon: 'alert-triangle', color: 'var(--state-warning)', text: '告警' },
                    error: { icon: 'x-circle', color: 'var(--state-error)', text: '异常' },
                };
                const s = statusMap[item.status];
                html += `
                    <div class="flex items-center gap-3 p-3 rounded-lg"
                         style="background: rgba(148, 163, 184, 0.03); border: 1px solid var(--color-border-subtle);">
                        <i data-lucide="${s.icon}" class="w-5 h-5 shrink-0" style="color: ${s.color};"></i>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between gap-2">
                                <p class="text-sm font-medium" style="color: var(--color-text-primary);">${item.name}</p>
                                <span class="text-sm font-medium" style="color: ${s.color};">${item.value}</span>
                            </div>
                            <p class="text-xs mt-0.5" style="color: var(--color-text-secondary);">${item.desc}</p>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;

            document.getElementById('detail-content').innerHTML = html;
            lucide.createIcons();
        }

        function closeDetailModal() {
            const modal = document.getElementById('detail-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // ========== 刷新 ==========
        function refreshAll() {
            const icon = document.getElementById('refresh-icon');
            if (icon) icon.style.animation = 'spin 1s linear infinite';

            setTimeout(() => {
                renderInspectionItems();
                renderHistoryTable();
                renderAlerts('all');
                if (icon) icon.style.animation = '';
                lucide.createIcons();
                showToast('数据已刷新');
            }, 600);
        }

        // ========== 响应式 ==========
        function handleResize() {
            // 简单的响应式处理
            const sidebar = document.querySelector('aside');
            const mainArea = document.querySelector('.flex-1.flex.flex-col');
            if (window.innerWidth < 1024) {
                sidebar.style.transform = 'translateX(-100%)';
                mainArea.style.marginLeft = '0';
            } else {
                sidebar.style.transform = 'translateX(0)';
                mainArea.style.marginLeft = '240px';
            }
        }

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            renderInspectionItems();
            renderHistoryTable();
            renderAlerts('all');

            // 健康度环形进度条动画
            const healthScore = 92;
            const circumference = 2 * Math.PI * 28; // r=28
            const offset = circumference - (healthScore / 100) * circumference;
            setTimeout(() => {
                document.getElementById('health-ring').style.strokeDashoffset = offset;
            }, 300);

            window.addEventListener('resize', handleResize);
        });

        // ESC 关闭弹窗
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeDetailModal();
                if (!isInspecting) closeInspectModal();
            }
        });

        // 点击遮罩关闭详情弹窗
        document.getElementById('detail-modal').addEventListener('click', (e) => {
            if (e.target.id === 'detail-modal') closeDetailModal();
        });
    </script>
