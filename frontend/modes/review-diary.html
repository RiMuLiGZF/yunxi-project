<!DOCTYPE html>
<html lang="zh-CN" data-theme="review-summary">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私密日记 — 云汐复盘模式</title>
  <link rel="stylesheet" href="./colors_and_type.css">
  <script src="../common/api.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font-family-base);
      font-size: var(--font-size-base);
      color: var(--color-text-primary);
      background: var(--color-page-bg);
    }
    .app-shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .top-bar {
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: var(--color-header-bg); border-bottom: 1px solid var(--color-header-border);
    }
    .back-btn {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      color: var(--color-text-secondary); font-size: 14px; padding: 6px 12px; border-radius: 8px;
      transition: all .2s;
    }
    .back-btn:hover { background: var(--color-hover-bg); color: var(--color-text-primary); }
    .page-title { font-size: 16px; font-weight: 600; }
    .main-body { flex: 1; display: flex; overflow: hidden; }

    .sidebar {
      width: 320px; border-right: 1px solid var(--color-border);
      background: var(--color-sidebar-bg); display: flex; flex-direction: column;
    }
    .sidebar-header {
      padding: 16px 20px; border-bottom: 1px solid var(--color-border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-title { font-size: 14px; font-weight: 600; }
    .encrypt-badge {
      display: flex; align-items: center; gap: 4px; font-size: 11px;
      color: #00B42A;
    }
    .search-box {
      padding: 12px 16px; border-bottom: 1px solid var(--color-border);
    }
    .search-input {
      width: 100%; padding: 8px 12px; border: 1px solid var(--color-border);
      border-radius: 8px; background: var(--color-page-bg); color: var(--color-text-primary);
      font-size: 13px; outline: none;
    }
    .search-input:focus { border-color: var(--color-primary); }
    .diary-list { flex: 1; overflow-y: auto; padding: 8px; }
    .diary-item {
      padding: 12px; border-radius: 8px; cursor: pointer;
      margin-bottom: 4px; transition: all .2s;
    }
    .diary-item:hover { background: var(--color-hover-bg); }
    .diary-item.active {
      background: var(--color-primary-light);
    }
    .diary-item-title {
      font-size: 13px; font-weight: 500; margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .diary-item-meta {
      display: flex; justify-content: space-between; font-size: 11px; color: var(--color-text-tertiary);
    }
    .mood-tag {
      display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px;
    }

    .editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .editor-header {
      padding: 20px 32px 16px; border-bottom: 1px solid var(--color-border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .editor-title-input {
      font-size: 24px; font-weight: 700; border: none; outline: none;
      background: transparent; color: var(--color-text-primary);
      width: 100%; font-family: inherit;
    }
    .editor-actions { display: flex; gap: 8px; }
    .btn-primary {
      background: var(--color-primary); color: white; border: none; border-radius: 8px;
      padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 500; transition: opacity .2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-secondary {
      background: var(--color-card-bg); color: var(--color-text-primary);
      border: 1px solid var(--color-border); border-radius: 8px;
      padding: 6px 12px; font-size: 12px; cursor: pointer; transition: all .2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-secondary:hover { background: var(--color-hover-bg); }

    .editor-meta-bar {
      padding: 10px 32px; border-bottom: 1px solid var(--color-border);
      display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--color-text-secondary);
    }
    .mood-selector { display: flex; gap: 6px; align-items: center; }
    .mood-option {
      font-size: 18px; cursor: pointer; opacity: 0.5; transition: opacity .2s;
      padding: 2px 4px; border-radius: 4px;
    }
    .mood-option:hover { opacity: 0.8; }
    .mood-option.active { opacity: 1; background: var(--color-primary-light); }

    .tags-editor { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .tag {
      padding: 2px 8px; background: var(--color-primary-light); color: var(--color-primary-text);
      border-radius: 12px; font-size: 11px; display: inline-flex; align-items: center; gap: 4px;
    }
    .tag-close { cursor: pointer; opacity: 0.6; }
    .tag-close:hover { opacity: 1; }
    .tag-input {
      border: none; outline: none; background: transparent; color: var(--color-text-primary);
      font-size: 12px; width: 80px; font-family: inherit;
    }

    .editor-content {
      flex: 1; padding: 24px 32px; overflow-y: auto;
    }
    .editor-textarea {
      width: 100%; min-height: 100%;
      border: none; outline: none; resize: none;
      font-size: 15px; line-height: 1.8;
      background: transparent; color: var(--color-text-primary);
      font-family: inherit;
    }

    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: var(--color-text-tertiary);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
    .empty-text { font-size: 14px; margin-bottom: 16px; }

    .word-count { font-size: 12px; color: var(--color-text-tertiary); }

    .new-btn {
      width: 100%; padding: 10px; text-align: center;
      background: var(--color-primary-light); color: var(--color-primary-text);
      border: none; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 500; transition: opacity .2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .new-btn:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="top-bar">
      <div style="display:flex;align-items:center;gap:16px;">
        <div class="back-btn" onclick="location.href='review-summary.html'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          返回复盘模式
        </div>
        <div class="page-title">私密日记</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <div class="encrypt-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          本地加密存储
        </div>
      </div>
    </div>
    <div class="main-body">
      <div class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title">我的日记</div>
          <span style="font-size:12px;color:var(--color-text-tertiary);" id="diary-count">0 篇</span>
        </div>
        <div class="search-box">
          <input type="text" class="search-input" placeholder="搜索日记..." oninput="searchDiaries(this.value)">
        </div>
        <div style="padding: 0 12px 12px;">
          <button class="new-btn" onclick="newDiary()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新建日记
          </button>
        </div>
        <div class="diary-list" id="diary-list"></div>
      </div>

      <div class="editor-area" id="editor-area">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">📝</div>
          <div class="empty-text">选择一篇日记开始阅读，或新建一篇</div>
          <button class="btn-primary" onclick="newDiary()">开始写作</button>
        </div>
        <div id="editor-content-wrapper" style="display:none;flex:1;flex-direction:column;">
          <div class="editor-header">
            <input type="text" class="editor-title-input" id="diary-title" placeholder="日记标题...">
            <div class="editor-actions">
              <span class="word-count" id="word-count">0 字</span>
              <button class="btn-secondary" id="diary-delete-btn" onclick="deleteDiary()" style="display:none;color:#F53F3F;border-color:rgba(245,63,63,0.3);">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                删除
              </button>
              <button class="btn-primary" onclick="saveDiary()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                保存
              </button>
            </div>
          </div>
          <div class="editor-meta-bar">
            <div style="display:flex;align-items:center;gap:8px;">
              <span>心情:</span>
              <div class="mood-selector" id="mood-selector">
                <span class="mood-option" data-mood="happy" onclick="setMood('happy')">😊</span>
                <span class="mood-option" data-mood="calm" onclick="setMood('calm')">😌</span>
                <span class="mood-option active" data-mood="neutral" onclick="setMood('neutral')">😐</span>
                <span class="mood-option" data-mood="sad" onclick="setMood('sad')">😢</span>
                <span class="mood-option" data-mood="thoughtful" onclick="setMood('thoughtful')">🤔</span>
                <span class="mood-option" data-mood="excited" onclick="setMood('excited')">🤩</span>
              </div>
            </div>
            <div style="flex:1;"></div>
            <div>
              <span style="margin-right:8px;">标签:</span>
              <div class="tags-editor" id="tags-editor">
                <input type="text" class="tag-input" placeholder="添加标签..." onkeydown="handleTagInput(event)">
              </div>
            </div>
          </div>
          <div class="editor-content">
            <textarea class="editor-textarea" id="diary-content" placeholder="今天想记录些什么..." oninput="updateWordCount()"></textarea>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let diaries = [];
    let currentDiaryId = null;
    let currentMood = 'neutral';
    let currentTags = [];

    const moodNames = {
      happy: '开心', calm: '平静', neutral: '一般', sad: '低落', thoughtful: '思考', excited: '兴奋'
    };

    async function loadDiaries() {
      try {
        const res = await YunxiAPI.request('GET', 'review/diaries');
        diaries = res.data;
        document.getElementById('diary-count').textContent = diaries.length + ' 篇';
        renderDiaryList(diaries);
      } catch (e) {
        console.error('加载日记失败', e);
      }
    }

    function renderDiaryList(list) {
      const listEl = document.getElementById('diary-list');
      if (list.length === 0) {
        listEl.innerHTML = '<div style="color:var(--color-text-tertiary);text-align:center;padding:30px;font-size:12px;">暂无日记</div>';
        return;
      }
      listEl.innerHTML = list.map(d => `
        <div class="diary-item ${d.id === currentDiaryId ? 'active' : ''}" onclick="openDiary(${d.id})">
          <div class="diary-item-title">${d.title}</div>
          <div class="diary-item-meta">
            <span>${new Date(d.created_at).toLocaleDateString()}</span>
            <span>${d.word_count} 字</span>
          </div>
        </div>
      `).join('');
    }

    function searchDiaries(keyword) {
      if (!keyword.trim()) {
        renderDiaryList(diaries);
        return;
      }
      const filtered = diaries.filter(d =>
        d.title.includes(keyword) || d.content.includes(keyword)
      );
      renderDiaryList(filtered);
    }

    function openDiary(id) {
      const diary = diaries.find(d => d.id === id);
      if (!diary) return;
      currentDiaryId = id;
      currentMood = diary.mood || 'neutral';
      currentTags = diary.tags || [];

      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('editor-content-wrapper').style.display = 'flex';

      document.getElementById('diary-title').value = diary.title;
      document.getElementById('diary-content').value = diary.content;
      updateWordCount();

      document.querySelectorAll('.mood-option').forEach(el => {
        el.classList.toggle('active', el.dataset.mood === currentMood);
      });

      renderTags();
      renderDiaryList(diaries);
      var deleteBtn = document.getElementById('diary-delete-btn');
      if (deleteBtn) deleteBtn.style.display = 'inline-flex';
    }

    function newDiary() {
      currentDiaryId = null;
      currentMood = 'neutral';
      currentTags = [];

      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('editor-content-wrapper').style.display = 'flex';

      document.getElementById('diary-title').value = '';
      document.getElementById('diary-content').value = '';
      updateWordCount();

      document.querySelectorAll('.mood-option').forEach(el => {
        el.classList.toggle('active', el.dataset.mood === 'neutral');
      });

      renderTags();
      var deleteBtn = document.getElementById('diary-delete-btn');
      if (deleteBtn) deleteBtn.style.display = 'none';
      document.getElementById('diary-title').focus();
    }

    function setMood(mood) {
      currentMood = mood;
      document.querySelectorAll('.mood-option').forEach(el => {
        el.classList.toggle('active', el.dataset.mood === mood);
      });
    }

    function renderTags() {
      const container = document.getElementById('tags-editor');
      const input = container.querySelector('.tag-input');
      const tagHtml = currentTags.map((tag, i) => `
        <span class="tag">
          ${tag}
          <span class="tag-close" onclick="removeTag(${i})">×</span>
        </span>
      `).join('');
      container.innerHTML = tagHtml + '<input type="text" class="tag-input" placeholder="添加标签..." onkeydown="handleTagInput(event)">';
    }

    function handleTagInput(e) {
      if (e.key === 'Enter' && e.target.value.trim()) {
        e.preventDefault();
        const tag = e.target.value.trim();
        if (!currentTags.includes(tag)) {
          currentTags.push(tag);
          renderTags();
        }
        e.target.value = '';
      }
    }

    function removeTag(index) {
      currentTags.splice(index, 1);
      renderTags();
    }

    function updateWordCount() {
      const content = document.getElementById('diary-content').value;
      document.getElementById('word-count').textContent = content.length + ' 字';
    }

    async function saveDiary() {
      const title = document.getElementById('diary-title').value.trim();
      const content = document.getElementById('diary-content').value.trim();

      if (!title) {
        YunxiAPI.showToast('请输入标题', 'warning');
        return;
      }
      if (!content) {
        YunxiAPI.showToast('内容不能为空', 'warning');
        return;
      }

      try {
        const res = await YunxiAPI.request('POST', 'review/diaries', {
          title,
          content,
          mood: currentMood,
          tags: currentTags,
        });
        YunxiAPI.showToast('保存成功', 'success');
        currentDiaryId = res.data.id;
        loadDiaries();
      } catch (e) {
        YunxiAPI.showToast('保存失败', 'error');
      }
    }

    async function deleteDiary() {
      if (!currentDiaryId) return;
      var confirmed = await YunxiAPI.showConfirm('确定要删除这篇日记吗？此操作不可恢复。', '删除日记');
      if (!confirmed) return;
      try {
        await YunxiAPI.request('DELETE', 'review/diaries/' + currentDiaryId);
        YunxiAPI.showToast('删除成功', 'success');
        currentDiaryId = null;
        document.getElementById('editor-content-wrapper').style.display = 'none';
        document.getElementById('empty-state').style.display = 'flex';
        loadDiaries();
      } catch (e) {
        YunxiAPI.showToast('删除失败: ' + (e.message || '未知错误'), 'error');
      }
    }

    // 初始化
    loadDiaries().then(function() {
      // 从 URL 参数读取日记 ID 并自动打开
      var params = new URLSearchParams(window.location.search);
      var diaryId = params.get('id');
      if (diaryId) {
        var id = parseInt(diaryId);
        if (!isNaN(id)) {
          openDiary(id);
        }
      }
    });
  </script>
</body>
</html>
