<!DOCTYPE html>
<html lang="zh-CN" data-theme="work-dev">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代码管理 — 云汐开发模式</title>
  <link rel="stylesheet" href="./colors_and_type.css">
  <script src="../common/api.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font-family-base);
      font-size: var(--font-size-base);
      color: var(--color-text-primary);
      background: var(--color-page-bg);
    }
    .app-shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .top-bar {
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: var(--color-header-bg); border-bottom: 1px solid var(--color-header-border);
    }
    .back-btn {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      color: var(--color-text-secondary); font-size: 14px; padding: 6px 12px; border-radius: 8px;
      transition: all .2s;
    }
    .back-btn:hover { background: var(--color-hover-bg); color: var(--color-text-primary); }
    .page-title { font-size: 16px; font-weight: 600; }
    .main-body { flex: 1; overflow: auto; padding: 24px; }

    .repo-selector {
      display: flex; align-items: center; gap: 10px;
      background: var(--color-card-bg); border: 1px solid var(--color-border);
      border-radius: 8px; padding: 6px 12px; cursor: pointer;
      transition: all .2s;
    }
    .repo-selector:hover { border-color: var(--color-primary); }
    .repo-selector select {
      background: transparent; border: none; outline: none;
      color: var(--color-text-primary); font-size: 13px; font-weight: 500;
      cursor: pointer;
    }
    .repo-selector select option {
      background: var(--color-card-bg);
    }
    .repo-badge {
      background: var(--color-primary-light); color: var(--color-primary-text);
      padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
    }

    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--color-card-bg); border: 1px solid var(--color-border);
      border-radius: 12px; padding: 20px;
    }
    .stat-value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .stat-label { font-size: 13px; color: var(--color-text-secondary); }
    .stat-icon { font-size: 24px; margin-bottom: 8px; }

    .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .card {
      background: var(--color-card-bg); border: 1px solid var(--color-border);
      border-radius: 12px; padding: 20px;
    }
    .section-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .section-title { font-size: 15px; font-weight: 600; }
    .btn-primary {
      background: var(--color-primary); color: white; border: none; border-radius: 8px;
      padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 500; transition: opacity .2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--color-card-bg); color: var(--color-text-primary);
      border: 1px solid var(--color-border); border-radius: 8px;
      padding: 6px 12px; font-size: 12px; cursor: pointer; transition: all .2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-secondary:hover { background: var(--color-hover-bg); }
    .btn-secondary:disabled { opacity: .5; cursor: not-allowed; }

    .commit-item {
      display: flex; gap: 14px; padding: 14px 0;
      border-bottom: 1px solid var(--color-border);
    }
    .commit-item:last-child { border-bottom: none; }
    .commit-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--color-primary); margin-top: 6px; flex-shrink: 0;
      box-shadow: 0 0 0 3px var(--color-primary-light);
    }
    .commit-info { flex: 1; min-width: 0; }
    .commit-msg { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .commit-meta { font-size: 11px; color: var(--color-text-tertiary); display: flex; gap: 12px; flex-wrap: wrap; }
    .commit-hash {
      font-family: monospace; background: var(--color-hover-bg); padding: 1px 6px; border-radius: 4px;
    }
    .commit-stats { font-size: 11px; display: flex; gap: 8px; }
    .stat-add { color: #00B42A; }
    .stat-del { color: #F53F3F; }

    .branch-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 0;
      border-bottom: 1px solid var(--color-border);
    }
    .branch-item:last-child { border-bottom: none; }
    .branch-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--color-primary-light); display: flex; align-items: center; justify-content: center;
      color: var(--color-primary-text);
    }
    .branch-info { flex: 1; min-width: 0; }
    .branch-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .branch-meta { font-size: 11px; color: var(--color-text-tertiary); }
    .default-badge {
      background: var(--color-primary-light); color: var(--color-primary-text);
      padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 500;
    }
    .current-badge {
      background: #00B42A20; color: #00B42A;
      padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 500;
    }

    .chart-container { position: relative; height: 180px; }

    .full-width { grid-column: 1 / -1; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--color-card-bg); border: 1px solid var(--color-border);
      border-radius: 12px; padding: 24px; width: 500px; max-width: 90vw;
      max-height: 80vh; overflow-y: auto;
    }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .modal-footer {
      display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;
    }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; padding: 8px 12px;
      background: var(--color-page-bg); border: 1px solid var(--color-border);
      border-radius: 8px; color: var(--color-text-primary); font-size: 13px;
      outline: none; transition: border-color .2s;
    }
    .form-input:focus { border-color: var(--color-primary); }
    .form-textarea {
      width: 100%; padding: 8px 12px; min-height: 80px; resize: vertical;
      background: var(--color-page-bg); border: 1px solid var(--color-border);
      border-radius: 8px; color: var(--color-text-primary); font-size: 13px;
      outline: none; transition: border-color .2s; font-family: inherit;
    }
    .form-textarea:focus { border-color: var(--color-primary); }

    .changed-files {
      max-height: 200px; overflow-y: auto;
      background: var(--color-page-bg); border: 1px solid var(--color-border);
      border-radius: 8px; padding: 8px;
    }
    .changed-file {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 8px; border-radius: 4px; font-size: 12px;
    }
    .changed-file:hover { background: var(--color-hover-bg); }
    .file-status {
      width: 20px; text-align: center; font-weight: 600; font-size: 11px;
    }
    .file-status.modified { color: #FF7D00; }
    .file-status.added { color: #00B42A; }
    .file-status.deleted { color: #F53F3F; }
    .file-status.untracked { color: #86909C; }
    .file-path { flex: 1; font-family: monospace; font-size: 11px; }

    .loading {
      display: flex; align-items: center; justify-content: center;
      padding: 20px; color: var(--color-text-tertiary); font-size: 13px;
    }
    .loading-spinner {
      width: 16px; height: 16px; border: 2px solid var(--color-border);
      border-top-color: var(--color-primary); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="top-bar">
      <div style="display:flex;align-items:center;gap:16px;">
        <div class="back-btn" onclick="location.href='work-dev.html'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          返回开发模式
        </div>
        <div class="page-title">代码管理</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <div class="repo-selector">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          <select id="repo-select" onchange="onRepoChange()">
            <option value="">加载中...</option>
          </select>
          <span class="repo-badge" id="current-branch-badge">--</span>
        </div>
        <button class="btn-secondary" onclick="doPull()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 0 0 9 9"/></svg>
          拉取
        </button>
        <button class="btn-primary" onclick="showCommitDialog()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><line x1="1.05" y1="12" x2="7" y2="12"/><line x1="17.01" y1="12" x2="22.96" y2="12"/></svg>
          提交
        </button>
      </div>
    </div>
    <div class="main-body">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">&#128230;</div>
          <div class="stat-value" id="stat-commits">0</div>
          <div class="stat-label">总提交数</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">➕</div>
          <div class="stat-value" id="stat-additions">0</div>
          <div class="stat-label">新增行数</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">➖</div>
          <div class="stat-value" id="stat-deletions">0</div>
          <div class="stat-label">删除行数</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">&#127807;</div>
          <div class="stat-value" id="stat-branches">0</div>
          <div class="stat-label">分支数</div>
        </div>
      </div>

      <div class="content-grid">
        <div class="card">
          <div class="section-header">
            <div class="section-title">提交趋势（近7天）</div>
          </div>
          <div class="chart-container">
            <canvas id="commitChart"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="section-header">
            <div class="section-title">分支列表</div>
            <button class="btn-secondary" onclick="showCreateBranchDialog()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              新建分支
            </button>
          </div>
          <div id="branch-list">
            <div class="loading"><div class="loading-spinner"></div>加载中...</div>
          </div>
        </div>

        <div class="card full-width">
          <div class="section-header">
            <div class="section-title">最近提交</div>
            <div style="display:flex;gap:8px;align-items:center;">
              <span style="font-size:11px;color:var(--color-text-tertiary);" id="work-tree-status"></span>
            </div>
          </div>
          <div id="commit-list">
            <div class="loading"><div class="loading-spinner"></div>加载中...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="commit-modal">
    <div class="modal">
      <div class="modal-title">提交变更</div>
      <div class="form-group">
        <label class="form-label">变更文件</label>
        <div class="changed-files" id="commit-changed-files">
          <div class="loading"><div class="loading-spinner"></div>加载中...</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">提交信息</label>
        <textarea class="form-textarea" id="commit-message" placeholder="请输入提交信息..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeCommitDialog()">取消</button>
        <button class="btn-primary" id="commit-btn" onclick="doCommit()">提交</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="branch-modal">
    <div class="modal">
      <div class="modal-title">新建分支</div>
      <div class="form-group">
        <label class="form-label">分支名称</label>
        <input type="text" class="form-input" id="new-branch-name" placeholder="例如: feature/new-feature">
      </div>
      <div class="form-group">
        <label class="form-label">基于分支（可选，留空则基于当前分支）</label>
        <input type="text" class="form-input" id="base-branch-name" placeholder="例如: main">
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeCreateBranchDialog()">取消</button>
        <button class="btn-primary" onclick="doCreateBranch()">创建</button>
      </div>
    </div>
  </div>

  <script>
    let currentRepoId = null;
    let commitChart = null;

    function formatTime(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      if (isNaN(date.getTime())) return dateStr;
      const now = new Date();
      const diff = (now - date) / 1000;
      if (diff < 60) return '刚刚';
      if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
      if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
      if (diff < 604800) return Math.floor(diff / 86400) + ' 天前';
      return date.toLocaleDateString();
    }

    function getFileStatusLabel(status) {
      const map = {
        'modified': { label: 'M', cls: 'modified' },
        'modified_staged': { label: 'M', cls: 'modified' },
        'added_staged': { label: 'A', cls: 'added' },
        'deleted': { label: 'D', cls: 'deleted' },
        'deleted_staged': { label: 'D', cls: 'deleted' },
        'renamed_staged': { label: 'R', cls: 'modified' },
        'untracked': { label: '?', cls: 'untracked' },
        'unknown': { label: '?', cls: 'untracked' },
      };
      return map[status] || { label: '?', cls: 'untracked' };
    }

    async function loadRepos() {
      try {
        const res = await YunxiAPI.request('GET', 'work-dev/git/repos');
        const repos = res.data;
        const select = document.getElementById('repo-select');
        select.innerHTML = '';

        repos.forEach(repo => {
          const opt = document.createElement('option');
          opt.value = repo.id;
          opt.textContent = repo.name + (repo.is_valid ? '' : ' (无效)');
          select.appendChild(opt);
        });

        if (repos.length > 0) {
          currentRepoId = repos[0].id;
          select.value = currentRepoId;
          await loadAllData();
        }
      } catch (e) {
        console.error('加载仓库列表失败', e);
        YunxiAPI.showToast('加载仓库列表失败', 'error');
      }
    }

    async function onRepoChange() {
      const select = document.getElementById('repo-select');
      currentRepoId = select.value;
      if (currentRepoId) {
        await loadAllData();
      }
    }

    async function loadAllData() {
      if (!currentRepoId) return;
      await Promise.all([
        loadStats(),
        loadCommits(),
        loadBranches(),
        loadStatus(),
      ]);
    }

    async function loadStats() {
      try {
        const res = await YunxiAPI.request('GET', 'work-dev/git/' + currentRepoId + '/stats');
        const data = res.data;

        document.getElementById('stat-commits').textContent = data.total_commits.toLocaleString();
        document.getElementById('stat-additions').textContent = data.total_insertions.toLocaleString();
        document.getElementById('stat-deletions').textContent = data.total_deletions.toLocaleString();
        document.getElementById('stat-branches').textContent = data.branch_count;
        document.getElementById('current-branch-badge').textContent = data.current_branch || '--';

        updateCommitChart(data.daily_commits);
      } catch (e) {
        console.error('加载统计失败', e);
      }
    }

    function updateCommitChart(dailyCommits) {
      const ctx = document.getElementById('commitChart').getContext('2d');

      if (commitChart) {
        commitChart.destroy();
      }

      const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--color-primary').trim() || '#165DFF';

      commitChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: dailyCommits.map(function(d) { return d.date.slice(5); }),
          datasets: [{
            label: '提交次数',
            data: dailyCommits.map(function(d) { return d.count; }),
            backgroundColor: primaryColor,
            borderRadius: 4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 11 }, stepSize: 1 } },
            x: { grid: { display: false }, ticks: { font: { size: 11 } } }
          }
        }
      });
    }

    async function loadCommits() {
      try {
        const res = await YunxiAPI.request('GET', 'work-dev/git/' + currentRepoId + '/commits?limit=20');
        const commits = res.data;
        const listEl = document.getElementById('commit-list');

        if (commits.length === 0) {
          listEl.innerHTML = '<div style="color:var(--color-text-tertiary);text-align:center;padding:20px;">暂无提交记录</div>';
          return;
        }

        listEl.innerHTML = commits.map(function(c) {
          var insertions = c.insertions != null ? c.insertions : '-';
          var deletions = c.deletions != null ? c.deletions : '-';
          return '<div class="commit-item">' +
            '<div class="commit-dot"></div>' +
            '<div class="commit-info">' +
              '<div class="commit-msg">' + escapeHtml(c.message) + '</div>' +
              '<div class="commit-meta">' +
                '<span class="commit-hash">' + (c.short_hash || c.hash.slice(0, 7)) + '</span>' +
                '<span>' + escapeHtml(c.author || '') + '</span>' +
                '<span>' + formatTime(c.date) + '</span>' +
                (c.files_changed != null ? '<span>' + c.files_changed + ' 个文件</span>' : '') +
                '<span class="commit-stats">' +
                  (insertions !== '-' ? '<span class="stat-add">+' + insertions + '</span>' : '') +
                  (deletions !== '-' ? '<span class="stat-del">-</span>' : '') +
                '</span>' +
              '</div>' +
            '</div>' +
          '</div>';
        }).join('');
      } catch (e) {
        document.getElementById('commit-list').innerHTML = '<div style="color:var(--color-text-tertiary);text-align:center;padding:20px;">加载失败</div>';
      }
    }

    async function loadBranches() {
      try {
        const res = await YunxiAPI.request('GET', 'work-dev/git/' + currentRepoId + '/branches');
        const branches = res.data;
        const listEl = document.getElementById('branch-list');

        if (branches.length === 0) {
          listEl.innerHTML = '<div style="color:var(--color-text-tertiary);text-align:center;padding:20px;">暂无分支</div>';
          return;
        }

        listEl.innerHTML = branches.map(function(b) {
          return '<div class="branch-item">' +
            '<div class="branch-icon">' +
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>' +
            '</div>' +
            '<div class="branch-info">' +
              '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">' +
                '<div class="branch-name">' + escapeHtml(b.name) + '</div>' +
                (b.is_current ? '<span class="current-badge">当前</span>' : '') +
                (b.is_default ? '<span class="default-badge">默认</span>' : '') +
              '</div>' +
              '<div class="branch-meta">' + escapeHtml((b.last_commit_msg || '').slice(0, 50)) + '</div>' +
            '</div>' +
            (!b.is_current ? '<button class="btn-secondary" onclick="switchBranch(\'' + escapeHtml(b.name).replace(/'/g, "\\'") + '\')" style="font-size:11px;padding:4px 8px;">切换</button>' : '') +
          '</div>';
        }).join('');
      } catch (e) {
        document.getElementById('branch-list').innerHTML = '<div style="color:var(--color-text-tertiary);text-align:center;padding:20px;">加载失败</div>';
      }
    }

    async function loadStatus() {
      try {
        const res = await YunxiAPI.request('GET', 'work-dev/git/' + currentRepoId + '/status');
        const data = res.data;

        const statusEl = document.getElementById('work-tree-status');
        if (data.is_clean) {
          statusEl.textContent = '工作区干净';
          statusEl.style.color = '#00B42A';
        } else {
          const parts = [];
          if (data.modified_count > 0) parts.push(data.modified_count + ' 个修改');
          if (data.staged_count > 0) parts.push(data.staged_count + ' 个暂存');
          if (data.untracked_count > 0) parts.push(data.untracked_count + ' 个未跟踪');
          statusEl.textContent = parts.join(' \u00b7 ');
          statusEl.style.color = '#FF7D00';
        }

        document.getElementById('current-branch-badge').textContent = data.current_branch || '--';
      } catch (e) {
        console.error('加载状态失败', e);
      }
    }

    async function showCommitDialog() {
      if (!currentRepoId) {
        YunxiAPI.showToast('请先选择仓库', 'warning');
        return;
      }

      document.getElementById('commit-modal').classList.add('active');
      document.getElementById('commit-message').value = '';

      const filesEl = document.getElementById('commit-changed-files');
      filesEl.innerHTML = '<div class="loading"><div class="loading-spinner"></div>加载中...</div>';

      try {
        const res = await YunxiAPI.request('GET', 'work-dev/git/' + currentRepoId + '/status');
        const data = res.data;

        if (data.is_clean || !data.changes || data.changes.length === 0) {
          filesEl.innerHTML = '<div style="color:var(--color-text-tertiary);text-align:center;padding:20px;">没有需要提交的变更</div>';
          document.getElementById('commit-btn').disabled = true;
          return;
        }

        document.getElementById('commit-btn').disabled = false;
        filesEl.innerHTML = data.changes.map(function(f) {
          const st = getFileStatusLabel(f.status);
          return '<div class="changed-file">' +
            '<span class="file-status ' + st.cls + '">' + st.label + '</span>' +
            '<span class="file-path">' + escapeHtml(f.path) + '</span>' +
          '</div>';
        }).join('');
      } catch (e) {
        filesEl.innerHTML = '<div style="color:#F53F3F;text-align:center;padding:20px;">加载变更失败</div>';
      }
    }

    function closeCommitDialog() {
      document.getElementById('commit-modal').classList.remove('active');
    }

    async function doCommit() {
      const message = document.getElementById('commit-message').value.trim();
      if (!message) {
        YunxiAPI.showToast('请输入提交信息', 'warning');
        return;
      }

      const btn = document.getElementById('commit-btn');
      btn.disabled = true;
      btn.textContent = '提交中...';

      try {
        const res = await YunxiAPI.request('POST', 'work-dev/git/' + currentRepoId + '/commit', { message: message });
        if (res.data && res.data.committed === false) {
          YunxiAPI.showToast(res.message || '没有需要提交的变更', 'warning');
        } else {
          YunxiAPI.showToast('提交成功', 'success');
          closeCommitDialog();
          await loadAllData();
        }
      } catch (e) {
        YunxiAPI.showToast('提交失败: ' + (e.message || '未知错误'), 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '提交';
      }
    }

    function showCreateBranchDialog() {
      if (!currentRepoId) {
        YunxiAPI.showToast('请先选择仓库', 'warning');
        return;
      }
      document.getElementById('new-branch-name').value = '';
      document.getElementById('base-branch-name').value = '';
      document.getElementById('branch-modal').classList.add('active');
    }

    function closeCreateBranchDialog() {
      document.getElementById('branch-modal').classList.remove('active');
    }

    async function doCreateBranch() {
      const branchName = document.getElementById('new-branch-name').value.trim();
      const baseBranch = document.getElementById('base-branch-name').value.trim() || null;

      if (!branchName) {
        YunxiAPI.showToast('请输入分支名称', 'warning');
        return;
      }

      try {
        await YunxiAPI.request('POST', 'work-dev/git/' + currentRepoId + '/branch/create', {
          branch_name: branchName,
          base_branch: baseBranch,
        });
        YunxiAPI.showToast('分支创建成功', 'success');
        closeCreateBranchDialog();
        await loadBranches();
        await loadStats();
      } catch (e) {
        YunxiAPI.showToast('创建分支失败: ' + (e.message || '未知错误'), 'error');
      }
    }

    async function switchBranch(branchName) {
      if (!confirm('确定要切换到分支 ' + branchName + ' 吗？\n（有未提交的变更会阻止切换）')) {
        return;
      }

      try {
        await YunxiAPI.request('POST', 'work-dev/git/' + currentRepoId + '/branch/switch', {
          branch_name: branchName,
        });
        YunxiAPI.showToast('已切换到 ' + branchName, 'success');
        await loadAllData();
      } catch (e) {
        YunxiAPI.showToast('切换失败: ' + (e.message || '未知错误'), 'error');
      }
    }

    async function doPull() {
      if (!currentRepoId) {
        YunxiAPI.showToast('请先选择仓库', 'warning');
        return;
      }

      try {
        const res = await YunxiAPI.request('POST', 'work-dev/git/' + currentRepoId + '/pull');
        if (res.data && res.data.pulled === false) {
          YunxiAPI.showToast(res.message || '无法拉取', 'warning');
        } else if (res.data && res.data.already_up_to_date) {
          YunxiAPI.showToast('已经是最新的', 'success');
        } else {
          YunxiAPI.showToast('拉取成功', 'success');
          await loadAllData();
        }
      } catch (e) {
        YunxiAPI.showToast('拉取失败: ' + (e.message || '未知错误'), 'error');
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('commit-modal').addEventListener('click', function(e) {
      if (e.target === this) closeCommitDialog();
    });
    document.getElementById('branch-modal').addEventListener('click', function(e) {
      if (e.target === this) closeCreateBranchDialog();
    });

    loadRepos();
  </script>
</body>
</html>
