<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M4 场景引擎 - 业务模式中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        .modes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .mode-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .mode-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #667eea, #764ba2);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .mode-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .mode-card:hover::before {
            opacity: 1;
        }

        .mode-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .mode-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .mode-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a2e;
        }

        .mode-desc {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .mode-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
        }

        .mode-category {
            font-size: 0.8rem;
            padding: 4px 10px;
            background: #f0f0ff;
            color: #667eea;
            border-radius: 12px;
        }

        .mode-priority {
            font-size: 0.8rem;
            color: #999;
        }

        .mode-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            display: inline-block;
            margin-right: 6px;
        }

        .mode-status.disabled {
            background: #9ca3af;
        }

        .section-title {
            color: white;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: white;
            border-radius: 2px;
        }

        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .api-link {
            display: inline-block;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .api-link:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .loading {
            text-align: center;
            color: white;
            padding: 40px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            color: #fecaca;
            padding: 40px;
        }

        @media (max-width: 640px) {
            header h1 {
                font-size: 1.8rem;
            }

            .modes-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌊 M4 场景引擎</h1>
            <p>业务模式中心 - 8 大模式，一站式体验</p>
            <div class="stats-bar" id="statsBar">
                <div class="stat-item">
                    <div class="stat-number" id="totalModes">-</div>
                    <div class="stat-label">业务模式</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalCategories">-</div>
                    <div class="stat-label">分类</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalScenes">-</div>
                    <div class="stat-label">场景</div>
                </div>
            </div>
        </header>

        <div class="section-title">业务模式</div>
        <div id="modesContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>加载中...</div>
            </div>
        </div>

        <footer>
            <div>M4 Scene Engine v1.0.0 | 云汐项目</div>
            <a href="/docs" class="api-link">📖 API 文档</a>
            <a href="/health" class="api-link">💓 健康检查</a>
        </footer>
    </div>

    <script>
        const API_BASE = '/api/v1';

        async function loadModes() {
            const container = document.getElementById('modesContainer');
            try {
                const response = await fetch(`${API_BASE}/modes?only_enabled=false`);
                const result = await response.json();

                if (result.code !== 0) {
                    throw new Error(result.message || '加载失败');
                }

                const modes = result.data.modes || [];
                document.getElementById('totalModes').textContent = modes.length;

                if (modes.length === 0) {
                    container.innerHTML = '<div class="error">暂无业务模式</div>';
                    return;
                }

                const categoryNames = {
                    'growth': '成长',
                    'work': '工作',
                    'study': '学业',
                    'life': '生活',
                    'social': '社交',
                    'emotion': '情绪',
                    'appearance': '形象',
                    'general': '通用'
                };

                let html = '<div class="modes-grid">';
                modes.forEach(mode => {
                    const categoryLabel = categoryNames[mode.category] || mode.category;
                    const disabledClass = mode.is_enabled ? '' : 'disabled';
                    const statusClass = mode.is_enabled ? '' : 'disabled';
                    const statusText = mode.is_enabled ? '已启用' : '未启用';

                    html += `
                        <div class="mode-card ${disabledClass}" onclick="enterMode('${mode.mode_id}')">
                            <div class="mode-icon">${mode.icon}</div>
                            <div class="mode-name">${mode.mode_name}</div>
                            <div class="mode-desc">${mode.mode_description}</div>
                            <div class="mode-meta">
                                <span class="mode-category">${categoryLabel}</span>
                                <span class="mode-priority">
                                    <span class="mode-status ${statusClass}"></span>
                                    ${statusText}
                                </span>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';

                container.innerHTML = html;

                // 加载分类统计
                loadCategories();
                // 加载场景统计
                loadScenes();

            } catch (error) {
                container.innerHTML = `
                    <div class="error">
                        <div>⚠️ 加载失败: ${error.message}</div>
                        <div style="font-size: 0.85rem; margin-top: 10px;">请确保后端服务已启动</div>
                    </div>
                `;
            }
        }

        async function loadCategories() {
            try {
                const response = await fetch(`${API_BASE}/modes/categories/list`);
                const result = await response.json();
                if (result.code === 0) {
                    document.getElementById('totalCategories').textContent = result.data.total;
                }
            } catch (e) {
                // 静默失败
            }
        }

        async function loadScenes() {
            try {
                const response = await fetch(`${API_BASE}/scenes`);
                const result = await response.json();
                if (result.code === 0) {
                    document.getElementById('totalScenes').textContent = result.data.total;
                }
            } catch (e) {
                // 静默失败
            }
        }

        async function enterMode(modeId) {
            try {
                const response = await fetch(`${API_BASE}/modes/${modeId}/enter`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: 'default',
                        context: {}
                    })
                });
                const result = await response.json();
                if (result.code === 0) {
                    const msg = result.data.message || `已进入模式`;
                    alert(msg);
                } else {
                    alert(`进入失败: ${result.message}`);
                }
            } catch (error) {
                alert(`操作失败: ${error.message}`);
            }
        }

        // 页面加载完成后获取数据
        document.addEventListener('DOMContentLoaded', loadModes);
    </script>
</body>
</html>
