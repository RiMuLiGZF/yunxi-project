<!DOCTYPE html>
<html lang="zh-CN" data-theme="work-dev">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代码沙箱 — 云汐开发模式</title>
  <link rel="stylesheet" href="./colors_and_type.css">
  <script src="../common/api.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font-family-base);
      font-size: var(--font-size-base);
      color: var(--color-text-primary);
      background: var(--color-page-bg);
    }
    .app-shell { display: flex; flex-direction: column; height: 100vh; }
    .top-bar {
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: var(--color-header-bg); border-bottom: 1px solid var(--color-header-border);
    }
    .back-btn {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      color: var(--color-text-secondary); font-size: 14px; padding: 6px 12px; border-radius: 8px;
      transition: all .2s;
    }
    .back-btn:hover { background: var(--color-hover-bg); color: var(--color-text-primary); }
    .page-title { font-size: 16px; font-weight: 600; }
    .main-body { flex: 1; display: flex; overflow: hidden; }
    .sidebar {
      width: 220px; border-right: 1px solid var(--color-border);
      background: var(--color-sidebar-bg); padding: 12px 0;
      overflow-y: auto;
    }
    .sidebar-title {
      padding: 4px 20px 8px; font-size: 12px; color: var(--color-text-tertiary);
      font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .lang-item {
      padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px;
      font-size: 14px; border-left: 3px solid transparent; transition: all .2s;
    }
    .lang-item:hover { background: var(--color-hover-bg); }
    .lang-item.active {
      border-left-color: var(--color-primary);
      background: var(--color-primary-light);
      color: var(--color-primary-text);
    }
    .lang-item.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      border-left-color: transparent !important;
      background: transparent !important;
      color: var(--color-text-tertiary) !important;
    }
    .lang-item .lang-status {
      margin-left: auto;
      font-size: 11px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: 3px;
    }
    .lang-item .lang-status.installed {
      background: rgba(0, 180, 42, 0.12);
      color: #00B42A;
    }
    .lang-item .lang-status.not-installed {
      background: rgba(134, 144, 156, 0.15);
      color: var(--color-text-tertiary);
    }
    .lang-version {
      padding: 2px 20px 8px;
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-top: -2px;
    }
    .editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .toolbar {
      height: 48px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; border-bottom: 1px solid var(--color-border);
    }
    .toolbar-left { display: flex; align-items: center; gap: 12px; }
    .toolbar-right { display: flex; align-items: center; gap: 10px; }
    .file-name { font-size: 13px; color: var(--color-text-secondary); font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    .vscode-open-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border: 1px solid var(--color-card-border);
      border-radius: var(--radius-sm); background: var(--color-card-bg);
      color: #007ACC; font-size: 12px; font-weight: var(--font-weight-medium);
      cursor: pointer; transition: all var(--transition-fast);
    }
    .vscode-open-btn:hover { background: rgba(0,122,204,0.1); border-color: #007ACC; }
    .run-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--color-primary); color: white; border: none; border-radius: 8px;
      padding: 8px 20px; font-size: 14px; cursor: pointer; font-weight: 500; transition: opacity .2s;
    }
    .run-btn:hover { opacity: .9; }
    .run-btn:disabled { opacity: .5; cursor: not-allowed; }
    .code-editor {
      flex: 1; padding: 0; background: #1e1e2e; color: #cdd6f4;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Courier New', monospace;
      font-size: 14px; line-height: 1.65; border: none; outline: none; resize: none;
      padding: 18px 22px; tab-size: 4; white-space: pre;
    }
    .code-editor:focus { box-shadow: inset 2px 0 0 var(--color-primary); }
    .output-panel {
      height: 240px; border-top: 1px solid var(--color-border); display: flex; flex-direction: column;
    }
    .output-header {
      height: 36px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; border-bottom: 1px solid var(--color-border);
      font-size: 13px; color: var(--color-text-secondary);
      flex-shrink: 0;
    }
    .output-tabs { display: flex; gap: 0; height: 100%; align-items: center; }
    .output-tab {
      padding: 0 12px; height: 100%; display: flex; align-items: center;
      font-size: 12px; cursor: pointer; color: var(--color-text-tertiary);
      border-bottom: 2px solid transparent; transition: all .15s;
    }
    .output-tab:hover { color: var(--color-text-secondary); }
    .output-tab.active { color: var(--color-text-primary); border-bottom-color: var(--color-primary); }
    .output-tab .badge {
      margin-left: 6px; padding: 0 5px; font-size: 10px; border-radius: 8px;
      background: var(--color-hover-bg); color: var(--color-text-secondary);
    }
    .output-content {
      flex: 1; padding: 12px 20px; overflow: auto;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px; line-height: 1.55; background: var(--color-card-bg);
    }
    .output-content .stdout { color: var(--color-text-primary); white-space: pre-wrap; word-break: break-all; }
    .output-content .stderr { color: #F53F3F; white-space: pre-wrap; word-break: break-all; }
    .output-content .security-warning {
      color: #FF7D00; white-space: pre-wrap; word-break: break-all;
      background: rgba(255, 125, 0, 0.06);
      border-left: 3px solid #FF7D00;
      padding: 8px 12px;
      margin-bottom: 8px;
      border-radius: 0 4px 4px 0;
    }
    .output-meta {
      display: flex; gap: 16px; flex-wrap: wrap;
      padding: 8px 20px; border-top: 1px solid var(--color-border);
      background: var(--color-card-bg);
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      font-size: 12px; color: var(--color-text-tertiary);
      flex-shrink: 0;
    }
    .output-meta .meta-item { display: flex; align-items: center; gap: 6px; }
    .output-meta .meta-item .label { color: var(--color-text-tertiary); }
    .output-meta .meta-item .value { color: var(--color-text-secondary); font-weight: 500; }
    .output-meta .meta-item.success .value { color: #00B42A; }
    .output-meta .meta-item.error .value { color: #F53F3F; }
    .output-meta .meta-item.timeout .value { color: #FF7D00; }
    .empty-state { color: var(--color-text-tertiary); font-style: italic; }
    .status-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 12px; font-weight: 500;
    }
    .status-badge.success { background: rgba(0,180,42,0.1); color: #00B42A; }
    .status-badge.error { background: rgba(245,63,63,0.1); color: #F53F3F; }
    .status-badge.running { background: rgba(22,93,255,0.1); color: #165DFF; }
    .status-badge.warning { background: rgba(255,125,0,0.1); color: #FF7D00; }

    /* 安全提示弹窗 */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.45); display: none;
      align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--color-card-bg); border-radius: 12px; padding: 24px;
      max-width: 480px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      border: 1px solid var(--color-border);
    }
    .modal-title {
      font-size: 16px; font-weight: 600; margin-bottom: 12px;
      color: var(--color-text-primary); display: flex; align-items: center; gap: 8px;
    }
    .modal-body { font-size: 13px; line-height: 1.6; color: var(--color-text-secondary); margin-bottom: 16px; }
    .modal-body ul { margin: 8px 0; padding-left: 20px; }
    .modal-body li { margin-bottom: 4px; }
    .modal-danger-list {
      background: rgba(245, 63, 63, 0.06); border: 1px solid rgba(245, 63, 63, 0.2);
      border-radius: 6px; padding: 10px 14px; margin: 10px 0;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
    }
    .modal-danger-list .danger-item { display: flex; gap: 8px; margin-bottom: 4px; }
    .modal-danger-list .danger-item:last-child { margin-bottom: 0; }
    .modal-danger-list .danger-line { color: var(--color-text-tertiary); min-width: 40px; }
    .modal-danger-list .danger-desc { color: #F53F3F; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
    .modal-btn {
      padding: 8px 18px; border-radius: 6px; font-size: 13px;
      cursor: pointer; border: none; font-weight: 500; transition: all .15s;
    }
    .modal-btn.secondary {
      background: var(--color-hover-bg); color: var(--color-text-secondary);
    }
    .modal-btn.secondary:hover { color: var(--color-text-primary); }
    .modal-btn.primary {
      background: var(--color-primary); color: white;
    }
    .modal-btn.primary:hover { opacity: .9; }
    .modal-btn.danger {
      background: #F53F3F; color: white;
    }
    .modal-btn.danger:hover { opacity: .9; }

    /* 保存提示 */
    .save-toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--color-text-primary); color: var(--color-page-bg);
      padding: 10px 20px; border-radius: 8px; font-size: 13px;
      opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999;
    }
    .save-toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="top-bar">
      <div style="display:flex;align-items:center;gap:16px;">
        <div class="back-btn" onclick="location.href='work-dev.html'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          返回开发模式
        </div>
        <div class="page-title">代码沙箱</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="status-badge success" id="lang-badge">Python</span>
      </div>
    </div>
    <div class="main-body">
      <div class="sidebar" id="lang-sidebar">
        <div class="sidebar-title">编程语言</div>
      </div>
      <div class="editor-area">
        <div class="toolbar">
          <div class="toolbar-left">
            <span class="file-name" id="file-name">main.py</span>
          </div>
          <div class="toolbar-right">
            <button class="vscode-open-btn" id="vscode-open-btn" onclick="openInVSCode()" title="在 VS Code 中打开当前代码">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 18 6-6-6-6"/><path d="m8 6-6 6 6 6"/></svg>
              VS Code
            </button>
            <button class="run-btn" id="run-btn" onclick="handleRunClick()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              运行
            </button>
          </div>
        </div>
        <textarea class="code-editor" id="code-editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
        <div class="output-panel">
          <div class="output-header">
            <div class="output-tabs">
              <div class="output-tab active" data-tab="combined" onclick="switchOutputTab('combined')">输出 <span class="badge" id="badge-combined">0</span></div>
              <div class="output-tab" data-tab="stdout" onclick="switchOutputTab('stdout')">stdout <span class="badge" id="badge-stdout">0</span></div>
              <div class="output-tab" data-tab="stderr" onclick="switchOutputTab('stderr')">stderr <span class="badge" id="badge-stderr">0</span></div>
            </div>
            <span id="output-status" class="empty-state">等待运行...</span>
          </div>
          <div class="output-content" id="output-content">
            <div class="empty-state">点击「运行」按钮或按 Ctrl+Enter 执行代码</div>
          </div>
          <div class="output-meta" id="output-meta" style="display:none;">
            <div class="meta-item"><span class="label">退出码:</span><span class="value" id="meta-exitcode">0</span></div>
            <div class="meta-item" id="meta-time-item"><span class="label">耗时:</span><span class="value" id="meta-duration">0ms</span></div>
            <div class="meta-item" id="meta-mem-item" style="display:none;"><span class="label">内存:</span><span class="value" id="meta-memory">0KB</span></div>
            <div class="meta-item" id="meta-lang-item"><span class="label">语言:</span><span class="value" id="meta-lang">Python</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 首次安全提示弹窗 -->
  <div class="modal-overlay" id="welcome-modal">
    <div class="modal-box">
      <div class="modal-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF7D00" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        沙箱环境安全提示
      </div>
      <div class="modal-body">
        欢迎使用云汐代码沙箱！请注意：
        <ul>
          <li>沙箱环境中执行的代码可能会访问您的系统资源</li>
          <li>请不要运行来源不明或可能包含危险操作的代码</li>
          <li>系统会检测危险操作并给出警告，但无法完全保证安全</li>
          <li>建议仅运行您理解且信任的代码</li>
        </ul>
      </div>
      <div class="modal-actions">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-tertiary);margin-right:auto;cursor:pointer;">
          <input type="checkbox" id="dont-show-again"> 不再显示此提示
        </label>
        <button class="modal-btn primary" onclick="closeWelcomeModal()">我知道了</button>
      </div>
    </div>
  </div>

  <!-- 危险代码确认弹窗 -->
  <div class="modal-overlay" id="danger-modal">
    <div class="modal-box">
      <div class="modal-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F53F3F" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        检测到危险代码
      </div>
      <div class="modal-body">
        您的代码中包含以下潜在危险操作：
        <div class="modal-danger-list" id="danger-list"></div>
        是否仍然要执行？
      </div>
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="closeDangerModal()">取消</button>
        <button class="modal-btn danger" onclick="confirmRunDangerous()">仍然执行</button>
      </div>
    </div>
  </div>

  <!-- 保存提示 -->
  <div class="save-toast" id="save-toast">代码已保存到本地</div>

  <script>
    var currentLang = 'python';
    var languages = [];
    var currentOutputTab = 'combined';

    var codeTemplates = {
      python: '# 欢迎使用云汐代码沙箱\n# 在这里编写 Python 代码，点击运行查看结果\n\ndef fibonacci(n):\n    """计算斐波那契数列"""\n    if n <= 1:\n        return n\n    a, b = 0, 1\n    for _ in range(2, n + 1):\n        a, b = b, a + b\n    return b\n\n# 打印前 10 个斐波那契数\nprint("斐波那契数列 (前 10 项):")\nfor i in range(10):\n    print(f"  F({i}) = {fibonacci(i)}")\n\nprint()\nprint("计算完成！")\n',
      javascript: '// 欢迎使用云汐代码沙箱\n// 在这里编写 JavaScript 代码\n\nfunction fibonacci(n) {\n    if (n <= 1) return n;\n    let a = 0, b = 1;\n    for (let i = 2; i <= n; i++) {\n        [a, b] = [b, a + b];\n    }\n    return b;\n}\n\nconsole.log("斐波那契数列 (前 10 项):");\nfor (let i = 0; i < 10; i++) {\n    console.log(`  F(${i}) = ${fibonacci(i)}`);\n}\n\nconsole.log();\nconsole.log("计算完成！");\n',
      typescript: '// 欢迎使用云汐代码沙箱\n// 在这里编写 TypeScript 代码\n\nfunction fibonacci(n: number): number {\n    if (n <= 1) return n;\n    let a = 0, b = 1;\n    for (let i = 2; i <= n; i++) {\n        [a, b] = [b, a + b];\n    }\n    return b;\n}\n\nconsole.log("斐波那契数列 (前 10 项):");\nfor (let i = 0; i < 10; i++) {\n    console.log(`  F(${i}) = ${fibonacci(i)}`);\n}\n\nconsole.log();\nconsole.log("计算完成！");\n',
      go: 'package main\n\nimport "fmt"\n\nfunc fibonacci(n int) int {\n    if n <= 1 {\n        return n\n    }\n    a, b := 0, 1\n    for i := 2; i <= n; i++ {\n        a, b = b, a+b\n    }\n    return b\n}\n\nfunc main() {\n    fmt.Println("斐波那契数列 (前 10 项):")\n    for i := 0; i < 10; i++ {\n        fmt.Printf("  F(%d) = %d\\n", i, fibonacci(i))\n    }\n    fmt.Println()\n    fmt.Println("计算完成！")\n}\n',
      rust: 'fn fibonacci(n: u32) -> u32 {\n    if n <= 1 {\n        return n;\n    }\n    let mut a = 0;\n    let mut b = 1;\n    for _ in 2..=n {\n        let temp = a + b;\n        a = b;\n        b = temp;\n    }\n    b\n}\n\nfn main() {\n    println!("斐波那契数列 (前 10 项):");\n    for i in 0..10 {\n        println!("  F({}) = {}", i, fibonacci(i));\n    }\n    println!();\n    println!("计算完成！");\n}\n',
    };

    var fileExtensions = {
      python: 'main.py',
      javascript: 'main.js',
      typescript: 'main.ts',
      go: 'main.go',
      rust: 'main.rs',
    };

    var langNames = {
      python: 'Python',
      javascript: 'JavaScript',
      typescript: 'TypeScript',
      go: 'Go',
      rust: 'Rust',
    };

    init();

    function init() {
      loadLanguages();
      restoreSavedCode();
      initEditorShortcuts();
      showWelcomeIfNeeded();
    }

    function loadLanguages() {
      YunxiAPI.request('GET', 'work-dev/code/languages')
        .then(function(res) {
          languages = res.data || [];
          renderLanguageList();
          var current = languages.find(function(l) { return l.key === currentLang; });
          if (!current || current.status !== 'available') {
            var firstAvailable = languages.find(function(l) { return l.status === 'available'; });
            if (firstAvailable) {
              currentLang = firstAvailable.key;
            }
          }
          updateActiveLang();
          updateFileName();
        })
        .catch(function() {
          languages = [
            { key: 'python', name: 'Python', icon: '\uD83D\uDC0D', status: 'available', version: '3.x', extension: '.py' },
            { key: 'javascript', name: 'JavaScript', icon: '\uD83D\uDCDC', status: 'available', version: 'Node.js', extension: '.js' },
            { key: 'typescript', name: 'TypeScript', icon: '\uD83D\uDD37', status: 'unavailable', version: '未安装', extension: '.ts', note: '需要 ts-node' },
            { key: 'go', name: 'Go', icon: '\uD83D\uDD35', status: 'unavailable', version: '未安装', extension: '.go' },
            { key: 'rust', name: 'Rust', icon: '\uD83E\uDD80', status: 'unavailable', version: '未安装', extension: '.rs' },
          ];
          renderLanguageList();
          updateActiveLang();
          updateFileName();
        });
    }

    function renderLanguageList() {
      var sidebar = document.getElementById('lang-sidebar');
      var html = '<div class="sidebar-title">编程语言</div>';
      languages.forEach(function(lang) {
        var isDisabled = lang.status !== 'available';
        var statusText = isDisabled ? '未安装' : '已安装';
        var statusClass = isDisabled ? 'not-installed' : 'installed';
        html += '<div class="lang-item' + (isDisabled ? ' disabled' : '') +
          '" data-lang="' + lang.key + '" onclick="switchLanguage(\'' + lang.key + '\')">' +
          '<span>' + (lang.icon || '') + '</span>' +
          '<span>' + lang.name + '</span>' +
          '<span class="lang-status ' + statusClass + '">' + statusText + '</span>' +
          '</div>';
        if (lang.version && lang.status === 'available') {
          html += '<div class="lang-version">v' + lang.version + '</div>';
        } else if (lang.note) {
          html += '<div class="lang-version">' + lang.note + '</div>';
        }
      });
      sidebar.innerHTML = html;
    }

    function updateActiveLang() {
      document.querySelectorAll('.lang-item').forEach(function(el) {
        el.classList.toggle('active', el.dataset.lang === currentLang);
      });
      var lang = languages.find(function(l) { return l.key === currentLang; });
      var badge = document.getElementById('lang-badge');
      badge.textContent = lang ? lang.name : langNames[currentLang] || currentLang;
      badge.className = 'status-badge ' + (lang && lang.status === 'available' ? 'success' : 'warning');
    }

    function updateFileName() {
      var name = fileExtensions[currentLang] || 'main.txt';
      document.getElementById('file-name').textContent = name;
    }

    function switchLanguage(lang) {
      var langInfo = languages.find(function(l) { return l.key === lang; });
      if (langInfo && langInfo.status !== 'available') {
        var note = langInfo.note || '请先安装该语言的编译器/解释器';
        YunxiAPI.showToast(langInfo.name + ' 未安装 - ' + note, 'warning');
        return;
      }
      if (!codeTemplates[lang]) {
        YunxiAPI.showToast((langNames[lang] || lang) + ' 暂不支持', 'info');
        return;
      }

      saveCurrentCode();
      currentLang = lang;
      updateActiveLang();
      updateFileName();

      var saved = localStorage.getItem('sandbox_code_' + lang);
      if (saved) {
        document.getElementById('code-editor').value = saved;
      } else {
        document.getElementById('code-editor').value = codeTemplates[lang] || '';
      }

      resetOutput();
    }

    function handleRunClick() {
      var lang = languages.find(function(l) { return l.key === currentLang; });
      if (lang && lang.status !== 'available') {
        YunxiAPI.showToast(lang.name + ' 未安装，无法执行', 'warning');
        return;
      }
      runCode();
    }

    function runCode() {
      var code = document.getElementById('code-editor').value;
      var btn = document.getElementById('run-btn');
      var outputEl = document.getElementById('output-content');
      var statusEl = document.getElementById('output-status');
      var metaEl = document.getElementById('output-meta');

      if (!code.trim()) {
        YunxiAPI.showToast('请先输入代码', 'warning');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>运行中...';
      statusEl.textContent = '正在执行...';
      statusEl.className = 'status-badge running';
      outputEl.innerHTML = '<div class="empty-state">代码执行中，请稍候...</div>';
      metaEl.style.display = 'none';
      updateBadges('', '');

      YunxiAPI.request('POST', 'work-dev/code/execute', {
        language: currentLang,
        code: code,
      })
        .then(function(result) {
          var data = result.data;
          renderOutput(data);
        })
        .catch(function(e) {
          outputEl.innerHTML = '<div class="stderr">执行错误: ' + escapeHtml(e.message || '未知错误') + '</div>';
          statusEl.textContent = '执行错误';
          statusEl.className = 'status-badge error';
        })
        .finally(function() {
          btn.disabled = false;
          btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>运行';
        });
    }

    function renderOutput(data) {
      var outputEl = document.getElementById('output-content');
      var statusEl = document.getElementById('output-status');
      var metaEl = document.getElementById('output-meta');

      var stdout = data.stdout || '';
      var stderr = data.stderr || '';
      var hasDanger = data.has_danger || false;

      var warningText = '';
      var pureStderr = stderr;
      if (hasDanger && stderr.indexOf('[安全警告]') === 0) {
        var idx = stderr.indexOf('\n\n');
        if (idx > 0) {
          warningText = stderr.substring(0, idx);
          pureStderr = stderr.substring(idx + 2);
        } else {
          warningText = stderr;
          pureStderr = '';
        }
      }

      var html = '';
      if (currentOutputTab === 'combined') {
        if (warningText) {
          html += '<div class="security-warning">' + escapeHtml(warningText) + '</div>';
        }
        if (stdout) {
          html += '<div class="stdout">' + escapeHtml(stdout) + '</div>';
        }
        if (pureStderr) {
          html += '<div class="stderr">' + escapeHtml(pureStderr) + '</div>';
        }
        if (!stdout && !pureStderr && !warningText) {
          html = '<div class="empty-state">无输出</div>';
        }
      } else if (currentOutputTab === 'stdout') {
        if (stdout) {
          html = '<div class="stdout">' + escapeHtml(stdout) + '</div>';
        } else {
          html = '<div class="empty-state">无标准输出</div>';
        }
      } else if (currentOutputTab === 'stderr') {
        if (warningText) {
          html += '<div class="security-warning">' + escapeHtml(warningText) + '</div>';
        }
        if (pureStderr) {
          html += '<div class="stderr">' + escapeHtml(pureStderr) + '</div>';
        }
        if (!pureStderr && !warningText) {
          html = '<div class="empty-state">无错误输出</div>';
        }
      }

      outputEl.innerHTML = html;

      if (data.timed_out) {
        statusEl.textContent = '执行超时';
        statusEl.className = 'status-badge warning';
      } else if (data.exit_code === 0) {
        statusEl.textContent = hasDanger ? '执行成功（有警告）' : '执行成功';
        statusEl.className = hasDanger ? 'status-badge warning' : 'status-badge success';
      } else {
        statusEl.textContent = '执行失败';
        statusEl.className = 'status-badge error';
      }

      metaEl.style.display = 'flex';
      var exitCodeEl = document.getElementById('meta-exitcode');
      var exitItem = exitCodeEl.parentElement;
      exitCodeEl.textContent = data.exit_code;
      exitItem.className = 'meta-item ' + (data.timed_out ? 'timeout' : (data.exit_code === 0 ? 'success' : 'error'));
      document.getElementById('meta-duration').textContent = data.duration_ms + 'ms';

      var lang = languages.find(function(l) { return l.key === (data.language || currentLang); });
      document.getElementById('meta-lang').textContent = lang ? lang.name : langNames[data.language || currentLang];

      if (data.memory_kb && data.memory_kb > 0) {
        document.getElementById('meta-mem-item').style.display = 'flex';
        document.getElementById('meta-memory').textContent = formatMemory(data.memory_kb);
      } else {
        document.getElementById('meta-mem-item').style.display = 'none';
      }

      updateBadges(stdout, pureStderr, warningText);
    }

    function updateBadges(stdout, stderr, warning) {
      var combinedCount = 0;
      var stdoutCount = 0;
      var stderrCount = 0;

      if (stdout) {
        stdoutCount = stdout.trim().split('\n').length;
        combinedCount += stdoutCount;
      }
      if (stderr) {
        stderrCount = stderr.trim().split('\n').length;
        combinedCount += stderrCount;
      }
      if (warning) {
        var warnLines = warning.trim().split('\n').length;
        stderrCount += warnLines;
        combinedCount += warnLines;
      }

      document.getElementById('badge-combined').textContent = combinedCount;
      document.getElementById('badge-stdout').textContent = stdoutCount;
      document.getElementById('badge-stderr').textContent = stderrCount;
    }

    function switchOutputTab(tab) {
      currentOutputTab = tab;
      document.querySelectorAll('.output-tab').forEach(function(el) {
        el.classList.toggle('active', el.dataset.tab === tab);
      });

      var outputEl = document.getElementById('output-content');
      var warnEl = outputEl.querySelector('.security-warning');
      var outEl = outputEl.querySelector('.stdout');
      var errEl = outputEl.querySelector('.stderr');

      if (!outEl && !errEl && !warnEl) return;

      var warning = warnEl ? warnEl.textContent : '';
      var stdout = outEl ? outEl.textContent : '';
      var stderr = errEl ? errEl.textContent : '';

      var html = '';
      if (tab === 'combined') {
        if (warning) html += '<div class="security-warning">' + warning + '</div>';
        if (stdout) html += '<div class="stdout">' + stdout + '</div>';
        if (stderr) html += '<div class="stderr">' + stderr + '</div>';
        if (!stdout && !stderr && !warning) html = '<div class="empty-state">无输出</div>';
      } else if (tab === 'stdout') {
        html = stdout ? '<div class="stdout">' + stdout + '</div>' : '<div class="empty-state">无标准输出</div>';
      } else if (tab === 'stderr') {
        if (warning) html += '<div class="security-warning">' + warning + '</div>';
        if (stderr) html += '<div class="stderr">' + stderr + '</div>';
        if (!stderr && !warning) html = '<div class="empty-state">无错误输出</div>';
      }
      outputEl.innerHTML = html;
    }

    function resetOutput() {
      var outputEl = document.getElementById('output-content');
      var statusEl = document.getElementById('output-status');
      var metaEl = document.getElementById('output-meta');
      outputEl.innerHTML = '<div class="empty-state">点击「运行」按钮或按 Ctrl+Enter 执行代码</div>';
      statusEl.textContent = '等待运行...';
      statusEl.className = 'empty-state';
      metaEl.style.display = 'none';
      updateBadges('', '');
    }

    function formatMemory(kb) {
      if (kb < 1024) return kb + ' KB';
      return (kb / 1024).toFixed(1) + ' MB';
    }

    function initEditorShortcuts() {
      var editor = document.getElementById('code-editor');

      editor.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
          e.preventDefault();
          var start = this.selectionStart;
          var end = this.selectionEnd;
          var value = this.value;
          var indent = '    ';

          if (start === end) {
            this.value = value.substring(0, start) + indent + value.substring(end);
            this.selectionStart = this.selectionEnd = start + indent.length;
          } else {
            var linesBefore = value.substring(0, start).split('\n');
            var linesAll = value.substring(0, end).split('\n');
            var startLineIdx = linesBefore.length - 1;
            var endLineIdx = linesAll.length - 1;

            if (e.shiftKey) {
              for (var i = startLineIdx; i <= endLineIdx; i++) {
                if (linesAll[i].startsWith(indent)) {
                  linesAll[i] = linesAll[i].substring(indent.length);
                } else if (linesAll[i].charAt(0) === '\t') {
                  linesAll[i] = linesAll[i].substring(1);
                }
              }
            } else {
              for (var j = startLineIdx; j <= endLineIdx; j++) {
                linesAll[j] = indent + linesAll[j];
              }
            }

            var newBefore = linesAll.slice(0, startLineIdx).join('\n');
            var newSelected = linesAll.slice(startLineIdx, endLineIdx + 1).join('\n');
            var newAfter = value.substring(end);
            var newVal = newBefore + '\n' + newSelected + newAfter;
            var newStart = newBefore.length + 1;
            var newEnd = newStart + newSelected.length;

            this.value = newVal;
            this.selectionStart = newStart;
            this.selectionEnd = newEnd;
          }
        }

        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          handleRunClick();
        }

        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault();
          saveCurrentCode();
          showSaveToast();
        }
      });

      editor.addEventListener('blur', function() {
        saveCurrentCode();
      });
    }

    function saveCurrentCode() {
      var code = document.getElementById('code-editor').value;
      localStorage.setItem('sandbox_code_' + currentLang, code);
      localStorage.setItem('sandbox_last_lang', currentLang);
    }

    function restoreSavedCode() {
      var lastLang = localStorage.getItem('sandbox_last_lang');
      if (lastLang && codeTemplates[lastLang]) {
        currentLang = lastLang;
      }
      var saved = localStorage.getItem('sandbox_code_' + currentLang);
      var editor = document.getElementById('code-editor');
      if (saved) {
        editor.value = saved;
      } else {
        editor.value = codeTemplates[currentLang] || '';
      }
      updateActiveLang();
      updateFileName();
    }

    function showSaveToast() {
      var toast = document.getElementById('save-toast');
      toast.classList.add('show');
      setTimeout(function() {
        toast.classList.remove('show');
      }, 1500);
    }

    function showWelcomeIfNeeded() {
      var dontShow = localStorage.getItem('sandbox_dont_show_welcome');
      if (!dontShow) {
        document.getElementById('welcome-modal').classList.add('show');
      }
    }

    function closeWelcomeModal() {
      var dontShow = document.getElementById('dont-show-again').checked;
      if (dontShow) {
        localStorage.setItem('sandbox_dont_show_welcome', 'true');
      }
      document.getElementById('welcome-modal').classList.remove('show');
    }

    function closeDangerModal() {
      document.getElementById('danger-modal').classList.remove('show');
    }

    function confirmRunDangerous() {
      closeDangerModal();
      runCode();
    }

    function openInVSCode() {
      YunxiAPI.showToast('请先保存代码到文件再在 VS Code 中打开', 'info');
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
