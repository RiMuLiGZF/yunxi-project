<!DOCTYPE html>
<html lang="zh-CN" data-theme="review-summary">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情绪仪表盘 — 云汐复盘模式</title>
  <link rel="stylesheet" href="./colors_and_type.css">
  <script src="../common/api.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font-family-base);
      font-size: var(--font-size-base);
      color: var(--color-text-primary);
      background: var(--color-page-bg);
    }
    .app-shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .top-bar {
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: var(--color-header-bg); border-bottom: 1px solid var(--color-header-border);
    }
    .back-btn {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      color: var(--color-text-secondary); font-size: 14px; padding: 6px 12px; border-radius: 8px;
      transition: all .2s;
    }
    .back-btn:hover { background: var(--color-hover-bg); color: var(--color-text-primary); }
    .page-title { font-size: 16px; font-weight: 600; }
    .main-body { flex: 1; overflow: auto; padding: 24px; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--color-card-bg); border: 1px solid var(--color-border);
      border-radius: 12px; padding: 20px;
    }
    .stat-icon { font-size: 28px; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .stat-label { font-size: 13px; color: var(--color-text-secondary); }

    .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .card {
      background: var(--color-card-bg); border: 1px solid var(--color-border);
      border-radius: 12px; padding: 20px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .card-title { font-size: 15px; font-weight: 600; }
    .chart-container { position: relative; height: 220px; }

    .btn-primary {
      background: var(--color-primary); color: white; border: none; border-radius: 8px;
      padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 500; transition: opacity .2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-secondary {
      background: var(--color-card-bg); color: var(--color-text-primary);
      border: 1px solid var(--color-border); border-radius: 8px;
      padding: 6px 12px; font-size: 12px; cursor: pointer; transition: all .2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-secondary:hover { background: var(--color-hover-bg); }

    .emotion-selector {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px;
    }
    .emotion-option {
      padding: 16px 8px; border-radius: 12px; text-align: center; cursor: pointer;
      border: 2px solid var(--color-border); transition: all .2s;
      background: var(--color-page-bg);
    }
    .emotion-option:hover { border-color: var(--color-primary-light); }
    .emotion-option.active {
      border-color: var(--color-primary);
      background: var(--color-primary-light);
    }
    .emotion-emoji { font-size: 28px; margin-bottom: 6px; }
    .emotion-name { font-size: 12px; font-weight: 500; }

    .level-slider {
      width: 100%; margin: 16px 0;
    }
    .level-labels {
      display: flex; justify-content: space-between; font-size: 11px; color: var(--color-text-tertiary);
    }

    .emotion-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
    .emotion-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 12px;
      border-radius: 8px; background: var(--color-page-bg);
    }
    .emotion-item-emoji { font-size: 22px; }
    .emotion-item-info { flex: 1; }
    .emotion-item-name { font-size: 13px; font-weight: 500; }
    .emotion-item-time { font-size: 11px; color: var(--color-text-tertiary); }
    .emotion-level-bar {
      width: 60px; height: 6px; background: var(--color-border); border-radius: 3px; overflow: hidden;
    }
    .emotion-level-fill {
      height: 100%; background: var(--color-primary); border-radius: 3px;
    }

    .full-width { grid-column: 1 / -1; }

    textarea {
      width: 100%; min-height: 80px; padding: 12px;
      border: 1px solid var(--color-border); border-radius: 10px;
      background: var(--color-page-bg); color: var(--color-text-primary);
      font-size: 13px; font-family: inherit; resize: vertical; outline: none;
    }
    textarea:focus { border-color: var(--color-primary); }

    input[type="range"] {
      width: 100%; height: 6px; border-radius: 3px;
      background: var(--color-border); outline: none;
      -webkit-appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--color-primary); cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="top-bar">
      <div style="display:flex;align-items:center;gap:16px;">
        <div class="back-btn" onclick="location.href='review-summary.html'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          返回复盘模式
        </div>
        <div class="page-title">情绪仪表盘</div>
      </div>
      <div>
        <button class="btn-secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          近 30 天
        </button>
      </div>
    </div>
    <div class="main-body">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">😊</div>
          <div class="stat-value" id="stat-dominant">—</div>
          <div class="stat-label">主导情绪</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📈</div>
          <div class="stat-value" id="stat-avg">0</div>
          <div class="stat-label">平均情绪值</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📝</div>
          <div class="stat-value" id="stat-count">0</div>
          <div class="stat-label">记录次数</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🔥</div>
          <div class="stat-value" id="stat-streak">0</div>
          <div class="stat-label">连续记录</div>
        </div>
      </div>

      <div class="content-grid">
        <div class="card">
          <div class="card-header">
            <div class="card-title">情绪趋势</div>
          </div>
          <div class="chart-container">
            <canvas id="trendChart"></canvas>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">情绪分布</div>
          </div>
          <div class="chart-container">
            <canvas id="distChart"></canvas>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">记录此刻心情</div>
          </div>
          <div class="emotion-selector">
            <div class="emotion-option active" data-emotion="happy" onclick="selectEmotion('happy')">
              <div class="emotion-emoji">😊</div>
              <div class="emotion-name">开心</div>
            </div>
            <div class="emotion-option" data-emotion="calm" onclick="selectEmotion('calm')">
              <div class="emotion-emoji">😌</div>
              <div class="emotion-name">平静</div>
            </div>
            <div class="emotion-option" data-emotion="neutral" onclick="selectEmotion('neutral')">
              <div class="emotion-emoji">😐</div>
              <div class="emotion-name">一般</div>
            </div>
            <div class="emotion-option" data-emotion="sad" onclick="selectEmotion('sad')">
              <div class="emotion-emoji">😢</div>
              <div class="emotion-name">低落</div>
            </div>
            <div class="emotion-option" data-emotion="anxious" onclick="selectEmotion('anxious')">
              <div class="emotion-emoji">😰</div>
              <div class="emotion-name">焦虑</div>
            </div>
            <div class="emotion-option" data-emotion="angry" onclick="selectEmotion('angry')">
              <div class="emotion-emoji">😠</div>
              <div class="emotion-name">生气</div>
            </div>
          </div>
          <div style="margin-bottom:8px;font-size:13px;color:var(--color-text-secondary);">
            情绪强度: <strong id="level-display">5</strong> / 10
          </div>
          <input type="range" class="level-slider" id="level-slider" min="1" max="10" value="5" oninput="document.getElementById('level-display').textContent=this.value">
          <div class="level-labels">
            <span>轻微</span><span>中等</span><span>强烈</span>
          </div>
          <div style="margin-top:16px;">
            <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px;">触发因素（可选）</div>
            <input type="text" id="trigger-input" placeholder="比如：工作压力、人际关系、天气..." style="width:100%;padding:10px 12px;border:1px solid var(--color-border);border-radius:8px;background:var(--color-page-bg);color:var(--color-text-primary);font-size:13px;outline:none;">
          </div>
          <div style="margin-top:12px;">
            <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px;">备注（可选）</div>
            <textarea id="note-input" placeholder="记录一下此刻的想法..."></textarea>
          </div>
          <div style="margin-top:16px;text-align:right;">
            <button class="btn-primary" onclick="recordEmotion()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4"/><path d="M12 18v4"/><path d="m4.93 4.93 2.83 2.83"/><path d="m16.24 16.24 2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="m4.93 19.07 2.83-2.83"/><path d="m16.24 7.76 2.83-2.83"/></svg>
              记录心情
            </button>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">最近记录</div>
            <button class="btn-secondary">查看全部</button>
          </div>
          <div class="emotion-list" id="emotion-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentEmotion = 'happy';

    const emotionNames = {
      happy: '开心', calm: '平静', neutral: '一般', sad: '低落', anxious: '焦虑', angry: '生气'
    };
    const emotionEmojis = {
      happy: '😊', calm: '😌', neutral: '😐', sad: '😢', anxious: '😰', angry: '😠'
    };
    const emotionColors = {
      happy: '#FFD93D', calm: '#6BCB77', neutral: '#86909C',
      sad: '#4D96FF', anxious: '#FF6B6B', angry: '#F53F3F'
    };

    function selectEmotion(emotion) {
      currentEmotion = emotion;
      document.querySelectorAll('.emotion-option').forEach(el => {
        el.classList.toggle('active', el.dataset.emotion === emotion);
      });
    }

    async function recordEmotion() {
      const level = parseInt(document.getElementById('level-slider').value);
      const trigger = document.getElementById('trigger-input').value;
      const note = document.getElementById('note-input').value;

      try {
        await YunxiAPI.request('POST', 'review/emotions', {
          emotion: currentEmotion,
          level,
          trigger,
          note,
        });
        YunxiAPI.showToast('心情记录成功', 'success');
        document.getElementById('trigger-input').value = '';
        document.getElementById('note-input').value = '';
        loadStats();
        loadEmotionList();
        loadCharts();
      } catch (e) {
        YunxiAPI.showToast('记录失败', 'error');
      }
    }

    async function loadStats() {
      try {
        const res = await YunxiAPI.request('GET', 'review/emotions/stats?days=30');
        const data = res.data;
        document.getElementById('stat-dominant').textContent = emotionNames[data.dominant_emotion] || '—';
        document.getElementById('stat-avg').textContent = data.avg_level;
        document.getElementById('stat-count').textContent = data.total_records;

        const overviewRes = await YunxiAPI.request('GET', 'review/overview');
        document.getElementById('stat-streak').textContent = overviewRes.data.stats.streak_days;
      } catch (e) {
        console.error('加载统计失败', e);
      }
    }

    async function loadEmotionList() {
      try {
        const res = await YunxiAPI.request('GET', 'review/emotions?days=10');
        const listEl = document.getElementById('emotion-list');
        listEl.innerHTML = res.data.map(e => `
          <div class="emotion-item">
            <div class="emotion-item-emoji">${emotionEmojis[e.emotion] || '😐'}</div>
            <div class="emotion-item-info">
              <div class="emotion-item-name">${emotionNames[e.emotion] || e.emotion}</div>
              <div class="emotion-item-time">${e.date}</div>
            </div>
            <div class="emotion-level-bar">
              <div class="emotion-level-fill" style="width:${e.level * 10}%;background:${emotionColors[e.emotion] || '#722ED1'};"></div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error('加载情绪列表失败', e);
      }
    }

    let trendChart, distChart;

    async function loadCharts() {
      try {
        const res = await YunxiAPI.request('GET', 'review/emotions/stats?days=30');
        const data = res.data;

        // 趋势图
        const trendCtx = document.getElementById('trendChart').getContext('2d');
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(trendCtx, {
          type: 'line',
          data: {
            labels: data.daily_trend.map(d => d.date.slice(5)),
            datasets: [{
              label: '情绪值',
              data: data.daily_trend.map(d => d.avg_level),
              borderColor: getComputedStyle(document.documentElement).getPropertyValue('--color-primary').trim() || '#722ED1',
              backgroundColor: 'rgba(114, 46, 209, 0.1)',
              fill: true,
              tension: 0.4,
              pointBackgroundColor: '#fff',
              pointBorderWidth: 2,
              pointRadius: 3,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { min: 0, max: 10, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 11 } } },
              x: { grid: { display: false }, ticks: { font: { size: 10 }, maxTicksLimit: 10 } }
            }
          }
        });

        // 分布图
        const distCtx = document.getElementById('distChart').getContext('2d');
        if (distChart) distChart.destroy();
        const labels = Object.keys(data.emotion_distribution).map(e => emotionNames[e] || e);
        const values = Object.values(data.emotion_distribution);
        const colors = Object.keys(data.emotion_distribution).map(e => emotionColors[e] || '#86909C');
        
        distChart = new Chart(distCtx, {
          type: 'doughnut',
          data: {
            labels,
            datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '60%',
            plugins: {
              legend: { position: 'right', labels: { font: { size: 12 }, padding: 12, usePointStyle: true } }
            }
          }
        });
      } catch (e) {
        console.error('加载图表失败', e);
      }
    }

    // 初始化
    loadStats();
    loadEmotionList();
    setTimeout(loadCharts, 200);
  </script>
</body>
</html>
