<!DOCTYPE html>
<html lang="zh-CN" data-theme="work-dev">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语音功能测试 — 云汐系统</title>
  <link rel="stylesheet" href="./colors_and_type.css">
  <script src="common/api.js"></script>
  <script src="../common/voice.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font-family-base);
      font-size: var(--font-size-base);
      color: var(--color-text-primary);
      background: var(--color-page-bg);
    }
    .app { max-width: 780px; margin: 0 auto; padding: 40px 24px; }
    .page-title {
      font-size: 24px; font-weight: 700; margin-bottom: 8px;
      background: linear-gradient(135deg, #165DFF, #722ED1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-subtitle { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 32px; }

    .card {
      background: var(--color-card-bg);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .card-title .icon { font-size: 20px; }

    /* 录音按钮 */
    .record-section { text-align: center; padding: 20px 0; }
    .record-btn {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, #165DFF, #722ED1);
      color: white; border: none; cursor: pointer;
      font-size: 32px; display: inline-flex; align-items: center; justify-content: center;
      transition: all .3s;
      box-shadow: 0 4px 20px rgba(22, 93, 255, 0.3);
    }
    .record-btn:hover { transform: scale(1.05); box-shadow: 0 6px 28px rgba(22, 93, 255, 0.4); }
    .record-btn.recording {
      background: linear-gradient(135deg, #F53F3F, #FF7D00);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(245, 63, 63, 0.3); }
      50% { box-shadow: 0 4px 40px rgba(245, 63, 63, 0.6); }
    }
    .record-hint { margin-top: 16px; font-size: 13px; color: var(--color-text-secondary); }
    .recording-time { margin-top: 8px; font-size: 18px; font-weight: 600; color: var(--color-primary); }

    /* 识别结果 */
    .result-box {
      background: var(--color-page-bg);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
      min-height: 80px;
      font-size: 14px;
      line-height: 1.6;
    }
    .result-label { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 8px; }

    /* TTS区域 */
    .tts-input {
      width: 100%; min-height: 100px;
      background: var(--color-page-bg);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: inherit;
      color: var(--color-text-primary);
      resize: vertical;
      outline: none;
      transition: border-color .2s;
    }
    .tts-input:focus { border-color: var(--color-primary); }
    .tts-actions { display: flex; gap: 12px; margin-top: 12px; }
    .btn {
      padding: 10px 20px; border-radius: 10px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      border: none; transition: all .2s;
    }
    .btn-primary { background: var(--color-primary); color: white; }
    .btn-primary:hover { opacity: .9; }
    .btn-secondary { background: var(--color-hover-bg); color: var(--color-text-primary); }
    .btn-secondary:hover { background: var(--color-border); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* 音色分组选择 */
    .voice-select-wrapper { margin-bottom: 16px; }
    .voice-select-label {
      font-size: 13px; color: var(--color-text-secondary); margin-bottom: 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .voice-select {
      width: 100%;
      padding: 10px 12px;
      background: var(--color-page-bg);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--color-text-primary);
      cursor: pointer;
      outline: none;
      transition: border-color .2s;
    }
    .voice-select:focus { border-color: var(--color-primary); }
    .voice-select optgroup {
      font-weight: 600;
      color: var(--color-text-secondary);
    }
    .voice-select option {
      color: var(--color-text-primary);
      padding: 4px 0;
    }
    .voice-desc {
      font-size: 12px; color: var(--color-text-tertiary);
      margin-top: 6px; min-height: 16px;
    }

    /* 状态标签 */
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
      background: var(--color-hover-bg);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #00B42A;
    }
    .status-dot.offline { background: #FF7D00; }
    .status-dot.listening { background: #165DFF; animation: blink 1.2s infinite; }
    .status-dot.detecting { background: #722ED1; animation: blink 0.6s infinite; }
    .status-dot.awake { background: #00B42A; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* 滑块 */
    .slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .slider-label { width: 60px; font-size: 13px; color: var(--color-text-secondary); }
    .slider { flex: 1; accent-color: var(--color-primary); }
    .slider-value { width: 40px; text-align: right; font-size: 13px; font-weight: 500; }

    /* 唤醒词检测区域 */
    .wake-status-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: var(--color-page-bg);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .wake-status-info { display: flex; align-items: center; gap: 10px; }
    .wake-status-text {
      font-size: 14px; font-weight: 500;
    }
    .wake-status-text .state-label { font-weight: 600; }
    .wake-status-text.idle .state-label { color: var(--color-text-tertiary); }
    .wake-status-text.listening .state-label { color: #165DFF; }
    .wake-status-text.detecting .state-label { color: #722ED1; }
    .wake-status-text.awake .state-label { color: #00B42A; }

    .wake-actions { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .wake-config-row {
      display: flex; gap: 10px; align-items: center;
      margin-bottom: 12px; flex-wrap: wrap;
    }
    .wake-config-label { font-size: 13px; color: var(--color-text-secondary); min-width: 70px; }
    .wake-config-input {
      flex: 1; min-width: 120px;
      padding: 8px 12px;
      background: var(--color-page-bg);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--color-text-primary);
      outline: none;
    }
    .wake-config-input:focus { border-color: var(--color-primary); }
    .wake-words-tags {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .wake-word-tag {
      padding: 4px 10px;
      background: var(--color-primary-light);
      color: var(--color-primary-text);
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    /* 唤醒事件日志 */
    .wake-log {
      background: var(--color-page-bg);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 12px;
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .wake-log-item {
      padding: 4px 0;
      border-bottom: 1px solid var(--color-border);
      display: flex; gap: 8px;
    }
    .wake-log-item:last-child { border-bottom: none; }
    .wake-log-time { color: var(--color-text-tertiary); flex-shrink: 0; }
    .wake-log-text { color: var(--color-text-secondary); flex: 1; }
    .wake-log-item.success .wake-log-text { color: #00B42A; font-weight: 600; }
    .wake-log-item.error .wake-log-text { color: #F53F3F; }
    .wake-log-empty { color: var(--color-text-tertiary); text-align: center; padding: 20px 0; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px;
      color: var(--color-text-secondary); font-size: 14px;
      cursor: pointer; transition: all .2s;
      margin-bottom: 24px;
    }
    .back-btn:hover { background: var(--color-hover-bg); color: var(--color-text-primary); }

    /* Tab 切换 */
    .tab-bar {
      display: flex; gap: 4px;
      background: var(--color-page-bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 16px;
    }
    .tab-item {
      flex: 1;
      padding: 8px 12px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s;
    }
    .tab-item:hover { color: var(--color-text-primary); }
    .tab-item.active {
      background: var(--color-card-bg);
      color: var(--color-primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
  <div class="app">
    <div class="back-btn" onclick="location.href='main-chat.html'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      返回聊天
    </div>

    <h1 class="page-title">🎤 云汐语音助手</h1>
    <p class="page-subtitle">语音识别 · 语音合成 · 唤醒词检测 · 音色管理</p>

    <!-- 状态卡片 -->
    <div class="card">
      <div class="card-title">
        <span class="icon">📊</span>
        服务状态
      </div>
      <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        <div>
          <div style="font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 6px;">语音合成 (TTS)</div>
          <span class="status-badge">
            <span class="status-dot" id="tts-dot"></span>
            <span id="tts-engine">检测中...</span>
          </span>
        </div>
        <div>
          <div style="font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 6px;">语音识别 (ASR)</div>
          <span class="status-badge">
            <span class="status-dot" id="asr-dot"></span>
            <span id="asr-engine">检测中...</span>
          </span>
        </div>
        <div>
          <div style="font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 6px;">唤醒词检测</div>
          <span class="status-badge">
            <span class="status-dot offline" id="wake-dot"></span>
            <span id="wake-engine">未启动</span>
          </span>
        </div>
      </div>
    </div>

    <!-- 唤醒词检测 -->
    <div class="card">
      <div class="card-title">
        <span class="icon">🔔</span>
        唤醒词检测
      </div>

      <!-- 状态指示条 -->
      <div class="wake-status-bar">
        <div class="wake-status-info">
          <span class="status-badge">
            <span class="status-dot" id="wake-status-dot"></span>
          </span>
          <div class="wake-status-text idle" id="wake-status-text">
            当前状态: <span class="state-label" id="wake-state-label">未启动</span>
          </div>
        </div>
        <div style="font-size: 12px; color: var(--color-text-tertiary);" id="wake-duration">运行时长: --</div>
      </div>

      <!-- 唤醒词标签 -->
      <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 8px;">当前唤醒词</div>
      <div class="wake-words-tags" id="wake-words-tags">
        <span class="wake-word-tag">加载中...</span>
      </div>

      <!-- 配置项 -->
      <div class="wake-config-row">
        <span class="wake-config-label">切片时长</span>
        <input type="number" class="wake-config-input" id="wake-slice-duration" value="2000" min="500" max="5000" step="100" style="max-width: 120px;">
        <span style="font-size: 12px; color: var(--color-text-tertiary);">毫秒</span>
      </div>
      <div class="wake-config-row">
        <span class="wake-config-label">自动录音</span>
        <label style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;">
          <input type="checkbox" id="wake-auto-record" checked style="accent-color: var(--color-primary);">
          <span>唤醒后自动开始录音</span>
        </label>
      </div>

      <!-- 操作按钮 -->
      <div class="wake-actions">
        <button class="btn btn-primary" id="wake-start-btn" onclick="startWakeDetection()">▶ 开始监听</button>
        <button class="btn btn-secondary" id="wake-stop-btn" onclick="stopWakeDetection()" disabled>⏹ 停止监听</button>
        <button class="btn btn-secondary" onclick="clearWakeLog()">🗑 清空日志</button>
      </div>

      <!-- 事件日志 -->
      <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 8px;">事件日志</div>
      <div class="wake-log" id="wake-log">
        <div class="wake-log-empty">暂无事件记录</div>
      </div>
    </div>

    <!-- 语音识别 -->
    <div class="card">
      <div class="card-title">
        <span class="icon">🎙️</span>
        语音识别
      </div>
      <div class="record-section">
        <button class="record-btn" id="record-btn" onclick="toggleRecording()">🎤</button>
        <div class="recording-time" id="recording-time" style="display:none;">00:00</div>
        <div class="record-hint" id="record-hint">点击麦克风开始说话</div>
      </div>
      <div class="result-box" id="asr-result">
        <div class="result-label">识别结果将显示在这里</div>
      </div>
    </div>

    <!-- 语音合成 -->
    <div class="card">
      <div class="card-title">
        <span class="icon">🔊</span>
        语音合成
      </div>

      <!-- 音色选择（分组下拉框） -->
      <div class="voice-select-wrapper">
        <div class="voice-select-label">
          <span>选择音色</span>
          <span style="font-size: 12px; color: var(--color-text-tertiary);" id="voice-engine-label">加载中...</span>
        </div>
        <select class="voice-select" id="voice-select" onchange="onVoiceSelectChange()">
          <option value="">加载中...</option>
        </select>
        <div class="voice-desc" id="voice-desc">--</div>
      </div>

      <!-- 语速音调调节 -->
      <div class="slider-row">
        <div class="slider-label">语速</div>
        <input type="range" class="slider" id="speed-slider" min="0.5" max="2" step="0.1" value="1" oninput="updateSpeed()">
        <div class="slider-value" id="speed-value">1.0x</div>
      </div>
      <div class="slider-row">
        <div class="slider-label">音调</div>
        <input type="range" class="slider" id="pitch-slider" min="0.5" max="2" step="0.1" value="1" oninput="updatePitch()">
        <div class="slider-value" id="pitch-value">1.0x</div>
      </div>

      <textarea class="tts-input" id="tts-text" placeholder="输入要合成的文字...">你好，我是云汐，很高兴认识你！有什么我可以帮你的吗？</textarea>
      <div class="tts-actions">
        <button class="btn btn-primary" id="speak-btn" onclick="speakText()">🔊 播放语音</button>
        <button class="btn btn-secondary" onclick="stopSpeaking()">⏹ 停止</button>
      </div>
    </div>
  </div>

  <script>
    let voice = null;
    let currentVoice = 'warm_female';
    let currentSpeed = 1.0;
    let currentPitch = 1.0;
    let recordingTimer = null;
    let recordingSeconds = 0;

    // 唤醒词相关
    let wakeTimer = null;
    let wakeSeconds = 0;
    let wakeLogCount = 0;

    // 初始化
    async function init() {
      voice = new YunxiVoice({
        onResult: (result) => {
          document.getElementById('asr-result').innerHTML = `
            <div class="result-label">识别结果（${result.engine}）</div>
            <div style="font-size:15px;line-height:1.7;">${result.text}</div>
          `;
        },
        onRecordingStart: () => {
          document.getElementById('record-btn').classList.add('recording');
          document.getElementById('record-hint').textContent = '正在聆听... 再次点击停止';
          document.getElementById('recording-time').style.display = 'block';
          recordingSeconds = 0;
          updateRecordingTime();
          recordingTimer = setInterval(() => {
            recordingSeconds++;
            updateRecordingTime();
          }, 1000);
        },
        onRecordingStop: () => {
          document.getElementById('record-btn').classList.remove('recording');
          document.getElementById('record-hint').textContent = '点击麦克风开始说话';
          if (recordingTimer) {
            clearInterval(recordingTimer);
            recordingTimer = null;
          }
        },
        onWakeWord: (result) => {
          addWakeLog(`检测到唤醒词: "${result.matched_word}" (置信度: ${(result.confidence || 0).toFixed(2)})`, 'success');
        },
        onWakeStateChange: (info) => {
          updateWakeStateDisplay(info.state);
        },
        onSpeakingStart: () => {
          const btn = document.getElementById('speak-btn');
          btn.disabled = true;
          btn.textContent = '播放中...';
        },
        onSpeakingEnd: () => {
          const btn = document.getElementById('speak-btn');
          btn.disabled = false;
          btn.textContent = '🔊 播放语音';
        }
      });

      // 获取状态
      const status = await voice.getStatus();
      updateStatusDisplay(status);

      // 加载音色列表
      await loadVoiceOptions();

      // 加载唤醒词配置
      await loadWakeWordConfig();
    }

    function updateStatusDisplay(status) {
      // TTS
      const ttsDot = document.getElementById('tts-dot');
      const ttsEngine = document.getElementById('tts-engine');
      if (status.tts_available) {
        ttsDot.classList.remove('offline');
        ttsEngine.textContent = status.tts_engine || '可用';
      } else {
        ttsDot.classList.add('offline');
        ttsEngine.textContent = '浏览器兜底';
      }

      // ASR
      const asrDot = document.getElementById('asr-dot');
      const asrEngine = document.getElementById('asr-engine');
      if (status.asr_available) {
        asrDot.classList.remove('offline');
        asrEngine.textContent = status.asr_engine || '可用';
      } else {
        asrDot.classList.add('offline');
        asrEngine.textContent = '未启用';
      }
    }

    function updateRecordingTime() {
      const mins = Math.floor(recordingSeconds / 60).toString().padStart(2, '0');
      const secs = (recordingSeconds % 60).toString().padStart(2, '0');
      document.getElementById('recording-time').textContent = `${mins}:${secs}`;
    }

    // 录音控制
    function toggleRecording() {
      if (!voice) return;
      voice.toggleRecording();
    }

    // ===== 音色管理 =====

    async function loadVoiceOptions() {
      if (!voice) return;

      try {
        const result = await voice.getVoiceOptions();
        const select = document.getElementById('voice-select');
        select.innerHTML = '';

        // 按分组添加 optgroup
        Object.keys(result.categories).forEach(catKey => {
          const cat = result.categories[catKey];
          const optGroup = document.createElement('optgroup');
          optGroup.label = cat.label;

          cat.voices.forEach(v => {
            const option = document.createElement('option');
            option.value = v.id;
            option.textContent = v.name + (v.desc ? ` — ${v.desc}` : '');
            optGroup.appendChild(option);
          });

          select.appendChild(optGroup);
        });

        // 设置引擎来源
        const engineLabel = document.getElementById('voice-engine-label');
        engineLabel.textContent = result.source === 'backend'
          ? `引擎: ${result.engine}`
          : '内置音色 (后端不可用)';

        // 设置默认音色
        if (result.voices.length > 0) {
          const defaultVoice = result.voices.find(v => v.id === 'warm_female') || result.voices[0];
          select.value = defaultVoice.id;
          currentVoice = defaultVoice.id;
          voice.setVoice(defaultVoice.id);
          updateVoiceDesc(defaultVoice);
        }
      } catch (e) {
        console.error('加载音色列表失败:', e);
      }
    }

    function onVoiceSelectChange() {
      const select = document.getElementById('voice-select');
      const voiceId = select.value;
      if (!voiceId) return;

      currentVoice = voiceId;
      voice.setVoice(voiceId);

      // 更新描述
      const voiceInfo = voice.getCurrentVoiceInfo();
      updateVoiceDesc(voiceInfo);
    }

    function updateVoiceDesc(voiceInfo) {
      const descEl = document.getElementById('voice-desc');
      if (voiceInfo) {
        const genderText = voiceInfo.gender === 'female' ? '女声' : (voiceInfo.gender === 'male' ? '男声' : '');
        descEl.textContent = `${voiceInfo.desc || ''} ${genderText ? '· ' + genderText : ''}`;
      } else {
        descEl.textContent = '--';
      }
    }

    function updateSpeed() {
      currentSpeed = parseFloat(document.getElementById('speed-slider').value);
      document.getElementById('speed-value').textContent = currentSpeed.toFixed(1) + 'x';
      if (voice) voice.setSpeed(currentSpeed);
    }

    function updatePitch() {
      currentPitch = parseFloat(document.getElementById('pitch-slider').value);
      document.getElementById('pitch-value').textContent = currentPitch.toFixed(1) + 'x';
      if (voice) voice.setPitch(currentPitch);
    }

    // 语音合成
    async function speakText() {
      if (!voice) return;
      const text = document.getElementById('tts-text').value;
      if (!text.trim()) return;

      try {
        await voice.speak(text, {
          voiceType: currentVoice,
          speed: currentSpeed,
          pitch: currentPitch,
        });
      } catch (e) {
        console.error('播放失败:', e);
      }
    }

    function stopSpeaking() {
      if (voice) {
        voice.stopSpeaking();
      }
    }

    // ===== 唤醒词检测 =====

    async function loadWakeWordConfig() {
      if (!voice) return;

      try {
        const config = await voice.getWakeWordConfig();
        const tagsContainer = document.getElementById('wake-words-tags');
        tagsContainer.innerHTML = '';

        const words = config.wake_words || ['云汐', '你好云汐'];
        words.forEach(word => {
          const tag = document.createElement('span');
          tag.className = 'wake-word-tag';
          tag.textContent = word;
          tagsContainer.appendChild(tag);
        });
      } catch (e) {
        console.error('加载唤醒词配置失败:', e);
      }
    }

    async function startWakeDetection() {
      if (!voice) return;

      const sliceDuration = parseInt(document.getElementById('wake-slice-duration').value) || 2000;
      const autoRecord = document.getElementById('wake-auto-record').checked;

      try {
        addWakeLog('正在启动唤醒词检测...');
        const result = await voice.startWakeWordDetection({
          sliceDuration: sliceDuration,
          autoRecord: autoRecord,
        });

        if (result) {
          document.getElementById('wake-start-btn').disabled = true;
          document.getElementById('wake-stop-btn').disabled = false;

          // 启动计时器
          wakeSeconds = 0;
          wakeTimer = setInterval(() => {
            wakeSeconds++;
            const mins = Math.floor(wakeSeconds / 60).toString().padStart(2, '0');
            const secs = (wakeSeconds % 60).toString().padStart(2, '0');
            document.getElementById('wake-duration').textContent = `运行时长: ${mins}:${secs}`;
          }, 1000);

          addWakeLog('唤醒词检测已启动', 'success');
        }
      } catch (e) {
        addWakeLog('启动失败: ' + e.message, 'error');
      }
    }

    function stopWakeDetection() {
      if (!voice) return;

      voice.stopWakeWordDetection();
      document.getElementById('wake-start-btn').disabled = false;
      document.getElementById('wake-stop-btn').disabled = true;

      // 停止计时器
      if (wakeTimer) {
        clearInterval(wakeTimer);
        wakeTimer = null;
      }
      document.getElementById('wake-duration').textContent = '运行时长: --';

      addWakeLog('唤醒词检测已停止');
    }

    function updateWakeStateDisplay(state) {
      const stateLabel = document.getElementById('wake-state-label');
      const statusText = document.getElementById('wake-status-text');
      const statusDot = document.getElementById('wake-status-dot');
      const wakeDot = document.getElementById('wake-dot');
      const wakeEngine = document.getElementById('wake-engine');

      // 重置样式
      statusText.className = 'wake-status-text';
      statusDot.className = 'status-dot';
      wakeDot.className = 'status-dot';

      const stateMap = {
        idle: { label: '未启动', dotClass: 'offline', engine: '未启动' },
        listening: { label: '监听中', dotClass: 'listening', engine: '运行中' },
        detecting: { label: '检测中', dotClass: 'detecting', engine: '运行中' },
        awake: { label: '已唤醒', dotClass: 'awake', engine: '已唤醒' },
      };

      const info = stateMap[state] || stateMap.idle;
      stateLabel.textContent = info.label;
      statusText.classList.add(state);
      statusDot.classList.add(info.dotClass);
      wakeDot.classList.add(info.dotClass);
      wakeEngine.textContent = info.engine;
    }

    function addWakeLog(text, type = '') {
      const logContainer = document.getElementById('wake-log');
      const now = new Date();
      const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false }) + '.' +
        now.getMilliseconds().toString().padStart(3, '0');

      // 如果是空状态，清除占位符
      if (wakeLogCount === 0) {
        logContainer.innerHTML = '';
      }

      const item = document.createElement('div');
      item.className = 'wake-log-item ' + type;
      item.innerHTML = `
        <span class="wake-log-time">[${timeStr}]</span>
        <span class="wake-log-text">${text}</span>
      `;

      logContainer.appendChild(item);
      logContainer.scrollTop = logContainer.scrollHeight;
      wakeLogCount++;
    }

    function clearWakeLog() {
      const logContainer = document.getElementById('wake-log');
      logContainer.innerHTML = '<div class="wake-log-empty">暂无事件记录</div>';
      wakeLogCount = 0;
    }

    // 启动
    init();
  </script>
</body>
</html>
