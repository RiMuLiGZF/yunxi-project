<!DOCTYPE html>
<html lang="zh-CN" data-theme="review-summary">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>复盘生成器 — 云汐复盘模式</title>
  <link rel="stylesheet" href="./colors_and_type.css">
  <script src="../common/api.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font-family-base);
      font-size: var(--font-size-base);
      color: var(--color-text-primary);
      background: var(--color-page-bg);
    }
    .app-shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .top-bar {
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: var(--color-header-bg); border-bottom: 1px solid var(--color-header-border);
    }
    .back-btn {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      color: var(--color-text-secondary); font-size: 14px; padding: 6px 12px; border-radius: 8px;
      transition: all .2s;
    }
    .back-btn:hover { background: var(--color-hover-bg); color: var(--color-text-primary); }
    .page-title { font-size: 16px; font-weight: 600; }
    .main-body { flex: 1; overflow: auto; padding: 24px; }

    .type-tabs {
      display: flex; gap: 8px; margin-bottom: 24px;
    }
    .type-tab {
      padding: 10px 24px; border-radius: 10px; cursor: pointer;
      background: var(--color-card-bg); border: 1px solid var(--color-border);
      font-size: 14px; font-weight: 500; transition: all .2s;
      display: flex; align-items: center; gap: 8px;
    }
    .type-tab:hover { border-color: var(--color-primary); }
    .type-tab.active {
      background: var(--color-primary-light);
      border-color: var(--color-primary);
      color: var(--color-primary-text);
    }

    .content-grid { display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
    .card {
      background: var(--color-card-bg); border: 1px solid var(--color-border);
      border-radius: 12px; padding: 20px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .card-title { font-size: 15px; font-weight: 600; }

    .editor-area {
      width: 100%; min-height: 400px;
      background: var(--color-page-bg); border: 1px solid var(--color-border);
      border-radius: 10px; padding: 16px; font-size: 14px; line-height: 1.7;
      font-family: inherit; color: var(--color-text-primary);
      outline: none; resize: vertical; white-space: pre-wrap;
    }
    .editor-area:focus { border-color: var(--color-primary); }

    .btn-primary {
      background: var(--color-primary); color: white; border: none; border-radius: 8px;
      padding: 10px 20px; font-size: 14px; cursor: pointer; font-weight: 500; transition: opacity .2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--color-card-bg); color: var(--color-text-primary);
      border: 1px solid var(--color-border); border-radius: 8px;
      padding: 8px 16px; font-size: 13px; cursor: pointer; transition: all .2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-secondary:hover { background: var(--color-hover-bg); }

    .history-list { display: flex; flex-direction: column; gap: 10px; }
    .history-item {
      padding: 12px; border-radius: 8px; border: 1px solid var(--color-border);
      cursor: pointer; transition: all .2s;
    }
    .history-item:hover { background: var(--color-hover-bg); border-color: var(--color-primary-light); }
    .history-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .history-meta { font-size: 11px; color: var(--color-text-tertiary); display: flex; gap: 10px; }

    .template-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .template-item {
      display: flex; align-items: center; gap: 10px; padding: 10px;
      border-radius: 8px; cursor: pointer; transition: all .2s;
    }
    .template-item:hover { background: var(--color-hover-bg); }
    .template-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--color-primary-light); display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .template-name { font-size: 13px; font-weight: 500; }
    .template-desc { font-size: 11px; color: var(--color-text-secondary); }

    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px;
    }
    .stat-item {
      background: var(--color-page-bg); border: 1px solid var(--color-border);
      border-radius: 8px; padding: 12px; text-align: center;
    }
    .stat-value { font-size: 20px; font-weight: 700; color: var(--color-primary-text); }
    .stat-label { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }

    .date-picker {
      padding: 8px 12px; border: 1px solid var(--color-border); border-radius: 8px;
      background: var(--color-card-bg); color: var(--color-text-primary);
      font-size: 13px; outline: none;
    }
    .date-picker:focus { border-color: var(--color-primary); }

    .quality-tag {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 500;
    }
    .quality-tag.high { background: rgba(0,180,42,0.1); color: #00B42A; }
    .quality-tag.medium { background: rgba(255,125,0,0.1); color: #FF7D00; }
    .quality-tag.low { background: rgba(245,63,63,0.1); color: #F53F3F; }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="top-bar">
      <div style="display:flex;align-items:center;gap:16px;">
        <div class="back-btn" onclick="location.href='review-summary.html'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          返回复盘模式
        </div>
        <div class="page-title">复盘生成器</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <input type="date" class="date-picker" id="review-date">
        <button class="btn-secondary" onclick="saveReview()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          保存
        </button>
        <button class="btn-primary" id="generate-btn" onclick="generateReview()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4"/><path d="M12 18v4"/><path d="m4.93 4.93 2.83 2.83"/><path d="m16.24 16.24 2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="m4.93 19.07 2.83-2.83"/><path d="m16.24 7.76 2.83-2.83"/></svg>
          AI 生成
        </button>
      </div>
    </div>
    <div class="main-body">
      <div class="type-tabs">
        <div class="type-tab active" data-type="daily" onclick="switchType('daily')">
          <span>📝</span> 日报
        </div>
        <div class="type-tab" data-type="weekly" onclick="switchType('weekly')">
          <span>📊</span> 周报
        </div>
        <div class="type-tab" data-type="monthly" onclick="switchType('monthly')">
          <span>📅</span> 月报
        </div>
      </div>

      <div class="content-grid">
        <div>
          <div class="card">
            <div class="card-header">
              <div class="card-title" id="editor-title">编辑日报</div>
              <div style="display:flex;gap:8px;align-items:center;">
                <span class="quality-tag high" id="quality-tag">高质量</span>
                <span style="font-size:12px;color:var(--color-text-tertiary);" id="word-count">0 字</span>
              </div>
            </div>
            <textarea class="editor-area" id="review-editor" placeholder="在这里编写你的复盘内容...&#10;&#10;【今日完成】&#10;1. xxx&#10;&#10;【遇到的问题】&#10;xxx&#10;&#10;【心得感悟】&#10;xxx"></textarea>
          </div>
        </div>

        <div>
          <div class="card" style="margin-bottom:20px;">
            <div class="card-title" style="margin-bottom:4px;">📈 复盘统计</div>
            <div class="stats-row">
              <div class="stat-item">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">总复盘数</div>
              </div>
              <div class="stat-item">
                <div class="stat-value" id="stat-streak">0</div>
                <div class="stat-label">连续天数</div>
              </div>
              <div class="stat-item">
                <div class="stat-value" id="stat-words">0</div>
                <div class="stat-label">总字数</div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-title" style="margin-bottom:4px;">📚 复盘模板</div>
            <div class="template-list" id="template-list"></div>
          </div>

          <div class="card" style="margin-top:20px;">
            <div class="card-title" style="margin-bottom:12px;">🕐 历史记录</div>
            <div class="history-list" id="history-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentType = 'daily';
    const typeNames = { daily: '日报', weekly: '周报', monthly: '月报' };

    // 设置默认日期
    document.getElementById('review-date').valueAsDate = new Date();

    // 字数统计
    document.getElementById('review-editor').addEventListener('input', function() {
      const count = this.value.length;
      document.getElementById('word-count').textContent = count + ' 字';
      const quality = count > 500 ? 'high' : count > 200 ? 'medium' : 'low';
      const tag = document.getElementById('quality-tag');
      tag.className = 'quality-tag ' + quality;
      tag.textContent = quality === 'high' ? '高质量' : quality === 'medium' ? '中等' : '待补充';
    });

    function switchType(type) {
      currentType = type;
      document.querySelectorAll('.type-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.type === type);
      });
      document.getElementById('editor-title').textContent = '编辑' + typeNames[type];
      loadHistory();
    }

    async function generateReview() {
      const btn = document.getElementById('generate-btn');
      btn.disabled = true;
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>AI生成中...';

      try {
        const date = document.getElementById('review-date').value;
        const res = await YunxiAPI.request('POST', 'review/generate', {
          type: currentType,
          date: date,
        });
        // 新接口返回生成的内容（不保存）
        const genContent = res.content || (res.data && res.data.content) || '';
        const isAI = res.is_ai_generated !== false && (!res.data || res.data.is_ai_generated !== false);
        document.getElementById('review-editor').value = genContent;
        document.getElementById('review-editor').dispatchEvent(new Event('input'));
        if (isAI) {
          YunxiAPI.showToast(typeNames[currentType] + 'AI生成成功，可编辑后保存', 'success');
        } else {
          YunxiAPI.showToast(typeNames[currentType] + '已生成（模板模式）', 'info');
        }
        loadStats();
        loadHistory();
      } catch (e) {
        // LLM 失败时降级使用本地模板
        try {
          const templates = {
            daily: "【今日完成】\n1. \n2. \n3. \n\n【遇到的问题】\n\n【解决方案】\n\n【明日计划】\n1. \n2. \n\n【心得感悟】\n",
            weekly: "【本周概述】\n\n【重点成果】\n✅ \n✅ \n✅ \n\n【问题挑战】\n⚠️ \n\n【下周计划】\n1. \n2. \n3. \n\n【成长收获】\n",
            monthly: "【工作总览】\n\n【目标达成】\n🎯 \n🎯 \n\n【里程碑】\n🏆 \n🏆 \n\n【反思与改进】\n• \n• \n\n【下月计划】\n1. \n2. \n",
          };
          document.getElementById('review-editor').value = templates[currentType] || templates.daily;
          document.getElementById('review-editor').dispatchEvent(new Event('input'));
          YunxiAPI.showToast('AI暂不可用，已加载模板', 'warning');
        } catch (e2) {
          YunxiAPI.showToast('生成失败: ' + (e.message || '未知错误'), 'error');
        }
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4"/><path d="M12 18v4"/><path d="m4.93 4.93 2.83 2.83"/><path d="m16.24 16.24 2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="m4.93 19.07 2.83-2.83"/><path d="m16.24 7.76 2.83-2.83"/></svg>AI 生成';
      }
    }

    async function saveReview() {
      const content = document.getElementById('review-editor').value;
      if (!content.trim()) {
        YunxiAPI.showToast('内容不能为空', 'warning');
        return;
      }
      try {
        const date = document.getElementById('review-date').value;
        await YunxiAPI.request('POST', 'review/reviews', {
          type: currentType,
          date: date,
          content: content,
        });
        YunxiAPI.showToast('保存成功', 'success');
        loadStats();
        loadHistory();
      } catch (e) {
        YunxiAPI.showToast('保存失败: ' + (e.message || '未知错误'), 'error');
      }
    }

    async function loadStats() {
      try {
        const res = await YunxiAPI.request('GET', 'review/overview');
        const stats = res.data.stats;
        document.getElementById('stat-total').textContent = stats.total_reviews;
        document.getElementById('stat-streak').textContent = stats.streak_days;
      } catch (e) {
        console.error('加载统计失败', e);
      }
    }

    async function loadTemplates() {
      try {
        const res = await YunxiAPI.request('GET', 'review/templates');
        const listEl = document.getElementById('template-list');
        listEl.innerHTML = res.data.map(t => `
          <div class="template-item" onclick="applyTemplate('${t.id}')">
            <div class="template-icon">${t.icon}</div>
            <div>
              <div class="template-name">${t.name}</div>
              <div class="template-desc">${t.description}</div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error('加载模板失败', e);
      }
    }

    function applyTemplate(id) {
      const templates = {
        daily: "【今日完成】\n1. \n2. \n3. \n\n【遇到的问题】\n\n【解决方案】\n\n【明日计划】\n1. \n2. \n\n【心得感悟】\n",
        weekly: "【本周概述】\n\n【重点成果】\n✅ \n✅ \n✅ \n\n【问题挑战】\n⚠️ \n\n【下周计划】\n1. \n2. \n3. \n\n【成长收获】\n",
        monthly: "【工作总览】\n\n【目标达成】\n🎯 \n🎯 \n\n【里程碑】\n🏆 \n🏆 \n\n【反思与改进】\n• \n• \n\n【下月计划】\n1. \n2. \n",
        kpt: "【Keep 保持】\n• \n• \n\n【Problem 问题】\n• \n• \n\n【Try 尝试】\n• \n• \n",
        star: "【Situation 情境】\n\n【Task 任务】\n\n【Action 行动】\n\n【Result 结果】\n",
        growing: "【目标回顾】\n\n【进度评估】\n\n【学到了什么】\n\n【改进方向】\n\n【下一步行动】\n",
      };
      document.getElementById('review-editor').value = templates[id] || templates.daily;
      document.getElementById('review-editor').dispatchEvent(new Event('input'));
      YunxiAPI.showToast('模板已应用', 'success');
    }

    async function loadHistory() {
      try {
        const res = await YunxiAPI.request('GET', `/api/review/reviews?review_type=${currentType}&limit=5`);
        const listEl = document.getElementById('history-list');
        if (res.data.length === 0) {
          listEl.innerHTML = '<div style="color:var(--color-text-tertiary);text-align:center;padding:20px;font-size:12px;">暂无历史记录</div>';
          return;
        }
        listEl.innerHTML = res.data.map(r => `
          <div class="history-item" style="display:flex;justify-content:space-between;align-items:center;" onclick="loadReview(${r.id})">
            <div style="flex:1;">
              <div class="history-title">${r.title}</div>
              <div class="history-meta">
                <span>${r.date}</span>
                <span>${r.word_count} 字</span>
              </div>
            </div>
            <button class="history-delete-btn" data-id="${r.id}" onclick="event.stopPropagation(); deleteReview(${r.id})" style="padding:4px 10px;border:1px solid rgba(245,63,63,0.3);background:transparent;color:#F53F3F;border-radius:6px;font-size:11px;cursor:pointer;flex-shrink:0;transition:all .2s;" onmouseover="this.style.background='rgba(245,63,63,0.08)'" onmouseout="this.style.background='transparent'">
              删除
            </button>
          </div>
        `).join('');
      } catch (e) {
        console.error('加载历史失败', e);
      }
    }

    async function loadReview(id) {
      try {
        const res = await YunxiAPI.request('GET', `/api/review/reviews/${id}`);
        document.getElementById('review-editor').value = res.data.content;
        document.getElementById('review-editor').dispatchEvent(new Event('input'));
        YunxiAPI.showToast('已加载', 'success');
      } catch (e) {
        YunxiAPI.showToast('加载失败', 'error');
      }
    }

    async function deleteReview(id) {
      var confirmed = await YunxiAPI.showConfirm('确定要删除这篇复盘吗？此操作不可恢复。', '删除复盘');
      if (!confirmed) return;
      try {
        await YunxiAPI.request('DELETE', 'review/reviews/' + id);
        YunxiAPI.showToast('删除成功', 'success');
        loadStats();
        loadHistory();
        // 如果当前编辑的是被删除的复盘，清空编辑器
        var editor = document.getElementById('review-editor');
        if (editor && editor.dataset.reviewId == id) {
          editor.value = '';
          editor.dataset.reviewId = '';
          editor.dispatchEvent(new Event('input'));
        }
      } catch (e) {
        YunxiAPI.showToast('删除失败: ' + (e.message || '未知错误'), 'error');
      }
    }

    // 初始化
    loadStats();
    loadTemplates();
    loadHistory();

    // 从 URL 参数读取类型
    const params = new URLSearchParams(window.location.search);
    const typeParam = params.get('type');
    if (typeParam && ['daily', 'weekly', 'monthly'].includes(typeParam)) {
      switchType(typeParam);
    }

    // 添加 spin 动画
    const style = document.createElement('style');
    style.textContent = '@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }';
    document.head.appendChild(style);
  </script>
</body>
</html>
