  # ----------------------------------------------------------
  # Nginx 反向代理（生产环境推荐）
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: yunxi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      yunxi-gateway:
        condition: service_healthy
      yunxi-m0:
        condition: service_healthy
    networks:
      - yunxi-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M
    logging: *common-logging
    restart: unless-stopped
    profiles:
      - nginx

  # ----------------------------------------------------------
  # Prometheus 监控
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: yunxi-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./tools/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - yunxi-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging: *common-logging
    restart: unless-stopped
    profiles:
      - monitoring

  # ----------------------------------------------------------
  # Grafana 可视化
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: yunxi-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./tools/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - yunxi-net
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging: *common-logging
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  redis_data:
    driver: local
  chroma_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  # ollama_data:
  #   driver: local

networks:
  yunxi-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
