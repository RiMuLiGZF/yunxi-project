# ============================================================
# 云汐系统 - Docker Compose 生产环境配置
# 用法: docker compose -f docker-compose.prod.yml up -d
# 说明:
#   - 生产环境专用，包含资源限制、日志配置、安全设置
#   - 使用 yunxi.env.prod 作为环境变量文件
#   - 各服务均配置健康检查和自动重启
#   - 推荐与 nginx 反向代理配合使用
# ============================================================

x-common-logging: &common-logging
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "5"

x-common-restart: &common-restart
  restart: unless-stopped

x-common-healthcheck: &common-healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

services:
  # ----------------------------------------------------------
  # 基础设施服务 - Redis
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: yunxi-redis
    ports:
      - "127.0.0.1:6379:6379"  # 仅绑定本地，不对外暴露
    volumes:
      - redis_data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes --requirepass ${REDIS_PASSWORD:-yunxi-redis-pass}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-yunxi-redis-pass}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-yunxi-redis-pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - yunxi-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging: *common-logging
    restart: unless-stopped

  # ----------------------------------------------------------
  # 基础设施服务 - ChromaDB 向量数据库
  # ----------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: yunxi-chromadb
    ports:
      - "127.0.0.1:8100:8000"  # 仅绑定本地
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_AUTH_CREDENTIALS=${CHROMA_AUTH_TOKEN:-yunxi-chroma-token}
      - CHROMA_SERVER_AUTH_PROVIDER=chromadb.auth.token.TokenAuthServerProvider
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - yunxi-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging: *common-logging
    restart: unless-stopped

  # ----------------------------------------------------------
  # API Gateway - 统一接入层
  # ----------------------------------------------------------
  yunxi-gateway:
    build:
      context: .
      dockerfile: API-Gateway/Dockerfile
    container_name: yunxi-gateway
    ports:
      - "8080:8080"
    env_file:
      - ./config/yunxi.env.prod
    environment:
      - YUNXI_ENV=production
      - GATEWAY_PORT=8080
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_ENABLE_DEV_KEY=false
      - M1_BASE_URL=http://yunxi-m1:8001
      - M2_BASE_URL=http://yunxi-m2:8002
      - M3_BASE_URL=http://yunxi-m3:8003
      - M4_BASE_URL=http://yunxi-m4:8004
      - M5_BASE_URL=http://yunxi-m5:8005
      - M6_BASE_URL=http://yunxi-m6:8006
      - M7_BASE_URL=http://yunxi-m7:8007
      - M8_BASE_URL=http://yunxi-m8:8008
      - M9_BASE_URL=http://yunxi-m9:8009
      - M10_BASE_URL=http://yunxi-m10:8010
      - M11_BASE_URL=http://yunxi-m11:8011
      - M12_BASE_URL=http://yunxi-m12:8012
    depends_on:
      redis:
        condition: service_healthy
      yunxi-m1:
        condition: service_healthy
      yunxi-m2:
        condition: service_healthy
      yunxi-m3:
        condition: service_healthy
      yunxi-m4:
        condition: service_healthy
      yunxi-m5:
        condition: service_healthy
      yunxi-m6:
        condition: service_healthy
      yunxi-m7:
        condition: service_healthy
      yunxi-m8:
        condition: service_healthy
      yunxi-m9:
        condition: service_healthy
      yunxi-m10:
        condition: service_healthy
      yunxi-m11:
        condition: service_healthy
      yunxi-m12:
        condition: service_healthy
    networks:
      - yunxi-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging: *common-logging
    restart: unless-stopped

  # ----------------------------------------------------------
  # M0 主理人管控台
  # ----------------------------------------------------------
  yunxi-m0:
