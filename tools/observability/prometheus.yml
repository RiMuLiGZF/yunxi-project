# ============================================================
# 云汐系统 - Prometheus 采集配置
# 采集所有模块的 /api/v1/metrics 端点（端口 8000-8012）
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ----------------------------------------------------------
  # 云汐系统各模块指标端点
  # ----------------------------------------------------------
  - job_name: "yunxi-m0"
    metrics_path: "/api/v1/metrics"
    static_configs:
      - targets: ["yunxi-m0:8000"]

  - job_name: "yunxi-m1"
    metrics_path: "/api/v1/metrics"
    static_configs:
      - targets: ["yunxi-m1:8001"]

  - job_name: "yunxi-m2"
    metrics_path: "/api/v1/metrics"
    static_configs:
      - targets: ["yunxi-m2:8002"]

  - job_name: "yunxi-m3"
    metrics_path: "/api/v1/metrics"
    static_configs:
      - targets: ["yunxi-m3:8003"]

  - job_name: "yunxi-m4"
    metrics_path: "/api/v1/metrics"
    static_configs:
      - targets: ["yunxi-m4:8004"]

  - job_name: "yunxi-m5"
