# =============================================================================
# Explore Agent 配置文件
# =============================================================================
# 「小探」研究助理 — 基于轻量本地大模型的信息检索专家
#
# 模型: qwen2.5:1.5b（约 1GB 显存，响应速度快）
# 定位: 网页检索、文档搜索、信息摘要、多源整合
# 特点: 轻量快速、零成本、完全本地
# =============================================================================

# ── Agent 基本信息 ──────────────────────────────────────────────────────
agent:
  agent_id: explore_agent_01
  display_name: "小探 研究助理"
  provider: Explore
  adapter_type: explore_agent
  personality: "小探"
  description: |
    信息检索与研究助手，擅长网页检索、文档搜索、信息摘要和多源整合。
    基于轻量大模型，响应快速，零 API 成本，数据完全本地处理。
  capabilities:
    - 网页检索
    - 文档搜索
    - 信息摘要
    - 多源整合
    - 翻译辅助
    - 资料分类
    - 要点提取
    - 文献整理
    - MCP工具调用
    - 快速响应

# ── Ollama 配置 ────────────────────────────────────────────────────────
ollama:
  base_url: "http://localhost:11434"
  model_name: "qwen2.5:1.5b"
  # 检索任务温度适中，既不太随机也不太死板
  temperature: 0.5

# ── MCP 工具配置 ───────────────────────────────────────────────────────
mcp:
  server_url: "http://localhost:8002/mcp/v1"
  enable_tools: true
  # M8 管理令牌（调用 M2 技能需要）
  m8_token: ""

# ── 性能参数 ────────────────────────────────────────────────────────────
performance:
  max_iterations: 5         # 最大工具调用次数
  timeout: 60               # 单次调用超时（秒）
  max_retries: 1            # 失败重试次数
  max_tokens: 1024          # 单次最大输出 token 数（1.5B 输出不宜太长）

# ── 日志与调试 ──────────────────────────────────────────────────────────
logging:
  verbose: false
  log_tool_calls: true
  log_reasoning_trace: false

# =============================================================================
# 使用示例
# =============================================================================
#
# 1. 快速测试：
#    python explore_register.py --test
#
# 2. 注册到联邦系统：
#    python explore_register.py --register
#
# 3. 查看所有 Explore Agent：
#    python explore_register.py --list
#
# 4. 使用自定义模型：
#    python explore_register.py --test --model qwen2.5:1.5b
#
# 5. 注册并测试：
#    python explore_register.py --register --test
#
# =============================================================================
