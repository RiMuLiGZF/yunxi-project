[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs =
    .git
    __pycache__
    .pytest_cache
    node_modules
    reports
    data
    _archive
    _deprecated
    .venv
    venv
    frontend
    docs
    assets
    business
    core
    data
    data_access
    config_sdk
    module_sdk
    perf
    i18n
    health
filterwarnings =
    ignore::DeprecationWarning
asyncio_mode = auto
timeout = 30
