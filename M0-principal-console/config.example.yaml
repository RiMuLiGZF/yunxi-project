# ============================================================
# M0 主理人管控台 - 配置示例
# 复制此文件为 config.yaml 并填入实际配置
# ============================================================

# 服务配置
server:
  host: "0.0.0.0"
  port: 8000
  env: "development"

# 应用信息
app:
  name: "M0 主理人管控台"
  version: "0.1.0"
  description: "云汐系统舰长室 - 主理人专属工作台"

# M8 控制塔连接配置
m8:
  base_url: "http://localhost:8000"
  timeout: 10
  api_prefix: "/api"

# JWT 认证配置（与 M8 保持一致）
jwt:
  secret: "your-jwt-secret-key-change-in-production"
  algorithm: "HS256"
  access_token_expire_minutes: 1440

# 主理人账号（Owner 角色）
principal:
  username: "owner"
  password: "owner123456"

# CORS 配置
cors:
  origins:
    - "http://localhost:8000"
    - "http://127.0.0.1:8000"

# 数据目录
data:
  data_path: "./data"
