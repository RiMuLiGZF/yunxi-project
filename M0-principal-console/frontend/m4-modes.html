<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M4 业务模式 - M0 主理人管控台</title>
    <link rel="stylesheet" href="common/style.css">
    <style>
        .modes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-4);
        }
        .modes-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-3);
            margin-bottom: var(--spacing-5);
        }
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--spacing-4);
        }
        .mode-card {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border-subtle);
            border-radius: var(--radius-lg);
            padding: var(--spacing-4);
            transition: all 0.2s;
            cursor: pointer;
        }
        .mode-card:hover {
            border-color: var(--color-primary);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }
        .mode-card-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-3);
            margin-bottom: var(--spacing-3);
        }
        .mode-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(6,182,212,0.1));
            border: 1px solid rgba(59,130,246,0.2);
        }
        .mode-info h3 {
            margin: 0 0 4px 0;
            font-size: var(--text-lg);
            color: var(--color-text-primary);
        }
        .mode-info p {
            margin: 0;
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
        }
        .mode-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: var(--spacing-3);
            padding-top: var(--spacing-3);
            border-top: 1px solid var(--color-border-subtle);
        }
        .mode-category {
            font-size: var(--text-xs);
            color: var(--color-text-tertiary);
            background: var(--color-bg-tertiary);
            padding: 2px 8px;
            border-radius: var(--radius-sm);
        }
        .mode-priority {
            font-size: var(--text-xs);
            color: var(--color-primary);
            font-family: var(--font-family-mono);
        }
        .proxy-section {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border-subtle);
            border-radius: var(--radius-lg);
            padding: var(--spacing-4);
            margin-bottom: var(--spacing-5);
        }
        .proxy-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-3);
        }
        .proxy-status {
            display: flex;
            align-items: center;
            gap: var(--spacing-2);
        }
        .proxy-mode-badge {
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: var(--text-sm);
            font-weight: 500;
        }
        .proxy-mode-off {
            background: rgba(107, 114, 128, 0.15);
            color: var(--color-text-secondary);
        }
        .proxy-mode-fallback {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }
        .proxy-mode-on {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }
        .proxy-actions {
            display: flex;
            gap: var(--spacing-2);
        }
        .proxy-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-3);
            margin-top: var(--spacing-3);
            padding-top: var(--spacing-3);
            border-top: 1px solid var(--color-border-subtle);
        }
        .proxy-info-item {
            text-align: center;
        }
        .proxy-info-label {
            font-size: var(--text-xs);
            color: var(--color-text-tertiary);
            margin-bottom: 4px;
        }
        .proxy-info-value {
            font-size: var(--text-md);
            color: var(--color-text-primary);
            font-family: var(--font-family-mono);
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">M0</div>
                <div>
                    <div class="sidebar-logo-text">主理人管控台</div>
                    <div class="sidebar-logo-sub">舰长室</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">总览</div>
                <a href="dashboard.html" class="nav-item"><span class="nav-item-icon">◈</span><span>仪表盘</span></a>
                <div class="nav-section">管理</div>
                <a href="modules.html" class="nav-item"><span class="nav-item-icon">▣</span><span>模块管理</span></a>
                <a href="m4-modes.html" class="nav-item active"><span class="nav-item-icon">◇</span><span>M4 业务模式</span></a>
                <a href="config.html" class="nav-item"><span class="nav-item-icon">⚙</span><span>配置中心</span></a>
                <a href="access.html" class="nav-item"><span class="nav-item-icon">⛨</span><span>权限管理</span></a>
                <a href="audit.html" class="nav-item"><span class="nav-item-icon">📋</span><span>审计日志</span></a>
                <div class="nav-section">运维</div>
                <a href="upgrade.html" class="nav-item"><span class="nav-item-icon">⇧</span><span>系统升级</span></a>
                <a href="emergency.html" class="nav-item"><span class="nav-item-icon">⚠</span><span>紧急操作</span></a>
                <div class="nav-section">主理人</div>
                <a href="tools.html" class="nav-item"><span class="nav-item-icon">🛠</span><span>专属工具</span></a>
            </nav>
            <div class="sidebar-footer">v0.1.0 · 云汐系统</div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-title">M4 业务模式管理</div>
                <div class="topbar-actions">
                    <span class="badge badge-success"><span class="status-dot running"></span>系统正常</span>
                    <button class="btn btn-secondary btn-sm" onclick="refreshModes()">刷新</button>
                </div>
            </header>

            <div class="content-area">
                <!-- M8 流量切换控制 -->
                <div class="proxy-section">
                    <div class="proxy-header">
                        <div>
                            <h3 style="margin: 0 0 4px 0;">M8 → M4 流量切换</h3>
                            <p style="margin: 0; font-size: var(--text-sm); color: var(--color-text-secondary);">
                                控制 M8 管控台的业务请求是否代理到 M4 场景引擎
                            </p>
                        </div>
                        <div class="proxy-status">
                            <span>当前模式:</span>
                            <span id="proxyModeBadge" class="proxy-mode-badge proxy-mode-off">检测中...</span>
                        </div>
                    </div>
                    <div class="proxy-actions">
                        <button class="btn btn-secondary btn-sm" onclick="setProxyMode('off')">关闭代理</button>
                        <button class="btn btn-warning btn-sm" onclick="setProxyMode('fallback')">兼容模式 (fallback)</button>
                        <button class="btn btn-primary btn-sm" onclick="setProxyMode('on')">强制代理 (on)</button>
                    </div>
                    <div class="proxy-info">
                        <div class="proxy-info-item">
                            <div class="proxy-info-label">M4 地址</div>
                            <div id="m4Url" class="proxy-info-value">-</div>
                        </div>
                        <div class="proxy-info-item">
                            <div class="proxy-info-label">超时时间</div>
                            <div id="m4Timeout" class="proxy-info-value">-</div>
                        </div>
                        <div class="proxy-info-item">
                            <div class="proxy-info-label">代理路径数</div>
                            <div id="m4PathCount" class="proxy-info-value">-</div>
                        </div>
                    </div>
                </div>

                <!-- 统计卡片 -->
                <div class="modes-stats">
                    <div class="stat-card">
                        <div class="stat-value" id="totalModes">-</div>
                        <div class="stat-label">业务模式总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="enabledModes">-</div>
                        <div class="stat-label">已启用模式</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="categoryCount">-</div>
                        <div class="stat-label">模式分类</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="m4Status">-</div>
                        <div class="stat-label">M4 状态</div>
                    </div>
                </div>

                <!-- 模式列表 -->
                <div class="modes-header">
                    <h3 style="margin: 0;">全部业务模式</h3>
                </div>
                <div id="modeGrid" class="mode-grid">
                    <!-- 模式卡片将通过 JS 动态生成 -->
                    <div class="loading-skeleton" style="height: 120px;"></div>
                    <div class="loading-skeleton" style="height: 120px;"></div>
                    <div class="loading-skeleton" style="height: 120px;"></div>
                    <div class="loading-skeleton" style="height: 120px;"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // API 基础地址（M8 管控台）
        const M8_BASE_URL = localStorage.getItem('m0_m8_url') || 'http://localhost:8008';
        const M4_BASE_URL = localStorage.getItem('m0_m4_url') || 'http://localhost:8004';

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadProxyStatus();
            loadModes();
        });

        // 鉴权检查
        function checkAuth() {
            const token = localStorage.getItem('m0_token');
            if (!token) {
                window.location.href = 'login.html';
            }
        }

        // 加载代理状态
        async function loadProxyStatus() {
            try {
                const response = await fetch(`${M8_BASE_URL}/api/m4-gateway/business-proxy/status`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('m0_token')}`,
                    },
                });
                const result = await response.json();
                if (result.code === 0 && result.data) {
                    updateProxyStatusUI(result.data);
                }
            } catch (e) {
                console.error('加载代理状态失败:', e);
                document.getElementById('proxyModeBadge').textContent = '未知';
                document.getElementById('proxyModeBadge').className = 'proxy-mode-badge proxy-mode-off';
            }
        }

        // 更新代理状态 UI
        function updateProxyStatusUI(data) {
            const badge = document.getElementById('proxyModeBadge');
            const mode = data.mode || 'off';
            const modeMap = {
                'off': { text: '关闭代理', class: 'proxy-mode-off' },
                'fallback': { text: '兼容模式', class: 'proxy-mode-fallback' },
                'on': { text: '强制代理', class: 'proxy-mode-on' },
            };
            const info = modeMap[mode] || modeMap['off'];
            badge.textContent = info.text;
            badge.className = `proxy-mode-badge ${info.class}`;

            document.getElementById('m4Url').textContent = data.m4_base_url || '-';
            document.getElementById('m4Timeout').textContent = data.timeout ? data.timeout + 's' : '-';
            document.getElementById('m4PathCount').textContent = data.business_paths ? data.business_paths.length : '-';
        }

        // 设置代理模式
        async function setProxyMode(mode) {
            if (!confirm(`确定要切换到"${mode}"模式吗？\n\n` +
                (mode === 'off' ? '关闭后所有业务请求将使用 M8 本地实现。' :
                 mode === 'fallback' ? '兼容模式下优先使用 M4，M4 不可用时自动回退到本地。' :
                 '强制模式下所有业务请求都走 M4，M4 不可用时返回 503 错误。'))) {
                return;
            }

            try {
                const response = await fetch(`${M8_BASE_URL}/api/m4-gateway/business-proxy/mode?mode=${mode}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('m0_token')}`,
                    },
                });
                const result = await response.json();
                if (result.code === 0) {
                    showToast(`已切换到 ${mode} 模式`, 'success');
                    loadProxyStatus();
                } else {
                    showToast(result.message || '切换失败', 'error');
                }
            } catch (e) {
                showToast('切换失败: ' + e.message, 'error');
            }
        }

        // 加载业务模式列表
        async function loadModes() {
            try {
                const response = await fetch(`${M4_BASE_URL}/api/v1/modes`);
                const result = await response.json();
                if (result.code === 0 && result.data) {
                    renderModes(result.data.modes || result.data);
                    updateStats(result.data.modes || result.data);
                    document.getElementById('m4Status').textContent = '运行中';
                    document.getElementById('m4Status').style.color = 'var(--color-success)';
                } else {
                    throw new Error(result.message || '加载失败');
                }
            } catch (e) {
                console.error('加载模式列表失败:', e);
                document.getElementById('m4Status').textContent = '离线';
                document.getElementById('m4Status').style.color = 'var(--color-danger)';
                document.getElementById('modeGrid').innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1; text-align: center; padding: 40px;">
                        <div style="font-size: 48px; margin-bottom: 16px;">📡</div>
                        <p style="color: var(--color-text-secondary);">M4 场景引擎暂不可用</p>
                        <p style="font-size: var(--text-sm); color: var(--color-text-tertiary);">${e.message}</p>
                    </div>
                `;
            }
        }

        // 更新统计数据
        function updateStats(modes) {
            const total = modes.length;
            const enabled = modes.filter(m => m.is_enabled !== false).length;
            const categories = new Set(modes.map(m => m.category || 'default'));

            document.getElementById('totalModes').textContent = total;
            document.getElementById('enabledModes').textContent = enabled;
            document.getElementById('categoryCount').textContent = categories.size;
        }

        // 渲染模式卡片
        function renderModes(modes) {
            const grid = document.getElementById('modeGrid');
            const categoryNames = {
                'growth': '成长',
                'work': '工作',
                'review': '复盘',
                'study': '学业',
                'life': '生活',
                'social': '社交',
                'emotion': '情绪',
                'appearance': '形象',
            };

            grid.innerHTML = modes.map(mode => `
                <div class="mode-card" onclick="enterMode('${mode.mode_id}')">
                    <div class="mode-card-header">
                        <div class="mode-icon">${mode.icon || '◆'}</div>
                        <div class="mode-info">
                            <h3>${mode.mode_name || mode.mode_id}</h3>
                            <p>${mode.mode_description || '点击进入模式'}</p>
                        </div>
                    </div>
                    <div class="mode-meta">
                        <span class="mode-category">${categoryNames[mode.category] || mode.category || '未分类'}</span>
                        <span class="mode-priority">优先级 ${mode.priority || '-'}</span>
                    </div>
                </div>
            `).join('');
        }

        // 进入模式
        function enterMode(modeId) {
            // 在新标签页打开 M4 对应模式
            const modePages = {
                'growth': 'growth.html',
                'work_dev': 'work.html',
                'review': 'review.html',
                'study_plan': 'study.html',
                'life_management': 'life.html',
                'social_relation': 'social.html',
                'emotion_comfort': 'emotion.html',
                'appearance': 'appearance.html',
            };
            const page = modePages[modeId] || 'index.html';
            window.open(`${M4_BASE_URL}/${page}`, '_blank');
        }

        // 刷新
        function refreshModes() {
            loadProxyStatus();
            loadModes();
            showToast('已刷新', 'success');
        }

        // Toast 提示
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 12px 20px;
                border-radius: 8px;
                color: white;
                font-size: 14px;
                z-index: 9999;
                animation: slideIn 0.3s ease;
                background: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#3b82f6'};
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
