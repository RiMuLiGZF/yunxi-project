<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紧急操作中心 - M0 主理人管控台</title>
    <link rel="stylesheet" href="common/style.css">
    <style>
        .emergency-status {
            padding: var(--spacing-6);
            border-radius: var(--radius-lg);
            text-align: center;
            margin-bottom: var(--spacing-6);
            transition: all var(--transition-normal);
        }
        .emergency-status.normal {
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .emergency-status.locked {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.3);
            animation: emergency-pulse 2s infinite;
        }
        @keyframes emergency-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2); }
            50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        }
        .status-icon {
            font-size: 3rem;
            margin-bottom: var(--spacing-3);
        }
        .status-title {
            font-size: var(--text-2xl);
            font-weight: 700;
            margin-bottom: var(--spacing-2);
        }
        .normal .status-title { color: var(--state-success); }
        .locked .status-title { color: var(--state-error); }
        .status-desc {
            color: var(--color-text-secondary);
            font-size: var(--text-sm);
        }
        .emergency-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-4);
        }
        .emergency-card {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-lg);
            padding: var(--spacing-5);
            transition: all var(--transition-normal);
        }
        .emergency-card:hover {
            transform: translateY(-2px);
        }
        .emergency-card.critical {
            border-color: rgba(239, 68, 68, 0.4);
        }
        .emergency-card.critical:hover {
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }
        .emergency-card.high {
            border-color: rgba(245, 158, 11, 0.4);
        }
        .emergency-card.high:hover {
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
        }
        .danger-level {
            display: inline-block;
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 500;
            margin-bottom: var(--spacing-3);
        }
        .danger-level.critical {
            background: rgba(239, 68, 68, 0.15);
            color: var(--state-error);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .danger-level.high {
            background: rgba(245, 158, 11, 0.15);
            color: var(--state-warning);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .danger-level.medium {
            background: rgba(59, 130, 246, 0.15);
            color: var(--color-primary);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .danger-level.low {
            background: rgba(16, 185, 129, 0.15);
            color: var(--state-success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .emergency-name {
            font-size: var(--text-lg);
            font-weight: 600;
            margin-bottom: var(--spacing-2);
            color: var(--color-text-primary);
        }
        .emergency-desc {
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-4);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">M0</div>
                <div>
                    <div class="sidebar-logo-text">主理人管控台</div>
                    <div class="sidebar-logo-sub">舰长室</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">总览</div>
                <a href="dashboard.html" class="nav-item"><span class="nav-item-icon">◈</span><span>仪表盘</span></a>
                <div class="nav-section">管理</div>
                <a href="modules.html" class="nav-item"><span class="nav-item-icon">▣</span><span>模块管理</span></a>
                <a href="config.html" class="nav-item"><span class="nav-item-icon">⚙</span><span>配置中心</span></a>
                <a href="access.html" class="nav-item"><span class="nav-item-icon">⛨</span><span>权限管理</span></a>
                <a href="audit.html" class="nav-item"><span class="nav-item-icon">📋</span><span>审计日志</span></a>
                <div class="nav-section">运维</div>
                <a href="upgrade.html" class="nav-item"><span class="nav-item-icon">⇧</span><span>系统升级</span></a>
                <a href="emergency.html" class="nav-item active"><span class="nav-item-icon">⚠</span><span>紧急操作</span></a>
                <div class="nav-section">主理人</div>
                <a href="tools.html" class="nav-item"><span class="nav-item-icon">🛠</span><span>专属工具</span></a>
            </nav>
            <div class="sidebar-footer">v0.1.0 · 云汐系统</div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-title">紧急操作中心</div>
                <div class="topbar-actions">
                    <div class="user-info" onclick="handleLogout()">
                        <div class="user-avatar">主</div>
                        <div class="user-details">
                            <span class="user-name">主理人</span>
                            <span class="user-role">Owner</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <h1 class="page-title">紧急操作中心</h1>
                    <p class="page-subtitle">系统级紧急操作，请谨慎使用</p>
                </div>

                <!-- 系统状态 -->
                <div class="emergency-status normal" id="emergencyStatus">
                    <div class="status-icon" id="statusIcon">✓</div>
                    <div class="status-title" id="statusTitle">系统运行正常</div>
                    <div class="status-desc" id="statusDesc">所有服务运行正常，无紧急状态</div>
                </div>

                <!-- 紧急操作列表 -->
                <h3 style="margin-bottom: var(--spacing-4); color: var(--color-text-primary);">可用操作</h3>
                <div class="emergency-grid" id="emergencyGrid">
                    <!-- 由 JS 动态渲染 -->
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        function getToken() { return localStorage.getItem('m0_token'); }
        function checkAuth() { if (!getToken()) { window.location.href='login.html'; return false; } return true; }
        function showToast(msg, type='info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t);
            setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(100%)'; t.style.transition='all 0.3s ease'; setTimeout(()=>t.remove(), 300); }, 3000);
        }
        function handleLogout() { if (confirm('确定要登出吗？')) { localStorage.clear(); window.location.href='login.html'; } }

        async function apiRequest(url, options={}) {
            const token = getToken();
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const res = await fetch(url, { ...options, headers });
            if (res.status === 401) { localStorage.clear(); window.location.href='login.html'; throw new Error('Unauthorized'); }
            return res.json();
        }

        async function loadEmergencyStatus() {
            try {
                const result = await apiRequest('/api/emergency/status');
                if (result.code === 0 && result.data) {
                    updateStatusUI(result.data);
                }
            } catch (err) { console.error(err); }
        }

        function updateStatusUI(data) {
            const statusEl = document.getElementById('emergencyStatus');
            const iconEl = document.getElementById('statusIcon');
            const titleEl = document.getElementById('statusTitle');
            const descEl = document.getElementById('statusDesc');

            if (data.locked) {
                statusEl.className = 'emergency-status locked';
                iconEl.textContent = '⛔';
                titleEl.textContent = '系统已紧急锁定';
                descEl.textContent = `锁定人: ${data.locked_by} | 原因: ${data.lock_reason || '未说明'}`;
            } else {
                statusEl.className = 'emergency-status normal';
                iconEl.textContent = '✓';
                titleEl.textContent = '系统运行正常';
                descEl.textContent = '所有服务运行正常，无紧急状态';
            }
        }

        async function loadEmergencyActions() {
            try {
                const result = await apiRequest('/api/emergency/actions');
                if (result.code === 0 && result.data) {
                    renderActions(result.data);
                }
            } catch (err) { console.error(err); }
        }

        function renderActions(actions) {
            const grid = document.getElementById('emergencyGrid');
            const iconMap = {
                lockdown: '🔒',
                stop_all_modules: '⏹',
                reset_sessions: '🔄',
                emergency_backup: '💾',
            };
            const btnMap = {
                lockdown: { text: '立即锁定', cls: 'btn-danger', action: doLockdown },
                unlock: { text: '解除锁定', cls: 'btn-success', action: doUnlock },
                stop_all_modules: { text: '一键关停', cls: 'btn-danger', action: doStopAll },
                reset_sessions: { text: '重置会话', cls: 'btn-warning', action: doResetSessions },
                emergency_backup: { text: '立即备份', cls: 'btn-primary', action: doBackup },
            };

            grid.innerHTML = actions.map(a => {
                const btnInfo = btnMap[a.key] || { text: '执行', cls: 'btn-secondary', action: () => showToast('功能开发中', 'info') };
                return `
                <div class="emergency-card ${a.danger_level}">
                    <span class="danger-level ${a.danger_level}">${
                        {critical: '严重', high: '高危', medium: '中等', low: '低危'}[a.danger_level] || a.danger_level
                    }</span>
                    <div class="emergency-name">${iconMap[a.key] || '⚙'} ${a.name}</div>
                    <div class="emergency-desc">${a.description}</div>
                    <button class="btn ${btnInfo.cls} btn-block" onclick="handleAction('${a.key}')">
                        ${btnInfo.text}
                    </button>
                </div>
                `;
            }).join('');
        }

        async function handleAction(key) {
            switch(key) {
                case 'lockdown': return doLockdown();
                case 'stop_all_modules': return doStopAll();
                case 'reset_sessions': return doResetSessions();
                case 'emergency_backup': return doBackup();
                default: showToast('功能开发中', 'info');
            }
        }

        async function doLockdown() {
            const reason = prompt('请输入锁定原因：');
            if (reason === null) return;
            if (!confirm('⚠ 确认执行系统紧急锁定？\n\n锁定后所有非 Owner 用户将无法访问系统！')) return;

            try {
                const result = await apiRequest('/api/emergency/lockdown', {
                    method: 'POST',
                    body: JSON.stringify({ action: 'lockdown', reason, operator: 'owner' })
                });
                if (result.code === 0) {
                    showToast('系统已紧急锁定', 'success');
                    loadEmergencyStatus();
                } else {
                    showToast(result.message || '操作失败', 'error');
                }
            } catch (err) {
                showToast('操作失败', 'error');
            }
        }

        async function doUnlock() {
            if (!confirm('确认解除系统锁定？')) return;
            try {
                const result = await apiRequest('/api/emergency/unlock', {
                    method: 'POST',
                    body: JSON.stringify({ action: 'unlock', reason: '手动解除', operator: 'owner' })
                });
                if (result.code === 0) {
                    showToast('系统已解除锁定', 'success');
                    loadEmergencyStatus();
                    loadEmergencyActions();
                }
            } catch (err) {
                showToast('操作失败', 'error');
            }
        }

        async function doStopAll() {
            if (!confirm('⚠ 确认一键关停所有业务模块？\n\n这将停止所有业务模块，仅保留核心服务！')) return;
            try {
                const result = await apiRequest('/api/emergency/stop-all-modules', {
                    method: 'POST',
                    body: JSON.stringify({ action: 'stop_all_modules', reason: '紧急关停', operator: 'owner' })
                });
                if (result.code === 0) {
                    showToast('关停指令已发送', 'success');
                } else {
                    showToast(result.message || '操作失败', 'error');
                }
            } catch (err) {
                showToast('操作失败', 'error');
            }
        }

        async function doResetSessions() {
            if (!confirm('确认重置所有用户会话？\n\n所有用户将被强制下线。')) return;
            try {
                const result = await apiRequest('/api/emergency/reset-sessions', {
                    method: 'POST',
                    body: JSON.stringify({ action: 'reset_sessions', reason: '重置会话', operator: 'owner' })
                });
                if (result.code === 0) {
                    showToast('所有会话已重置', 'success');
                }
            } catch (err) {
                showToast('操作失败', 'error');
            }
        }

        async function doBackup() {
            showToast('备份任务已启动', 'success');
        }

        if (checkAuth()) {
            loadEmergencyStatus();
            loadEmergencyActions();
        }
    </script>
</body>
</html>
