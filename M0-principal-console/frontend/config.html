<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置中心 - M0 主理人管控台</title>
    <link rel="stylesheet" href="common/style.css">
    <style>
        .config-layout {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: var(--spacing-4);
            min-height: 60vh;
        }
        .config-categories {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-lg);
            padding: var(--spacing-3);
            height: fit-content;
        }
        .category-item {
            padding: var(--spacing-2) var(--spacing-3);
            border-radius: var(--radius-md);
            cursor: pointer;
            color: var(--color-text-secondary);
            font-size: var(--text-sm);
            transition: all var(--transition-fast);
            margin-bottom: 2px;
        }
        .category-item:hover {
            background: rgba(59, 130, 246, 0.08);
            color: var(--color-text-primary);
        }
        .category-item.active {
            background: rgba(59, 130, 246, 0.15);
            color: var(--color-primary);
            font-weight: 500;
        }
        .category-item-count {
            float: right;
            font-size: var(--text-xs);
            color: var(--color-text-tertiary);
        }
        .config-content {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-lg);
            padding: var(--spacing-5);
        }
        .config-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-3) 0;
            border-bottom: 1px solid var(--color-border-subtle);
        }
        .config-row:last-child { border-bottom: none; }
        .config-info { flex: 1; }
        .config-key-name {
            font-weight: 500;
            color: var(--color-text-primary);
            margin-bottom: 2px;
        }
        .config-key-desc {
            font-size: var(--text-xs);
            color: var(--color-text-tertiary);
        }
        .config-value-edit {
            display: flex;
            align-items: center;
            gap: var(--spacing-2);
            min-width: 200px;
        }
        .config-value-text {
            font-family: var(--font-family-mono);
            font-size: var(--text-sm);
            color: var(--color-text-accent);
            padding: var(--spacing-1) var(--spacing-2);
            background: rgba(59, 130, 246, 0.08);
            border-radius: var(--radius-sm);
        }
        @media (max-width: 768px) {
            .config-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">M0</div>
                <div>
                    <div class="sidebar-logo-text">主理人管控台</div>
                    <div class="sidebar-logo-sub">舰长室</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">总览</div>
                <a href="dashboard.html" class="nav-item"><span class="nav-item-icon">◈</span><span>仪表盘</span></a>
                <div class="nav-section">管理</div>
                <a href="modules.html" class="nav-item"><span class="nav-item-icon">▣</span><span>模块管理</span></a>
                <a href="config.html" class="nav-item active"><span class="nav-item-icon">⚙</span><span>配置中心</span></a>
                <a href="access.html" class="nav-item"><span class="nav-item-icon">⛨</span><span>权限管理</span></a>
                <a href="audit.html" class="nav-item"><span class="nav-item-icon">📋</span><span>审计日志</span></a>
                <div class="nav-section">运维</div>
                <a href="upgrade.html" class="nav-item"><span class="nav-item-icon">⇧</span><span>系统升级</span></a>
                <a href="emergency.html" class="nav-item"><span class="nav-item-icon">⚠</span><span>紧急操作</span></a>
                <div class="nav-section">主理人</div>
                <a href="tools.html" class="nav-item"><span class="nav-item-icon">🛠</span><span>专属工具</span></a>
            </nav>
            <div class="sidebar-footer">v0.1.0 · 云汐系统</div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-title">配置中心</div>
                <div class="topbar-actions">
                    <button class="btn btn-sm btn-danger" onclick="resetConfig()">重置配置</button>
                    <div class="user-info" onclick="handleLogout()">
                        <div class="user-avatar">主</div>
                        <div class="user-details">
                            <span class="user-name">主理人</span>
                            <span class="user-role">Owner</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <h1 class="page-title">全局配置中心</h1>
                    <p class="page-subtitle">管理云汐系统的全局配置项</p>
                </div>

                <div class="config-layout">
                    <!-- 左侧分类 -->
                    <div class="config-categories" id="categoryList">
                        <div style="padding: var(--spacing-2) var(--spacing-3); font-size: var(--text-xs); color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: var(--spacing-2);">配置分类</div>
                    </div>

                    <!-- 右侧配置项 -->
                    <div class="config-content">
                        <div id="configItems" style="min-height: 300px;">
                            <div style="text-align:center;padding:4rem;color:var(--color-text-tertiary);">请选择一个配置分类</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        function getToken() { return localStorage.getItem('m0_token'); }
        function checkAuth() { if (!getToken()) { window.location.href = 'login.html'; return false; } return true; }
        function showToast(msg, type='info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t);
            setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(100%)'; t.style.transition='all 0.3s ease'; setTimeout(()=>t.remove(), 300); }, 3000);
        }
        function handleLogout() { if (confirm('确定要登出吗？')) { localStorage.clear(); window.location.href='login.html'; } }

        async function apiRequest(url, options={}) {
            const token = getToken();
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const res = await fetch(url, { ...options, headers });
            if (res.status === 401) { localStorage.clear(); window.location.href='login.html'; throw new Error('Unauthorized'); }
            return res.json();
        }

        let currentCategory = '';
        let categoriesData = [];

        async function loadCategories() {
            try {
                const result = await apiRequest('/api/config/categories');
                if (result.code === 0 && result.data) {
                    categoriesData = result.data;
                    renderCategories();
                    if (result.data.length > 0) {
                        selectCategory(result.data[0].key);
                    }
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderCategories() {
            const list = document.getElementById('categoryList');
            const items = categoriesData.map(cat => `
                <div class="category-item ${cat.key === currentCategory ? 'active' : ''}" onclick="selectCategory('${cat.key}')">
                    ${cat.name}
                    <span class="category-item-count">${cat.item_count || 0}</span>
                </div>
            `).join('');
            list.innerHTML += items;
        }

        async function selectCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-item').forEach(el => {
                el.classList.toggle('active', el.textContent.trim().startsWith(
                    categoriesData.find(c => c.key === category)?.name || ''
                ));
            });

            // 更新选中状态
            const allItems = document.querySelectorAll('.category-item');
            allItems.forEach((el, idx) => {
                el.classList.toggle('active', categoriesData[idx]?.key === category);
            });

            try {
                const result = await apiRequest(`/api/config/${category}`);
                if (result.code === 0 && result.data) {
                    renderConfigItems(result.data, category);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderConfigItems(items, category) {
            const container = document.getElementById('configItems');
            const keys = Object.keys(items);
            if (keys.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:4rem;color:var(--color-text-tertiary);">该分类暂无配置项</div>';
                return;
            }

            container.innerHTML = keys.map(key => {
                const item = items[key];
                const value = item.value !== undefined ? item.value : item;
                const desc = item.description || '';
                return `
                <div class="config-row">
                    <div class="config-info">
                        <div class="config-key-name">${key}</div>
                        <div class="config-key-desc">${desc || '暂无描述'}</div>
                    </div>
                    <div class="config-value-edit">
                        <span class="config-value-text">${typeof value === 'object' ? JSON.stringify(value) : String(value)}</span>
                        <button class="btn btn-sm btn-secondary" onclick="editConfig('${category}', '${key}')">编辑</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        async function editConfig(category, key) {
            const result = await apiRequest(`/api/config/${category}`);
            if (result.code !== 0) return;
            const items = result.data;
            const currentValue = items[key]?.value ?? items[key] ?? '';
            const displayValue = typeof currentValue === 'object' ? JSON.stringify(currentValue) : String(currentValue);

            const newValue = prompt(`编辑配置项: ${key}`, displayValue);
            if (newValue === null) return;

            try {
                // 尝试解析 JSON
                let parsedValue = newValue;
                try { parsedValue = JSON.parse(newValue); } catch(e) { /* 保持字符串 */ }

                const updateResult = await apiRequest(`/api/config?category=${category}`, {
                    method: 'PUT',
                    body: JSON.stringify({ key, value: parsedValue })
                });

                if (updateResult.code === 0) {
                    showToast('配置更新成功', 'success');
                    selectCategory(category);
                } else {
                    showToast(updateResult.message || '更新失败', 'error');
                }
            } catch (err) {
                showToast('操作失败', 'error');
            }
        }

        async function resetConfig() {
            if (!confirm('确定要重置所有配置为默认值吗？此操作不可撤销！')) return;
            try {
                const result = await apiRequest('/api/config/reset', { method: 'POST' });
                if (result.code === 0) {
                    showToast('配置已重置为默认值', 'success');
                    loadCategories();
                } else {
                    showToast(result.message || '重置失败', 'error');
                }
            } catch (err) {
                showToast('操作失败', 'error');
            }
        }

        if (checkAuth()) loadCategories();
    </script>
</body>
</html>
