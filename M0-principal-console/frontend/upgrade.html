<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统升级 - M0 主理人管控台</title>
    <link rel="stylesheet" href="common/style.css">
    <style>
        .version-card {
            text-align: center;
            padding: var(--spacing-8);
        }
        .version-number {
            font-size: 3rem;
            font-weight: 700;
            background: var(--color-gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: var(--font-family-mono);
            margin-bottom: var(--spacing-2);
        }
        .version-label {
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-6);
        }
        .history-item {
            display: flex;
            gap: var(--spacing-4);
            padding: var(--spacing-4);
            border-bottom: 1px solid var(--color-border-subtle);
            position: relative;
        }
        .history-item:last-child { border-bottom: none; }
        .history-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--color-primary);
            margin-top: 6px;
            flex-shrink: 0;
            box-shadow: 0 0 8px var(--color-primary);
        }
        .history-item.current .history-indicator {
            background: var(--state-success);
            box-shadow: 0 0 8px var(--state-success);
        }
        .history-content { flex: 1; }
        .history-version {
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 4px;
        }
        .history-date {
            font-size: var(--text-xs);
            color: var(--color-text-tertiary);
            margin-bottom: var(--spacing-2);
        }
        .history-notes {
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
            line-height: 1.6;
        }
        .change-list {
            margin-top: var(--spacing-2);
            padding-left: var(--spacing-4);
        }
        .change-list li {
            font-size: var(--text-xs);
            color: var(--color-text-tertiary);
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">M0</div>
                <div>
                    <div class="sidebar-logo-text">主理人管控台</div>
                    <div class="sidebar-logo-sub">舰长室</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">总览</div>
                <a href="dashboard.html" class="nav-item"><span class="nav-item-icon">◈</span><span>仪表盘</span></a>
                <div class="nav-section">管理</div>
                <a href="modules.html" class="nav-item"><span class="nav-item-icon">▣</span><span>模块管理</span></a>
                <a href="config.html" class="nav-item"><span class="nav-item-icon">⚙</span><span>配置中心</span></a>
                <a href="access.html" class="nav-item"><span class="nav-item-icon">⛨</span><span>权限管理</span></a>
                <a href="audit.html" class="nav-item"><span class="nav-item-icon">📋</span><span>审计日志</span></a>
                <div class="nav-section">运维</div>
                <a href="upgrade.html" class="nav-item active"><span class="nav-item-icon">⇧</span><span>系统升级</span></a>
                <a href="emergency.html" class="nav-item"><span class="nav-item-icon">⚠</span><span>紧急操作</span></a>
                <div class="nav-section">主理人</div>
                <a href="tools.html" class="nav-item"><span class="nav-item-icon">🛠</span><span>专属工具</span></a>
            </nav>
            <div class="sidebar-footer">v0.1.0 · 云汐系统</div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-title">系统升级</div>
                <div class="topbar-actions">
                    <button class="btn btn-sm btn-primary" onclick="checkUpgrade()">检查更新</button>
                    <div class="user-info" onclick="handleLogout()">
                        <div class="user-avatar">主</div>
                        <div class="user-details">
                            <span class="user-name">主理人</span>
                            <span class="user-role">Owner</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <h1 class="page-title">系统升级与回滚</h1>
                    <p class="page-subtitle">管理云汐系统的版本升级和回滚操作</p>
                </div>

                <div class="stats-grid" style="grid-template-columns: 1fr 1fr;">
                    <!-- 当前版本 -->
                    <div class="card version-card">
                        <div style="font-size: var(--text-sm); color: var(--color-text-secondary); margin-bottom: var(--spacing-2);">当前版本</div>
                        <div class="version-number" id="currentVersion">0.1.0</div>
                        <div class="version-label">M0 Principal Console</div>
                        <div style="display: flex; gap: var(--spacing-3); justify-content: center;">
                            <span class="badge badge-success"><span class="status-dot running"></span>运行正常</span>
                            <span class="badge badge-info" id="lastCheck">上次检查: -</span>
                        </div>
                    </div>

                    <!-- 最新版本 -->
                    <div class="card version-card">
                        <div style="font-size: var(--text-sm); color: var(--color-text-secondary); margin-bottom: var(--spacing-2);">最新版本</div>
                        <div class="version-number" id="latestVersion" style="font-size: 2rem; color: var(--color-text-secondary); -webkit-text-fill-color: var(--color-text-tertiary);">检查中...</div>
                        <div class="version-label" id="upgradeStatus">点击检查更新</div>
                        <button class="btn btn-primary" id="upgradeBtn" onclick="performUpgrade()" disabled style="margin-top: var(--spacing-3);">
                            立即升级
                        </button>
                    </div>
                </div>

                <!-- 版本历史 -->
                <div class="card" style="margin-top: var(--spacing-6);">
                    <div class="card-header">
                        <h2 class="card-title">版本历史</h2>
                        <span class="badge badge-info" id="historyCount">共 0 个版本</span>
                    </div>
                    <div id="versionHistory"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        function getToken() { return localStorage.getItem('m0_token'); }
        function checkAuth() { if (!getToken()) { window.location.href='login.html'; return false; } return true; }
        function showToast(msg, type='info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t);
            setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(100%)'; t.style.transition='all 0.3s ease'; setTimeout(()=>t.remove(), 300); }, 3000);
        }
        function handleLogout() { if (confirm('确定要登出吗？')) { localStorage.clear(); window.location.href='login.html'; } }

        async function apiRequest(url, options={}) {
            const token = getToken();
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const res = await fetch(url, { ...options, headers });
            if (res.status === 401) { localStorage.clear(); window.location.href='login.html'; throw new Error('Unauthorized'); }
            return res.json();
        }

        async function loadVersionInfo() {
            try {
                const result = await apiRequest('/api/upgrade/version');
                if (result.code === 0 && result.data) {
                    document.getElementById('currentVersion').textContent = result.data.current_version;
                    if (result.data.last_check_time) {
                        document.getElementById('lastCheck').textContent =
                            '上次检查: ' + new Date(result.data.last_check_time).toLocaleString('zh-CN');
                    }
                }
            } catch (err) { console.error(err); }
        }

        async function loadHistory() {
            try {
                const result = await apiRequest('/api/upgrade/history');
                if (result.code === 0 && result.data) {
                    renderHistory(result.data);
                    document.getElementById('historyCount').textContent = `共 ${result.data.length} 个版本`;
                }
            } catch (err) { console.error(err); }
        }

        function renderHistory(history) {
            const container = document.getElementById('versionHistory');
            container.innerHTML = history.map(v => `
                <div class="history-item ${v.status === 'current' ? 'current' : ''}">
                    <div class="history-indicator"></div>
                    <div class="history-content">
                        <div class="history-version">
                            v${v.version}
                            ${v.status === 'current' ? '<span class="badge badge-success" style="margin-left: 8px;">当前版本</span>' : ''}
                        </div>
                        <div class="history-date">${v.release_date}</div>
                        <div class="history-notes">${v.release_notes}</div>
                        ${v.changes ? `<ul class="change-list">${v.changes.map(c => `<li>${c}</li>`).join('')}</ul>` : ''}
                        ${v.status !== 'current' ? `<button class="btn btn-sm btn-secondary" style="margin-top: var(--spacing-2);" onclick="rollback('${v.version}')">回滚到此版本</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function checkUpgrade() {
            const btn = document.getElementById('upgradeBtn');
            const latest = document.getElementById('latestVersion');
            const status = document.getElementById('upgradeStatus');

            latest.textContent = '检查中...';
            status.textContent = '正在连接更新服务器...';
            btn.disabled = true;

            try {
                const result = await apiRequest('/api/upgrade/check', { method: 'POST' });
                if (result.code === 0 && result.data) {
                    latest.textContent = 'v' + result.data.latest_version;
                    latest.style.webkitTextFillColor = 'initial';

                    if (result.data.upgrade_available) {
                        status.textContent = '有新版本可用！';
                        status.style.color = 'var(--state-success)';
                        btn.disabled = false;
                    } else {
                        status.textContent = '当前已是最新版本';
                        status.style.color = 'var(--color-text-secondary)';
                        btn.disabled = true;
                    }

                    if (result.data.last_check_time) {
                        document.getElementById('lastCheck').textContent =
                            '上次检查: ' + new Date(result.data.last_check_time).toLocaleString('zh-CN');
                    }
                }
            } catch (err) {
                latest.textContent = '检查失败';
                status.textContent = '无法连接更新服务器';
                showToast('检查更新失败', 'error');
            }
        }

        async function performUpgrade() {
            if (!confirm('确定要升级系统吗？升级过程中可能会短暂中断服务。')) return;
            showToast('升级任务已提交', 'success');
        }

        function rollback(version) {
            if (!confirm(`确定要回滚到版本 v${version} 吗？`)) return;
            showToast(`回滚到 v${version} 任务已提交`, 'info');
        }

        if (checkAuth()) {
            loadVersionInfo();
            loadHistory();
        }
    </script>
</body>
</html>
