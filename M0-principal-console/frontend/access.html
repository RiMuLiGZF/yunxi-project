<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权限管理 - M0 主理人管控台</title>
    <link rel="stylesheet" href="common/style.css">
    <style>
        .role-card {
            border-left: 3px solid var(--color-primary);
            padding-left: var(--spacing-3);
        }
        .role-level-bar {
            height: 6px;
            background: var(--color-bg-surface);
            border-radius: var(--radius-full);
            margin-top: var(--spacing-2);
            overflow: hidden;
        }
        .role-level-fill {
            height: 100%;
            background: var(--color-gradient-primary);
            border-radius: var(--radius-full);
        }
        .permission-tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: var(--radius-sm);
            font-size: var(--text-xs);
            color: var(--color-text-accent);
            font-family: var(--font-family-mono);
            margin: 2px;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">M0</div>
                <div>
                    <div class="sidebar-logo-text">主理人管控台</div>
                    <div class="sidebar-logo-sub">舰长室</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">总览</div>
                <a href="dashboard.html" class="nav-item"><span class="nav-item-icon">◈</span><span>仪表盘</span></a>
                <div class="nav-section">管理</div>
                <a href="modules.html" class="nav-item"><span class="nav-item-icon">▣</span><span>模块管理</span></a>
                <a href="config.html" class="nav-item"><span class="nav-item-icon">⚙</span><span>配置中心</span></a>
                <a href="access.html" class="nav-item active"><span class="nav-item-icon">⛨</span><span>权限管理</span></a>
                <a href="audit.html" class="nav-item"><span class="nav-item-icon">📋</span><span>审计日志</span></a>
                <div class="nav-section">运维</div>
                <a href="upgrade.html" class="nav-item"><span class="nav-item-icon">⇧</span><span>系统升级</span></a>
                <a href="emergency.html" class="nav-item"><span class="nav-item-icon">⚠</span><span>紧急操作</span></a>
                <div class="nav-section">主理人</div>
                <a href="tools.html" class="nav-item"><span class="nav-item-icon">🛠</span><span>专属工具</span></a>
            </nav>
            <div class="sidebar-footer">v0.1.0 · 云汐系统</div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-title">权限管理</div>
                <div class="topbar-actions">
                    <div class="user-info" onclick="handleLogout()">
                        <div class="user-avatar">主</div>
                        <div class="user-details">
                            <span class="user-name">主理人</span>
                            <span class="user-role">Owner</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <h1 class="page-title">权限与角色管理</h1>
                    <p class="page-subtitle">管理系统用户、角色和权限体系</p>
                </div>

                <!-- 角色体系 -->
                <div class="card" style="margin-bottom: var(--spacing-6);">
                    <div class="card-header">
                        <h2 class="card-title">角色体系</h2>
                        <span class="badge badge-info" id="roleCount">共 0 个角色</span>
                    </div>
                    <div class="stats-grid" id="rolesGrid" style="grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));">
                    </div>
                </div>

                <!-- 用户列表 -->
                <div class="card" style="padding: 0; overflow: hidden;">
                    <div class="card-header" style="padding: var(--spacing-4) var(--spacing-5); margin: 0;">
                        <h2 class="card-title">用户列表</h2>
                        <button class="btn btn-sm btn-primary">+ 添加用户</button>
                    </div>
                    <table class="data-table" id="usersTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>显示名称</th>
                                <th>角色</th>
                                <th>状态</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="usersBody">
                            <tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--color-text-tertiary);">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        function getToken() { return localStorage.getItem('m0_token'); }
        function checkAuth() { if (!getToken()) { window.location.href='login.html'; return false; } return true; }
        function showToast(msg, type='info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t);
            setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(100%)'; t.style.transition='all 0.3s ease'; setTimeout(()=>t.remove(), 300); }, 3000);
        }
        function handleLogout() { if (confirm('确定要登出吗？')) { localStorage.clear(); window.location.href='login.html'; } }

        async function apiRequest(url, options={}) {
            const token = getToken();
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const res = await fetch(url, { ...options, headers });
            if (res.status === 401) { localStorage.clear(); window.location.href='login.html'; throw new Error('Unauthorized'); }
            return res.json();
        }

        async function loadRoles() {
            try {
                const result = await apiRequest('/api/access/roles');
                if (result.code === 0 && result.data) {
                    renderRoles(result.data);
                    document.getElementById('roleCount').textContent = `共 ${result.data.length} 个角色`;
                }
            } catch (err) { console.error(err); }
        }

        function renderRoles(roles) {
            const grid = document.getElementById('rolesGrid');
            const colorMap = {
                owner: 'var(--color-accent)',
                admin: 'var(--color-primary)',
                auditor: 'var(--color-secondary)',
                user: 'var(--state-success)',
                viewer: 'var(--color-text-tertiary)',
            };

            grid.innerHTML = roles.map(role => {
                const levelPercent = (role.level / 100) * 100;
                const color = colorMap[role.key] || 'var(--color-primary)';
                return `
                <div class="stat-card">
                    <div class="role-card">
                        <div class="stat-label" style="font-size: var(--text-sm); color: var(--color-text-secondary);">${role.key.toUpperCase()}</div>
                        <div class="stat-value" style="font-size: var(--text-xl); margin-bottom: var(--spacing-1); color: ${color};">${role.name}</div>
                        <div style="font-size: var(--text-xs); color: var(--color-text-tertiary); margin-bottom: var(--spacing-2);">${role.description}</div>
                        <div class="role-level-bar">
                            <div class="role-level-fill" style="width: ${levelPercent}%; background: ${color};"></div>
                        </div>
                        <div style="margin-top: var(--spacing-3);">
                            ${(role.permissions || []).slice(0, 4).map(p => `<span class="permission-tag">${p}</span>`).join('')}
                            ${role.permissions.length > 4 ? `<span class="permission-tag">+${role.permissions.length - 4}</span>` : ''}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        async function loadUsers() {
            try {
                const result = await apiRequest('/api/access/users');
                if (result.code === 0 && result.data) {
                    renderUsers(result.data);
                }
            } catch (err) {
                document.getElementById('usersBody').innerHTML =
                    '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--color-text-tertiary);">加载失败</td></tr>';
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersBody');
            const roleBadge = {
                owner: 'badge badge-critical',
                admin: 'badge badge-info',
                auditor: 'badge badge-info',
                user: 'badge badge-success',
                viewer: 'badge',
            };
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td><strong>${u.username}</strong></td>
                    <td>${u.display_name}</td>
                    <td><span class="${roleBadge[u.role] || 'badge'}">${u.role}</span></td>
                    <td><span class="badge ${u.status === 'active' ? 'badge-success' : 'badge-error'}">${u.status === 'active' ? '正常' : '禁用'}</span></td>
                    <td style="color:var(--color-text-tertiary);font-size:var(--text-xs);">${u.created_at}</td>
                    <td>
                        <button class="btn btn-sm btn-secondary" onclick="changeRole(${u.id}, '${u.role}')">修改角色</button>
                    </td>
                </tr>
            `).join('');
        }

        function changeRole(userId, currentRole) {
            const newRole = prompt('输入新角色 (owner/admin/auditor/user/viewer):', currentRole);
            if (!newRole) return;
            showToast('角色修改功能开发中', 'info');
        }

        if (checkAuth()) {
            loadRoles();
            loadUsers();
        }
    </script>
</body>
</html>
