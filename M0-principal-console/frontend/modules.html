<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模块管理 - M0 主理人管控台</title>
    <link rel="stylesheet" href="common/style.css">
    <style>
        .filter-bar {
            display: flex;
            gap: var(--spacing-3);
            margin-bottom: var(--spacing-4);
            align-items: center;
            flex-wrap: wrap;
        }
        .module-detail-panel {
            display: none;
        }
        .module-detail-panel.show {
            display: block;
        }
        .action-buttons {
            display: flex;
            gap: var(--spacing-2);
        }
        .config-section {
            margin-top: var(--spacing-4);
            padding-top: var(--spacing-4);
            border-top: 1px solid var(--color-border-subtle);
        }
        .config-item {
            display: flex;
            justify-content: space-between;
            padding: var(--spacing-2) 0;
            border-bottom: 1px solid var(--color-border-subtle);
        }
        .config-key {
            color: var(--color-text-secondary);
            font-family: var(--font-family-mono);
            font-size: var(--text-sm);
        }
        .config-value {
            color: var(--color-text-primary);
            font-size: var(--text-sm);
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">M0</div>
                <div>
                    <div class="sidebar-logo-text">主理人管控台</div>
                    <div class="sidebar-logo-sub">舰长室</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">总览</div>
                <a href="dashboard.html" class="nav-item"><span class="nav-item-icon">◈</span><span>仪表盘</span></a>
                <div class="nav-section">管理</div>
                <a href="modules.html" class="nav-item active"><span class="nav-item-icon">▣</span><span>模块管理</span></a>
                <a href="config.html" class="nav-item"><span class="nav-item-icon">⚙</span><span>配置中心</span></a>
                <a href="access.html" class="nav-item"><span class="nav-item-icon">⛨</span><span>权限管理</span></a>
                <a href="audit.html" class="nav-item"><span class="nav-item-icon">📋</span><span>审计日志</span></a>
                <div class="nav-section">运维</div>
                <a href="upgrade.html" class="nav-item"><span class="nav-item-icon">⇧</span><span>系统升级</span></a>
                <a href="emergency.html" class="nav-item"><span class="nav-item-icon">⚠</span><span>紧急操作</span></a>
                <div class="nav-section">主理人</div>
                <a href="tools.html" class="nav-item"><span class="nav-item-icon">🛠</span><span>专属工具</span></a>
            </nav>
            <div class="sidebar-footer">v0.1.0 · 云汐系统</div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-title">模块管理</div>
                <div class="topbar-actions">
                    <span class="badge badge-success"><span class="status-dot running"></span>系统正常</span>
                    <div class="user-info" onclick="handleLogout()">
                        <div class="user-avatar">主</div>
                        <div class="user-details">
                            <span class="user-name">主理人</span>
                            <span class="user-role">Owner</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <h1 class="page-title">模块管理</h1>
                    <p class="page-subtitle">管理云汐系统所有模块的运行状态和配置</p>
                </div>

                <!-- 筛选栏 -->
                <div class="filter-bar">
                    <select class="form-select" id="statusFilter" onchange="loadModules()" style="width: 160px;">
                        <option value="">全部状态</option>
                        <option value="running">运行中</option>
                        <option value="stopped">已停止</option>
                        <option value="degraded">降级</option>
                        <option value="unknown">未知</option>
                    </select>
                    <input type="text" class="form-input" id="searchInput" placeholder="搜索模块..." style="width: 240px;" oninput="loadModules()">
                    <div style="flex: 1;"></div>
                    <span class="badge badge-info" id="moduleCount">共 0 个模块</span>
                </div>

                <!-- 模块列表 -->
                <div class="card" style="padding: 0; overflow: hidden;">
                    <table class="data-table" id="modulesTable">
                        <thead>
                            <tr>
                                <th>模块</th>
                                <th>标识</th>
                                <th>状态</th>
                                <th>端口</th>
                                <th>版本</th>
                                <th>最后心跳</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="modulesBody">
                            <tr><td colspan="7" style="text-align: center; padding: 2rem; color: var(--color-text-tertiary);">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        function getToken() { return localStorage.getItem('m0_token'); }
        function checkAuth() {
            if (!getToken()) { window.location.href = 'login.html'; return false; }
            return true;
        }
        function showToast(msg, type='info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(100%)'; t.style.transition='all 0.3s ease'; setTimeout(()=>t.remove(), 300); }, 3000);
        }
        function handleLogout() {
            if (confirm('确定要登出吗？')) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }

        async function apiRequest(url, options={}) {
            const token = getToken();
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const res = await fetch(url, { ...options, headers });
            if (res.status === 401) { localStorage.clear(); window.location.href='login.html'; throw new Error('Unauthorized'); }
            return res.json();
        }

        async function loadModules() {
            try {
                const status = document.getElementById('statusFilter').value;
                const search = document.getElementById('searchInput').value.toLowerCase();
                let url = '/api/modules';
                if (status) url += '?status=' + status;

                const result = await apiRequest(url);
                if (result.code === 0 && result.data) {
                    let modules = result.data;
                    if (search) {
                        modules = modules.filter(m =>
                            m.name.toLowerCase().includes(search) ||
                            m.key.toLowerCase().includes(search)
                        );
                    }
                    renderModules(modules);
                    document.getElementById('moduleCount').textContent = `共 ${modules.length} 个模块`;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('modulesBody').innerHTML =
                    '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--color-text-tertiary);">加载失败</td></tr>';
            }
        }

        function renderModules(modules) {
            const tbody = document.getElementById('modulesBody');
            if (modules.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--color-text-tertiary);">暂无数据</td></tr>';
                return;
            }

            const statusBadge = {
                running: 'badge-success',
                stopped: 'badge-error',
                degraded: 'badge-warning',
                unknown: 'badge-info',
            };

            tbody.innerHTML = modules.map(m => {
                const hb = m.last_heartbeat ? new Date(m.last_heartbeat).toLocaleString('zh-CN') : '-';
                return `
                <tr>
                    <td><strong>${m.name}</strong></td>
                    <td><code style="color:var(--color-text-secondary);">${m.key}</code></td>
                    <td><span class="badge ${statusBadge[m.status] || 'badge-info'}"><span class="status-dot ${m.status}"></span>${m.status}</span></td>
                    <td>${m.port || '-'}</td>
                    <td>v${m.version || '-'}</td>
                    <td style="color:var(--color-text-tertiary);font-size:var(--text-xs);">${hb}</td>
                    <td class="action-buttons">
                        <button class="btn btn-sm btn-secondary" onclick="viewModule('${m.key}')">详情</button>
                        <button class="btn btn-sm btn-warning" onclick="restartModule('${m.key}')">重启</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function viewModule(key) {
            showToast('查看模块详情: ' + key, 'info');
        }

        async function restartModule(key) {
            if (!confirm(`确定要重启模块 ${key} 吗？`)) return;
            try {
                const result = await apiRequest(`/api/modules/${key}/restart`, { method: 'POST' });
                if (result.code === 0) {
                    showToast(`模块 ${key} 重启指令已发送`, 'success');
                    setTimeout(loadModules, 1000);
                } else {
                    showToast(result.message || '操作失败', 'error');
                }
            } catch (err) {
                showToast('操作失败', 'error');
            }
        }

        if (checkAuth()) loadModules();
    </script>
</body>
</html>
