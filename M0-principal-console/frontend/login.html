<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M0 主理人管控台 - 登录</title>
    <link rel="stylesheet" href="common/style.css">
    <style>
        /* 登录页专属样式 */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            padding: var(--spacing-4);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--color-bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-xl);
            padding: var(--spacing-10);
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--color-gradient-primary);
        }

        .login-logo {
            text-align: center;
            margin-bottom: var(--spacing-8);
        }

        .login-logo-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto var(--spacing-4);
            background: var(--color-gradient-primary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: bold;
            color: white;
            box-shadow: var(--glow-primary);
        }

        .login-title {
            font-size: var(--text-2xl);
            font-weight: 700;
            background: var(--color-gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--spacing-1);
        }

        .login-subtitle {
            color: var(--color-text-secondary);
            font-size: var(--text-sm);
        }

        .login-form {
            margin-top: var(--spacing-6);
        }

        .login-footer {
            margin-top: var(--spacing-6);
            text-align: center;
            font-size: var(--text-xs);
            color: var(--color-text-tertiary);
        }

        .login-error {
            padding: var(--spacing-3);
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-md);
            color: var(--state-error);
            font-size: var(--text-sm);
            margin-bottom: var(--spacing-4);
            display: none;
        }

        .login-error.show {
            display: block;
        }

        .btn-login {
            margin-top: var(--spacing-2);
            height: 44px;
            font-size: var(--text-base);
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: 0;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
        }

        .bg-circle-1 {
            width: 400px;
            height: 400px;
            background: var(--color-primary);
            top: -100px;
            right: -100px;
        }

        .bg-circle-2 {
            width: 300px;
            height: 300px;
            background: var(--color-secondary);
            bottom: -50px;
            left: -50px;
        }

        .bg-circle-3 {
            width: 250px;
            height: 250px;
            background: var(--color-accent);
            top: 50%;
            left: 30%;
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="bg-circle bg-circle-1"></div>
        <div class="bg-circle bg-circle-2"></div>
        <div class="bg-circle bg-circle-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon">M0</div>
                <h1 class="login-title">主理人管控台</h1>
                <p class="login-subtitle">云汐系统 · 舰长室</p>
            </div>

            <div class="login-error" id="loginError"></div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">账号</label>
                    <input
                        type="text"
                        id="username"
                        class="form-input"
                        placeholder="请输入主理人账号"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="请输入密码"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-login" id="loginBtn">
                    <span>登 录</span>
                </button>
            </form>

            <div class="login-footer">
                <p>默认账号：owner / owner123456</p>
                <p style="margin-top: 8px;">© 2026 云汐系统 · M0 Principal Console</p>
            </div>
        </div>
    </div>

    <script>
        // 登录页逻辑
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');

        // 检查是否已登录
        function checkAuth() {
            const token = localStorage.getItem('m0_token');
            if (token) {
                // 验证 token 是否有效
                fetch('/api/auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                }).then(res => {
                    if (res.ok) {
                        window.location.href = 'dashboard.html';
                    }
                }).catch(() => {
                    localStorage.removeItem('m0_token');
                });
            }
        }

        // 页面加载时检查
        checkAuth();

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('请输入账号和密码');
                return;
            }

            // 显示加载状态
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span>登录中...</span>';
            loginError.classList.remove('show');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.code === 0 && result.data) {
                    // 登录成功
                    localStorage.setItem('m0_token', result.data.access_token);
                    localStorage.setItem('m0_username', result.data.username);
                    localStorage.setItem('m0_role', result.data.role);

                    // 跳转到仪表盘
                    showToast('登录成功，正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    showError(result.message || '登录失败，请检查账号密码');
                }
            } catch (err) {
                showError('网络错误，请稍后重试');
                console.error('Login error:', err);
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span>登 录</span>';
            }
        });

        function showError(message) {
            loginError.textContent = message;
            loginError.classList.add('show');
        }

        // Toast 通知
        function showToast(message, type = 'info') {
            const container = document.createElement('div');
            container.className = 'toast-container';
            document.body.appendChild(container);

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => container.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
