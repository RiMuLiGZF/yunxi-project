<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主理人专属工具 - M0 主理人管控台</title>
    <link rel="stylesheet" href="common/style.css">
    <style>
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--spacing-4);
        }
        .tool-card {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-lg);
            padding: var(--spacing-5);
            cursor: pointer;
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }
        .tool-card:hover {
            border-color: var(--color-border-primary);
            transform: translateY(-3px);
            box-shadow: var(--shadow-glow);
        }
        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--color-gradient-primary);
            opacity: 0;
            transition: opacity var(--transition-normal);
        }
        .tool-card:hover::before {
            opacity: 1;
        }
        .tool-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            background: var(--color-gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: var(--spacing-3);
        }
        .tool-name {
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-2);
        }
        .tool-desc {
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
            line-height: 1.6;
            margin-bottom: var(--spacing-3);
        }
        .tool-category {
            display: inline-block;
            padding: 2px 10px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            color: var(--color-text-accent);
        }
        .insight-report {
            margin-top: var(--spacing-4);
        }
        .insight-section {
            padding: var(--spacing-4);
            background: var(--color-bg-surface);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-3);
        }
        .insight-score {
            font-size: 2rem;
            font-weight: 700;
            background: var(--color-gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">M0</div>
                <div>
                    <div class="sidebar-logo-text">主理人管控台</div>
                    <div class="sidebar-logo-sub">舰长室</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">总览</div>
                <a href="dashboard.html" class="nav-item"><span class="nav-item-icon">◈</span><span>仪表盘</span></a>
                <div class="nav-section">管理</div>
                <a href="modules.html" class="nav-item"><span class="nav-item-icon">▣</span><span>模块管理</span></a>
                <a href="config.html" class="nav-item"><span class="nav-item-icon">⚙</span><span>配置中心</span></a>
                <a href="access.html" class="nav-item"><span class="nav-item-icon">⛨</span><span>权限管理</span></a>
                <a href="audit.html" class="nav-item"><span class="nav-item-icon">📋</span><span>审计日志</span></a>
                <div class="nav-section">运维</div>
                <a href="upgrade.html" class="nav-item"><span class="nav-item-icon">⇧</span><span>系统升级</span></a>
                <a href="emergency.html" class="nav-item"><span class="nav-item-icon">⚠</span><span>紧急操作</span></a>
                <div class="nav-section">主理人</div>
                <a href="tools.html" class="nav-item active"><span class="nav-item-icon">🛠</span><span>专属工具</span></a>
            </nav>
            <div class="sidebar-footer">v0.1.0 · 云汐系统</div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-title">主理人专属工具</div>
                <div class="topbar-actions">
                    <div class="user-info" onclick="handleLogout()">
                        <div class="user-avatar">主</div>
                        <div class="user-details">
                            <span class="user-name">主理人</span>
                            <span class="user-role">Owner</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <h1 class="page-title">主理人专属工具</h1>
                    <p class="page-subtitle">仅主理人可用的高级功能和工具</p>
                </div>

                <!-- 工具列表 -->
                <div class="tools-grid" id="toolsGrid">
                    <!-- 由 JS 动态渲染 -->
                </div>

                <!-- 系统洞察报告区域 -->
                <div id="insightSection" style="margin-top: var(--spacing-8); display: none;">
                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title">系统洞察报告</h2>
                            <span class="badge badge-info" id="reportTime"></span>
                        </div>
                        <div id="insightContent" class="insight-report"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        function getToken() { return localStorage.getItem('m0_token'); }
        function checkAuth() { if (!getToken()) { window.location.href='login.html'; return false; } return true; }
        function showToast(msg, type='info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t);
            setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(100%)'; t.style.transition='all 0.3s ease'; setTimeout(()=>t.remove(), 300); }, 3000);
        }
        function handleLogout() { if (confirm('确定要登出吗？')) { localStorage.clear(); window.location.href='login.html'; } }

        async function apiRequest(url, options={}) {
            const token = getToken();
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const res = await fetch(url, { ...options, headers });
            if (res.status === 401) { localStorage.clear(); window.location.href='login.html'; throw new Error('Unauthorized'); }
            return res.json();
        }

        const iconMap = {
            system_insight: '📊',
            data_export: '📥',
            password_reset: '🔑',
            activity_summary: '📈',
            api_test: '🔧',
            shell_access: '💻',
        };

        async function loadTools() {
            try {
                const result = await apiRequest('/api/principal/tools');
                if (result.code === 0 && result.data) {
                    renderTools(result.data);
                }
            } catch (err) { console.error(err); }
        }

        function renderTools(tools) {
            const grid = document.getElementById('toolsGrid');
            grid.innerHTML = tools.map(tool => `
                <div class="tool-card" onclick="openTool('${tool.key}')">
                    <div class="tool-icon">${iconMap[tool.key] || '🛠'}</div>
                    <div class="tool-name">${tool.name}</div>
                    <div class="tool-desc">${tool.description}</div>
                    <span class="tool-category">${tool.category}</span>
                </div>
            `).join('');
        }

        function openTool(key) {
            switch(key) {
                case 'system_insight':
                    generateInsight();
                    break;
                case 'password_reset':
                    changePassword();
                    break;
                case 'activity_summary':
                    showActivitySummary();
                    break;
                default:
                    showToast('该工具开发中，敬请期待', 'info');
            }
        }

        async function generateInsight() {
            showToast('正在生成洞察报告...', 'info');
            try {
                const result = await apiRequest('/api/principal/insight-report', { method: 'POST' });
                if (result.code === 0 && result.data) {
                    document.getElementById('insightSection').style.display = 'block';
                    document.getElementById('reportTime').textContent =
                        new Date(result.data.generated_at).toLocaleString('zh-CN');
                    renderInsightReport(result.data);
                    showToast('报告生成成功', 'success');
                }
            } catch (err) {
                showToast('生成失败', 'error');
            }
        }

        function renderInsightReport(data) {
            const container = document.getElementById('insightContent');
            container.innerHTML = `
                <div style="padding: var(--spacing-4); background: var(--color-bg-surface); border-radius: var(--radius-md); margin-bottom: var(--spacing-4);">
                    <div style="font-size: var(--text-sm); color: var(--color-text-secondary); margin-bottom: var(--spacing-2);">总评</div>
                    <div style="font-size: var(--text-base); color: var(--color-text-primary);">${data.summary}</div>
                </div>
                <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));">
                    ${(data.sections || []).map(s => `
                        <div class="insight-section" style="margin: 0;">
                            <div style="font-size: var(--text-sm); color: var(--color-text-secondary); margin-bottom: var(--spacing-2);">${s.title}</div>
                            <div class="insight-score">${s.score}</div>
                            <div style="font-size: var(--text-xs); color: var(--color-text-tertiary); margin-top: var(--spacing-2);">${s.details}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function showActivitySummary() {
            showToast('正在加载活动总览...', 'info');
            try {
                const result = await apiRequest('/api/principal/activity-summary?days=7');
                if (result.code === 0 && result.data) {
                    alert(`活动总览（最近7天）:\n\n登录次数: ${result.data.total_logins}\n操作总数: ${result.data.total_actions}\n活跃用户: ${result.data.active_users}`);
                }
            } catch (err) {
                showToast('加载失败', 'error');
            }
        }

        async function changePassword() {
            const oldPwd = prompt('请输入当前密码：');
            if (!oldPwd) return;
            const newPwd = prompt('请输入新密码（至少8位）：');
            if (!newPwd || newPwd.length < 8) {
                showToast('新密码长度不能少于8位', 'error');
                return;
            }
            const confirmPwd = prompt('请再次输入新密码：');
            if (newPwd !== confirmPwd) {
                showToast('两次密码不一致', 'error');
                return;
            }

            try {
                const result = await apiRequest(
                    `/api/principal/change-password?old_password=${encodeURIComponent(oldPwd)}&new_password=${encodeURIComponent(newPwd)}`,
                    { method: 'POST' }
                );
                if (result.code === 0) {
                    showToast('密码修改成功', 'success');
                } else {
                    showToast(result.message || '修改失败', 'error');
                }
            } catch (err) {
                showToast('修改失败', 'error');
            }
        }

        if (checkAuth()) {
            loadTools();
        }
    </script>
</body>
</html>
