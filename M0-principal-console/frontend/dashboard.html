<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全局仪表盘 - M0 主理人管控台</title>
    <link rel="stylesheet" href="common/style.css">
    <style>
        /* 仪表盘专属样式 */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--spacing-4);
            margin-top: var(--spacing-4);
        }

        .module-card {
            background: var(--color-bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-lg);
            padding: var(--spacing-4);
            transition: all var(--transition-normal);
            cursor: pointer;
        }

        .module-card:hover {
            border-color: var(--color-border-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .module-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-3);
        }

        .module-name {
            font-weight: 600;
            font-size: var(--text-base);
            color: var(--color-text-primary);
        }

        .module-key {
            font-size: var(--text-xs);
            color: var(--color-text-tertiary);
            font-family: var(--font-family-mono);
        }

        .module-meta {
            display: flex;
            justify-content: space-between;
            font-size: var(--text-xs);
            color: var(--color-text-tertiary);
        }

        .alert-list {
            margin-top: var(--spacing-4);
        }

        .alert-item {
            display: flex;
            align-items: flex-start;
            gap: var(--spacing-3);
            padding: var(--spacing-3);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-2);
            transition: background var(--transition-fast);
        }

        .alert-item:hover {
            background: rgba(59, 130, 246, 0.05);
        }

        .alert-level-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 6px;
            flex-shrink: 0;
        }

        .alert-level-dot.critical { background: var(--state-critical); box-shadow: 0 0 8px var(--state-critical); }
        .alert-level-dot.warning { background: var(--state-warning); box-shadow: 0 0 8px var(--state-warning); }
        .alert-level-dot.info { background: var(--state-info); }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-size: var(--text-sm);
            color: var(--color-text-primary);
            margin-bottom: 2px;
        }

        .alert-meta {
            font-size: var(--text-xs);
            color: var(--color-text-tertiary);
        }

        .two-col {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: var(--spacing-4);
        }

        @media (max-width: 1024px) {
            .two-col {
                grid-template-columns: 1fr;
            }
        }

        .section-title {
            font-size: var(--text-lg);
            font-weight: 600;
            margin-bottom: var(--spacing-3);
            color: var(--color-text-primary);
            display: flex;
            align-items: center;
            gap: var(--spacing-2);
        }

        .section-title::before {
            content: '';
            width: 3px;
            height: 18px;
            background: var(--color-gradient-primary);
            border-radius: 2px;
        }

        .loading-skeleton {
            background: linear-gradient(90deg, var(--color-bg-surface) 25%, var(--color-bg-elevated) 50%, var(--color-bg-surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-md);
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">M0</div>
                <div>
                    <div class="sidebar-logo-text">主理人管控台</div>
                    <div class="sidebar-logo-sub">舰长室</div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">总览</div>
                <a href="dashboard.html" class="nav-item active">
                    <span class="nav-item-icon">◈</span>
                    <span>仪表盘</span>
                </a>

                <div class="nav-section">管理</div>
                <a href="modules.html" class="nav-item">
                    <span class="nav-item-icon">▣</span>
                    <span>模块管理</span>
                </a>
                <a href="config.html" class="nav-item">
                    <span class="nav-item-icon">⚙</span>
                    <span>配置中心</span>
                </a>
                <a href="access.html" class="nav-item">
                    <span class="nav-item-icon">⛨</span>
                    <span>权限管理</span>
                </a>
                <a href="audit.html" class="nav-item">
                    <span class="nav-item-icon">📋</span>
                    <span>审计日志</span>
                </a>

                <div class="nav-section">运维</div>
                <a href="upgrade.html" class="nav-item">
                    <span class="nav-item-icon">⇧</span>
                    <span>系统升级</span>
                </a>
                <a href="emergency.html" class="nav-item">
                    <span class="nav-item-icon">⚠</span>
                    <span>紧急操作</span>
                </a>

                <div class="nav-section">主理人</div>
                <a href="tools.html" class="nav-item">
                    <span class="nav-item-icon">🛠</span>
                    <span>专属工具</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                v0.1.0 · 云汐系统
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部导航 -->
            <header class="topbar">
                <div class="topbar-title">全局仪表盘</div>
                <div class="topbar-actions">
                    <span class="badge badge-success" id="systemStatus" style="cursor: pointer;">
                        <span class="status-dot running"></span>
                        系统正常
                    </span>
                    <div class="user-info" id="userInfo">
                        <div class="user-avatar">主</div>
                        <div class="user-details">
                            <span class="user-name" id="userName">主理人</span>
                            <span class="user-role">Owner</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- 内容区 -->
            <div class="content-wrapper">
                <div class="page-header">
                    <h1 class="page-title">舰长室总览</h1>
                    <p class="page-subtitle">实时监控云汐系统的运行状态，一切尽在掌握</p>
                </div>

                <!-- 6个状态卡片 -->
                <div class="stats-grid" id="statsGrid">
                    <!-- 数据由 JS 动态加载 -->
                    <div class="stat-card">
                        <div class="stat-icon primary">◈</div>
                        <div class="stat-label">模块健康</div>
                        <div class="stat-value loading-skeleton" style="height: 2rem; width: 60%;"></div>
                        <div class="stat-subtext">加载中...</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon success">▣</div>
                        <div class="stat-label">系统资源</div>
                        <div class="stat-value loading-skeleton" style="height: 2rem; width: 60%;"></div>
                        <div class="stat-subtext">加载中...</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon warning">⚠</div>
                        <div class="stat-label">活动告警</div>
                        <div class="stat-value loading-skeleton" style="height: 2rem; width: 60%;"></div>
                        <div class="stat-subtext">加载中...</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon accent">v</div>
                        <div class="stat-label">系统版本</div>
                        <div class="stat-value loading-skeleton" style="height: 2rem; width: 60%;"></div>
                        <div class="stat-subtext">加载中...</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon secondary">💬</div>
                        <div class="stat-label">今日对话</div>
                        <div class="stat-value loading-skeleton" style="height: 2rem; width: 60%;"></div>
                        <div class="stat-subtext">加载中...</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon primary">🧠</div>
                        <div class="stat-label">记忆总数</div>
                        <div class="stat-value loading-skeleton" style="height: 2rem; width: 60%;"></div>
                        <div class="stat-subtext">加载中...</div>
                    </div>
                </div>

                <!-- 模块状态 + 告警 -->
                <div class="two-col">
                    <!-- 模块状态 -->
                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title">模块运行状态</h2>
                            <a href="modules.html" style="font-size: var(--text-sm); color: var(--color-primary);">查看全部 →</a>
                        </div>
                        <div class="module-grid" id="moduleGrid">
                            <!-- 数据由 JS 动态加载 -->
                            <div class="loading-skeleton" style="height: 80px;"></div>
                            <div class="loading-skeleton" style="height: 80px;"></div>
                            <div class="loading-skeleton" style="height: 80px;"></div>
                        </div>
                    </div>

                    <!-- 告警列表 -->
                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title">活动告警</h2>
                            <a href="#" style="font-size: var(--text-sm); color: var(--color-primary);">全部 →</a>
                        </div>
                        <div class="alert-list" id="alertList">
                            <div class="loading-skeleton" style="height: 40px; margin-bottom: 8px;"></div>
                            <div class="loading-skeleton" style="height: 40px; margin-bottom: 8px;"></div>
                            <div class="loading-skeleton" style="height: 40px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ============================================================
        // 通用工具函数
        // ============================================================

        // 获取 Token
        function getToken() {
            return localStorage.getItem('m0_token');
        }

        // 检查登录状态
        function checkAuth() {
            const token = getToken();
            if (!token) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }

        // API 请求封装
        async function apiRequest(url, options = {}) {
            const token = getToken();
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers,
            };
            if (token) {
                headers['Authorization'] = 'Bearer ' + token;
            }

            const response = await fetch(url, {
                ...options,
                headers,
            });

            if (response.status === 401) {
                localStorage.removeItem('m0_token');
                window.location.href = 'login.html';
                throw new Error('Unauthorized');
            }

            return response.json();
        }

        // Toast 通知
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 登出
        document.getElementById('userInfo').addEventListener('click', function() {
            if (confirm('确定要登出吗？')) {
                localStorage.removeItem('m0_token');
                localStorage.removeItem('m0_username');
                localStorage.removeItem('m0_role');
                window.location.href = 'login.html';
            }
        });

        // ============================================================
        // 页面逻辑
        // ============================================================

        // 初始化
        async function init() {
            if (!checkAuth()) return;

            // 加载用户信息
            loadUserInfo();

            // 加载仪表盘数据
            await loadDashboardData();

            // 加载模块状态
            await loadModulesStatus();

            // 加载告警列表
            await loadAlerts();

            // 定时刷新
            setInterval(loadDashboardData, 30000); // 30秒刷新一次
        }

        // 加载用户信息
        function loadUserInfo() {
            const username = localStorage.getItem('m0_username') || '主理人';
            document.getElementById('userName').textContent = username;
        }

        // 加载快速统计
        async function loadDashboardData() {
            try {
                const result = await apiRequest('/api/dashboard/quick-stats');
                if (result.code === 0 && result.data) {
                    renderStats(result.data);
                }
            } catch (err) {
                console.error('Failed to load dashboard stats:', err);
            }
        }

        // 渲染状态卡片
        function renderStats(stats) {
            const icons = {
                module_health: { icon: '◈', cls: 'primary' },
                system_resources: { icon: '▣', cls: 'success' },
                alerts: { icon: '⚠', cls: 'warning' },
                version: { icon: 'v', cls: 'accent' },
                today_conversations: { icon: '💬', cls: 'secondary' },
                memory_total: { icon: '🧠', cls: 'primary' },
            };

            const labels = {
                module_health: '模块健康',
                system_resources: '系统资源',
                alerts: '活动告警',
                version: '系统版本',
                today_conversations: '今日对话',
                memory_total: '记忆总数',
            };

            const grid = document.getElementById('statsGrid');
            grid.innerHTML = '';

            for (const [key, data] of Object.entries(stats)) {
                const iconInfo = icons[key] || { icon: '●', cls: 'primary' };
                const statusClass = data.status || 'healthy';

                const card = document.createElement('div');
                card.className = `stat-card ${statusClass}`;
                card.innerHTML = `
                    <div class="stat-icon ${iconInfo.cls}">${iconInfo.icon}</div>
                    <div class="stat-label">${labels[key] || key}</div>
                    <div class="stat-value">${data.value}</div>
                    <div class="stat-subtext">${data.subtext || ''}</div>
                `;
                grid.appendChild(card);
            }
        }

        // 加载模块状态
        async function loadModulesStatus() {
            try {
                const result = await apiRequest('/api/dashboard/modules-status');
                if (result.code === 0 && result.data) {
                    renderModules(result.data.slice(0, 6)); // 只显示前6个
                }
            } catch (err) {
                console.error('Failed to load modules:', err);
            }
        }

        // 渲染模块卡片
        function renderModules(modules) {
            const grid = document.getElementById('moduleGrid');
            grid.innerHTML = '';

            modules.forEach(mod => {
                const statusMap = {
                    running: { class: 'running', text: '运行中' },
                    stopped: { class: 'stopped', text: '已停止' },
                    degraded: { class: 'degraded', text: '降级' },
                    unknown: { class: 'unknown', text: '未知' },
                };
                const status = statusMap[mod.status] || statusMap.unknown;

                const card = document.createElement('div');
                card.className = 'module-card';
                card.onclick = () => window.location.href = `modules.html?key=${mod.key}`;
                card.innerHTML = `
                    <div class="module-card-header">
                        <div>
                            <div class="module-name">${mod.name}</div>
                            <div class="module-key">${mod.key.toUpperCase()}</div>
                        </div>
                        <span class="badge badge-${status.class === 'degraded' ? 'warning' : status.class === 'stopped' ? 'error' : 'success'}">
                            <span class="status-dot ${status.class}"></span>
                            ${status.text}
                        </span>
                    </div>
                    <div class="module-meta">
                        <span>端口: ${mod.port || '-'}</span>
                        <span>v${mod.version || '-'}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 加载告警列表
        async function loadAlerts() {
            try {
                const result = await apiRequest('/api/dashboard/alerts');
                if (result.code === 0 && result.data) {
                    renderAlerts(result.data.slice(0, 5));
                }
            } catch (err) {
                console.error('Failed to load alerts:', err);
            }
        }

        // 渲染告警列表
        function renderAlerts(alerts) {
            const list = document.getElementById('alertList');
            list.innerHTML = '';

            if (alerts.length === 0) {
                list.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--color-text-tertiary);">暂无告警</div>';
                return;
            }

            alerts.forEach(alert => {
                const item = document.createElement('div');
                item.className = 'alert-item';
                const time = new Date(alert.created_at).toLocaleString('zh-CN');
                item.innerHTML = `
                    <div class="alert-level-dot ${alert.level}"></div>
                    <div class="alert-content">
                        <div class="alert-title">${alert.title}</div>
                        <div class="alert-meta">${alert.module.toUpperCase()} · ${time}</div>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        // 启动
        init();
    </script>
</body>
</html>
