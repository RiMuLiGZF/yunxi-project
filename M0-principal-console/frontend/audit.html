<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审计日志 - M0 主理人管控台</title>
    <link rel="stylesheet" href="common/style.css">
    <style>
        .filter-bar {
            display: flex;
            gap: var(--spacing-3);
            margin-bottom: var(--spacing-4);
            align-items: center;
            flex-wrap: wrap;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: var(--spacing-2);
            margin-top: var(--spacing-4);
            align-items: center;
        }
        .pagination button {
            padding: var(--spacing-1) var(--spacing-3);
            background: var(--color-bg-surface);
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-md);
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .pagination button:hover:not(:disabled) {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .pagination button.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }
        .action-tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: var(--radius-sm);
            font-size: var(--text-xs);
            color: var(--color-secondary);
            font-family: var(--font-family-mono);
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">M0</div>
                <div>
                    <div class="sidebar-logo-text">主理人管控台</div>
                    <div class="sidebar-logo-sub">舰长室</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">总览</div>
                <a href="dashboard.html" class="nav-item"><span class="nav-item-icon">◈</span><span>仪表盘</span></a>
                <div class="nav-section">管理</div>
                <a href="modules.html" class="nav-item"><span class="nav-item-icon">▣</span><span>模块管理</span></a>
                <a href="config.html" class="nav-item"><span class="nav-item-icon">⚙</span><span>配置中心</span></a>
                <a href="access.html" class="nav-item"><span class="nav-item-icon">⛨</span><span>权限管理</span></a>
                <a href="audit.html" class="nav-item active"><span class="nav-item-icon">📋</span><span>审计日志</span></a>
                <div class="nav-section">运维</div>
                <a href="upgrade.html" class="nav-item"><span class="nav-item-icon">⇧</span><span>系统升级</span></a>
                <a href="emergency.html" class="nav-item"><span class="nav-item-icon">⚠</span><span>紧急操作</span></a>
                <div class="nav-section">主理人</div>
                <a href="tools.html" class="nav-item"><span class="nav-item-icon">🛠</span><span>专属工具</span></a>
            </nav>
            <div class="sidebar-footer">v0.1.0 · 云汐系统</div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-title">审计日志</div>
                <div class="topbar-actions">
                    <button class="btn btn-sm btn-secondary">导出日志</button>
                    <div class="user-info" onclick="handleLogout()">
                        <div class="user-avatar">主</div>
                        <div class="user-details">
                            <span class="user-name">主理人</span>
                            <span class="user-role">Owner</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <h1 class="page-title">审计日志</h1>
                    <p class="page-subtitle">记录系统所有关键操作，支持查询和追溯</p>
                </div>

                <!-- 筛选栏 -->
                <div class="filter-bar">
                    <select class="form-select" id="actionFilter" onchange="loadLogs()" style="width: 180px;">
                        <option value="">全部操作</option>
                    </select>
                    <select class="form-select" id="moduleFilter" onchange="loadLogs()" style="width: 160px;">
                        <option value="">全部模块</option>
                        <option value="system">系统</option>
                        <option value="auth">认证</option>
                        <option value="config">配置</option>
                    </select>
                    <input type="text" class="form-input" id="operatorFilter" placeholder="操作人..." style="width: 160px;" onkeyup="if(event.key==='Enter')loadLogs()">
                    <button class="btn btn-sm btn-secondary" onclick="loadLogs()">查询</button>
                    <div style="flex: 1;"></div>
                    <span class="badge badge-info" id="logCount">共 0 条记录</span>
                </div>

                <!-- 日志列表 -->
                <div class="card" style="padding: 0; overflow: hidden;">
                    <table class="data-table" id="auditTable">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>操作类型</th>
                                <th>操作人</th>
                                <th>模块</th>
                                <th>详情</th>
                                <th>IP</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody id="auditBody">
                            <tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--color-text-tertiary);">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>

                <!-- 分页 -->
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        function getToken() { return localStorage.getItem('m0_token'); }
        function checkAuth() { if (!getToken()) { window.location.href='login.html'; return false; } return true; }
        function showToast(msg, type='info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t);
            setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(100%)'; t.style.transition='all 0.3s ease'; setTimeout(()=>t.remove(), 300); }, 3000);
        }
        function handleLogout() { if (confirm('确定要登出吗？')) { localStorage.clear(); window.location.href='login.html'; } }

        async function apiRequest(url, options={}) {
            const token = getToken();
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const res = await fetch(url, { ...options, headers });
            if (res.status === 401) { localStorage.clear(); window.location.href='login.html'; throw new Error('Unauthorized'); }
            return res.json();
        }

        let currentPage = 1;
        const pageSize = 20;

        async function loadActionTypes() {
            try {
                const result = await apiRequest('/api/audit/actions/types');
                if (result.code === 0 && result.data) {
                    const select = document.getElementById('actionFilter');
                    result.data.forEach(action => {
                        const opt = document.createElement('option');
                        opt.value = action; opt.textContent = action;
                        select.appendChild(opt);
                    });
                }
            } catch (err) { console.error(err); }
        }

        async function loadLogs() {
            const action = document.getElementById('actionFilter').value;
            const module = document.getElementById('moduleFilter').value;
            const operator = document.getElementById('operatorFilter').value;

            let params = new URLSearchParams({
                page: currentPage,
                page_size: pageSize,
            });
            if (action) params.append('action', action);
            if (module) params.append('module', module);
            if (operator) params.append('operator', operator);

            try {
                const result = await apiRequest(`/api/audit?${params.toString()}`);
                if (result.code === 0 && result.data) {
                    renderLogs(result.data.items);
                    document.getElementById('logCount').textContent = `共 ${result.data.total} 条记录`;
                    renderPagination(result.data.total, result.data.page, result.data.page_size);
                }
            } catch (err) {
                document.getElementById('auditBody').innerHTML =
                    '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--color-text-tertiary);">加载失败</td></tr>';
            }
        }

        function renderLogs(logs) {
            const tbody = document.getElementById('auditBody');
            if (logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--color-text-tertiary);">暂无审计日志</td></tr>';
                return;
            }

            tbody.innerHTML = logs.map(log => {
                const time = new Date(log.created_at).toLocaleString('zh-CN');
                return `
                <tr>
                    <td style="font-size:var(--text-xs);color:var(--color-text-secondary);white-space:nowrap;">${time}</td>
                    <td><span class="action-tag">${log.action}</span></td>
                    <td><strong>${log.operator}</strong></td>
                    <td>${log.module}</td>
                    <td style="color:var(--color-text-secondary);font-size:var(--text-xs);">${log.detail || '-'}</td>
                    <td style="font-family:var(--font-family-mono);font-size:var(--text-xs);color:var(--color-text-tertiary);">${log.ip || '-'}</td>
                    <td><span class="badge ${log.success ? 'badge-success' : 'badge-error'}">${log.success ? '成功' : '失败'}</span></td>
                </tr>
                `;
            }).join('');
        }

        function renderPagination(total, page, pageSize) {
            const totalPages = Math.ceil(total / pageSize);
            const container = document.getElementById('pagination');

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = `<button onclick="goToPage(1)" ${page === 1 ? 'disabled' : ''}>首页</button>`;
            html += `<button onclick="goToPage(${page - 1})" ${page === 1 ? 'disabled' : ''}>上一页</button>`;

            const start = Math.max(1, page - 2);
            const end = Math.min(totalPages, page + 2);
            for (let i = start; i <= end; i++) {
                html += `<button class="${i === page ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }

            html += `<button onclick="goToPage(${page + 1})" ${page === totalPages ? 'disabled' : ''}>下一页</button>`;
            html += `<button onclick="goToPage(${totalPages})" ${page === totalPages ? 'disabled' : ''}>末页</button>`;
            html += `<span style="margin-left: var(--spacing-3); color: var(--color-text-tertiary); font-size: var(--text-xs);">第 ${page} / ${totalPages} 页</span>`;

            container.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            loadLogs();
        }

        if (checkAuth()) {
            loadActionTypes();
            loadLogs();
        }
    </script>
</body>
</html>
