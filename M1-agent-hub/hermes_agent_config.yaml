# =============================================================================
# Hermes Agent 配置文件模板
# =============================================================================
# Hermes Agent 是支持双算力模式的 ReAct 风格 Agent：
#   - 本地模式（local）：基于 Ollama 本地大模型，零成本，数据本地
#   - API 模式（api）：调用云端 API（OpenAI/Anthropic/DeepSeek 等），更强能力
# 通过 MCP 协议调用外部工具，支持多轮推理和工具链编排。
#
# 使用方法：
#   1. 根据实际环境修改配置值
#   2. 通过配置管理器加载此文件，构造 HermesAgentAdapter
# =============================================================================

# ── Agent 基本信息 ────────────────────────────────────────────────────────────
agent:
  # Agent 唯一标识符（用于注册、路由、日志追踪）
  agent_id: hermes_agent_01

  # 显示名称（用于 UI 展示、对话界面）
  display_name: "Hermes 智能助手"

  # 服务提供商标识
  provider: Hermes

  # 适配器类型（对应 federation.adapters 中的适配器类）
  adapter_type: hermes_agent

  # 运行模式：local（本地 Ollama）或 api（云端 API）
  # 默认 local，保持向后兼容
  mode: local

  # Agent 能力列表（用于能力匹配和路由调度）
  capabilities:
    - local_reasoning       # 本地推理能力（隐私保护）
    - tool_use              # 工具调用能力（MCP）
    - react_planning        # ReAct 规划能力
    - chinese_conversation  # 中文对话能力
    - zero_cost             # 零成本（本地模型）
    # - api_reasoning       # API 推理能力（api 模式时启用）
    # - paid_service        # 付费服务（api 模式时启用）

  # 描述信息
  description: >
    基于双算力模式的 ReAct 风格 Agent，支持本地 Ollama 模型和云端 API 调用，
    通过 MCP 协议调用外部工具，支持多轮推理和工具链编排。
    本地模式下所有推理在本地完成，数据不出境，隐私等级最高；
    API 模式下可调用更强模型，适合复杂任务。

# ── 本地模式配置（Ollama） ───────────────────────────────────────────────────
# 仅在 mode: local 时生效
ollama:
  # Ollama 服务基础地址
  # 默认本地部署地址为 http://localhost:11434
  base_url: http://localhost:11434

  # 使用的模型名称
  # 推荐：qwen2.5:7b（中文能力强、推理速度快）
  # 可选：qwen2.5:14b、llama3.1:8b、mistral:7b 等
  model_name: qwen2.5:7b

  # 模型拉取命令（参考）
  # ollama pull qwen2.5:7b

# ── API 模式配置 ─────────────────────────────────────────────────────────────
# 仅在 mode: api 时生效
api:
  # API 服务商
  # 支持：openai / anthropic / deepseek / moonshot / qwen / custom
  provider: deepseek

  # API 基础 URL
  # OpenAI:    https://api.openai.com/v1
  # Anthropic: https://api.anthropic.com
  # DeepSeek:  https://api.deepseek.com/v1
  # Moonshot:  https://api.moonshot.cn/v1
  # Qwen:      https://dashscope.aliyuncs.com/compatible-mode/v1
  base_url: https://api.deepseek.com/v1

  # API 模型名称
  # OpenAI:    gpt-4o, gpt-4o-mini, gpt-3.5-turbo
  # Anthropic: claude-3-5-sonnet-20241022, claude-3-opus-20240229
  # DeepSeek:  deepseek-chat, deepseek-reasoner
  # Moonshot:  moonshot-v1-8k, moonshot-v1-32k, moonshot-v1-128k
  # Qwen:      qwen2.5-72b-instruct, qwen2.5-32b-instruct
  model: deepseek-chat

  # API 密钥
  # 生产环境建议通过密钥管理服务（M8 / Vault）存储，不要明文写在配置中
  # 开发环境可直接填写
  api_key: ""

  # API 格式（可选，默认根据 provider 自动推断）
  # - openai_compatible: OpenAI 兼容格式（默认，适用于大多数服务商）
  # - anthropic_native:  Anthropic 原生格式（仅适用于 anthropic provider）
  # format: openai_compatible

  # 成本模型（可选，不配置则使用 provider 默认价格）
  # cost_model:
  #   input_per_1k: 0.00014   # 每 1000 输入 token 成本（美元）
  #   output_per_1k: 0.00028  # 每 1000 输出 token 成本（美元）
  #   per_request: 0.0        # 每次请求固定成本（美元）
  #   currency: USD

# ── MCP 服务器配置 ───────────────────────────────────────────────────────────
mcp:
  # M2 模块的 MCP 端点 URL
  # Hermes Agent 通过 HTTP 协议调用此端点获取工具列表和执行工具调用
  # MCP 协议遵循 JSON-RPC 2.0 规范
  server_url: http://localhost:8002/mcp

  # M8 管理令牌（用于 MCP 调用鉴权）
  # 与 M2 模块的 M2_ADMIN_TOKEN 环境变量一致
  # 开发环境可留空（M2 开发模式下自动跳过鉴权）
  m8_token: ""

  # MCP 调用超时时间（秒）
  timeout: 30

  # 是否启用 MCP 工具缓存
  # 启用后首次调用获取工具列表，后续直接使用缓存
  enable_tool_cache: true

# ── 性能参数 ─────────────────────────────────────────────────────────────────
performance:
  # ReAct 最大迭代次数
  # 每次迭代包含一次模型推理和可能的一次工具调用
  # 设置过大可能导致响应时间过长，设置过小可能无法完成复杂任务
  # 推荐值：3-10
  max_iterations: 5

  # 请求超时时间（秒）
  # 单次模型 API 调用的超时阈值
  timeout: 120

  # 生成温度
  # 0.0 = 完全确定性输出
  # 0.7 = 平衡创造性和稳定性（推荐）
  # 1.0+ = 更具创造性但可能不稳定
  temperature: 0.7

  # 最大输出 token 数
  # 限制单次模型推理的输出长度
  max_tokens: 2048

  # 最大重试次数
  # 模型调用失败时的重试次数
  max_retries: 2

# ── 日志与监控 ───────────────────────────────────────────────────────────────
logging:
  # 是否启用详细日志
  verbose: false

  # 是否记录工具调用详情
  log_tool_calls: true

  # 是否记录完整的推理过程（Thought/Action/Observation）
  log_reasoning_trace: false

# ── 成本配置 ─────────────────────────────────────────────────────────────────
# 注意：api 模式下会自动使用 api.cost_model（如果配置）或 provider 默认价格
# 本地模式始终为零成本
cost:
  # 本地模型零成本
  # 如需计算硬件成本，可在此处配置
  input_per_1k: 0.0      # 每 1000 输入 token 成本（美元）
  output_per_1k: 0.0     # 每 1000 输出 token 成本（美元）
  per_request: 0.0       # 每次请求固定成本（美元）
  currency: USD

