# ============================================================
# 云汐 API 网关 - 模块路由配置表
# ============================================================
# 这是路由配置的唯一事实来源（Single Source of Truth）。
# 修改此文件后，网关将自动检测变更并热加载路由配置。
# 新增模块只需在此文件中添加条目，无需修改代码。
#
# 环境变量覆盖：
#   每个模块的 target 地址可通过环境变量覆盖，格式为 {MODULE_ID}_TARGET
#   例如：M0_TARGET=http://prod-m0:8000、M1_TARGET=http://prod-m1:8001
# ============================================================

# 配置版本
version: "3.0.0"

# 全局默认配置（各模块可单独覆盖）
defaults:
  enabled: true
  timeout: 30.0
  health_path: "/health"
  health_timeout: 5.0
  auth_required: true
  public_paths: []
  rate_limit_per_minute: 60
  rate_limit_per_ip: 30
  rate_limit_tier: "public"
  supports_websocket: false
  supports_sse: false
  cb_failure_threshold: 5
  cb_recovery_time: 30

# 模块路由配置表（按模块 ID 索引）
modules:
  # --------------------------------------------------------
  # M0 主控台
  # --------------------------------------------------------
  m0:
    name: "M0 主控台"
    description: "系统主控台，统一入口与导航，负责全局布局与模块切换"
    prefix: "/m0"
    target: "http://localhost:8000"
    enabled: true
    timeout: 30.0
    health_path: "/health"
    auth_required: true
    public_paths:
      - "/health"
      - "/api/v1/public"
    rate_limit_per_minute: 120
    rate_limit_per_ip: 60
    rate_limit_tier: "public"
    supports_websocket: false
    supports_sse: false
    cb_failure_threshold: 5
    cb_recovery_time: 30

  # --------------------------------------------------------
  # M1 多Agent调度中心
  # --------------------------------------------------------
  m1:
    name: "M1 多Agent调度中心"
    description: "多智能体集群调度与管理，负责Agent的创建、调度、负载均衡"
    prefix: "/m1"
    target: "http://localhost:8001"
    enabled: true
    timeout: 60.0
    health_path: "/health"
    auth_required: true
    public_paths:
      - "/health"
      - "/api/v1/public"
    rate_limit_per_minute: 120
    rate_limit_per_ip: 60
    rate_limit_tier: "public"
    supports_websocket: true
    supports_sse: true
    cb_failure_threshold: 5
    cb_recovery_time: 30

  # --------------------------------------------------------
  # M2 技能集群
  # --------------------------------------------------------
  m2:
    name: "M2 技能集群"
    description: "技能市场与技能执行引擎，提供各类AI能力调用"
    prefix: "/m2"
    target: "http://localhost:8002"
    enabled: true
    timeout: 30.0
    health_path: "/health"
    auth_required: true
    public_paths:
      - "/health"
      - "/api/v1/skills/public"
      - "/api/v1/categories"
    rate_limit_per_minute: 100
    rate_limit_per_ip: 50
    rate_limit_tier: "public"
    supports_websocket: false
    supports_sse: false
    cb_failure_threshold: 5
    cb_recovery_time: 30

  # --------------------------------------------------------
  # M3 端云协同内核
  # --------------------------------------------------------
  m3:
    name: "M3 端云协同内核"
    description: "端云协同计算框架，支持本地推理与云端协同"
    prefix: "/m3"
    target: "http://localhost:8003"
    enabled: true
    timeout: 120.0
    health_path: "/health"
    auth_required: true
    public_paths:
      - "/health"
      - "/api/v1/status"
    rate_limit_per_minute: 80
    rate_limit_per_ip: 40
    rate_limit_tier: "public"
    supports_websocket: true
    supports_sse: true
    cb_failure_threshold: 3
    cb_recovery_time: 60

  # --------------------------------------------------------
  # M4 场景引擎
