# ============================================================
# 云汐 API 网关 - 路由配置文件
# ============================================================
# 动态路由配置，支持热加载
# 修改此文件后，网关将自动检测变更并重新加载路由配置
# ============================================================

# 路由配置版本（用于配置管理和版本追踪）
version: "2.0.0"

# 全局默认配置（各路由可单独覆盖）
defaults:
  timeout: 30.0
  retry: 2
  strip_prefix: true
  enabled: true
  auth_required: true
  rate_limit:
    per_minute: 60
    per_ip: 30
    tier: "public"

# 路由表
routes:
  # --------------------------------------------------------
  # M1 多Agent调度中心
  # --------------------------------------------------------
  - id: m1
    name: "M1 多Agent调度中心"
    description: "多智能体集群调度与管理，负责Agent的创建、调度、负载均衡"
    path: /m1
    target: m1-service
    url: "http://localhost:8001"
    weight: 100
    methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
    timeout: 60.0
    retry: 2
    strip_prefix: true
    enabled: true
    auth_required: true
    health_path: /health
    health_timeout: 5.0
    public_paths:
      - /health
      - /api/v1/public
    rate_limit:
      per_minute: 120
      per_ip: 60
      tier: "public"
    supports_websocket: true
    supports_sse: true
    circuit_breaker:
      failure_threshold: 5
      recovery_time: 30
    plugins:
      - request_logging
      - trace_id

  # --------------------------------------------------------
  # M2 技能集群
  # --------------------------------------------------------
  - id: m2
    name: "M2 技能集群"
    description: "技能市场与技能执行引擎，提供各类AI能力调用"
