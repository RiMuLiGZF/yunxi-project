    url: "http://localhost:8002"
    weight: 100
    methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
    timeout: 30.0
    retry: 2
    strip_prefix: true
    enabled: true
    auth_required: true
    health_path: /health
    health_timeout: 5.0
    public_paths:
      - /health
      - /api/v1/skills/public
      - /api/v1/categories
    rate_limit:
      per_minute: 100
      per_ip: 50
      tier: "public"
    supports_websocket: false
    supports_sse: false
    circuit_breaker:
      failure_threshold: 5
      recovery_time: 30
    plugins:
      - request_logging
      - trace_id

  # --------------------------------------------------------
  # M3 端云协同内核
  # --------------------------------------------------------
  - id: m3
    name: "M3 端云协同内核"
    description: "端云协同计算框架，支持本地推理与云端协同"
