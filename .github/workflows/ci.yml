name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-module:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - M0-principal-console
          - M1-agent-hub
          - M2-skills-cluster
          - M3-edge-cloud
          - m4-scene-engine
          - M5-tide-memory
          - M6-hardware-peripheral
          - M7-workflow-builder
          - M8-control-tower
          - M9-programming-dev
          - M10-system-guard
          - M11-mcp-bus
          - M12-security-shield
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install shared dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff coverage

      - name: Install module dependencies
        run: |
          if [ -f "${{ matrix.module }}/requirements.txt" ]; then
            pip install -r "${{ matrix.module }}/requirements.txt"
          fi
        shell: bash

      - name: Check for tests
        id: check_tests
        run: |
          if [ -d "${{ matrix.module }}/tests" ] || [ -f "${{ matrix.module }}/pytest.ini" ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Run tests
        if: steps.check_tests.outputs.has_tests == 'true'
        run: |
          cd "${{ matrix.module }}"
          python -m pytest --tb=short -q --cov=. --cov-report=xml --timeout=60 || true

      - name: Lint check
        if: steps.check_tests.outputs.has_tests == 'true'
        run: |
          ruff check "${{ matrix.module }}" || true
        continue-on-error: true

      - name: Upload coverage
        if: steps.check_tests.outputs.has_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.module }}
          path: ${{ matrix.module }}/coverage.xml
          if-no-files-found: ignore

  coverage-summary:
    needs: test-module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install coverage
      - uses: actions/download-artifact@v4
        with:
          path: coverage-reports
          pattern: coverage-*
      - name: Combine coverage
        run: |
          coverage combine coverage-reports/*/coverage.xml || true
          coverage report || true
