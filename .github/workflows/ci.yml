name: CI - 代码质量与测试

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# 失败快速终止
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: 代码质量检查（Lint + 类型 + 安全）
  # ============================================================
  quality-check:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff>=0.6.0 mypy>=1.10.0 bandit>=1.7.0 radon>=6.0.0

      - name: Ruff - 代码风格检查
        run: |
          echo "=== Ruff Lint Check ==="
          ruff check . \
            --exclude="M5-tide-memory,_archive,archive,M1-agent-cluster,frontend,node_modules,data,logs,models,assets,artifacts" \
            --output-format=github \
            --statistics
        # 目前为警告模式，后续可改为阻断
        continue-on-error: true

      - name: Ruff - 代码格式化检查
        run: |
          echo "=== Ruff Format Check ==="
          ruff format --check . \
            --exclude="M5-tide-memory,_archive,archive,M1-agent-cluster,frontend,node_modules,data,logs,models,assets,artifacts"
        continue-on-error: true

      - name: Mypy - 核心模块类型检查
        run: |
          echo "=== Mypy Type Check (Core Modules) ==="
          mypy shared/core shared/data \
            --config-file=pyproject.toml \
            --show-error-codes \
            --color-output
        # 类型检查目前为警告模式
        continue-on-error: true

      - name: Bandit - 安全扫描（高/中风险）
        run: |
          echo "=== Bandit Security Scan ==="
          bandit -r shared/core shared/data shared/business M8-control-tower M9-dev-workshop M11-mcp-bus M12-security-shield \
            -c .bandit \
            -ll \
            -f json -o bandit-report.json \
            -x "tests,__pycache__,.git"
        continue-on-error: true

      - name: Radon - 圈复杂度检测
        run: |
          echo "=== Radon Cyclomatic Complexity ==="
          radon cc shared/core shared/data \
            -a -nc \
            --total-average \
            -x "tests,__pycache__"
        continue-on-error: true

      - name: Upload quality reports
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            bandit-report.json
          if-no-files-found: ignore

  # ============================================================
  # Job 2: 单元测试与覆盖率
  # ============================================================
  unit-tests:
    name: 单元测试与覆盖率
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install fastapi uvicorn httpx python-jose[cryptography] passlib[bcrypt]

      - name: Run unit tests with coverage
        run: |
          echo "=== Unit Tests with Coverage ==="
          python -m pytest tests/test_shared/ shared/tests/ \
            -m "unit and not slow" \
            -v \
            --tb=short \
            --cov=shared/core \
            --cov=shared/data \
            --cov=shared/business \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-config=.coveragerc \
            --timeout=30
        # 目前为非阻断模式，后续逐步加强
        continue-on-error: true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: ignore

  # ============================================================
  # Job 3: 集成测试
  # ============================================================
  integration-tests:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: unit-tests
    if: success() || needs.unit-tests.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx fastapi uvicorn

      - name: Run integration tests
        run: |
          echo "=== Integration Tests ==="
          python -m pytest tests/integration/ tests/test_integration/ \
            -m integration \
            -v \
            --tb=short \
            --timeout=120
        continue-on-error: true

  # ============================================================
  # Job 4: 构建与结构检查
  # ============================================================
  build-check:
    name: 构建与结构检查
    runs-on: ubuntu-latest
    needs: quality-check
    if: success() || always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify module structure
        run: |
          set -e
          echo "=== Module Structure Check ==="
          MISSING=0
          for dir in M0-principal-console M1-agent-hub M2-skills-cluster M3-edge-cloud M4-scene-engine M5-tide-memory M6-hardware-peripheral M7-workflow-builder M8-control-tower M9-dev-workshop M10-system-guard M11-mcp-bus M12-security-shield API-Gateway shared; do
            if [ -d "$dir" ]; then
              echo "PASS: $dir"
            else
              echo "FAIL: $dir MISSING"
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            echo "ERROR: Some modules are missing"
            exit 1
          fi
          echo "All required modules present."

      - name: Python syntax check
        run: |
          set -e
          echo "=== Python Syntax Check ==="
          find . -name "*.py" \
            -not -path "./M5-tide-memory/*" \
            -not -path "./_archive/*" \
            -not -path "./archive/*" \
            -not -path "./.git/*" \
            -not -path "*/__pycache__/*" \
            -not -path "*/.pytest_cache/*" \
            -not -path "./frontend/*" \
            -not -path "*/node_modules/*" | while read -r file; do
            python -m py_compile "$file" || exit 1
          done
          echo "All Python files pass syntax check"

  # ============================================================
  # Job 5: 质量门禁汇总
  # ============================================================
  quality-gate:
    name: 质量门禁汇总
    runs-on: ubuntu-latest
    needs: [quality-check, unit-tests, integration-tests, build-check]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Quality Gate Summary
        run: |
          echo "=========================================="
          echo "  云汐系统 CI 质量门禁汇总"
          echo "=========================================="
          echo ""
          echo "检查项:"
          echo "  [1] 代码风格检查 (Ruff Lint)    - 信息性"
          echo "  [2] 代码格式化检查 (Ruff Format) - 信息性"
          echo "  [3] 核心模块类型检查 (Mypy)    - 信息性"
          echo "  [4] 安全扫描 (Bandit)          - 信息性"
          echo "  [5] 复杂度检测 (Radon)         - 信息性"
          echo "  [6] 单元测试 + 覆盖率          - 信息性"
          echo "  [7] 集成测试                   - 信息性"
          echo "  [8] 构建与结构检查             - 阻断性"
          echo ""
          echo "当前阶段: 质量工具全部为信息性输出，"
          echo "后续将逐步提升为阻断性质检门禁。"
          echo ""
          echo "=========================================="
          echo "  详细报告请查看各 Job 输出"
          echo "=========================================="
