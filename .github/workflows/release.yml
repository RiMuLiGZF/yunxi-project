name: Release - 版本发布

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: 创建发布
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION"

      - name: Generate changelog
        run: |
          echo "# Changelog ${{ steps.version.outputs.version }}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")..HEAD >> CHANGELOG.md
          cat CHANGELOG.md

      - name: Build archive
        run: |
          mkdir -p release
          tar -czf release/yunxi-system-${{ steps.version.outputs.version }}.tar.gz \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='M5-tide-memory' \
            --exclude='archive' \
            --exclude='*.db' \
            --exclude='data/' \
            .
          echo "Archive created"
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: CHANGELOG.md
          files: |
            release/yunxi-system-${{ steps.version.outputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
