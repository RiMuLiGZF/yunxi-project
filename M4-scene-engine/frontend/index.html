<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M4 场景引擎 - 业务模式中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        .modes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .mode-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .mode-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #667eea, #764ba2);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .mode-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .mode-card:hover::before {
            opacity: 1;
        }

        .mode-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .mode-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .mode-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a2e;
        }

        .mode-desc {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .mode-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
        }

        .mode-category {
            font-size: 0.8rem;
            padding: 4px 10px;
            background: #f0f0ff;
            color: #667eea;
            border-radius: 12px;
        }

        .mode-priority {
            font-size: 0.8rem;
            color: #999;
        }

        .mode-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            display: inline-block;
            margin-right: 6px;
        }

        .mode-status.disabled {
            background: #9ca3af;
        }

        .section-title {
            color: white;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: white;
            border-radius: 2px;
        }

        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .api-link {
            display: inline-block;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .api-link:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .loading {
            text-align: center;
            color: white;
            padding: 40px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            color: #fecaca;
            padding: 40px;
        }

        @media (max-width: 640px) {
            header h1 {
                font-size: 1.8rem;
            }

            .modes-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌊 M4 场景引擎</h1>
            <p>业务模式中心 - 8 大模式，一站式体验</p>
            <div class="stats-bar" id="statsBar">
                <div class="stat-item">
                    <div class="stat-number" id="totalModes">-</div>
                    <div class="stat-label">业务模式</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalCategories">-</div>
                    <div class="stat-label">分类</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalScenes">-</div>
                    <div class="stat-label">场景</div>
                </div>
            </div>
        </header>

        <div class="section-title">业务模式</div>
        <div id="modesContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>加载中...</div>
            </div>
        </div>

        <footer>
            <div>M4 Scene Engine v1.0.0 | 云汐项目</div>
            <a href="/docs" class="api-link">📖 API 文档</a>
            <a href="/health" class="api-link">💓 健康检查</a>
        </footer>
    </div>

    <script>
        const API_BASE = '/api/v1';

        // HTML 转义（防 XSS）
        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            if (typeof str !== 'string') str = String(str);
            return str.replace(/[&<>"'`=\/]/g, function(char) {
                return {
                    '&': '&amp;', '<': '&lt;', '>': '&gt;',
                    '"': '&quot;', "'": '&#x27;', '/': '&#x2F;',
                    '`': '&#x60;', '=': '&#x3D;'
                }[char];
            });
        }

        async function loadModes() {
            const container = document.getElementById('modesContainer');
            try {
                const response = await fetch(`${API_BASE}/modes?only_enabled=false`);
                const result = await response.json();

                if (result.code !== 0) {
                    throw new Error(result.message || '加载失败');
                }

                const modes = result.data.modes || [];
                document.getElementById('totalModes').textContent = modes.length;

                if (modes.length === 0) {
                    // 安全改造：使用 DOM 操作替代 innerHTML
                    container.textContent = '';
                    var emptyDiv = document.createElement('div');
                    emptyDiv.className = 'error';
                    emptyDiv.textContent = '暂无业务模式';
                    container.appendChild(emptyDiv);
                    return;
                }

                const categoryNames = {
                    'growth': '成长',
                    'work': '工作',
                    'study': '学业',
                    'life': '生活',
                    'social': '社交',
                    'emotion': '情绪',
                    'appearance': '形象',
                    'general': '通用'
                };

                // 安全改造：使用 DOM 操作替代 innerHTML，防止 XSS
                container.textContent = '';
                var grid = document.createElement('div');
                grid.className = 'modes-grid';

                modes.forEach(mode => {
                    const categoryLabel = categoryNames[mode.category] || mode.category;
                    const disabledClass = mode.is_enabled ? '' : 'disabled';

                    // 创建卡片
                    var card = document.createElement('div');
                    card.className = 'mode-card' + (disabledClass ? ' ' + disabledClass : '');
                    card.addEventListener('click', function() {
                        enterMode(mode.mode_id);
                    });

                    // 图标（icon 字段来自 API，可能是 emoji，用 textContent 安全渲染）
                    var iconDiv = document.createElement('div');
                    iconDiv.className = 'mode-icon';
                    iconDiv.textContent = mode.icon || '';
                    card.appendChild(iconDiv);

                    // 模式名称
                    var nameDiv = document.createElement('div');
                    nameDiv.className = 'mode-name';
                    nameDiv.textContent = mode.mode_name || '';
                    card.appendChild(nameDiv);

                    // 模式描述
                    var descDiv = document.createElement('div');
                    descDiv.className = 'mode-desc';
                    descDiv.textContent = mode.mode_description || '';
                    card.appendChild(descDiv);

                    // 底部元信息
                    var metaDiv = document.createElement('div');
                    metaDiv.className = 'mode-meta';

                    var categorySpan = document.createElement('span');
                    categorySpan.className = 'mode-category';
                    categorySpan.textContent = categoryLabel;
                    metaDiv.appendChild(categorySpan);

                    var prioritySpan = document.createElement('span');
                    prioritySpan.className = 'mode-priority';

                    var statusSpan = document.createElement('span');
                    statusSpan.className = 'mode-status' + (mode.is_enabled ? '' : ' disabled');
                    prioritySpan.appendChild(statusSpan);

                    prioritySpan.appendChild(document.createTextNode(mode.is_enabled ? '已启用' : '未启用'));
                    metaDiv.appendChild(prioritySpan);

                    card.appendChild(metaDiv);
                    grid.appendChild(card);
                });

                container.appendChild(grid);

                // 加载分类统计
                loadCategories();
                // 加载场景统计
                loadScenes();

            } catch (error) {
                // 安全改造：使用 DOM 操作替代 innerHTML，防止错误消息中的 XSS
                container.textContent = '';
                var errorDiv = document.createElement('div');
                errorDiv.className = 'error';

                var errorMsg = document.createElement('div');
                errorMsg.textContent = '⚠️ 加载失败: ' + (error.message || '未知错误');
                errorDiv.appendChild(errorMsg);

                var errorHint = document.createElement('div');
                errorHint.style.fontSize = '0.85rem';
                errorHint.style.marginTop = '10px';
                errorHint.textContent = '请确保后端服务已启动';
                errorDiv.appendChild(errorHint);

                container.appendChild(errorDiv);
            }
        }

        async function loadCategories() {
            try {
                const response = await fetch(`${API_BASE}/modes/categories/list`);
                const result = await response.json();
                if (result.code === 0) {
                    document.getElementById('totalCategories').textContent = result.data.total;
                }
            } catch (e) {
                // 静默失败
            }
        }

        async function loadScenes() {
            try {
                const response = await fetch(`${API_BASE}/scenes`);
                const result = await response.json();
                if (result.code === 0) {
                    document.getElementById('totalScenes').textContent = result.data.total;
                }
            } catch (e) {
                // 静默失败
            }
        }

        async function enterMode(modeId) {
            try {
                const response = await fetch(`${API_BASE}/modes/${modeId}/enter`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: 'default',
                        context: {}
                    })
                });
                const result = await response.json();
                if (result.code === 0) {
                    const msg = result.data.message || `已进入模式`;
                    alert(msg);
                } else {
                    alert(`进入失败: ${result.message}`);
                }
            } catch (error) {
                alert(`操作失败: ${error.message}`);
            }
        }

        // 页面加载完成后获取数据
        document.addEventListener('DOMContentLoaded', loadModes);
    </script>
</body>
</html>
