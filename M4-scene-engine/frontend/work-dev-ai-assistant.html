<!DOCTYPE html>
<html lang="zh-CN" data-theme="work-dev">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 代码助手 — 云汐开发模式</title>
  <link rel="stylesheet" href="./colors_and_type.css">
  <script src="common/api.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font-family-base);
      font-size: var(--font-size-base);
      color: var(--color-text-primary);
      background: var(--color-page-bg);
    }
    .app-shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .top-bar {
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: var(--color-header-bg); border-bottom: 1px solid var(--color-header-border);
    }
    .back-btn {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      color: var(--color-text-secondary); font-size: 14px; padding: 6px 12px; border-radius: 8px;
      transition: all .2s;
    }
    .back-btn:hover { background: var(--color-hover-bg); color: var(--color-text-primary); }
    .page-title { font-size: 16px; font-weight: 600; }
    .main-body { flex: 1; display: flex; overflow: hidden; }

    .sidebar {
      width: 240px; border-right: 1px solid var(--color-border);
      background: var(--color-sidebar-bg); padding: 16px; overflow: auto;
    }
    .sidebar-section { margin-bottom: 20px; }
    .sidebar-title {
      font-size: 12px; color: var(--color-text-tertiary); text-transform: uppercase;
      margin-bottom: 10px; font-weight: 600; letter-spacing: 0.5px;
    }
    .action-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: 8px; cursor: pointer; font-size: 13px; transition: all .2s;
      margin-bottom: 4px;
    }
    .action-item:hover { background: var(--color-hover-bg); }
    .action-item.active {
      background: var(--color-primary-light);
      color: var(--color-primary-text);
    }
    .action-icon {
      width: 28px; height: 28px; border-radius: 6px;
      background: var(--color-hover-bg); display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header {
      padding: 16px 24px; border-bottom: 1px solid var(--color-border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .chat-title { font-size: 15px; font-weight: 600; }
    .model-select {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; background: var(--color-card-bg); border: 1px solid var(--color-border);
      border-radius: 8px; font-size: 12px; cursor: pointer;
    }
    .model-select .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #00B42A;
    }
    .model-select .status-dot.offline {
      background: #FF7D00;
    }

    .chat-messages {
      flex: 1; overflow: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px;
    }
    .message { display: flex; gap: 12px; max-width: 85%; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message-avatar {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .message.user .message-avatar {
      background: linear-gradient(135deg, #165DFF, #722ED1); color: white;
    }
    .message.assistant .message-avatar {
      background: linear-gradient(135deg, #00B42A, #165DFF); color: white;
    }
    .message-content {
      background: var(--color-card-bg); border: 1px solid var(--color-border);
      border-radius: 12px; padding: 14px 16px; font-size: 14px; line-height: 1.6;
      min-width: 200px;
    }
    .message.user .message-content {
      background: var(--color-primary-light); border-color: var(--color-primary-light);
    }
    .message-content p { margin-bottom: 8px; }
    .message-content p:last-child { margin-bottom: 0; }
    .message-content ul, .message-content ol {
      margin: 8px 0; padding-left: 24px;
    }
    .message-content li { margin-bottom: 4px; }
    .message-content strong { font-weight: 600; }

    /* 代码块样式 */
    .code-block-wrapper {
      position: relative;
      margin: 10px 0;
      border-radius: 8px;
      overflow: hidden;
      background: #1e1e2e;
    }
    .code-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: #313244;
      font-size: 12px;
      color: #cdd6f4;
    }
    .code-block-lang {
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      font-weight: 500;
    }
    .copy-btn {
      background: transparent;
      border: 1px solid #45475a;
      color: #bac2de;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: all .2s;
    }
    .copy-btn:hover {
      background: #45475a;
      color: #fff;
    }
    .copy-btn.copied {
      background: #00B42A;
      border-color: #00B42A;
      color: #fff;
    }
    .message-content pre {
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 12px;
      overflow-x: auto;
      font-size: 13px;
      margin: 0;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      line-height: 1.5;
    }
    .message-content code {
      background: var(--color-hover-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      font-size: 13px;
    }
    .message-content pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      color: inherit;
    }

    .chat-input-area {
      padding: 16px 24px; border-top: 1px solid var(--color-border);
      background: var(--color-card-bg);
    }
    .chat-input-wrapper {
      display: flex; align-items: flex-end; gap: 12px;
      background: var(--color-page-bg); border: 1px solid var(--color-border);
      border-radius: 12px; padding: 12px;
    }
    .chat-input {
      flex: 1; border: none; outline: none; resize: none;
      font-size: 14px; font-family: inherit; background: transparent;
      color: var(--color-text-primary); min-height: 24px; max-height: 150px;
    }
    .send-btn {
      background: var(--color-primary); color: white; border: none; border-radius: 8px;
      padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 6px; transition: opacity .2s;
    }
    .send-btn:hover { opacity: .9; }
    .send-btn:disabled { opacity: .5; cursor: not-allowed; }

    .quick-prompt {
      display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .quick-prompt-chip {
      padding: 6px 12px; background: var(--color-hover-bg); border-radius: 20px;
      font-size: 12px; cursor: pointer; transition: all .2s;
    }
    .quick-prompt-chip:hover { background: var(--color-primary-light); color: var(--color-primary-text); }

    /* 加载动画 */
    .loading-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .loading-dots {
      display: inline-flex;
      gap: 4px;
    }
    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-text-secondary);
      animation: dotPulse 1.4s infinite ease-in-out both;
    }
    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* 欢迎界面 */
    .welcome-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }
    .welcome-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #00B42A, #165DFF);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }
    .welcome-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .welcome-subtitle {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-bottom: 32px;
      max-width: 500px;
    }
    .welcome-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 600px;
      width: 100%;
    }
    .welcome-card {
      background: var(--color-card-bg);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 16px;
      text-align: left;
      cursor: pointer;
      transition: all .2s;
    }
    .welcome-card:hover {
      border-color: var(--color-primary);
      transform: translateY(-2px);
    }
    .welcome-card-icon {
      font-size: 20px;
      margin-bottom: 8px;
    }
    .welcome-card-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .welcome-card-desc {
      font-size: 12px;
      color: var(--color-text-tertiary);
      line-height: 1.4;
    }

    /* 滚动条样式 */
    .chat-messages::-webkit-scrollbar,
    .sidebar::-webkit-scrollbar {
      width: 6px;
    }
    .chat-messages::-webkit-scrollbar-track,
    .sidebar::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-messages::-webkit-scrollbar-thumb,
    .sidebar::-webkit-scrollbar-thumb {
      background: var(--color-border);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="top-bar">
      <div style="display:flex;align-items:center;gap:16px;">
        <div class="back-btn" onclick="location.href='work-dev.html'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          返回开发模式
        </div>
        <div class="page-title">AI 代码助手</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <div class="model-select" id="model-status" title="点击查看详情">
          <span class="status-dot" id="status-dot"></span>
          <span id="model-name">加载中...</span>
        </div>
      </div>
    </div>
    <div class="main-body">
      <div class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-title">代码操作</div>
          <div class="action-item active" data-action="generate" onclick="selectAction('generate')">
            <div class="action-icon">✨</div>
            <span>生成代码</span>
          </div>
          <div class="action-item" data-action="review" onclick="selectAction('review')">
            <div class="action-icon">🔍</div>
            <span>代码审查</span>
          </div>
          <div class="action-item" data-action="debug" onclick="selectAction('debug')">
            <div class="action-icon">🐛</div>
            <span>调试帮助</span>
          </div>
          <div class="action-item" data-action="optimize" onclick="selectAction('optimize')">
            <div class="action-icon">⚡</div>
            <span>性能优化</span>
          </div>
          <div class="action-item" data-action="refactor" onclick="selectAction('refactor')">
            <div class="action-icon">🔄</div>
            <span>代码重构</span>
          </div>
          <div class="action-item" data-action="explain" onclick="selectAction('explain')">
            <div class="action-icon">📖</div>
            <span>代码解释</span>
          </div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-title">语言支持</div>
          <div class="action-item active" data-lang="python" onclick="selectLanguage('python')">
            <div class="action-icon">🐍</div>
            <span>Python</span>
          </div>
          <div class="action-item" data-lang="javascript" onclick="selectLanguage('javascript')">
            <div class="action-icon">📜</div>
            <span>JavaScript</span>
          </div>
          <div class="action-item" data-lang="typescript" onclick="selectLanguage('typescript')">
            <div class="action-icon">🔷</div>
            <span>TypeScript</span>
          </div>
          <div class="action-item" data-lang="go" onclick="selectLanguage('go')">
            <div class="action-icon">🔵</div>
            <span>Go</span>
          </div>
          <div class="action-item" data-lang="rust" onclick="selectLanguage('rust')">
            <div class="action-icon">🦀</div>
            <span>Rust</span>
          </div>
        </div>
      </div>

      <div class="chat-area">
        <div class="chat-header">
          <div class="chat-title" id="chat-title">生成代码</div>
          <div style="font-size:12px;color:var(--color-text-tertiary);">
            当前语言: <span id="current-lang-display">Python</span>
          </div>
        </div>

        <div class="chat-messages" id="chat-messages">
          <!-- 欢迎界面 -->
          <div class="welcome-screen" id="welcome-screen">
            <div class="welcome-icon">🤖</div>
            <div class="welcome-title">云汐 AI 代码助手</div>
            <div class="welcome-subtitle">
              我是你的代码专家助手，可以帮你生成、审查、调试、优化、重构和解释代码。<br>
              选择左侧的操作类型和语言，然后输入你的需求开始对话。
            </div>
            <div class="welcome-cards">
              <div class="welcome-card" onclick="sendQuickPrompt('帮我写一个快速排序算法')">
                <div class="welcome-card-icon">✨</div>
                <div class="welcome-card-title">生成代码</div>
                <div class="welcome-card-desc">根据需求生成高质量代码</div>
              </div>
              <div class="welcome-card" onclick="sendQuickPrompt('帮我审查这段代码的问题')">
                <div class="welcome-card-icon">🔍</div>
                <div class="welcome-card-title">代码审查</div>
                <div class="welcome-card-desc">发现 Bug 和改进建议</div>
              </div>
              <div class="welcome-card" onclick="sendQuickPrompt('帮我优化这个函数的性能')">
                <div class="welcome-card-icon">⚡</div>
                <div class="welcome-card-title">性能优化</div>
                <div class="welcome-card-desc">提升代码运行效率</div>
              </div>
            </div>
          </div>
        </div>

        <div class="chat-input-area">
          <div class="quick-prompt">
            <div class="quick-prompt-chip" onclick="sendQuickPrompt('快速排序算法')">快速排序</div>
            <div class="quick-prompt-chip" onclick="sendQuickPrompt('REST API 接口示例')">REST API</div>
            <div class="quick-prompt-chip" onclick="sendQuickPrompt('解释这段代码的逻辑')">解释代码</div>
            <div class="quick-prompt-chip" onclick="sendQuickPrompt('优化这个函数的性能')">优化性能</div>
            <div class="quick-prompt-chip" onclick="sendQuickPrompt('生成单元测试用例')">单元测试</div>
          </div>
          <div class="chat-input-wrapper">
            <textarea
              class="chat-input"
              id="chat-input"
              placeholder="输入你的编程问题... (Enter 发送，Shift+Enter 换行)"
              rows="1"
            ></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMessage()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              发送
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── 状态管理 ──────────────────────────────────────────────────
    let currentAction = 'generate';
    let currentLanguage = 'python';
    let isLoading = false;
    let conversationId = 'code_chat_' + Date.now();
    let messageCount = 0;

    const actionTitles = {
      generate: '生成代码',
      review: '代码审查',
      debug: '调试帮助',
      optimize: '性能优化',
      refactor: '代码重构',
      explain: '代码解释',
    };

    const langNames = {
      python: 'Python',
      javascript: 'JavaScript',
      typescript: 'TypeScript',
      go: 'Go',
      rust: 'Rust',
    };

    // ── 初始化 ──────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      checkAIStatus();
      setupInputHandlers();
    });

    async function checkAIStatus() {
      try {
        const data = await YunxiAPI.request('GET', 'work-dev/code/ai/status');
        if (data) {
          const dot = document.getElementById('status-dot');
          const name = document.getElementById('model-name');
          if (data.available) {
            dot.classList.remove('offline');
            name.textContent = `${data.provider || 'llm'} / ${data.model || 'model'}`;
          } else {
            dot.classList.add('offline');
            name.textContent = '模板模式（降级）';
          }
        }
      } catch (e) {
        const dot = document.getElementById('status-dot');
        const name = document.getElementById('model-name');
        dot.classList.add('offline');
        name.textContent = '连接中...';
      }
    }

    // ── 操作类型切换 ────────────────────────────────────────────
    function selectAction(action) {
      currentAction = action;
      document.querySelectorAll('[data-action]').forEach(el => {
        el.classList.toggle('active', el.dataset.action === action);
      });
      document.getElementById('chat-title').textContent = actionTitles[action] || '代码助手';

      // 更新输入框 placeholder
      const placeholders = {
        generate: '描述你想要生成的代码功能...',
        review: '粘贴你想要审查的代码...',
        debug: '描述你遇到的错误或问题，粘贴相关代码...',
        optimize: '粘贴你想要优化的代码...',
        refactor: '粘贴你想要重构的代码...',
        explain: '粘贴你想要理解的代码...',
      };
      document.getElementById('chat-input').placeholder =
        placeholders[action] + ' (Enter 发送，Shift+Enter 换行)';
    }

    // ── 语言切换 ────────────────────────────────────────────────
    function selectLanguage(lang) {
      currentLanguage = lang;
      document.querySelectorAll('[data-lang]').forEach(el => {
        el.classList.toggle('active', el.dataset.lang === lang);
      });
      document.getElementById('current-lang-display').textContent = langNames[lang] || lang;
    }

    // ── 快速提示 ────────────────────────────────────────────────
    function sendQuickPrompt(text) {
      document.getElementById('chat-input').value = text;
      sendMessage();
    }

    // ── 发送消息 ────────────────────────────────────────────────
    async function sendMessage() {
      if (isLoading) return;
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      // 隐藏欢迎界面
      hideWelcomeScreen();

      // 添加用户消息
      addMessage('user', text);
      input.value = '';
      input.style.height = 'auto';
      isLoading = true;
      document.getElementById('send-btn').disabled = true;

      // 添加加载中消息
      const loadingId = addLoadingMessage();

      try {
        // 调用后端代码对话接口（多轮对话）
        const data = await YunxiAPI.request('POST', 'work-dev/code/chat', {
          body: {
            message: text,
            language: currentLanguage,
            conversation_id: conversationId,
          }
        });

        removeMessage(loadingId);

        if (data && data.reply) {
          addMessage('assistant', data.reply);
          messageCount = data.message_count || messageCount + 1;
        } else {
          addMessage('assistant', '抱歉，没有收到有效回复，请稍后重试。');
        }
      } catch (e) {
        removeMessage(loadingId);
        addMessage('assistant',
          `抱歉，请求失败了。\n\n错误信息：${e.message || '未知错误'}\n\n请检查后端服务是否正常运行。`
        );
      } finally {
        isLoading = false;
        document.getElementById('send-btn').disabled = false;
        input.focus();
      }
    }

    // ── 消息渲染 ────────────────────────────────────────────────
    function addMessage(role, content) {
      const container = document.getElementById('chat-messages');
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;
      const avatar = role === 'user' ? '👤' : '🤖';
      msgDiv.innerHTML = `
        <div class="message-avatar">${avatar}</div>
        <div class="message-content">${formatMessage(content)}</div>
      `;
      container.appendChild(msgDiv);
      scrollToBottom();
      return msgDiv;
    }

    function addLoadingMessage() {
      const container = document.getElementById('chat-messages');
      const id = 'loading-' + Date.now();
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message assistant';
      msgDiv.id = id;
      msgDiv.innerHTML = `
        <div class="message-avatar">🤖</div>
        <div class="message-content">
          <div class="loading-indicator">
            <div class="loading-dots">
              <span></span><span></span><span></span>
            </div>
            <span style="font-size:13px;color:var(--color-text-secondary);">思考中...</span>
          </div>
        </div>
      `;
      container.appendChild(msgDiv);
      scrollToBottom();
      return id;
    }

    function removeMessage(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function hideWelcomeScreen() {
      const welcome = document.getElementById('welcome-screen');
      if (welcome) {
        welcome.style.display = 'none';
      }
    }

    function scrollToBottom() {
      const container = document.getElementById('chat-messages');
      container.scrollTop = container.scrollHeight;
    }

    // ── 消息格式化（Markdown 子集） ─────────────────────────────
    function formatMessage(text) {
      if (!text) return '';

      let html = escapeHtml(text);

      // 处理代码块 ```language ... ```
      const codeBlockRegex = /```(\w+)?\n([\s\S]*?)```/g;
      html = html.replace(codeBlockRegex, (match, lang, code) => {
        const language = lang || 'text';
        const codeId = 'code-' + Math.random().toString(36).substr(2, 9);
        return `
          <div class="code-block-wrapper">
            <div class="code-block-header">
              <span class="code-block-lang">${language}</span>
              <button class="copy-btn" onclick="copyCode('${codeId}', this)">复制</button>
            </div>
            <pre><code id="${codeId}">${code}</code></pre>
          </div>
        `;
      });

      // 处理行内代码 `code`
      html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');

      // 处理粗体 **text**
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

      // 处理标题 ### text
      html = html.replace(/^###\s+(.+)$/gm, '<p><strong>$1</strong></p>');

      // 处理无序列表 - item
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

      // 处理有序列表 1. item
      html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => {
        // 已经被 ul 包裹的不处理
        if (match.includes('<ul>') || match.includes('<ol>')) return match;
        return '<ol>' + match + '</ol>';
      });

      // 处理换行
      html = html.replace(/\n/g, '<br>');

      // 清理多余的空行
      html = html.replace(/(<br>\s*){3,}/g, '<br><br>');

      return html;
    }

    // ── 复制代码 ────────────────────────────────────────────────
    function copyCode(codeId, btn) {
      const codeEl = document.getElementById(codeId);
      if (!codeEl) return;

      const text = codeEl.textContent;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.textContent;
        btn.textContent = '已复制';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = originalText;
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => {
        // fallback
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        btn.textContent = '已复制';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '复制';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // ── 工具函数 ────────────────────────────────────────────────
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ── 输入框事件 ──────────────────────────────────────────────
    function setupInputHandlers() {
      const input = document.getElementById('chat-input');

      // 快捷键：Enter 发送，Shift+Enter 换行
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // 自动调整高度
      input.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 150) + 'px';
      });
    }
  </script>
</body>
