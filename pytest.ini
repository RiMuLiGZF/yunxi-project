# 云汐系统 - pytest 配置
# 注意：由于项目中存在幽灵目录（目录项存在但内容不可读），
# 需使用 collect_ignore 完全忽略这些目录

[pytest]
testpaths =
    shared/tests

# 完全忽略的目录（幽灵目录，内容不可读）
collect_ignore =
    M1-agent-cluster
    M2-skill-cluster
    M3-edge-cloud
    M4-scene-engine
    M5-tide-memory
    M6-hardware-hub
    M7-workflow
    M8-control-tower
    M9-dev-workshop
    M10-system-guard
    frontend
    .git
    __pycache__
    .pytest_cache

norecursedirs =
    .git
    __pycache__
    .pytest_cache

# 测试文件匹配模式
python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_*

# 输出格式
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# 标记定义
markers =
    slow: 标记为慢测试
    integration: 集成测试
    unit: 单元测试
    e2e: 端到端测试
    api: API测试
    db: 数据库相关测试

# 禁用警告过滤（保留重要警告）
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
