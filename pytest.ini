# ============================================================
# 云汐系统 - pytest 全局配置
# 文档: https://docs.pytest.org/
# ============================================================

[pytest]
# ---- 测试发现配置 ----
testpaths = tests shared/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 不递归扫描的目录
norecursedirs =
    .git
    __pycache__
    .pytest_cache
    node_modules
    reports
    data
    archive
    _archive
    .venv
    venv
    frontend
    docs
    assets
    artifacts
    models
    M1-agent-cluster
    M5-tide-memory
    backups
    inspection-reports
    .ruff_cache
    .mypy_cache

# ============================================================
# 标记分类（测试类型 + 模块 + 功能域 + 专项）
# 使用 --strict-markers 强制标记必须在此处声明
# ============================================================
markers =
    # ---- 测试类型 ----
    smoke: 冒烟测试 - 核心功能快速验证（CI 必跑）
    unit: 单元测试 - 单个组件/函数测试，mock 外部依赖（默认运行）
    integration: 集成测试 - 多模块/服务交互测试，需要真实服务运行（默认跳过，使用 -m integration 运行）
    e2e: 端到端测试 - 完整业务流程测试，需要完整环境（默认跳过，使用 -m e2e 运行）
    security: 安全测试 - 安全相关功能验证
    performance: 性能测试 - 性能基准与回归测试（默认跳过，使用 -m performance 运行）
    slow: 慢速测试 - 执行时间较长的测试（默认跳过，使用 --runslow 执行）
    flaky: 不稳定测试 - 偶发失败的测试，启用重跑机制

    # ---- 模块标记 ----
    m0: M0主控台相关测试
    m1: M1智能体集群相关测试
    m2: M2技能集群相关测试
    m3: M3端云协同相关测试
    m4: M4场景引擎相关测试
    m5: M5潮汐记忆相关测试
    m6: M6硬件外设相关测试
    m7: M7工作流编排相关测试
    m8: M8控制塔相关测试
    m9: M9开发工坊相关测试
    m10: M10系统卫士相关测试
    m11: M11 MCP总线相关测试
    m12: M12安全盾相关测试
    shared: shared公共模块相关测试
    gateway: API网关相关测试

    # ---- 功能域标记 ----
    compute: 算力调度相关测试
    health: 健康检查相关测试
    auth: 认证授权相关测试
    skill: 技能相关测试
    execution: 执行相关测试
    knowledge: 知识库相关测试
    graph: 图谱查询相关测试
    codegen: 代码生成相关测试
    project: 项目管理相关测试
    memory: 记忆存储相关测试
    search: 搜索相关测试
    device: 设备管理相关测试
    workflow: 工作流相关测试
    config: 配置模块相关测试
    response: 响应格式相关测试
    error: 错误码相关测试
    logger: 日志工具相关测试
    mcp: MCP协议相关测试
    apikey: API Key相关测试
    jwt: JWT相关测试
    backup: 备份调度相关测试
    module: 模块管理相关测试
    middleware: 中间件相关测试
    tool: 工具管理相关测试
    sse: SSE连接相关测试
    db: 数据库相关测试
    server: 服务器注册相关测试

# ============================================================
# 日志配置
# ============================================================
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_file = tests/reports/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s

# ============================================================
# 运行选项
# ============================================================
addopts =
    --strict-markers
    -v
    --tb=short
    --ignore=archive
    --ignore=_archive
    --ignore=M1-agent-cluster
    --ignore=M5-tide-memory
    # 默认排除需要真实服务的测试类型（使用 -m 手动运行）
    -m "not e2e and not integration and not performance and not slow"
    # 慢测试显示（>1s 的测试会被标记）
    --durations=20
    --durations-min=1.0
    # 失败时进入调试（可选，注释掉默认关闭）
    # --pdb
    # 彩色输出
    --color=yes

# ============================================================
# 异步测试配置（pytest-asyncio）
# ============================================================
asyncio_mode = auto

# ============================================================
# 测试超时配置（pytest-timeout）
# 单元测试 30s，集成测试 120s
# 可通过 @pytest.mark.timeout(seconds) 单测覆盖
# ============================================================
timeout = 30
# Windows 下使用 thread 方法（signal 方法仅支持 Unix）
# 如需跨平台兼容，使用 thread 方法
timeout_method = thread

# ============================================================
# 失败重跑配置（pytest-rerunfailures）
# 仅对标记为 flaky 的测试启用重跑，避免掩盖真实问题
# ============================================================
# only_rerun 与 markers 配合使用：标记 flaky 的测试才重跑
# 注意：pytest-rerunfailures 不支持 ini 配置 only_rerun，
# 需在命令行或 conftest 中通过 --only-rerun 参数指定

# ============================================================
# 并行测试配置（pytest-xdist）
# 使用 -n auto 自动检测 CPU 核心数
# 注意：启用并行时需确保测试间无状态依赖
# ============================================================
# addopts 中添加 -n auto 可启用并行，默认关闭以兼容有状态测试

# ============================================================
# 覆盖率配置（pytest-cov）
# 详细配置见 .coveragerc
# ============================================================
# 覆盖率源路径（与 .coveragerc 的 source 保持一致）
# 可通过 --no-cov 临时禁用覆盖率统计
# addopts 中不默认开启 --cov，由脚本和 CI 显式控制
