# ============================================================
# 云汐系统 - pytest 全局配置
# ============================================================

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
norecursedirs = 
    .git
    __pycache__
    .pytest_cache
    node_modules
    reports
    data
    archive
    .venv
    venv
    frontend
    docs
    assets
    artifacts
    models
    M1-agent-cluster

# 标记分类（测试类型 + 模块 + 功能域）
markers =
    # ---- 测试类型 ----
    smoke: 冒烟测试 - 核心功能快速验证
    unit: 单元测试 - 单个组件/函数测试
    integration: 集成测试 - 多模块/端到端测试
    e2e: 端到端测试 - 完整流程测试
    slow: 慢速测试 - 执行时间较长的测试
    # ---- 模块标记 ----
    m0: M0主控台相关测试
    m1: M1智能体集群相关测试
    m2: M2技能集群相关测试
    m3: M3端云协同相关测试
    m4: M4场景引擎相关测试
    m5: M5潮汐记忆相关测试
    m6: M6硬件外设相关测试
    m7: M7工作流编排相关测试
    m8: M8控制塔相关测试
    m9: M9开发工坊相关测试
    m10: M10系统卫士相关测试
    m11: M11 MCP总线相关测试
    m12: M12安全盾相关测试
    shared: shared公共模块相关测试
    gateway: API网关相关测试
    # ---- 功能域标记 ----
    compute: 算力调度相关测试
    health: 健康检查相关测试
    auth: 认证授权相关测试
    skill: 技能相关测试
    execution: 执行相关测试
    knowledge: 知识库相关测试
    graph: 图谱查询相关测试
    codegen: 代码生成相关测试
    project: 项目管理相关测试
    memory: 记忆存储相关测试
    search: 搜索相关测试
    device: 设备管理相关测试
    workflow: 工作流相关测试
    config: 配置模块相关测试
    response: 响应格式相关测试
    error: 错误码相关测试
    logger: 日志工具相关测试
    mcp: MCP协议相关测试
    apikey: API Key相关测试
    jwt: JWT相关测试
    backup: 备份调度相关测试
    module: 模块管理相关测试
    middleware: 中间件相关测试
    tool: 工具管理相关测试
    sse: SSE连接相关测试
    db: 数据库相关测试
    server: 服务器注册相关测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 运行选项
addopts = 
    --strict-markers
    -v
    --tb=short
    --ignore=archive
    --ignore=M1-agent-cluster

# 异步测试配置
asyncio_mode = auto
