# ============================================================
# 云汐系统 - pytest 全局配置
# ============================================================

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
norecursedirs = 
    .git
    __pycache__
    .pytest_cache
    node_modules
    reports
    data
    M1-agent-cluster

# 标记
markers =
    smoke: 冒烟测试 - 核心功能快速验证
    integration: 集成测试 - 多模块/端到端测试
    unit: 单元测试 - 单个组件测试
    slow: 慢速测试 - 执行时间较长的测试
    m8: M8管理台相关测试
    m1: M1调度模块相关测试
    m2: M2技能集群相关测试
    m3: M3知识图谱相关测试
    m4: M4代码生成相关测试
    m5: M5潮汐记忆相关测试
    m6: M6硬件外设相关测试
    m7: M7工作流相关测试
    compute: 算力调度相关测试
    health: 健康检查相关测试
    auth: 认证授权相关测试
    skill: 技能相关测试
    execution: 执行相关测试
    knowledge: 知识库相关测试
    graph: 图谱查询相关测试
    codegen: 代码生成相关测试
    project: 项目管理相关测试
    memory: 记忆存储相关测试
    search: 搜索相关测试
    device: 设备管理相关测试
    workflow: 工作流相关测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 运行选项
addopts = 
    --strict-markers
    -v
    --tb=short
