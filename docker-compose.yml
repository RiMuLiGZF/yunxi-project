      start_period: 10s
    restart: unless-stopped

  # ----------------------------------------------------------
  # M8 管理工作台
  # ----------------------------------------------------------
  yunxi-m8:
    build:
      context: .
      dockerfile: M8-control-tower/Dockerfile
    container_name: yunxi-m8
    ports:
      - "8008:8008"
    env_file:
      - ./config/yunxi.env
    environment:
      - M8_PORT=8008
