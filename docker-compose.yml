      - redis
      - chromadb
    networks:
      - yunxi-net
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ----------------------------------------------------------
  # M6 硬件外设模拟服务
  # ----------------------------------------------------------
  yunxi-m6:
    build:
      context: .
      dockerfile: M6-hardware-peripheral/Dockerfile
    container_name: yunxi-m6
    ports:
