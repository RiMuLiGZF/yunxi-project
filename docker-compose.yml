# ============================================================
# 云汐系统 - Docker Compose 完整编排
# 用法: docker compose up -d
# 说明: 包含外部依赖服务(redis/chromadb) + 13个业务模块
# ============================================================

services:
  # ----------------------------------------------------------
  # 基础设施服务
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: yunxi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - yunxi-net
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: yunxi-chromadb
    ports:
      - "8100:8000"  # 端口映射到 8100，避免与 M0 的 8000 冲突
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - yunxi-net
    restart: unless-stopped

  # ----------------------------------------------------------
  # API Gateway - 统一接入层（路由转发、认证鉴权、限流熔断）
  # ----------------------------------------------------------
  yunxi-gateway:
    build:
      context: .
      dockerfile: API-Gateway/Dockerfile
    container_name: yunxi-gateway
    ports:
      - "8080:8080"
    env_file:
      - ./config/yunxi.env
    environment:
      - GATEWAY_PORT=8080
      - M8_BASE_URL=http://yunxi-m8:8008
      - M1_BASE_URL=http://yunxi-m1:8001
      - M2_BASE_URL=http://yunxi-m2:8002
      - M3_BASE_URL=http://yunxi-m3:8003
      - M4_BASE_URL=http://yunxi-m4:8004
      - M5_BASE_URL=http://yunxi-m5:8005
      - M6_BASE_URL=http://yunxi-m6:8006
      - M7_BASE_URL=http://yunxi-m7:8007
      - M9_BASE_URL=http://yunxi-m9:8009
      - M10_BASE_URL=http://yunxi-m10:8010
      - M11_BASE_URL=http://yunxi-m11:8011
      - M12_BASE_URL=http://yunxi-m12:8012
    depends_on:
      - redis
      - yunxi-m8
    networks:
      - yunxi-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ----------------------------------------------------------
  # M0 主理人管控台 - 系统总入口
  # ----------------------------------------------------------
  yunxi-m0:
    build:
      context: .
      dockerfile: M0-principal-console/Dockerfile
    container_name: yunxi-m0
    ports:
      - "8000:8000"
    env_file:
      - ./config/yunxi.env
    environment:
      - M0_PORT=8000
    depends_on:
      - redis
    networks:
      - yunxi-net
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ----------------------------------------------------------
  # M1 多Agent调度中心
  # ----------------------------------------------------------
  yunxi-m1:
    build:
      context: .
      dockerfile: M1-agent-hub/Dockerfile
    container_name: yunxi-m1
