      - redis
    networks:
      - yunxi-net
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ----------------------------------------------------------
  # M2 技能集群
  # ----------------------------------------------------------
  yunxi-m2:
    build:
      context: .
      dockerfile: M2-skills-cluster/Dockerfile
    container_name: yunxi-m2
