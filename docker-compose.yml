# ============================================================
# 云汐系统 - Docker Compose 完整编排 v2.0
# 用法:
#   开发环境: docker compose up -d
#   生产环境: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# 说明: 包含外部依赖服务 + 12个业务模块 + 监控基础设施
# 特性:
#   - 多阶段构建 Dockerfile（docker/ 目录）
#   - 非 root 用户运行
#   - 健康检查体系（live/ready/startup）
#   - 资源限制
#   - 内部网络隔离
#   - 数据卷持久化
#   - 重启策略
#   - Traefik 反向代理预留
# ============================================================

x-common-env: &common-env
  YUNXI_ENV: production
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  TZ: Asia/Shanghai
  REDIS_URL: redis://redis:6379/0

x-common-restart: &common-restart
  restart: unless-stopped

x-common-networks: &common-networks
  networks:
    - yunxi-net

x-common-logging: &common-logging
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:
  # ============================================================
  # 基础设施服务
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: yunxi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M

  chromadb:
    image: chromadb/chroma:latest
    container_name: yunxi-chromadb
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=chromadb.auth.token.TokenConfigServerAuthCredentialsProvider
      - CHROMA_SERVER_AUTH_PROVIDER=chromadb.auth.token.TokenAuthServerProvider
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M

  # ============================================================
  # API 网关 - 统一接入层
  # ============================================================
  yunxi-gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    container_name: yunxi-gateway
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
      GATEWAY_PORT: "8080"
      GATEWAY_HOST: "0.0.0.0"
      M1_BASE_URL: http://yunxi-m1:8001
      M2_BASE_URL: http://yunxi-m2:8002
      M3_BASE_URL: http://yunxi-m3:8003
      M4_BASE_URL: http://yunxi-m4:8004
      M5_BASE_URL: http://yunxi-m5:8005
      M6_BASE_URL: http://yunxi-m6:8006
      M7_BASE_URL: http://yunxi-m7:8007
      M8_BASE_URL: http://yunxi-m8:8008
      M9_BASE_URL: http://yunxi-m9:8009
      M10_BASE_URL: http://yunxi-m10:8010
      M11_BASE_URL: http://yunxi-m11:8011
      M12_BASE_URL: http://yunxi-m12:8012
      GATEWAY_JWT_SECRET: yunxi-m8-jwt-secret-2026
      GATEWAY_JWT_ALGORITHM: HS256
      GATEWAY_JWT_ISSUER: yunxi
      GATEWAY_RATE_LIMIT_TOTAL: "600"
      GATEWAY_RATE_LIMIT_PER_IP: "100"
      GATEWAY_CB_THRESHOLD: "5"
      GATEWAY_CB_RECOVERY: "30"
      GATEWAY_ENABLE_DEV_KEY: "false"
    depends_on:
      redis:
        condition: service_healthy
      yunxi-m8:
        condition: service_healthy
    volumes:
      - ./logs/gateway:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  # ============================================================
  # M0 主理人管控台
  # ============================================================
  yunxi-m0:
    build:
      context: .
      dockerfile: docker/m0.Dockerfile
    container_name: yunxi-m0
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      M0_PORT: "8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs/m0:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M

  # ============================================================
  # M1 对话核心
  # ============================================================
  yunxi-m1:
    build:
      context: .
      dockerfile: docker/m1.Dockerfile
    container_name: yunxi-m1
    ports:
      - "8001:8001"
    environment:
      <<: *common-env
      M1_PORT: "8001"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs/m1:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M

  # ============================================================
  # M2 技能集群
  # ============================================================
  yunxi-m2:
    build:
      context: .
      dockerfile: docker/m2.Dockerfile
    container_name: yunxi-m2
    ports:
      - "8002:8002"
    environment:
      <<: *common-env
      M2_PORT: "8002"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs/m2:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M

  # ============================================================
  # M3 端云协同内核
  # ============================================================
  yunxi-m3:
    build:
      context: .
      dockerfile: API-Gateway/Dockerfile
    container_name: yunxi-m3
    ports:
      - "8003:8003"
    environment:
      <<: *common-env
      M3_PORT: "8003"
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./logs/m3:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8003/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M

  # ============================================================
  # M4 场景引擎
  # ============================================================
  yunxi-m4:
    build:
      context: .
      dockerfile: docker/m4.Dockerfile
    container_name: yunxi-m4
    ports:
      - "8004:8004"
    environment:
      <<: *common-env
      M4_PORT: "8004"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs/m4:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8004/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M

  # ============================================================
  # M5 潮汐记忆
  # ============================================================
  yunxi-m5:
    build:
      context: .
      dockerfile: M5-tide-memory/Dockerfile
    container_name: yunxi-m5
    ports:
      - "8005:8005"
    environment:
      <<: *common-env
      M5_PORT: "8005"
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./logs/m5:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8005/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M

  # ============================================================
  # M6 硬件外设
  # ============================================================
  yunxi-m6:
    build:
      context: .
      dockerfile: M6-hardware-peripheral/Dockerfile
    container_name: yunxi-m6
    ports:
      - "8006:8006"
    environment:
      <<: *common-env
      M6_PORT: "8006"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs/m6:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8006/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"
        reservations:
          memory: 64M

  # ============================================================
  # M7 工作流
  # ============================================================
  yunxi-m7:
    build:
      context: .
      dockerfile: docker/m7.Dockerfile
    container_name: yunxi-m7
    ports:
      - "8007:8007"
    environment:
      <<: *common-env
      M7_PORT: "8007"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs/m7:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8007/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M

  # ============================================================
  # M8 控制塔（运维中枢）
  # ============================================================
  yunxi-m8:
    build:
      context: .
      dockerfile: docker/m8.Dockerfile
    container_name: yunxi-m8
    ports:
      - "8008:8008"
    environment:
      <<: *common-env
      M8_PORT: "8008"
      M8_ADMIN_TOKEN: yunxi-admin-token-2026
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8008/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M

  # ============================================================
  # M9 数据水晶
  # ============================================================
  yunxi-m9:
    build:
      context: .
      dockerfile: docker/m9.Dockerfile
    container_name: yunxi-m9
    ports:
      - "8009:8009"
    environment:
      <<: *common-env
      M9_PORT: "8009"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs/m9:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8009/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M

  # ============================================================
  # M10 系统卫士
  # ============================================================
  yunxi-m10:
    build:
      context: .
      dockerfile: docker/m10.Dockerfile
    container_name: yunxi-m10
    ports:
      - "8010:8010"
    environment:
      <<: *common-env
      M10_PORT: "8010"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs/m10:/app/logs
      - ./config:/app/config:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8010/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    pid: host
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M

  # ============================================================
  # M11 MCP 总线
  # ============================================================
  yunxi-m11:
    build:
      context: .
      dockerfile: docker/m11.Dockerfile
    container_name: yunxi-m11
    ports:
      - "8011:8011"
    environment:
      <<: *common-env
      M11_PORT: "8011"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs/m11:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8011/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M

  # ============================================================
  # M12 安全盾
  # ============================================================
  yunxi-m12:
    build:
      context: .
      dockerfile: docker/m12.Dockerfile
    container_name: yunxi-m12
    ports:
      - "8012:8012"
    environment:
      <<: *common-env
      M12_PORT: "8012"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs/m12:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8012/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M

  # ============================================================
  # 监控基础设施
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: yunxi-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./tools/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M

  grafana:
    image: grafana/grafana:latest
    container_name: yunxi-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=yunxi-admin
      - GF_USERS_ALLOW_SIGN_UP=false
    <<: *common-restart
    <<: *common-networks
    <<: *common-logging
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"
        reservations:
          memory: 64M

volumes:
  redis_data:
    driver: local
  chroma_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  yunxi-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
