      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ----------------------------------------------------------
  # M7 积木平台（可视化工作流构建）
  # ----------------------------------------------------------
  yunxi-m7:
    build:
      context: .
      dockerfile: M7-workflow-builder/Dockerfile
