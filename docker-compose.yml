      - "8002:8002"
    env_file:
      - ./config/yunxi.env
    environment:
      - M2_PORT=8002
    depends_on:
      - redis
    networks:
      - yunxi-net
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ----------------------------------------------------------
  # M3 端云协同内核
  # ----------------------------------------------------------
  yunxi-m3:
    build:
      context: .
      dockerfile: M3-edge-cloud/Dockerfile
    container_name: yunxi-m3
    ports:
      - "8003:8003"
    env_file:
      - ./config/yunxi.env
    environment:
      - M3_PORT=8003
    depends_on:
      - redis
      - chromadb
    networks:
      - yunxi-net
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ----------------------------------------------------------
  # M4 场景引擎
  # ----------------------------------------------------------
  yunxi-m4:
    build:
      context: .
      dockerfile: M4-scene-engine/Dockerfile
    container_name: yunxi-m4
    ports:
