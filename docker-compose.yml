    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ----------------------------------------------------------
  # M9 编程开发模块
  # ----------------------------------------------------------
  yunxi-m9:
    build:
      context: .
      dockerfile: M9-dev-workshop/Dockerfile
    container_name: yunxi-m9
    ports:
