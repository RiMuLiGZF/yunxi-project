    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ----------------------------------------------------------
  # M5 潮汐记忆系统
  # ----------------------------------------------------------
  yunxi-m5:
    build:
      context: .
      dockerfile: M5-tide-memory/Dockerfile
    container_name: yunxi-m5
