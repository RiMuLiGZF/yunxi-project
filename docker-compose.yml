  # ----------------------------------------------------------
  # Ollama (可选 - 需要 GPU 的用户自行启用)
  # 用法: 取消下方注释后 docker compose up -d
  # ----------------------------------------------------------
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: yunxi-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   networks:
  #     - yunxi-net
  #   restart: unless-stopped

  # ----------------------------------------------------------
  # Prometheus 监控
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: yunxi-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./tools/observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - yunxi-net
    restart: unless-stopped

  # ----------------------------------------------------------
  # Grafana 可视化
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: yunxi-grafana
    ports:
      - "3000:3000"
    networks:
      - yunxi-net
    restart: unless-stopped

volumes:
  redis_data:
  chroma_data:
  prometheus_data:
  # ollama_data:

networks:
  yunxi-net:
    driver: bridge
